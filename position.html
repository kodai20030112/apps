<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="apple-touch-icon" href="icons/icon-position.png">
<meta name="apple-mobile-web-app-title" content="ポジション">
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>ポジション・ストーリー</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --ink: #1d1d1f;
    --ink-2: #6e6e73;
    --line: #e5e5ea;
    --accent: #0071e3;
    --gold: #ffb400;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.05);
    --radius: 18px;
    --pos: #0071e3;
    --pos-bg: #eef4ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }

  /* ---------- Top bar ---------- */
  header.topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(245,245,247,.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
    padding-top: env(safe-area-inset-top);
  }
  .topbar-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; max-width: 640px; margin: 0 auto; padding: 0 16px;
  }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .back-btn {
    background: none; border: none; color: var(--accent);
    font-size: 16px; cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 2px;
  }
  .sync {
    font-size: 12px; color: var(--ink-2); font-weight: 600; min-width: 84px; text-align: right;
  }

  /* ---------- Views ---------- */
  .view { display: none; padding: 18px 0 110px; }
  .view.active { display: block; animation: fade .28s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  h1.page { font-size: 28px; font-weight: 700; margin: 8px 0 4px; letter-spacing: -.02em; }
  .sub { color: var(--ink-2); font-size: 14px; margin: 0 0 18px; }

  /* ---------- Position cards (home) ---------- */
  .pos-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px; margin-bottom: 14px; cursor: pointer; transition: transform .14s, box-shadow .14s;
    border-left: 5px solid var(--pos); position: relative; overflow: hidden;
  }
  .pos-card:active { transform: scale(.99); }
  @media(hover:hover){ .pos-card:hover{ box-shadow: 0 10px 30px rgba(0,0,0,.09); } }
  .pos-top { display: flex; align-items: center; gap: 12px; }
  .pos-emoji {
    font-size: 26px; width: 48px; height: 48px; flex: 0 0 auto; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; background: var(--pos-bg);
  }
  .pos-jp { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
  .pos-en { font-size: 12px; color: var(--ink-2); font-weight: 600; letter-spacing: .03em; }
  .pos-role { font-size: 13px; color: var(--ink-2); margin-top: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pos-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .pos-stat { font-size: 12px; color: var(--pos); font-weight: 700; }
  .pos-date { font-size: 12px; color: var(--ink-2); }
  .pos-arrow { position: absolute; right: 16px; top: 22px; color: #c7c7cc; font-size: 20px; }

  /* ---------- Editor ---------- */
  .desc-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; margin-bottom: 18px; border-top: 5px solid var(--pos);
  }
  .desc-head { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .desc-emoji {
    font-size: 22px; width: 42px; height: 42px; flex: 0 0 auto; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; background: var(--pos-bg);
  }
  .desc-jp { font-size: 17px; font-weight: 700; }
  .desc-en { font-size: 11px; color: var(--ink-2); font-weight: 600; letter-spacing: .03em; }
  .desc-toggle { margin-left: auto; color: var(--pos); font-size: 13px; font-weight: 600; flex: 0 0 auto; }
  .desc-body { margin-top: 12px; display: none; }
  .desc-body.open { display: block; }
  .desc-body .lead { font-size: 14px; color: var(--ink); white-space: pre-wrap; }
  .desc-body .common { font-size: 13px; color: var(--ink-2); white-space: pre-wrap;
    margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .desc-body .tag { display: inline-block; font-size: 11px; font-weight: 700; color: var(--pos);
    background: var(--pos-bg); border-radius: 6px; padding: 2px 8px; margin-bottom: 6px; }

  .story-head { font-size: 13px; font-weight: 700; color: var(--ink-2); text-transform: uppercase;
    letter-spacing: .06em; margin: 4px 0 10px; }

  .sec {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 14px 12px; margin-bottom: 14px; border-left: 4px solid var(--pos);
  }
  .sec-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .sec-no {
    width: 22px; height: 22px; flex: 0 0 auto; border-radius: 7px; background: var(--pos);
    color: #fff; font-weight: 800; font-size: 12px; display: flex; align-items: center; justify-content: center;
  }
  .sec-tools { margin-left: auto; display: flex; gap: 2px; }
  .sec-tools button {
    background: none; border: none; color: var(--ink-2); font-size: 17px; cursor: pointer;
    padding: 4px 7px; border-radius: 8px; line-height: 1;
  }
  .sec-tools button:active { background: #f0f0f3; }
  .sec-tools button.del { color: #ff3b30; }
  .sec-tools button:disabled { opacity: .25; cursor: default; }
  input.sec-h {
    width: 100%; border: none; border-bottom: 1px solid var(--line); padding: 4px 2px 8px;
    font-size: 16px; font-weight: 700; font-family: inherit; color: var(--ink); background: none;
    margin-bottom: 8px;
  }
  input.sec-h:focus { outline: none; border-color: var(--pos); }
  input.sec-h::placeholder { color: #b8b8bd; font-weight: 600; }
  textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    font-size: 16px; font-family: inherit; resize: none; min-height: 70px; background: var(--card);
    color: var(--ink); line-height: 1.65; transition: border-color .15s; overflow: hidden;
  }
  textarea:focus { outline: none; border-color: var(--pos); }
  textarea::placeholder { color: #b8b8bd; }

  .add-sec {
    width: 100%; background: var(--card); color: var(--pos); border: 1px dashed var(--pos);
    border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
    margin-top: 2px; transition: .15s;
  }
  .add-sec:active { background: var(--pos-bg); }

  .primary {
    width: 100%; background: var(--pos); color: #fff; border: none; border-radius: 14px;
    padding: 15px; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity .15s; margin-top: 18px;
  }
  .primary:active { opacity: .85; }

  .empty { text-align: center; color: var(--ink-2); padding: 50px 20px; }
  .empty .big { font-size: 44px; margin-bottom: 10px; }

  /* ---------- Modal ---------- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--card); width: 100%; max-width: 640px; max-height: 90vh;
    border-radius: 20px 20px 0 0; padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: .5; } to { transform: none; opacity: 1; } }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal-desc { font-size: 13px; color: var(--ink-2); margin-bottom: 12px; }
  .modal-body { overflow-y: auto; }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal-actions button { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .m-primary { background: var(--pos); color: #fff; }
  .m-ghost { background: #f0f0f3; color: var(--ink); }
  @media (min-width: 768px){
    .modal-overlay{ align-items: center; padding: 24px; }
    .modal-sheet{ border-radius: 20px; }
  }
  .imgwrap { max-height: 60vh; overflow: auto; border-radius: 14px; border: 1px solid var(--line); background: #f5f5f7; -webkit-overflow-scrolling: touch; }
  .imgwrap img { width: 100%; display: block; }

  .toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px);
    background: rgba(29,29,31,.92); color: #fff; padding: 11px 20px; border-radius: 999px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: .25s; z-index: 300; backdrop-filter: blur(10px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <button class="back-btn" id="backBtn" style="visibility:hidden">‹ 戻る</button>
    <div class="topbar-title" id="topTitle">ポジション・ストーリー</div>
    <div class="sync" id="syncStatus"></div>
  </div>
</header>

<div class="wrap">

  <!-- ===== HOME ===== -->
  <section class="view active" id="view-home">
    <h1 class="page">Position Story</h1>
    <p class="sub">Apple Retailの役割に沿って、自分のストーリーを綴ろう。MacでもiPhoneでも、書きかけはそのまま引き継げます。</p>
    <div id="posList"></div>
  </section>

  <!-- ===== EDIT ===== -->
  <section class="view" id="view-edit">
    <div id="descHost"></div>
    <div class="story-head">あなたのストーリー</div>
    <div id="secList"></div>
    <button class="add-sec" id="addSec">＋ セクションを追加</button>
    <button class="primary" id="exportBtn">🖼 画像で書き出し</button>
  </section>

</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
/* =========================================================================
   ポジション定義  ★ここを編集すれば説明文を更新できます★
   - common: 3ポジション共通のApple Retailの説明
   - role  : 各ポジション固有の役割説明
   ========================================================================= */
const COMMON_INTRO =
  "Apple Retailは、Appleが提供する最高の製品やサービスが集結する場所です。私たちは専門的スキルを発揮しながら、お客様が大好きなことを追求できるようサポートし、Appleならではのエクスペリエンスを提供します。Appleでは、インクルージョンは全員が果たすべき共通の責任であると考えているため、誰もが帰属意識を持ち、最高の仕事がしたいという意欲をかき立てられるようなカルチャーを協力して育みます。";

const POSITIONS = [
  {
    id: "creative_pro", jp: "クリエイティブプロ", en: "Creative Pro", emoji: "🎨",
    color: "#af52de", bg: "#f6edfc",
    role: "クリエイティブプロは、お客様、ストアチーム、そして地域コミュニティ全体にAppleのエコシステムを推進します。ストアチームやお客様の学びを促進することで、Appleのテクノロジーが生み出す可能性を誰もが理解できるようにサポートし、お客様がAppleの製品のことを知り、オーナーになり、大好きになるきっかけを作り出します。"
  },
  {
    id: "expert", jp: "エキスパート", en: "Expert", emoji: "🎓",
    color: "#0071e3", bg: "#eef4ff",
    role: "エキスパートは、Appleのエコシステム全体の製品やサービスについて深く理解し、製品の販売、Appleの各種サービスの提案、卓越したカスタマーエクスペリエンスの提供に優れた能力を発揮します。また、優れた接客とはどういうものかを体現し、成果を上げるための方法について同僚のメンターとしての役割を担います。"
  },
  {
    id: "specialist", jp: "スペシャリスト", en: "Specialist", emoji: "🧭",
    color: "#ff9500", bg: "#fff4e6",
    role: "スペシャリストは、ブランドロイヤルティを構築し、Appleの製品やサービスのオーナーを創出します。そして、ほかに類を見ないカスタマーサービスを販売、提供することに力を尽くします。スペシャリストには好奇心が必要です。お客様のニーズを知るために質問し、お客様の人生を豊かにする製品やサービスを一人ひとりに合わせて提案します。"
  }
];
const POS_BY_ID = Object.fromEntries(POSITIONS.map(p => [p.id, p]));

/* =========================================================================
   状態・ストレージ・クラウド同期
   端末間同期は grownote と同じ grownote_state テーブルを別IDで間借り。
   → Supabase 側の追加設定（SQL）は不要。
   ========================================================================= */
const LS_KEY = "position_story_v1";
const SUPABASE_URL = "https://okbjqtdirrathscctyvx.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y";
const ROW_ID = "position_story_kodai";

/* DB 形: { positions: { <id>: { sections:[{heading,body}], updatedAt } }, _ts } */
let DB = loadLocal();
let curId = null;          // 編集中のポジションID
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{persistSession:false} }); } catch(e){}
let pushTimer = null, pushing = false;

function emptyDB(){ return { positions: {}, _ts: 0 }; }
function loadLocal(){ try { const d = JSON.parse(localStorage.getItem(LS_KEY)); return (d && d.positions) ? d : emptyDB(); } catch(e){ return emptyDB(); } }
function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
function getPos(id){ if(!DB.positions[id]) DB.positions[id] = { sections: [], updatedAt: 0 }; return DB.positions[id]; }

function setSync(t){ const e = document.getElementById("syncStatus"); if(e) e.textContent = t; }

/* 変更時：ローカル即保存＋クラウドへデバウンス送信 */
function touch(){
  DB._ts = Date.now();
  saveLocal();
  if(!sb){ return; }
  setSync("…"); clearTimeout(pushTimer); pushTimer = setTimeout(pushCloud, 1200);
}
async function pushCloud(){
  if(!sb || pushing) return;
  pushing = true; setSync("同期中…");
  try {
    const res = await sb.from("grownote_state").upsert({ id: ROW_ID, state: DB, updated_at: new Date().toISOString() });
    if(res.error){ console.error(res.error); setSync("⚠ 同期失敗"); }
    else setSync("✓ 同期済み");
  } catch(e){ console.error(e); setSync("⚠ 同期失敗"); }
  finally { pushing = false; }
}
async function pullCloud(){
  if(!sb) return null;
  try {
    const res = await sb.from("grownote_state").select("state").eq("id", ROW_ID).maybeSingle();
    if(res.error){ console.error(res.error); return null; }
    if(res.data && res.data.state && res.data.state.positions) return res.data.state;
  } catch(e){ console.error(e); }
  return null;
}
/* クラウドの方が新しければ取り込む */
function adoptIfNewer(cloud){
  if(cloud && (cloud._ts||0) > (DB._ts||0)){ DB = cloud; saveLocal(); return true; }
  return false;
}
async function bootstrapCloud(){
  if(!sb){ setSync("オフライン（この端末のみ）"); return; }
  setSync("読込中…");
  const cloud = await pullCloud();
  if(cloud){
    if(adoptIfNewer(cloud)) rerenderCurrent();
    setSync("✓ 同期済み");
    // ローカルの方が新しい（クラウド未作成 or 古い）なら一度上げる
    if((DB._ts||0) > (cloud._ts||0)) pushCloud();
  } else {
    // クラウドに行が無い → 初回アップロード
    if(Object.keys(DB.positions).length) { setSync("初回アップロード中…"); await pushCloud(); }
    else setSync("✓ 同期済み");
  }
}
/* 別端末から戻ったとき（タブ復帰）に最新を引き継ぐ */
function isEditingText(){ const a = document.activeElement; return a && (a.tagName==="TEXTAREA" || (a.tagName==="INPUT" && a.classList.contains("sec-h"))); }
document.addEventListener("visibilitychange", async ()=>{
  if(document.visibilityState !== "visible" || !sb) return;
  if(isEditingText()) return;              // 入力中は上書きしない
  const cloud = await pullCloud();
  if(cloud && adoptIfNewer(cloud)){ rerenderCurrent(); toast("別の端末の更新を反映しました"); }
});

/* =========================================================================
   画面遷移
   ========================================================================= */
const VIEWS = { home: "view-home", edit: "view-edit" };
function show(v){
  Object.entries(VIEWS).forEach(([k,id]) => document.getElementById(id).classList.toggle("active", k===v));
  document.getElementById("backBtn").style.visibility = (v==="home") ? "hidden" : "visible";
  document.getElementById("topTitle").textContent = (v==="edit" && curId) ? POS_BY_ID[curId].jp : "ポジション・ストーリー";
  window.scrollTo(0,0);
}
function rerenderCurrent(){
  const editActive = document.getElementById("view-edit").classList.contains("active");
  if(editActive && curId) renderEdit(curId); else renderHome();
}

/* =========================================================================
   ホーム：ポジション一覧
   ========================================================================= */
function charCount(p){ return (p.sections||[]).reduce((a,s)=> a + (s.heading||"").length + (s.body||"").length, 0); }
function fmtDate(ts){ if(!ts) return ""; const d = new Date(ts); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; }
function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function renderHome(){
  const host = document.getElementById("posList");
  host.innerHTML = POSITIONS.map(p=>{
    const d = DB.positions[p.id];
    const n = d ? charCount(d) : 0;
    const stat = n>0 ? `✍️ ${n.toLocaleString()}文字` : "まだ書いていません";
    const date = d && d.updatedAt ? `更新 ${fmtDate(d.updatedAt)}` : "";
    return `<div class="pos-card" data-id="${p.id}" style="--pos:${p.color};--pos-bg:${p.bg}">
      <span class="pos-arrow">›</span>
      <div class="pos-top">
        <div class="pos-emoji">${p.emoji}</div>
        <div>
          <div class="pos-jp">${p.jp}</div>
          <div class="pos-en">${p.en}</div>
        </div>
      </div>
      <div class="pos-role">${esc(p.role)}</div>
      <div class="pos-foot">
        <span class="pos-stat">${stat}</span>
        <span class="pos-date">${date}</span>
      </div>
    </div>`;
  }).join("");
  host.querySelectorAll(".pos-card").forEach(el=>{
    el.onclick = ()=>{ openEdit(el.dataset.id); };
  });
}

/* =========================================================================
   編集：説明文＋ストーリー（セクション）
   ========================================================================= */
function openEdit(id){ curId = id; renderEdit(id); show("edit"); }

function renderEdit(id){
  const p = POS_BY_ID[id];
  document.documentElement.style.setProperty("--pos", p.color);
  document.documentElement.style.setProperty("--pos-bg", p.bg);
  const pos = getPos(id);
  if(!pos.sections.length) pos.sections.push({ heading:"", body:"" });

  // 説明カード
  document.getElementById("descHost").innerHTML = `
    <div class="desc-card">
      <div class="desc-head" id="descHead">
        <div class="desc-emoji">${p.emoji}</div>
        <div>
          <div class="desc-jp">${p.jp}</div>
          <div class="desc-en">${p.en} ・ Apple Retail</div>
        </div>
        <div class="desc-toggle" id="descToggle">説明 ▾</div>
      </div>
      <div class="desc-body" id="descBody">
        <span class="tag">この役割</span>
        <div class="lead">${esc(p.role)}</div>
        <div class="common">${esc(COMMON_INTRO)}</div>
      </div>
    </div>`;
  const body = document.getElementById("descBody"), tg = document.getElementById("descToggle");
  document.getElementById("descHead").onclick = ()=>{
    const open = body.classList.toggle("open");
    tg.textContent = open ? "説明 ▴" : "説明 ▾";
  };

  renderSections(id);
}

function renderSections(id){
  const pos = getPos(id);
  const host = document.getElementById("secList");
  host.innerHTML = pos.sections.map((s,i)=>`
    <div class="sec" data-i="${i}">
      <div class="sec-bar">
        <div class="sec-no">${i+1}</div>
        <div class="sec-tools">
          <button class="up" title="上へ" ${i===0?"disabled":""}>↑</button>
          <button class="down" title="下へ" ${i===pos.sections.length-1?"disabled":""}>↓</button>
          <button class="del" title="削除">🗑</button>
        </div>
      </div>
      <input class="sec-h" type="text" placeholder="見出し（任意）— 例：私が大切にしていること" value="${esc(s.heading)}">
      <textarea class="sec-b" placeholder="ここに自由に綴ってください。文量はいくらでもOK。">${esc(s.body)}</textarea>
    </div>`).join("");

  host.querySelectorAll(".sec").forEach(secEl=>{
    const i = +secEl.dataset.i;
    const ta = secEl.querySelector(".sec-b");
    autoGrow(ta);
    secEl.querySelector(".sec-h").addEventListener("input", e=>{ pos.sections[i].heading = e.target.value; pos.updatedAt = Date.now(); touch(); });
    ta.addEventListener("input", e=>{ pos.sections[i].body = e.target.value; autoGrow(ta); pos.updatedAt = Date.now(); touch(); });
    secEl.querySelector(".up").onclick   = ()=> moveSection(id, i, -1);
    secEl.querySelector(".down").onclick = ()=> moveSection(id, i, 1);
    secEl.querySelector(".del").onclick  = ()=> deleteSection(id, i);
  });
}
function moveSection(id, i, dir){
  const pos = getPos(id), j = i + dir;
  if(j < 0 || j >= pos.sections.length) return;
  [pos.sections[i], pos.sections[j]] = [pos.sections[j], pos.sections[i]];
  pos.updatedAt = Date.now(); touch(); renderSections(id);
}
function deleteSection(id, i){
  const pos = getPos(id);
  const s = pos.sections[i];
  const empty = !(s.heading||"").trim() && !(s.body||"").trim();
  const doDel = ()=>{
    pos.sections.splice(i,1);
    if(!pos.sections.length) pos.sections.push({ heading:"", body:"" });
    pos.updatedAt = Date.now(); touch(); renderSections(id);
  };
  if(empty){ doDel(); return; }
  openModal({
    title:"セクションを削除", desc:"このセクションの内容を削除します。元に戻せません。",
    actions:[
      { label:"キャンセル", primary:false, onClick: closeModal },
      { label:"削除する", primary:true, onClick: ()=>{ closeModal(); doDel(); } }
    ]
  });
}
function autoGrow(ta){ ta.style.height = "auto"; ta.style.height = Math.max(ta.scrollHeight, 70) + "px"; }

document.getElementById("addSec").onclick = ()=>{
  const pos = getPos(curId);
  pos.sections.push({ heading:"", body:"" });
  pos.updatedAt = Date.now(); touch(); renderSections(curId);
  const list = document.getElementById("secList");
  const last = list.lastElementChild;
  if(last){ last.querySelector(".sec-h").focus(); last.scrollIntoView({behavior:"smooth", block:"center"}); }
};

/* =========================================================================
   画像で書き出し
   ========================================================================= */
const IMG_FONT = (w,s)=>`${w} ${s}px -apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif`;
function wrapPara(ctx, text, maxW){
  const out = [];
  (text||"").split("\n").forEach(p=>{
    if(!p){ out.push(""); return; }
    let line = "";
    for(const ch of p){
      if(ctx.measureText(line+ch).width > maxW && line){ out.push(line); line = ch; }
      else line += ch;
    }
    out.push(line);
  });
  return out;
}
function exportImage(id){
  const p = POS_BY_ID[id];
  const pos = getPos(id);
  const accent = p.color;
  const W = 560, PAD = 22, CARDW = W - PAD*2, IN = 18, GAP = 12, BAR = 4, maxTextW = CARDW - IN*2;
  const mc = document.createElement("canvas").getContext("2d");

  // 書き出すセクション（中身のあるものだけ）
  const secs = pos.sections.filter(s => (s.heading||"").trim() || (s.body||"").trim());

  // カードを組み立てる（説明 → 各ストーリー）
  const cards = [];
  cards.push({ accent:true, tag:"この役割",
    blocks:[{ text:p.role, font:IMG_FONT(500,17), color:"#1d1d1f", lineH:27 }] });
  secs.forEach((s,i)=>{
    const blocks = [];
    if((s.heading||"").trim()) blocks.push({ text:s.heading.trim(), font:IMG_FONT(800,17), color:accent, lineH:26, gap:4 });
    if((s.body||"").trim())    blocks.push({ text:s.body.trim(), font:IMG_FONT(500,16), color:"#1d1d1f", lineH:26 });
    if(!blocks.length) return;
    cards.push({ accent:false, no:i+1, blocks });
  });

  // ヘッダー寸法
  mc.font = IMG_FONT(700,24);
  const titleLines = wrapPara(mc, p.jp, CARDW - 56);
  const headBottom = 30 + 56 + Math.max(0, (titleLines.length-1))*32 + 14;

  // 各カード高さ
  cards.forEach(c=>{
    let h = IN + (c.tag ? 22 : 0);
    c._wrapped = c.blocks.map(b=>{ mc.font = b.font; const wl = wrapPara(mc, b.text, maxTextW); h += wl.length*b.lineH + (b.gap||0); return wl; });
    h += IN; c._h = h;
  });
  const footerH = 38;
  const totalH = Math.ceil(headBottom + 6 + cards.reduce((a,x)=>a+x._h+GAP, 0) + footerH);

  const scale = 2, cv = document.createElement("canvas");
  cv.width = W*scale; cv.height = totalH*scale;
  const ctx = cv.getContext("2d"); ctx.scale(scale,scale); ctx.textBaseline = "top";
  ctx.fillStyle = "#f5f5f7"; ctx.fillRect(0,0,W,totalH);
  function rr(x,yy,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,yy); ctx.arcTo(x+w,yy,x+w,yy+h,r); ctx.arcTo(x+w,yy+h,x,yy+h,r); ctx.arcTo(x,yy+h,x,yy,r); ctx.arcTo(x,yy,x+w,yy,r); ctx.closePath(); }

  // ヘッダー：絵文字バッジ＋ポジション名
  let y = 30;
  ctx.fillStyle = p.bg; rr(PAD, y, 46, 46, 13); ctx.fill();
  ctx.font = IMG_FONT(400,26); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(p.emoji, PAD+23, y+25); ctx.textAlign="left"; ctx.textBaseline="top";
  let ty = y + (titleLines.length>1 ? 2 : 6);
  ctx.fillStyle = "#1d1d1f"; ctx.font = IMG_FONT(700,24);
  titleLines.forEach(l=>{ ctx.fillText(l, PAD+58, ty); ty += 32; });
  ctx.fillStyle = accent; ctx.font = IMG_FONT(700,12);
  ctx.fillText(p.en.toUpperCase() + " ・ APPLE RETAIL", PAD+58, ty);
  y = headBottom + 6;

  // カード描画
  cards.forEach(c=>{
    const cardY = y;
    ctx.fillStyle = "#ffffff"; rr(PAD, cardY, CARDW, c._h, 14); ctx.fill();
    ctx.strokeStyle = "#ececf0"; ctx.lineWidth = 1; rr(PAD+.5, cardY+.5, CARDW-1, c._h-1, 14); ctx.stroke();
    ctx.fillStyle = accent; rr(PAD, cardY+12, BAR, c._h-24, 2); ctx.fill();
    const cx = PAD + IN; let cy = cardY + IN;
    if(c.tag){
      ctx.font = IMG_FONT(700,11); const tw = ctx.measureText(c.tag).width;
      ctx.fillStyle = p.bg; rr(cx, cy, tw+16, 18, 6); ctx.fill();
      ctx.fillStyle = accent; ctx.fillText(c.tag, cx+8, cy+3); cy += 22;
    } else if(c.no){
      ctx.fillStyle = accent; rr(cx, cy+1, 18, 18, 6); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = IMG_FONT(800,11); ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(String(c.no), cx+9, cy+11); ctx.textAlign="left"; ctx.textBaseline="top";
    }
    const tx = c.no ? cx + 26 : cx;
    if(c.no) cy = cardY + IN - 1;
    c.blocks.forEach((b,bi)=>{ ctx.font = b.font; ctx.fillStyle = b.color; c._wrapped[bi].forEach(l=>{ ctx.fillText(l, tx, cy); cy += b.lineH; }); cy += (b.gap||0); });
    y = cardY + c._h + GAP;
  });

  // フッター
  ctx.fillStyle = "#9a9aa0"; ctx.font = IMG_FONT(500,12);
  const total = charCount(pos);
  ctx.fillText(`Position Story ・ ${p.en} ・ ${total.toLocaleString()}文字`, PAD, y+4);

  const ymd = (()=>{ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; })();
  const fname = `PositionStory_${p.en.replace(/\s/g,"")}_${ymd}.png`;
  cv.toBlob(b=>{ if(!b){ toast("画像化に失敗しました"); return; } showImageSheet(URL.createObjectURL(b), b, fname); }, "image/png");
}
function showImageSheet(url, blob, fname){
  openModal({
    title: "🖼 画像で書き出し",
    desc: "画像を長押しでも保存・共有できます。下のボタンからもどうぞ。",
    bodyHTML: `<div class="imgwrap"><img src="${url}" alt="ポジション・ストーリー"></div>`,
    actions: [
      { label: "閉じる", primary: false, onClick: ()=>{ closeModal(); setTimeout(()=>URL.revokeObjectURL(url), 500); } },
      { label: "保存・共有", primary: true, onClick: async ()=>{
          try {
            const file = new File([blob], fname, { type:"image/png" });
            if(navigator.canShare && navigator.canShare({ files:[file] })){ await navigator.share({ files:[file], title:"ポジション・ストーリー" }); }
            else { const a = document.createElement("a"); a.href = url; a.download = fname; document.body.appendChild(a); a.click(); a.remove(); toast("画像を保存しました"); }
          } catch(e) {}
      } }
    ]
  });
}
document.getElementById("exportBtn").onclick = ()=>{
  const pos = getPos(curId);
  const has = pos.sections.some(s => (s.heading||"").trim() || (s.body||"").trim());
  if(!has){ toast("まずはストーリーを書いてみましょう ✍️"); return; }
  exportImage(curId);
};

/* =========================================================================
   モーダル・トースト
   ========================================================================= */
function openModal({ title="", desc="", bodyHTML="", actions=[] }){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalDesc").textContent = desc;
  document.getElementById("modalDesc").style.display = desc ? "block" : "none";
  document.getElementById("modalBody").innerHTML = bodyHTML;
  const act = document.getElementById("modalActions"); act.innerHTML = "";
  actions.forEach(a=>{
    const b = document.createElement("button");
    b.className = a.primary ? "m-primary" : "m-ghost";
    b.textContent = a.label; b.onclick = a.onClick;
    act.appendChild(b);
  });
  document.getElementById("modal").classList.add("show");
}
function closeModal(){ document.getElementById("modal").classList.remove("show"); }
document.getElementById("modal").addEventListener("click", e=>{ if(e.target.id==="modal") closeModal(); });

let toastT = null;
function toast(msg){ const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove("show"), 1700); }

/* =========================================================================
   ナビ・起動
   ========================================================================= */
document.getElementById("backBtn").onclick = ()=>{ renderHome(); show("home"); };

renderHome();
bootstrapCloud();
</script>

<style>
  #tsumikiBack{
    position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:12px; z-index:1000;
    display:none; align-items:center; gap:2px;
    background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:999px;
    padding:6px 12px 6px 9px; font-size:13px; font-weight:600;
    color:#0071e3; text-decoration:none; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    box-shadow:0 2px 10px rgba(0,0,0,.10); -webkit-tap-highlight-color:transparent;
    transition:transform .28s cubic-bezier(.22,.61,.36,1), opacity .28s ease;
    will-change:transform,opacity;
  }
  #tsumikiBack.show{display:inline-flex;}
  #tsumikiBack.hide{transform:translateX(-130%); opacity:0; pointer-events:none;}
  #tsumikiBack:active{transform:scale(.95);}
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<a id="tsumikiBack" href="index.html">‹ つみき</a>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var pill = document.getElementById('tsumikiBack');
    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');
    pill.classList.add('show');

    function goBack(){ location.href = 'index.html'; }

    var lastY = window.scrollY || 0, ticking = false;
    function onScroll(){
      var y = window.scrollY || 0;
      if(y <= 4){ pill.classList.remove('hide'); }
      else if(y > lastY + 6){ pill.classList.add('hide'); }
      else if(y < lastY - 6){ pill.classList.remove('hide'); }
      lastY = y; ticking = false;
    }
    window.addEventListener('scroll', function(){
      if(!ticking){ window.requestAnimationFrame(onScroll); ticking = true; }
    }, {passive:true});

    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>

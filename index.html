<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icons/icon-index.png">
<meta name="apple-mobile-web-app-title" content="つみき">
<title>つみき — こうだいの制作物</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
    --line:#e5e5ea; --accent:#0071e3; --radius:20px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    line-height:1.6; padding:env(safe-area-inset-top) 16px 48px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px; margin:0 auto;}
  header{padding:40px 4px 28px; text-align:center;}
  .logo{font-size:44px; line-height:1;}
  h1{font-size:30px; font-weight:700; letter-spacing:-.02em; margin-top:10px;}
  .tagline{color:var(--sub); font-size:15px; margin-top:8px;}
  .count{color:var(--sub); font-size:13px; margin-top:16px;}
  .section{margin-top:30px;}
  .section h2{font-size:19px; font-weight:700; letter-spacing:-.01em;
    padding:0 4px 12px; display:flex; align-items:center; gap:9px;}
  .section h2 .cat-emoji{font-size:22px;}
  .section h2 .badge{margin-left:auto; font-size:12px; font-weight:600; color:var(--sub);
    background:var(--card); border:1px solid var(--line); border-radius:999px; padding:3px 11px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(min-width:560px){ .grid{grid-template-columns:repeat(3,1fr);} }
  a.card{
    display:flex; flex-direction:column; justify-content:space-between; gap:12px;
    text-decoration:none; aspect-ratio:1/1; overflow:hidden;
    background:var(--card); border:1px solid var(--line); border-radius:24px;
    padding:18px 16px; color:var(--ink);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  a.card:active{transform:scale(.96);}
  @media(hover:hover){ a.card:hover{transform:translateY(-3px); box-shadow:0 10px 28px rgba(0,0,0,.09);} }
  .emoji{font-size:27px; flex:0 0 auto; width:50px; height:50px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg); border-radius:16px;}
  .txt{min-width:0; display:flex; flex-direction:column; gap:3px;}
  .title{display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; font-size:15px; font-weight:600; letter-spacing:-.01em; line-height:1.3;}
  .desc{display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; font-size:12px; color:var(--sub); line-height:1.4;}
  footer{text-align:center; color:var(--sub); font-size:12px; margin-top:36px; line-height:1.8;}
  /* 今週のWork ダッシュボード */
  .dash{margin-top:22px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:18px 18px 8px;}
  .dash h2{font-size:17px; font-weight:700; letter-spacing:-.01em;
    display:flex; align-items:center; gap:8px;}
  .dash .ds{color:var(--sub); font-size:13px; margin-top:3px;}
  .dstats{display:flex; gap:10px; margin:14px 0 4px;}
  .dstat{flex:1; background:var(--bg); border-radius:14px; padding:12px 14px;}
  .dstat b{font-size:25px; font-weight:700; display:block; letter-spacing:-.02em; line-height:1.1;}
  .dstat span{font-size:12px; color:var(--sub);}
  .feed-title{font-size:12px; color:var(--sub); font-weight:600; margin:16px 4px 4px;}
  a.fitem{display:flex; align-items:center; gap:11px; padding:11px 6px;
    text-decoration:none; color:var(--ink); border-top:1px solid var(--line);}
  a.fitem:first-of-type{border-top:none;}
  a.fitem:active{background:var(--bg);}
  .fitem .fe{font-size:20px; width:30px; text-align:center; flex:0 0 auto;}
  .fitem .ft{min-width:0; flex:1;}
  .fitem .fs{display:block; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fitem .fm{display:block; font-size:11px; color:var(--sub); margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fitem .fa{margin-left:auto; color:#c7c7cc; font-size:18px; flex:0 0 auto;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🧱</div>
    <h1>つみき</h1>
    <p class="tagline">こうだいの制作物 — 小さなアプリを積み上げる</p>
    <p class="count" id="count"></p>
  </header>

  <section id="dash" class="dash" hidden></section>

  <main id="app"></main>

  <footer>
    更新日 2026-06-03<br>
    tsumiki-apps.github.io
  </footer>
</div>

<script src="career.js"></script>
<script>
  const categories = [
    {key:"work", emoji:"💼", label:"Work", apps:[
      {emoji:"🔎", title:"横断検索", desc:"STARS・GROW・5Whys・Recognitionを一括検索", href:"search.html"},
      {emoji:"📊", title:"NPSカウンター", desc:"NPS目標から必要Promoter数を逆算", href:"nps.html"},
      {emoji:"📈", title:"Weekly Recap", desc:"週次リキャップ画像を作成", href:"recap.html"},
      {emoji:"🌟", title:"Recognition", desc:"承認・称賛を記録", href:"recognition.html"},
      {emoji:"🌳", title:"GROW ノート", desc:"1on1の成長に伴走するノート", href:"grownote.html"},
      {emoji:"🔍", title:"5Whys ノート", desc:"連鎖型5Whysで本音を深掘り", href:"team5whys.html"},
      {emoji:"🪞", title:"STARS 振り返り", desc:"面接で使える経験を蓄積", href:"reflection.html"},
      {emoji:"🔐", title:"Password mgr", desc:"パスワードをジャンルごとに保管", href:"vault.html"},
      {emoji:"🎁", title:"おすそわけ", desc:"作ったアプリを誰に届けたか記録", href:"osusowake.html"},
      {emoji:"🗓️", title:"スケジュール→カレンダー", desc:"Excelの予定を.icsに変換して取り込む", href:"schedule.html"},
      {emoji:"🗂️", title:"キャリアログ", desc:"Work活動の足跡を自動で残しレジュメ素材に", href:"career.html"},
    ]},
    {key:"private", emoji:"🌿", label:"Private", apps:[
      {emoji:"⏰", title:"つぎいつ？", desc:"美容室や脱毛など、次に行く日を計算して通知", href:"tsugi.html"},
      {emoji:"🍳", title:"ゆずごはん日記", desc:"ふたりで共有する献立ノート", href:"cooking.html"},
      {emoji:"🌱", title:"ツナグ", desc:"夢と今日をつなぐ努力の記録", href:"tsunagu.html"},
    ]},
    {key:"asset", emoji:"💰", label:"Asset", apps:[
      {emoji:"💳", title:"クレジット明細マネージャー", desc:"立て替え＆クレカ支出を分けて管理", href:"credit.html"},
      {emoji:"💴", title:"お金の残高 計算ツール", desc:"残高をサッと計算", href:"money.html"},
      {emoji:"📉", title:"資産予測グラフ", desc:"資産の推移を予測して可視化", href:"forecast.html"},
    ]},
  ];
  const app = document.getElementById("app");
  let total = 0;
  categories.forEach(cat=>{
    total += cat.apps.length;
    const sec = document.createElement("section");
    sec.className = "section";
    const cards = cat.apps.map(a =>
      '<a class="card" href="'+a.href+'">'+
        '<span class="emoji">'+a.emoji+'</span>'+
        '<span class="txt"><span class="title">'+a.title+'</span>'+
        '<span class="desc">'+a.desc+'</span></span>'+
      '</a>'
    ).join("");
    sec.innerHTML =
      '<h2><span class="cat-emoji">'+cat.emoji+'</span>'+cat.label+
      '<span class="badge">'+cat.apps.length+'</span></h2>'+
      '<div class="grid">'+cards+'</div>';
    app.appendChild(sec);
  });
  document.getElementById("count").textContent = total + " 個のアプリ";

  /* ===== 今週のWork ダッシュボード ===== */
  const APP_HREF = {
    nps:"nps.html", recap:"recap.html", recognition:"recognition.html",
    grownote:"grownote.html", team5whys:"team5whys.html", reflection:"reflection.html",
    vault:"vault.html", osusowake:"osusowake.html", schedule:"schedule.html",
  };
  function relTime(ts){
    const diff = Date.now() - ts, m=60000, h=3600000, d=86400000;
    if(diff < m) return "たった今";
    if(diff < h) return Math.floor(diff/m) + "分前";
    if(diff < d) return Math.floor(diff/h) + "時間前";
    if(diff < 7*d) return Math.floor(diff/d) + "日前";
    const dt = new Date(ts); return (dt.getMonth()+1) + "/" + dt.getDate();
  }
  function startOfWeek(){
    const n = new Date(); n.setHours(0,0,0,0);
    n.setDate(n.getDate() - ((n.getDay()+6)%7));   // 月曜始まり
    return n.getTime();
  }
  function esc(s){ return String(s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  (async function(){
    if(!window.Career || !Career.getAll) return;
    let res; try{ res = await Career.getAll(); }catch(e){ return; }
    const items = (res && res.items) || [];
    if(!items.length) return;

    const sow = startOfWeek();
    const week = items.filter(e => (e.ts||0) >= sow);
    const achThisWeek = week.filter(e => e.action !== "visit").length;
    const activeDays = new Set(week.map(e => new Date(e.ts).toDateString())).size;

    let recent = items.filter(e => e.action !== "visit").slice(0,5);
    if(!recent.length) recent = items.slice(0,5);

    const apps = (Career.APPS) || {};
    const rows = recent.map(e=>{
      const meta = apps[e.app] || {};
      const href = APP_HREF[e.app] || (e.app + ".html");
      return '<a class="fitem" href="'+href+'">'+
        '<span class="fe">'+(meta.emoji||"•")+'</span>'+
        '<span class="ft"><span class="fs">'+esc(e.summary || (meta.label||e.app))+'</span>'+
        '<span class="fm">'+esc(meta.label||e.app)+' ・ '+relTime(e.ts)+'</span></span>'+
        '<span class="fa">›</span></a>';
    }).join("");

    const dash = document.getElementById("dash");
    dash.innerHTML =
      '<h2>📊 今週のWork</h2>'+
      '<p class="ds">'+(res.connected ? "クラウド同期中" : "この端末の記録")+'</p>'+
      '<div class="dstats">'+
        '<div class="dstat"><b>'+achThisWeek+'</b><span>今週の実績</span></div>'+
        '<div class="dstat"><b>'+activeDays+'<small style="font-size:15px">日</small></b><span>活動した日</span></div>'+
      '</div>'+
      '<p class="feed-title">最近の足跡</p>'+ rows;
    dash.hidden = false;
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icons/icon-index.png">
<meta name="apple-mobile-web-app-title" content="つみき">
<title>つみき — こうだいの制作物</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
    --line:#e5e5ea; --accent:#0071e3; --radius:20px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    line-height:1.6; padding:env(safe-area-inset-top) 16px 48px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px; margin:0 auto;}
  header{padding:40px 4px 28px; text-align:center;}
  .logo{font-size:44px; line-height:1;}
  h1{font-size:30px; font-weight:700; letter-spacing:-.02em; margin-top:10px;}
  .tagline{color:var(--sub); font-size:15px; margin-top:8px;}
  .count{color:var(--sub); font-size:13px; margin-top:16px;}
  .section{margin-top:30px;}
  .section h2{font-size:19px; font-weight:700; letter-spacing:-.01em;
    padding:0 4px 12px; display:flex; align-items:center; gap:9px;}
  .section h2 .cat-emoji{font-size:22px;}
  .section h2 .badge{margin-left:auto; font-size:12px; font-weight:600; color:var(--sub);
    background:var(--card); border:1px solid var(--line); border-radius:999px; padding:3px 11px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(min-width:560px){ .grid{grid-template-columns:repeat(3,1fr);} }
  a.card{
    display:flex; flex-direction:column; justify-content:space-between; gap:12px;
    text-decoration:none; aspect-ratio:1/1; overflow:hidden;
    background:var(--card); border:1px solid var(--line); border-radius:24px;
    padding:18px 16px; color:var(--ink);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  a.card:active{transform:scale(.96);}
  @media(hover:hover){ a.card:hover{transform:translateY(-3px); box-shadow:0 10px 28px rgba(0,0,0,.09);} }
  .emoji{font-size:27px; flex:0 0 auto; width:50px; height:50px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg); border-radius:16px;}
  .txt{min-width:0; display:flex; flex-direction:column; gap:3px;}
  .title{display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; font-size:15px; font-weight:600; letter-spacing:-.01em; line-height:1.3;}
  .desc{display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; font-size:12px; color:var(--sub); line-height:1.4;}
  footer{text-align:center; color:var(--sub); font-size:12px; margin-top:36px; line-height:1.8;}
  /* 今週のWork ダッシュボード */
  .dash{margin-top:22px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:18px 18px 10px;}
  .dash-head{display:flex; align-items:center; gap:8px;}
  .dash h2{font-size:17px; font-weight:700; letter-spacing:-.01em;
    display:flex; align-items:center; gap:8px;}
  .dash .ds{margin-left:auto; font-size:11px; font-weight:600; color:var(--sub);
    background:var(--bg); border-radius:999px; padding:4px 10px; display:flex; align-items:center; gap:5px;}
  .ds .dot{width:7px; height:7px; border-radius:50%; background:#34c759;}
  .ds.off .dot{background:#c7c7cc;}
  /* ヒーロー統計 */
  .dstats{display:flex; gap:10px; margin:16px 0 4px;}
  .dstat{flex:1; background:var(--bg); border-radius:16px; padding:13px 12px 12px; text-align:center;}
  .dstat .di{font-size:18px; line-height:1;}
  .dstat b{font-size:28px; font-weight:800; display:block; letter-spacing:-.03em; line-height:1.05;
    margin-top:6px; color:var(--accent);}
  .dstat b small{font-size:15px; font-weight:700;}
  .dstat span{font-size:11px; color:var(--sub); display:block; margin-top:2px;}
  .dstat.warm b{color:#ff9500;}
  /* アプリ×曜日 ヒートマップ */
  .hm{margin:20px 0 6px; display:flex; flex-direction:column; gap:5px;}
  .hm-row{display:grid; grid-template-columns:var(--hm-app) repeat(7,1fr) 26px;
    gap:5px; align-items:center; --hm-app:96px;}
  @media(max-width:420px){ .hm-row{--hm-app:74px; gap:4px;} }
  .hm-app{display:flex; align-items:center; gap:6px; min-width:0;
    text-decoration:none; color:inherit;}
  .hm-app:active{opacity:.55;}
  .hm-app .he{font-size:15px; flex:0 0 auto;}
  .hm-app .hl{font-size:12px; color:var(--ink); overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;}
  .hm-cell{aspect-ratio:1/1; border-radius:5px; background:#ebebf0;
    transition:transform .12s ease;}
  .hm-cell.l1{background:#cfe3ff;} .hm-cell.l2{background:#8fc0ff;}
  .hm-cell.l3{background:#3b93ff;} .hm-cell.l4{background:#0071e3;}
  .hm-cell.today{box-shadow:0 0 0 2px #ff9500 inset;}
  .hm-tot{font-size:12px; font-weight:800; color:var(--sub); text-align:right;}
  /* ヘッダー行（曜日ラベル） */
  .hm-head .hm-dl{font-size:11px; color:var(--sub); text-align:center; line-height:1;}
  .hm-head .hm-dl.today{color:#ff9500; font-weight:800;}
  /* 凡例 */
  .hm-leg{display:flex; align-items:center; justify-content:flex-end; gap:5px;
    margin:8px 2px 2px; font-size:10px; color:var(--sub);}
  .hm-leg i{width:13px; height:13px; border-radius:4px; display:inline-block;}
  .hm-empty{margin:18px 4px; text-align:center; font-size:13px; color:var(--sub);}
  .feed-title{font-size:12px; color:var(--sub); font-weight:600; margin:18px 4px 4px;}
  a.fitem{display:flex; align-items:center; gap:11px; padding:11px 6px;
    text-decoration:none; color:var(--ink); border-top:1px solid var(--line);}
  a.fitem:first-of-type{border-top:none;}
  a.fitem:active{background:var(--bg);}
  .fitem .fe{font-size:20px; width:30px; text-align:center; flex:0 0 auto;}
  .fitem .ft{min-width:0; flex:1;}
  .fitem .fs{display:block; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fitem .fm{display:block; font-size:11px; color:var(--sub); margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fitem .fa{margin-left:auto; color:#c7c7cc; font-size:18px; flex:0 0 auto;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🧱</div>
    <h1>つみき</h1>
    <p class="tagline">こうだいの制作物 — 小さなアプリを積み上げる</p>
    <p class="count" id="count"></p>
  </header>

  <section id="dash" class="dash" hidden></section>

  <main id="app"></main>

  <footer>
    更新日 2026-06-03<br>
    tsumiki-apps.github.io
  </footer>
</div>

<script src="career.js"></script>
<script>
  const categories = [
    {key:"work", emoji:"💼", label:"Work", apps:[
      {emoji:"🔎", title:"横断検索", desc:"STARS・GROW・5Whys・Recognitionを一括検索", href:"search.html"},
      {emoji:"📊", title:"NPSカウンター", desc:"NPS目標から必要Promoter数を逆算", href:"nps.html"},
      {emoji:"📈", title:"Weekly Recap", desc:"週次リキャップ画像を作成", href:"recap.html"},
      {emoji:"🌟", title:"Recognition", desc:"承認・称賛を記録", href:"recognition.html"},
      {emoji:"🌳", title:"GROW ノート", desc:"1on1の成長に伴走するノート", href:"grownote.html"},
      {emoji:"🔍", title:"5Whys ノート", desc:"連鎖型5Whysで本音を深掘り", href:"team5whys.html"},
      {emoji:"🪞", title:"STARS 振り返り", desc:"面接で使える経験を蓄積", href:"reflection.html"},
      {emoji:"🔐", title:"Password mgr", desc:"パスワードをジャンルごとに保管", href:"vault.html"},
      {emoji:"🎁", title:"おすそわけ", desc:"作ったアプリを誰に届けたか記録", href:"osusowake.html"},
      {emoji:"🗓️", title:"スケジュール→カレンダー", desc:"Excelの予定を.icsに変換して取り込む", href:"schedule.html"},
      {emoji:"🗂️", title:"キャリアログ", desc:"Work活動の足跡を自動で残しレジュメ素材に", href:"career.html"},
      {emoji:"🎤", title:"Interviewノート", desc:"昇進面接の質問・回答・FBを記録", href:"interview.html"},
    ]},
    {key:"private", emoji:"🌿", label:"Private", apps:[
      {emoji:"⏰", title:"つぎいつ？", desc:"美容室や脱毛など、次に行く日を計算して通知", href:"tsugi.html"},
      {emoji:"🍳", title:"ゆずごはん日記", desc:"ふたりで共有する献立ノート", href:"cooking.html"},
      {emoji:"🌱", title:"ツナグ", desc:"夢と今日をつなぐ努力の記録", href:"tsunagu.html"},
      {emoji:"🌴", title:"たびのき", desc:"ふたりで作る旅のしおり。時刻つきの計画を共有", href:"tabinoki.html"},
      {emoji:"✅", title:"やることばこ", desc:"やること・アプリ構想・買い物を1つの箱で整理", href:"yarukoto.html"},
      {emoji:"🛒", title:"おつかいカート", desc:"頼まれた物をAmazonで安い順に探して管理", href:"kaimono.html"},
    ]},
    {key:"asset", emoji:"💰", label:"Asset", apps:[
      {emoji:"💳", title:"クレジット明細マネージャー", desc:"立て替え＆クレカ支出を分けて管理", href:"credit.html"},
      {emoji:"💴", title:"お金の残高 計算ツール", desc:"残高をサッと計算", href:"money.html"},
      {emoji:"📉", title:"資産予測グラフ", desc:"資産の推移を予測して可視化", href:"forecast.html"},
      {emoji:"📋", title:"コピペ箱", desc:"クレカ・口座・EPP注文などよくコピーする情報を保管", href:"copybox.html"},
    ]},
  ];
  const app = document.getElementById("app");
  let total = 0;
  categories.forEach(cat=>{
    total += cat.apps.length;
    const sec = document.createElement("section");
    sec.className = "section";
    const cards = cat.apps.map(a =>
      '<a class="card" href="'+a.href+'">'+
        '<span class="emoji">'+a.emoji+'</span>'+
        '<span class="txt"><span class="title">'+a.title+'</span>'+
        '<span class="desc">'+a.desc+'</span></span>'+
      '</a>'
    ).join("");
    sec.innerHTML =
      '<h2><span class="cat-emoji">'+cat.emoji+'</span>'+cat.label+
      '<span class="badge">'+cat.apps.length+'</span></h2>'+
      '<div class="grid">'+cards+'</div>';
    app.appendChild(sec);
  });
  document.getElementById("count").textContent = total + " 個のアプリ";

  /* ===== 今週のWork ダッシュボード ===== */
  const APP_HREF = {
    nps:"nps.html", recap:"recap.html", recognition:"recognition.html",
    grownote:"grownote.html", team5whys:"team5whys.html", reflection:"reflection.html",
    vault:"vault.html", osusowake:"osusowake.html", schedule:"schedule.html",
  };
  function relTime(ts){
    const diff = Date.now() - ts, m=60000, h=3600000, d=86400000;
    if(diff < m) return "たった今";
    if(diff < h) return Math.floor(diff/m) + "分前";
    if(diff < d) return Math.floor(diff/h) + "時間前";
    if(diff < 7*d) return Math.floor(diff/d) + "日前";
    const dt = new Date(ts); return (dt.getMonth()+1) + "/" + dt.getDate();
  }
  function startOfWeek(){
    const n = new Date(); n.setHours(0,0,0,0);
    n.setDate(n.getDate() - ((n.getDay()+6)%7));   // 月曜始まり
    return n.getTime();
  }
  function esc(s){ return String(s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  (async function(){
    if(!window.Career || !Career.getAll) return;
    let res; try{ res = await Career.getAll(); }catch(e){ return; }
    const items = (res && res.items) || [];
    if(!items.length) return;

    const sow = startOfWeek();
    const week = items.filter(e => (e.ts||0) >= sow);
    const ach = week.filter(e => e.action !== "visit");
    const achThisWeek = ach.length;
    const activeDays = new Set(week.map(e => new Date(e.ts).toDateString())).size;

    const todayIdx = (new Date().getDay()+6)%7;
    const dayLabels = ["月","火","水","木","金","土","日"];

    /* Workアプリの絵文字・短ラベル（index.htメニューから流用） */
    const workCat = categories.find(c => c.key === "work") || {apps:[]};
    const APP_META = {};
    workCat.apps.forEach(a=>{
      APP_META[a.href.replace(/\.html$/i,"")] = {emoji:a.emoji, label:a.title};
    });

    /* アプリ × 曜日 で全活動（visit＋実績）を集計 */
    const perApp = {};   // app -> {days:[7], total}
    week.forEach(e=>{
      const app = e.app;
      if(!APP_META[app]) return;                 // Workアプリのみ
      const d = (new Date(e.ts).getDay()+6)%7;
      if(!perApp[app]) perApp[app] = {days:[0,0,0,0,0,0,0], total:0};
      perApp[app].days[d]++; perApp[app].total++;
    });
    /* 活動の多い順に並べる */
    const rows = Object.keys(perApp)
      .map(app => ({app, ...perApp[app]}))
      .sort((a,b)=> b.total - a.total);

    const lvl = c => c===0 ? "" : (c>=4 ? " l4" : " l"+c);   // 1,2,3,4+
    const headRow =
      '<div class="hm-row hm-head"><div></div>'+
      dayLabels.map((d,i)=>'<div class="hm-dl'+(i===todayIdx?" today":"")+'">'+d+'</div>').join("")+
      '<div></div></div>';
    const bodyRows = rows.map(r=>{
      const m = APP_META[r.app];
      const cells = r.days.map((c,i)=>
        '<div class="hm-cell'+lvl(c)+(i===todayIdx?" today":"")+'"></div>').join("");
      return '<div class="hm-row">'+
        '<a class="hm-app" href="'+esc(r.app)+'.html">'+
          '<span class="he">'+m.emoji+'</span>'+
          '<span class="hl">'+esc(m.label)+'</span></a>'+
        cells+
        '<div class="hm-tot">'+r.total+'</div></div>';
    }).join("");
    const heatmap = rows.length
      ? '<div class="hm">'+headRow+bodyRows+'</div>'+
        '<div class="hm-leg">少'+
          '<i style="background:#ebebf0"></i><i style="background:#cfe3ff"></i>'+
          '<i style="background:#8fc0ff"></i><i style="background:#3b93ff"></i>'+
          '<i style="background:#0071e3"></i>多</div>'
      : '<div class="hm-empty">今週はまだ活動がありません</div>';

    /* 連続活動日数（実績がある日を今日からさかのぼって数える） */
    const achDays = new Set(items.filter(e=>e.action!=="visit")
      .map(e=>new Date(e.ts).toDateString()));
    let streak = 0; const cur = new Date(); cur.setHours(0,0,0,0);
    while(achDays.has(cur.toDateString())){ streak++; cur.setDate(cur.getDate()-1); }

    const dash = document.getElementById("dash");
    dash.innerHTML =
      '<div class="dash-head">'+
        '<h2>📊 今週のWork</h2>'+
        '<span class="ds'+(res.connected?"":" off")+'"><span class="dot"></span>'+
          (res.connected ? "クラウド同期中" : "この端末の記録")+'</span>'+
      '</div>'+
      '<div class="dstats">'+
        '<div class="dstat"><div class="di">🎯</div><b>'+achThisWeek+'</b><span>今週の実績</span></div>'+
        '<div class="dstat warm"><div class="di">🔥</div><b>'+streak+'<small>日</small></b><span>連続活動</span></div>'+
        '<div class="dstat"><div class="di">📅</div><b>'+activeDays+'<small>日</small></b><span>活動した日</span></div>'+
      '</div>'+
      heatmap;
    dash.hidden = false;
  })();
</script>
</body>
</html>

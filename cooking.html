<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="icons/icon-cooking.png">
<meta name="apple-mobile-web-app-title" content="ゆずごはん">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ゆずごはん日記">
<meta name="theme-color" content="#fbf7f0">
<title>ゆずごはん日記</title>
<style>
  :root {
    --bg: #fbf7f0;
    --card: #ffffff;
    --text: #2b2622;
    --sub: #8a817a;
    --line: #ece5da;
    --accent: #e8915b;     /* 柚子色っぽいオレンジ */
    --accent-soft: #fdf0e6;
    --green: #5fa86b;
    --red: #e0574d;
    --chip: #f3ede3;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(96px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  /* ===== ヘッダー ===== */
  header.app {
    text-align: center; padding: 26px 16px 14px;
  }
  header.app .logo { font-size: 30px; line-height: 1; }
  header.app h1 { font-size: 21px; font-weight: 700; margin: 6px 0 2px; letter-spacing: .02em; }
  header.app .tagline { color: var(--sub); font-size: 12.5px; }
  .stat-row {
    display:flex; justify-content:center; gap:22px; margin-top: 14px;
  }
  .stat { text-align:center; }
  .stat .n { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat .l { font-size: 11px; color: var(--sub); margin-top: 1px; }

  /* ===== 検索 / フィルタ ===== */
  .toolbar { padding: 6px 0 4px; }
  .search-box { position: relative; }
  .search-box input {
    width:100%; font-size: 16px; padding: 11px 14px 11px 38px;
    border: 1px solid var(--line); border-radius: 13px; background: #fff;
    font-family: inherit; color: var(--text);
  }
  .search-box .mag { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--sub); font-size:15px;}
  .search-box input:focus { outline:none; border-color: var(--accent); }
  .filter-row { display:flex; gap:8px; overflow-x:auto; padding: 12px 0 4px; -webkit-overflow-scrolling:touch; }
  .filter-row::-webkit-scrollbar{display:none;}
  .fchip {
    white-space:nowrap; font-size:13.5px; padding:7px 14px; border-radius:999px;
    background:var(--chip); color:var(--sub); border:none; cursor:pointer; font-family:inherit;
  }
  .fchip.on { background: var(--text); color:#fff; }

  /* ===== 日記フィード ===== */
  .feed { margin-top: 8px; }
  .month-head { font-size: 13px; font-weight:700; color:var(--sub); margin: 22px 4px 10px; letter-spacing:.04em;}
  .entry {
    background: var(--card); border-radius: 20px; overflow:hidden; margin-bottom: 16px;
    box-shadow: 0 2px 10px rgba(120,90,50,.06); cursor:pointer;
  }
  .entry:active { transform: scale(.992); }
  .entry .cover { width:100%; aspect-ratio: 4/3; object-fit:cover; background:var(--accent-soft); display:block;}
  .entry .cover.placeholder { display:flex; align-items:center; justify-content:center; font-size:46px; }
  .entry .multi { position:relative; }
  .entry .multi .count {
    position:absolute; right:10px; bottom:10px; background:rgba(0,0,0,.55); color:#fff;
    font-size:12px; padding:3px 9px; border-radius:999px; backdrop-filter:blur(4px);
  }
  .entry .body { padding: 13px 16px 16px; }
  .entry .e-date { font-size: 12px; color: var(--accent); font-weight:600; }
  .entry .e-name { font-size: 18px; font-weight: 700; margin: 2px 0 6px; }
  .entry .e-note { font-size: 14px; color: var(--sub); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; margin-top: 10px; }
  .tag { font-size:11.5px; padding:3px 10px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-weight:600;}

  .empty { text-align:center; color:var(--sub); padding: 60px 24px; font-size:15px; }
  .empty .big { font-size:46px; display:block; margin-bottom:14px; }

  /* ===== 追加ボタン（FAB） ===== */
  .fab {
    position: fixed; right: 20px; bottom: calc(24px + env(safe-area-inset-bottom)); z-index: 40;
    width: 60px; height: 60px; border-radius: 50%; border:none;
    background: var(--accent); color:#fff; font-size: 30px; line-height: 1;
    box-shadow: 0 6px 18px rgba(232,145,91,.45); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .fab:active { transform: scale(.93); }

  /* ===== モーダル ===== */
  .modal-bg { position:fixed; inset:0; background:rgba(40,30,20,.42); z-index:100; display:none; align-items:flex-end; justify-content:center;}
  .modal-bg.show { display:flex; }
  .modal {
    background:var(--bg); width:100%; max-width:680px; max-height:94vh; overflow-y:auto;
    border-radius: 24px 24px 0 0; padding: 8px 16px calc(28px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling:touch; animation: slideUp .28s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes slideUp { from{transform:translateY(40px);opacity:.6;} to{transform:translateY(0);opacity:1;} }
  /* PC（広い画面）ではモーダルを画面中央に。iPhoneは従来どおり下からせり出す */
  @media (min-width: 768px){
    .modal-bg{ align-items:center; padding:24px; }
    .modal{ border-radius:24px; max-height:88vh; }
  }
  .grip { width:40px;height:5px;background:#dcd3c6;border-radius:3px;margin:8px auto 14px;}
  .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px;}
  .modal-head h3 { margin:0; font-size:19px; font-weight:700;}
  .modal-head .close { font-size:22px; color:var(--sub); cursor:pointer; padding:4px 8px;}

  label.fld { display:block; font-size: 13px; color: var(--sub); margin: 16px 0 6px; font-weight:600;}
  input[type=text], input[type=date], textarea {
    width: 100%; font-size: 16px; padding: 12px 13px;
    border: 1px solid var(--line); border-radius: 12px; background: #fff;
    font-family: inherit; color: var(--text);
  }
  textarea { resize: vertical; min-height: 90px; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }

  .btn {
    display:flex; align-items:center; justify-content:center; gap:6px;
    border:none; border-radius: 13px; padding: 14px 18px;
    font-size: 16px; font-weight: 700; font-family: inherit;
    cursor:pointer; background: var(--accent); color:#fff; width:100%;
  }
  .btn:active { opacity:.85; }
  .btn.sec { background:#efe8dd; color:var(--text); }
  .btn.danger { background:transparent; color:var(--red); }

  /* 写真追加 */
  .photo-strip { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .photo-strip .pi { position:relative; width:80px; height:80px; border-radius:12px; overflow:hidden; }
  .photo-strip .pi img { width:100%;height:100%;object-fit:cover; }
  .photo-strip .pi .x { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.6); color:#fff; width:20px;height:20px;border-radius:50%; font-size:12px; display:flex;align-items:center;justify-content:center; cursor:pointer;}
  .addphoto { width:80px;height:80px;border-radius:12px; border:2px dashed var(--line); display:flex;flex-direction:column;align-items:center;justify-content:center; font-size:24px; color:var(--sub); cursor:pointer; background:#fff;}
  .addphoto small{font-size:10px;}

  /* タグ入力 */
  .tag-input-row { display:flex; gap:8px; }
  .tag-input-row input { flex:1; }
  .tag-input-row button { width:auto; padding:12px 16px; }
  .tag-suggest { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
  .tag-suggest .ts { font-size:13px; padding:6px 12px; border-radius:999px; background:#fff; border:1px solid var(--line); color:var(--sub); cursor:pointer;}
  .tag-suggest .ts.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600;}
  .chosen-tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
  .chosen-tags .ct { font-size:13px; padding:6px 12px; border-radius:999px; background:var(--accent); color:#fff; cursor:pointer; display:flex; gap:6px; align-items:center;}

  /* 詳細 */
  .detail-photos { display:flex; gap:10px; overflow-x:auto; margin: 0 -16px 4px; padding: 0 16px; scroll-snap-type:x mandatory;}
  .detail-photos::-webkit-scrollbar{display:none;}
  .detail-photos img { height:240px; border-radius:16px; scroll-snap-align:center; object-fit:cover; }
  .detail-photos img:only-child { width:calc(100% - 0px); object-fit:cover; }
  .d-name { font-size:24px; font-weight:700; margin: 14px 0 4px;}
  .d-date { font-size:13px; color:var(--accent); font-weight:600; }
  .d-note { font-size:15.5px; margin-top:14px; white-space:pre-wrap; line-height:1.75;}
  .note-card { background:var(--accent-soft); border-radius:14px; padding:14px 16px; margin-top:14px; }
  .note-card .lab { font-size:11px; color:var(--accent); font-weight:700; margin-bottom:4px;}

  /* ===== ビュー切替 ===== */
  .viewseg { display:flex; gap:6px; background:var(--chip); padding:4px; border-radius:12px; }
  .viewseg button { flex:1; border:none; background:transparent; font-family:inherit; font-size:14px; font-weight:600; color:var(--sub); padding:8px; border-radius:9px; cursor:pointer; }
  .viewseg button.on { background:#fff; color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.08); }

  /* ===== いいね・コメント数（フィード） ===== */
  .entry .meta { display:flex; align-items:center; gap:16px; margin-top:11px; color:var(--sub); font-size:13.5px; }
  .entry .meta .m { display:flex; align-items:center; gap:5px; cursor:default; }
  .entry .meta .heart { cursor:pointer; }
  .entry .meta .heart.on { color:var(--red); font-weight:700; }

  /* ===== カレンダー ===== */
  .cal { margin-top:14px; }
  .cal-head { display:flex; align-items:center; justify-content:space-between; margin:6px 4px 12px; }
  .cal-head .mon { font-size:17px; font-weight:700; }
  .cal-head button { border:none; background:var(--chip); width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; color:var(--text); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-grid .wd { text-align:center; font-size:11px; color:var(--sub); padding-bottom:4px; }
  .cal-cell { aspect-ratio:1; border-radius:11px; background:var(--card); position:relative; padding:5px 0 0 6px; font-size:12px; color:var(--sub); overflow:hidden; }
  .cal-cell.empty { background:transparent; }
  .cal-cell.today { outline:2px solid var(--accent); }
  .cal-cell.has { cursor:pointer; color:#fff; }
  .cal-cell.has .thumb { position:absolute; inset:0; object-fit:cover; width:100%; height:100%; z-index:0; }
  .cal-cell.has .shade { position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.5)); z-index:1; }
  .cal-cell.has .dnum { position:relative; z-index:2; font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,.5); }
  .cal-cell.has .cnt { position:absolute; right:4px; bottom:3px; z-index:2; font-size:10px; background:rgba(0,0,0,.55); padding:1px 6px; border-radius:999px; color:#fff; }
  .cal-cell.has.nopic { color:var(--accent); }
  .cal-cell.has.nopic .dnum { text-shadow:none; }
  .cal-cell.has.nopic .dot { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:6px; height:6px; border-radius:50%; background:var(--accent); z-index:2; }

  /* ===== いいねボタン（詳細） ===== */
  .like-row { display:flex; align-items:center; gap:12px; margin-top:18px; flex-wrap:wrap; }
  .like-btn { display:flex; align-items:center; gap:7px; background:var(--chip); border:none; border-radius:999px; padding:9px 17px; font-size:15px; font-weight:700; font-family:inherit; color:var(--sub); cursor:pointer; }
  .like-btn.on { background:#fde7e4; color:var(--red); }
  .like-who { font-size:12.5px; color:var(--sub); }

  /* ===== コメント ===== */
  .cmt-sec { margin-top:22px; }
  .cmt-sec .lab { font-size:12px; color:var(--sub); font-weight:700; margin-bottom:12px; }
  .cmt { display:flex; gap:9px; margin-bottom:12px; }
  .cmt .av { flex:none; width:30px; height:30px; border-radius:50%; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
  .cmt .bub { background:var(--card); border-radius:13px; padding:8px 12px; flex:1; }
  .cmt .bub .top { display:flex; align-items:baseline; gap:8px; }
  .cmt .bub .who { font-size:12.5px; font-weight:700; }
  .cmt .bub .when { font-size:10.5px; color:var(--sub); }
  .cmt .bub .txt { font-size:14.5px; white-space:pre-wrap; margin-top:2px; }
  .cmt .bub .del { font-size:11px; color:var(--sub); cursor:pointer; margin-top:4px; display:inline-block; }
  .cmt-empty { font-size:13px; color:var(--sub); padding:2px 0 8px; }
  .cmt-input { display:flex; gap:8px; margin-top:6px; }
  .cmt-input input { flex:1; }
  .cmt-input button { width:auto; padding:0 18px; }

  /* ===== ライトボックス ===== */
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:300; display:none; flex-direction:column; }
  .lightbox.show { display:flex; }
  .lb-top { display:flex; justify-content:space-between; align-items:center; padding:calc(10px + env(safe-area-inset-top)) 18px 6px; color:#fff; }
  .lb-top .idx { font-size:14px; opacity:.85; }
  .lb-top .x { font-size:26px; cursor:pointer; padding:4px 8px; }
  .lb-track { flex:1; display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .lb-track::-webkit-scrollbar{display:none;}
  .lb-slide { flex:none; width:100%; scroll-snap-align:center; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .lb-slide img { max-width:100%; max-height:100%; object-fit:contain; }
  .lb-dots { display:flex; gap:7px; justify-content:center; padding:14px 0 calc(20px + env(safe-area-inset-bottom)); }
  .lb-dots .d { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.35); }
  .lb-dots .d.on { background:#fff; }

  /* ===== 名前選択 ===== */
  .who-card { text-align:center; padding:10px 4px 6px; }
  .who-card h3 { font-size:20px; margin:6px 0 6px; }
  .who-card p { color:var(--sub); font-size:14px; margin:0 0 20px; }
  .who-opts { display:flex; gap:12px; }
  .who-opts button { flex:1; border:1px solid var(--line); background:#fff; border-radius:16px; padding:18px 8px; font-family:inherit; font-size:17px; font-weight:700; color:var(--text); cursor:pointer; }
  .who-opts button:active { background:var(--accent-soft); }
  .who-opts button .em { font-size:30px; display:block; margin-bottom:6px; }

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:rgba(40,30,20,.9);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header class="app">
  <div class="logo">🍋</div>
  <h1>ゆずごはん日記</h1>
  <div class="tagline">ゆずちゃんが作ってくれたごはんの記録</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="statTotal">0</div><div class="l">これまでの品数</div></div>
    <div class="stat"><div class="n" id="statMonth">0</div><div class="l">今月のごはん</div></div>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <div class="viewseg" id="viewSeg">
      <button data-view="feed" class="on">📖 フィード</button>
      <button data-view="calendar">📅 カレンダー</button>
    </div>
    <div id="feedTools">
      <div class="search-box" style="margin-top:12px">
        <span class="mag">🔍</span>
        <input type="text" id="search" placeholder="料理名・メモ・タグで検索" autocomplete="off">
      </div>
      <div class="filter-row" id="filterRow"></div>
    </div>
  </div>
  <div class="feed" id="feed"></div>
  <div class="cal" id="calendar" style="display:none"></div>
</main>

<button class="fab" id="fab" aria-label="記録を追加">＋</button>

<!-- ===== 記録モーダル ===== -->
<div class="modal-bg" id="recordModal">
  <div class="modal">
    <div class="grip"></div>
    <div class="modal-head">
      <h3 id="recordTitle">ごはんを記録する</h3>
      <span class="close" data-close="recordModal">✕</span>
    </div>

    <label class="fld">写真</label>
    <div class="photo-strip" id="photoStrip">
      <div class="addphoto" id="addPhotoBtn">＋<small>写真</small></div>
    </div>
    <input type="file" id="photoInput" accept="image/*" multiple class="hidden">

    <label class="fld">料理名</label>
    <input type="text" id="rName" placeholder="例：肉じゃが、ナポリタン">

    <label class="fld">作ってもらった日</label>
    <input type="date" id="rDate">

    <label class="fld">感想・ありがとうメモ</label>
    <textarea id="rNote" placeholder="味の感想や、ゆずちゃんへのありがとうを残そう"></textarea>

    <label class="fld">タグ</label>
    <div class="tag-input-row">
      <input type="text" id="tagInput" placeholder="自由に追加（例：あったかい）" autocomplete="off">
      <button class="btn" id="tagAddBtn">＋</button>
    </div>
    <div class="chosen-tags" id="chosenTags"></div>
    <div class="tag-suggest" id="tagSuggest"></div>

    <div style="height:22px"></div>
    <button class="btn" id="saveRecordBtn">保存する</button>
    <div style="height:8px"></div>
    <button class="btn danger hidden" id="deleteRecordBtn">この記録を削除</button>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="grip"></div>
    <div class="modal-head">
      <h3>　</h3>
      <span class="close" data-close="detailModal">✕</span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- ===== 名前選択モーダル ===== -->
<div class="modal-bg" id="whoModal">
  <div class="modal">
    <div class="grip"></div>
    <div class="who-card">
      <div style="font-size:34px">🍋</div>
      <h3>あなたはどっち？</h3>
      <p>いいねやコメントに名前が表示されます</p>
      <div class="who-opts">
        <button data-who="こうだい"><span class="em">🧑</span>こうだい</button>
        <button data-who="ゆずは"><span class="em">👩</span>ゆずは</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 写真ライトボックス ===== -->
<div class="lightbox" id="lightbox">
  <div class="lb-top">
    <span class="idx" id="lbIdx"></span>
    <span class="x" id="lbClose">✕</span>
  </div>
  <div class="lb-track" id="lbTrack"></div>
  <div class="lb-dots" id="lbDots"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ Supabase 接続 ============ */
const SUPABASE_URL  = 'https://okbjqtdirrathscctyvx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const PHOTO_BUCKET = 'photos';

/* ============ ユーティリティ ============ */
const $ = s=>document.querySelector(s);
const $$ = s=>document.querySelectorAll(s);
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1700);}

/* ===== 通知まわり ===== */
/* Service Worker 登録（iPhoneのホーム画面追加＋iOS16.4+＋HTTPSで通知が有効に） */
let _swReg=null;
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('cooking-sw.js').then(r=>{_swReg=r;}).catch(()=>{});
}
/* 通知許可をリクエスト（ユーザー操作＝保存タップ時に呼ぶこと） */
async function ensureNotifyPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='denied') return false;
  let ok = Notification.permission==='granted';
  if(!ok){ try{ ok = (await Notification.requestPermission())==='granted'; }catch(e){ ok=false; } }
  if(ok) ensurePushSubscription();   // 許可済みなら、この端末をプッシュ購読登録
  return ok;
}
/* OS通知バナーを表示（iOSはSW経由が必須） */
async function showOSNotification(body){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const reg = _swReg || (navigator.serviceWorker && await navigator.serviceWorker.ready.catch(()=>null));
  const opts={ body, icon:'icons/icon-cooking.png', badge:'icons/icon-cooking.png', tag:'yuzu-diary', renotify:true };
  try{ if(reg && reg.showNotification) await reg.showNotification('🍋', opts); }
  catch(e){ /* 通知できない環境では無視 */ }
}

/* ===== Web Push（アプリを閉じていても、相手のいいね/コメントが届く） ===== */
const VAPID_PUBLIC = 'BOp-K1Eif_TEF21_2O_oGWuE23r2ppFzl6b1hafxV0i_1VktjXRRWnTj3vAmG_GXzaVx-HcRwQsfBoljV-_lmdk';
function urlB64ToUint8Array(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
/* この端末をプッシュ購読し、push_subs テーブルに（誰の端末か付きで）登録する */
async function ensurePushSubscription(){
  if(!who) return;                                                 // 名前未選択なら登録しない
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  try{
    const reg = _swReg || await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC)
      });
    }
    const j = sub.toJSON();
    await sb.from('push_subs').upsert({
      endpoint: sub.endpoint, who,
      p256dh: j.keys.p256dh, auth: j.keys.auth, created_at: Date.now()
    }, { onConflict:'endpoint' });
  }catch(e){ /* 非対応端末・拒否時などは無視 */ }
}
/* いいね/コメント時に、相手の端末へプッシュ送信を依頼する（補助機能：失敗は無視） */
async function pushNotify(kind, recId, body){
  if(!who) return;
  try{
    const rec = allRecords.find(r=>r.id===recId);
    await fetch(SUPABASE_URL + '/functions/v1/notify-reaction', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_ANON },
      body: JSON.stringify({ kind, actor:who, recordId:recId, recordName: rec?rec.name:'', body: body||'' })
    });
  }catch(e){ /* 送信失敗は無視 */ }
}

/* 保存成功時の通知（やわらかい合成音＋端末バイブ＋OS通知バナー） */
let _audioCtx=null;
function notifySaved(body){
  // OS通知バナー（iPhone等。許可済みのときのみ）
  showOSNotification(body || '日記を保存しました');
  // バイブ（対応端末のみ。PC等は自動で無視される）
  if(navigator.vibrate) navigator.vibrate([40,30,40]);
  // 合成音「ポーン♪」
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    _audioCtx = _audioCtx || new AC();
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    const ctx=_audioCtx, now=ctx.currentTime;
    [880, 1318.51].forEach((freq,i)=>{           // A5 → E6 の2音
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      const t0=now+i*0.12;
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.18, t0+0.02);   // やわらかい立ち上がり
      gain.gain.exponentialRampToValueAtTime(0.0001, t0+0.45);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0); osc.stop(t0+0.5);
    });
  }catch(e){ /* 音が出せない環境では無視 */ }
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* 写真をストレージにアップロードして公開URLにする（新規=data:のみ対象。既存URLはそのまま） */
async function uploadPhotos(photos){
  const out=[];
  for(const p of photos){
    if(typeof p==='string' && p.startsWith('data:')){
      const blob = await (await fetch(p)).blob();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
      const { error } = await sb.storage.from(PHOTO_BUCKET).upload(path, blob, { contentType:'image/jpeg', upsert:false });
      if(error){ console.error(error); throw error; }
      out.push(sb.storage.from(PHOTO_BUCKET).getPublicUrl(path).data.publicUrl);
    } else {
      out.push(p);
    }
  }
  return out;
}

/* ============ 旧ローカルデータ（IndexedDB）読み出し：初回引っ越し用 ============ */
const DB_NAME='yuzuGohanDB', STORE='records';
function openLocalDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>{const db=e.target.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE,{keyPath:'id'});};
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function localGetAll(){
  try{
    const db=await openLocalDB();
    return await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const q=tx.objectStore(STORE).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error);});
  }catch(e){ return []; }
}
async function migrateLocalIfNeeded(){
  if(localStorage.getItem('yuzuMigratedV1')) return;
  let cloud=[]; try{ cloud=await dbGetAll(); }catch(e){ return; }
  if(cloud.length>0){ localStorage.setItem('yuzuMigratedV1','1'); return; } // クラウドに既にあるなら引っ越し不要
  const local=await localGetAll();
  if(!local.length){ localStorage.setItem('yuzuMigratedV1','1'); return; }

}

function fmtWhen(ts){ if(!ts) return ''; const d=new Date(ts); const p=n=>String(n).padStart(2,'0'); return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ============ 写真圧縮 ============ */
function compressImage(file, maxDim=1400, quality=0.82){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h){ if(w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;} }
        else { if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;} }
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

    await dbDelete(editingId); await loadRecords();
    hideModal('recordModal'); toast('削除しました');
  }catch(e){ console.error(e); toast('削除に失敗しました'); }
};
$('#fab').onclick=()=>openRecord(null);

/* ============ 詳細モーダル ============ */
function openDetail(id){
  openDetailId=id;
  renderDetail(id);
  showModal('detailModal');
}
function renderDetail(id){
  const r=allRecords.find(x=>x.id===id);
  if(!r){ hideModal('detailModal'); return; }
  const photos=r.photos||[];
  const photoHtml = photos.length
    ? `<div class="detail-photos">${photos.map((p,i)=>`<img src="${p}" data-lb="${i}">`).join('')}</div>`
    : '';
  const tags=(r.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const likes=likesFor(id), liked=iLiked(id);
  const likeNames=likes.map(l=>l.who).join('・');
  const comments=commentsFor(id);
  const cmtHtml = comments.length
    ? comments.map(c=>`
        <div class="cmt">
          <div class="av">${esc((c.who||'?').slice(0,1))}</div>
          <div class="bub">
            <div class="top"><span class="who">${esc(c.who)}</span><span class="when">${fmtWhen(c.created_at)}</span></div>
            <div class="txt">${esc(c.body)}</div>
            ${c.who===who?`<span class="del" data-delc="${c.id}">削除</span>`:''}
          </div>
        </div>`).join('')
    : `<div class="cmt-empty">まだコメントはありません。最初のひとことを 🍋</div>`;
  $('#detailBody').innerHTML = `
    ${photoHtml}
    <div class="d-date">${fmtDate(r.date)}</div>
    <div class="d-name">${esc(r.name)}</div>
    ${tags?`<div class="tags" style="margin-top:8px">${tags}</div>`:''}
    ${r.note?`<div class="note-card"><div class="lab">感想・ありがとうメモ</div><div class="d-note" style="margin-top:0">${esc(r.note)}</div></div>`:''}
    <div class="like-row">
      <button class="like-btn ${liked?'on':''}" id="likeBtn"><span class="hi">${liked?'❤️':'🤍'}</span>いいね${likes.length?` ${likes.length}`:''}</button>
      ${likes.length?`<span class="like-who">${esc(likeNames)} がいいね</span>`:''}
    </div>
    <div class="cmt-sec">
      <div class="lab">コメント ${comments.length||''}</div>
      <div id="cmtList">${cmtHtml}</div>
      <div class="cmt-input">
        <input type="text" id="cmtInput" placeholder="コメントを書く…" autocomplete="off">
        <button class="btn" id="cmtSend">送信</button>
      </div>
    </div>
    <div style="height:22px"></div>
    <button class="btn sec" id="editRecBtn">編集する</button>`;
  $('#editRecBtn').onclick=()=>{ hideModal('detailModal'); openRecord(r); };
  $('#likeBtn').onclick=()=>ensureWho(async()=>{ await toggleLike(id); await loadRecords(); });
  $('#cmtSend').onclick=()=>sendComment(id);
  $('#cmtInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendComment(id); } });
  $('#cmtList').querySelectorAll('[data-delc]').forEach(el=>el.onclick=async()=>{
    if(confirm('コメントを削除しますか？')){ await deleteComment(el.dataset.delc); await loadRecords(); }
  });
  $('#detailBody').querySelectorAll('[data-lb]').forEach(el=>el.onclick=()=>openLightbox(photos, +el.dataset.lb));
}
function sendComment(id){
  const inp=$('#cmtInput'); const v=inp.value.trim(); if(!v) return;
  ensureWho(async()=>{
    inp.value='';
    try{ await addComment(id, v); await loadRecords(); }
    catch(e){ toast('コメントの送信に失敗しました'); }
  });
}

/* ============ カレンダービュー ============ */
function renderCalendar(){
  const cal=$('#calendar');
  if(calYear==null){ const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); }
  const startWd=new Date(calYear, calMonth, 1).getDay();
  const days=new Date(calYear, calMonth+1, 0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const byDate={};
  allRecords.forEach(r=>{ (byDate[r.date]=byDate[r.date]||[]).push(r); });
  let cells='';
  for(let i=0;i<startWd;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1; d<=days; d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const recs=byDate[ds]||[];
    const today=ds===todayStr?'today':'';
    if(recs.length){
      const pic=recs.map(r=>(r.photos||[])[0]).find(Boolean);
      if(pic){
        cells+=`<div class="cal-cell has ${today}" data-day="${ds}"><img class="thumb" src="${pic}"><div class="shade"></div><span class="dnum">${d}</span>${recs.length>1?`<span class="cnt">${recs.length}</span>`:''}</div>`;
      } else {
        cells+=`<div class="cal-cell has nopic ${today}" data-day="${ds}"><span class="dnum">${d}</span><span class="dot"></span></div>`;
      }
    } else {
      cells+=`<div class="cal-cell ${today}">${d}</div>`;
    }
  }
  cal.innerHTML = `
    <div class="cal-head">
      <button id="calPrev" aria-label="前の月">‹</button>
      <div class="mon">${calYear}年${calMonth+1}月</div>
      <button id="calNext" aria-label="次の月">›</button>
    </div>
    <div class="cal-grid">
      ${WD.map(w=>`<div class="wd">${w}</div>`).join('')}
      ${cells}
    </div>`;
  $('#calPrev').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  $('#calNext').onclick=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
  cal.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>openDay(el.dataset.day));
}
function openDay(ds){
  const recs=allRecords.filter(r=>r.date===ds).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(!recs.length) return;
  if(recs.length===1){ openDetail(recs[0].id); return; }
  openDetailId=null;
  $('#detailBody').innerHTML =
    `<div class="d-date">${fmtDate(ds)}</div><div class="d-name" style="margin-bottom:10px">この日のごはん（${recs.length}品）</div>` +
    recs.map(r=>{
      const pic=(r.photos||[])[0];
      const cov = pic
        ? `<img src="${pic}" style="width:64px;height:64px;border-radius:12px;object-fit:cover;flex:none">`
        : `<div style="width:64px;height:64px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex:none;font-size:26px">🍽️</div>`;
      return `<div class="day-item" data-id="${r.id}" style="display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer">${cov}<div><div style="font-weight:700">${esc(r.name)}</div><div style="font-size:12px;color:var(--sub);margin-top:2px">❤️ ${likesFor(r.id).length}　💬 ${commentsFor(r.id).length}</div></div></div>`;
    }).join('');
  showModal('detailModal');
  $('#detailBody').querySelectorAll('.day-item').forEach(el=>el.onclick=()=>openDetail(el.dataset.id));
}

/* ============ 写真ライトボックス ============ */
function openLightbox(photos, start){
  if(!photos||!photos.length) return;
  const track=$('#lbTrack'), dots=$('#lbDots');
  track.innerHTML = photos.map(p=>`<div class="lb-slide"><img src="${p}"></div>`).join('');
  dots.innerHTML = photos.map((_,i)=>`<span class="d ${i===start?'on':''}"></span>`).join('');
  $('#lbIdx').textContent = `${start+1} / ${photos.length}`;
  $('#lightbox').classList.add('show');
  requestAnimationFrame(()=>{ track.scrollLeft = track.clientWidth*start; });
  track.onscroll=()=>{
    const i=Math.round(track.scrollLeft/track.clientWidth);
    $('#lbIdx').textContent=`${i+1} / ${photos.length}`;
    dots.querySelectorAll('.d').forEach((d,j)=>d.classList.toggle('on', j===i));
  };
}
function closeLightbox(){ $('#lightbox').classList.remove('show'); $('#lbTrack').onscroll=null; }
$('#lbClose').onclick=closeLightbox;
$('#lightbox').addEventListener('click',e=>{ if(e.target.id==='lightbox') closeLightbox(); });

/* ============ ビュー切替 ============ */
$('#viewSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  viewMode=b.dataset.view;
  $('#viewSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
  $('#feedTools').style.display = viewMode==='feed'?'':'none';
  $('#feed').style.display = viewMode==='feed'?'':'none';
  $('#calendar').style.display = viewMode==='calendar'?'':'none';
  renderCurrentView();
});

/* ============ 検索 ============ */
$('#search').addEventListener('input', renderFeed);

/* ============ モーダル制御 ============ */
function showModal(id){$('#'+id).classList.add('show');document.body.style.overflow='hidden';}
function hideModal(id){$('#'+id).classList.remove('show');document.body.style.overflow='';if(id==='detailModal')openDetailId=null;}
$$('[data-close]').forEach(el=>el.onclick=()=>hideModal(el.dataset.close));
$$('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)hideModal(bg.id);}));

/* ============ リアルタイム同期 ============ */
let rtTimer=null;
function scheduleReload(){ clearTimeout(rtTimer); rtTimer=setTimeout(loadRecords, 400); } // 連続変更をまとめて再読み込み
function subscribeRealtime(){
  sb.channel('yuzu-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:'records' }, scheduleReload)
    .on('postgres_changes', { event:'*', schema:'public', table:'likes' }, scheduleReload)
    .on('postgres_changes', { event:'*', schema:'public', table:'comments' }, scheduleReload)
    .subscribe();
}

/* ============ 初期化 ============ */
$('#feed').innerHTML = `<div class="empty"><span class="big">🍳</span>読み込み中…</div>`;
(async()=>{
  await migrateLocalIfNeeded();
  await loadRecords();
  subscribeRealtime();
  ensurePushSubscription();   // 既に許可済みの端末は、起動時に購読を最新化
  if(!who) showModal('whoModal');
})();
</script>

<style>
  #tsumikiBack{
    position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:12px; z-index:1000;
    display:none; align-items:center; gap:2px;
    background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:999px;
    padding:6px 12px 6px 9px; font-size:13px; font-weight:600;
    color:#0071e3; text-decoration:none; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    box-shadow:0 2px 10px rgba(0,0,0,.10); -webkit-tap-highlight-color:transparent;
    transition:transform .28s cubic-bezier(.22,.61,.36,1), opacity .28s ease;
    will-change:transform,opacity;
  }
  #tsumikiBack.show{display:inline-flex;}
  #tsumikiBack.hide{transform:translateX(-130%); opacity:0; pointer-events:none;}
  #tsumikiBack:active{transform:scale(.95);}
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<a id="tsumikiBack" href="index.html">‹ つみき</a>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var pill = document.getElementById('tsumikiBack');
    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');
    pill.classList.add('show');

    function goBack(){ location.href = 'index.html'; }

    /* --- ピルをスクロールで自動的に出し入れ（iOSツールバー流） --- */
    var lastY = window.scrollY || 0, ticking = false;
    function onScroll(){
      var y = window.scrollY || 0;
      if(y <= 4){ pill.classList.remove('hide'); }
      else if(y > lastY + 6){ pill.classList.add('hide'); }
      else if(y < lastY - 6){ pill.classList.remove('hide'); }
      lastY = y; ticking = false;
    }
    window.addEventListener('scroll', function(){
      if(!ticking){ window.requestAnimationFrame(onScroll); ticking = true; }
    }, {passive:true});

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icons/icon-vault.png">
<meta name="apple-mobile-web-app-title" content="Password manager">
<title>Password manager — パスワード保管</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
    --line:#e5e5ea; --accent:#0071e3; --danger:#ff3b30; --radius:20px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    line-height:1.6; padding:env(safe-area-inset-top) 16px 120px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px; margin:0 auto;}
  header{padding:36px 4px 18px; text-align:center;}
  .logo{font-size:42px; line-height:1;}
  h1{font-size:28px; font-weight:700; letter-spacing:-.02em; margin-top:8px;}
  .tagline{color:var(--sub); font-size:14px; margin-top:6px;}

  /* 検索 */
  .search{position:relative; margin-top:22px;}
  .search input{
    width:100%; border:1px solid var(--line); background:var(--card);
    border-radius:14px; padding:13px 16px 13px 42px; font-size:16px; color:var(--ink);
  }
  .search input:focus{outline:none; border-color:var(--accent);}
  .search .ico{position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#c7c7cc; font-size:17px;}

  /* ジャンルチップ */
  .chips{display:flex; gap:8px; overflow-x:auto; padding:16px 2px 4px; -webkit-overflow-scrolling:touch;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card);
    border-radius:999px; padding:7px 15px; font-size:14px; font-weight:600; color:var(--sub);
    cursor:pointer; transition:all .15s ease; white-space:nowrap;
  }
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  /* リスト */
  .list{margin-top:14px; display:flex; flex-direction:column; gap:11px;}
  .item{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:15px 16px; transition:box-shadow .15s ease;
  }
  .item-head{display:flex; align-items:center; gap:13px;}
  .badge-ico{
    flex:0 0 auto; width:46px; height:46px; border-radius:13px; display:flex;
    align-items:center; justify-content:center; font-size:22px; color:#fff; font-weight:700;
  }
  .item-meta{min-width:0; flex:1;}
  .item-title{font-size:16px; font-weight:600; letter-spacing:-.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .item-cat{font-size:12px; color:var(--sub); margin-top:1px;}
  .item-actions{display:flex; gap:6px; flex:0 0 auto;}
  .icon-btn{
    width:34px; height:34px; border:none; background:var(--bg); border-radius:10px;
    font-size:15px; cursor:pointer; color:var(--sub); display:flex; align-items:center; justify-content:center;
    transition:background .15s ease;
  }
  .icon-btn:active{background:var(--line);}

  /* フィールド行（展開時） */
  .fields{margin-top:13px; border-top:1px solid var(--line); padding-top:12px; display:none; flex-direction:column; gap:10px;}
  .item.open .fields{display:flex;}
  .field{display:flex; align-items:center; gap:10px;}
  .field-label{font-size:12px; color:var(--sub); width:64px; flex:0 0 auto;}
  .field-val{
    flex:1; min-width:0; font-size:15px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:.02em;
  }
  .field-val.mask{letter-spacing:.18em;}
  .copy-btn{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--accent);
    border-radius:9px; padding:6px 11px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .copy-btn:active{background:var(--bg);}

  /* 空状態 */
  .empty{text-align:center; color:var(--sub); padding:60px 20px; font-size:15px;}
  .empty .big{font-size:46px; margin-bottom:12px;}

  /* 追加ボタン（FAB） */
  .fab{
    position:fixed; right:20px; bottom:calc(20px + env(safe-area-inset-bottom));
    width:58px; height:58px; border-radius:50%; border:none; background:var(--accent);
    color:#fff; font-size:30px; line-height:1; box-shadow:0 8px 24px rgba(0,113,227,.4);
    cursor:pointer; z-index:20; display:flex; align-items:center; justify-content:center;
  }
  .fab:active{transform:scale(.94);}

  /* モーダル */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:30;
    display:none; align-items:flex-end; justify-content:center; padding:0;
  }
  .overlay.show{display:flex;}
  @media(min-width:560px){ .overlay{align-items:center; padding:20px;} }
  .sheet{
    background:var(--card); width:100%; max-width:560px;
    border-radius:24px 24px 0 0; padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:92vh; overflow-y:auto;
  }
  @media(min-width:560px){ .sheet{border-radius:24px;} }
  .sheet h2{font-size:20px; font-weight:700; text-align:center; margin-bottom:18px;}
  .form-group{margin-bottom:15px;}
  .form-group label{display:block; font-size:13px; font-weight:600; color:var(--sub); margin-bottom:6px;}
  .form-group input{
    width:100%; border:1px solid var(--line); background:#fbfbfd; border-radius:12px;
    padding:13px 14px; font-size:16px; color:var(--ink);
  }
  .form-group input:focus{outline:none; border-color:var(--accent); background:#fff;}
  .pw-row{display:flex; gap:8px;}
  .pw-row input{flex:1;}
  .mini-btn{
    border:1px solid var(--line); background:#fbfbfd; border-radius:12px; padding:0 13px;
    font-size:14px; font-weight:600; color:var(--accent); cursor:pointer; white-space:nowrap;
  }
  .mini-btn:active{background:var(--bg);}
  .cat-suggest{display:flex; flex-wrap:wrap; gap:7px; margin-top:9px;}
  .cat-suggest span{
    font-size:13px; padding:5px 11px; border-radius:999px; background:var(--bg);
    color:var(--sub); cursor:pointer; border:1px solid var(--line);
  }
  .cat-suggest span:active{background:var(--line);}
  .sheet-actions{display:flex; gap:10px; margin-top:8px;}
  .btn{
    flex:1; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:600; cursor:pointer;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-ghost{background:var(--bg); color:var(--ink);}
  .btn-danger{background:transparent; color:var(--danger); margin-top:6px; width:100%; border:none; padding:12px; font-size:15px; font-weight:600; cursor:pointer;}

  /* トースト */
  .toast{
    position:fixed; left:50%; bottom:calc(92px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:14px; font-weight:600;
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer{text-align:center; color:var(--sub); font-size:11px; margin-top:24px; line-height:1.8;}
  .note{background:#fff8e6; border:1px solid #ffe7a3; color:#8a6d00; font-size:12px; border-radius:12px; padding:10px 13px; margin-top:14px; line-height:1.5;}

  /* 同期チップ */
  .sync{
    display:inline-flex; align-items:center; gap:6px; margin-top:10px;
    font-size:12px; font-weight:600; color:var(--sub);
    padding:5px 12px; border-radius:999px; background:var(--card); border:1px solid var(--line);
  }
  .sync .dot{width:7px; height:7px; border-radius:50%; background:#c7c7cc;}
  .sync.ok .dot{background:#34c759;}
  .sync.off .dot{background:#ff9f0a;}

  /* メモ項目エディタ */
  .cf-row{display:flex; gap:6px; align-items:center; margin-bottom:7px;}
  .cf-row .cf-label{flex:0 0 34%; min-width:0;}
  .cf-row .cf-value{flex:1; min-width:0;}
  .cf-row input{
    width:100%; border:1px solid var(--line); background:#fbfbfd; border-radius:10px;
    padding:10px 11px; font-size:15px; color:var(--ink);
  }
  .cf-row input:focus{outline:none; border-color:var(--accent); background:#fff;}
  .cf-secret,.cf-del{
    flex:0 0 auto; border:1px solid var(--line); background:#fbfbfd; border-radius:10px;
    width:40px; height:41px; font-size:15px; cursor:pointer;
  }
  .cf-secret.on{background:#fff3cd; border-color:#ffe08a;}
  .cf-del{color:var(--danger);}

  /* ロック画面 */
  .lock-sheet{text-align:center;}
  .lock-emoji{font-size:40px; margin-bottom:8px;}
  .lock-desc{font-size:13px; color:var(--sub); line-height:1.65; margin-bottom:16px; text-align:left;}
  .lock-err{color:var(--danger); font-size:13px; min-height:18px; margin:2px 0 10px;}
  #lockOverlay .sheet input{
    width:100%; border:1px solid var(--line); background:#fbfbfd; border-radius:12px;
    padding:13px 14px; font-size:16px; color:var(--ink);
  }
  #lockOverlay .sheet input:focus{outline:none; border-color:var(--accent); background:#fff;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="career.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🔐</div>
    <h1>Password manager</h1>
    <p class="tagline">パスワードを、ジャンルごとに保管</p>
    <div class="sync" id="syncChip"><span class="dot"></span><span id="syncText">接続中…</span></div>
  </header>

  <div class="search">
    <span class="ico">🔍</span>
    <input id="search" type="search" placeholder="タイトル・ユーザー名で検索" autocomplete="off">
  </div>

  <div class="chips" id="chips"></div>

  <div class="list" id="list"></div>

  <div class="note">
    🔒 パスワードはマスターパスワードで暗号化してから同期されます。クラウドには暗号文だけが保存され、マスターパスワードを知らない限り中身は読めません。<b>マスターパスワードを忘れると復元できない</b>ので大切に保管してください。
  </div>

  <footer>
    Password manager — つみき<br>
    tsumiki-apps.github.io
  </footer>
</div>

<button class="fab" id="addBtn" aria-label="追加">＋</button>

<!-- 追加/編集シート -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">新しいパスワード</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label for="fTitle">タイトル（なんのパスワード？）</label>
      <input id="fTitle" type="text" placeholder="例：Apple ID、楽天、社内ポータル" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="fCategory">ジャンル</label>
      <input id="fCategory" type="text" placeholder="例：SNS、金融、仕事" autocomplete="off">
      <div class="cat-suggest" id="catSuggest"></div>
    </div>
    <div class="form-group">
      <label for="fUser">ユーザー名 / ID（任意）</label>
      <input id="fUser" type="text" placeholder="メールアドレス・ログインIDなど" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="fPass">パスワード</label>
      <div class="pw-row">
        <input id="fPass" type="text" placeholder="パスワードを入力" autocomplete="off">
        <button type="button" class="mini-btn" id="genBtn">🎲 自動生成</button>
      </div>
    </div>
    <div class="form-group">
      <label>メモ項目（任意）</label>
      <div id="customFields"></div>
      <button type="button" class="mini-btn" id="addFieldBtn" style="width:100%; padding:11px 0; margin-top:4px;">＋ 項目を追加</button>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">キャンセル</button>
      <button class="btn btn-primary" id="saveBtn">保存</button>
    </div>
    <button class="btn-danger" id="deleteBtn" style="display:none;">このパスワードを削除</button>
  </div>
</div>

<!-- マスターパスワードのロック画面 -->
<div class="overlay" id="lockOverlay">
  <div class="sheet lock-sheet">
    <div class="lock-emoji">🔑</div>
    <h2 id="lockTitle">マスターパスワード</h2>
    <p class="lock-desc" id="lockDesc"></p>
    <div class="form-group">
      <input id="lockPw" type="password" placeholder="マスターパスワード" autocomplete="off" autocapitalize="off" autocorrect="off">
    </div>
    <div class="form-group" id="lockConfirmGroup" style="display:none;">
      <input id="lockPw2" type="password" placeholder="もう一度入力（確認）" autocomplete="off" autocapitalize="off" autocorrect="off">
    </div>
    <p class="lock-err" id="lockErr"></p>
    <button class="btn btn-primary" id="lockBtn" style="width:100%;">解除</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORE = "tsumiki-vault-v1";        // この端末の復号済みデータ
  const MPW_KEY = "tsumiki-vault-mpw";     // この端末に記憶するマスターパス（クラウドは暗号文のみ）
  const SALT_KEY = "tsumiki-vault-salt";   // 端末キャッシュ用のソルト
  const DEFAULT_CATS = ["SNS","金融・銀行","買い物","仕事","メール","ゲーム","その他"];

  // ---- Supabase（クラウド同期：暗号文だけを保存するゼロ知識方式） ----
  const SUPABASE_URL  = 'https://okbjqtdirrathscctyvx.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y';
  const sb = (window.supabase && window.supabase.createClient) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
  const STATE_TABLE = 'vault_state';
  const STATE_ID = 'kodai';                // 個人の複数端末で共有する1行

  // ジャンル名 → 配色（決まった色で一貫させる）
  const PALETTE = ["#ff6b6b","#4d8bf0","#34c759","#ff9f0a","#af52de","#5ac8fa","#ff2d92","#30b0c7","#a2845e","#8e8e93"];
  function colorFor(cat){
    if(!cat) return "#8e8e93";
    let h=0; for(let i=0;i<cat.length;i++) h=(h*31+cat.charCodeAt(i))>>>0;
    return PALETTE[h % PALETTE.length];
  }

  function normalize(d){ if(!Array.isArray(d.fields)) d.fields = []; return d; }

  let data = load();
  let filterCat = "すべて";
  let query = "";

  function load(){
    try{ return (JSON.parse(localStorage.getItem(STORE)) || []).map(normalize); }catch(e){ return []; }
  }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  // ===== 暗号化（マスターパスワードで端末間ゼロ知識同期） =====
  const _enc = new TextEncoder(), _dec = new TextDecoder();
  let cryptoKey = null;                                  // 導出済みAES鍵（メモリ上のみ）
  let saltB64 = localStorage.getItem(SALT_KEY) || null;
  let online = null;                                     // null=確認中, true=同期OK, false=オフライン
  let lastPushed = null;

  function b64e(buf){ let s=""; const b=new Uint8Array(buf); for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
  function b64d(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }

  async function deriveKey(password, salt){
    const base = await crypto.subtle.importKey("raw", _enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name:"PBKDF2", salt, iterations:150000, hash:"SHA-256" },
      base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
  }
  async function encryptData(obj){
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, cryptoKey, _enc.encode(JSON.stringify(obj)));
    return { v:1, salt:saltB64, iv:b64e(iv), ct:b64e(ct) };
  }
  async function decryptBlob(blob){
    const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64d(blob.iv) }, cryptoKey, b64d(blob.ct));
    return JSON.parse(_dec.decode(pt));
  }

  // ローカル保存＋クラウドへ暗号化アップロード（デバウンス）
  let saveTimer=null;
  function save(){
    localStorage.setItem(STORE, JSON.stringify(data));
    if(!sb || !cryptoKey) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushRemote, 350);
  }
  async function pushRemote(){
    if(!sb || !cryptoKey) return;
    try{
      const blob = await encryptData(data);
      lastPushed = JSON.stringify(blob);
      const { error } = await sb.from(STATE_TABLE).upsert({ id:STATE_ID, state:blob, updated_at:new Date().toISOString() });
      online = !error;
    }catch(e){ online=false; }
    renderSync();
  }
  // リアルタイム反映用：リモートの状態をそのまま反映（両端末オンライン時の同期）
  function applyRemote(obj){
    data = (Array.isArray(obj) ? obj : []).map(normalize);
    localStorage.setItem(STORE, JSON.stringify(data));
    render();
  }
  // 初回読み込み用：ID単位でマージ（ローカルにしか無い項目は絶対に消さない）。
  // 競合（同じID）はリモート優先。ローカル限定の項目があればクラウドへ反映する。
  function mergeRemote(obj){
    const remote = (Array.isArray(obj) ? obj : []).map(normalize);
    const byId = new Map();
    data.forEach(d=> byId.set(d.id, normalize(d)));   // 既存ローカル
    remote.forEach(d=> byId.set(d.id, d));            // リモート優先で上書き／追加
    data = [...byId.values()];
    localStorage.setItem(STORE, JSON.stringify(data));
    render();
    if(data.length !== remote.length) save();         // ローカル限定の項目をクラウドへ
  }

  async function startSync(){
    if(!sb){ online=false; renderSync(); return; }
    let row;
    try{
      const { data:r, error } = await sb.from(STATE_TABLE).select('state').eq('id', STATE_ID).maybeSingle();
      if(error) throw error;
      row = r;
    }catch(e){ online=false; renderSync(); return; }
    online = true; renderSync();
    if(row && row.state && row.state.ct){
      saltB64 = row.state.salt; localStorage.setItem(SALT_KEY, saltB64);
      await unlockExisting(row.state);
    }else{
      await setupNew();
    }
  }
  async function unlockExisting(blob){
    const salt = b64d(blob.salt);
    const cached = localStorage.getItem(MPW_KEY);
    if(cached){
      try{ cryptoKey = await deriveKey(cached, salt); mergeRemote(await decryptBlob(blob)); return; }
      catch(e){ cryptoKey=null; }
    }
    showLock("unlock", async (pw)=>{
      try{
        cryptoKey = await deriveKey(pw, salt);
        const obj = await decryptBlob(blob);     // 復号に失敗（=パス違い）なら例外
        localStorage.setItem(MPW_KEY, pw);
        mergeRemote(obj);
        return true;
      }catch(e){ cryptoKey=null; return false; }
    });
  }
  async function setupNew(){
    const cached = localStorage.getItem(MPW_KEY);
    if(cached && saltB64){       // この端末では設定済み → そのままクラウドへ種を上げる
      cryptoKey = await deriveKey(cached, b64d(saltB64));
      await pushRemote();
      return;
    }
    showLock("setup", async (pw)=>{
      const salt = crypto.getRandomValues(new Uint8Array(16));
      saltB64 = b64e(salt);
      localStorage.setItem(SALT_KEY, saltB64);
      cryptoKey = await deriveKey(pw, salt);
      localStorage.setItem(MPW_KEY, pw);
      await pushRemote();        // 今あるローカルを暗号化して初回アップ
      return true;
    });
  }
  function subscribeRealtime(){
    if(!sb) return;
    sb.channel('vault-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:STATE_TABLE, filter:'id=eq.'+STATE_ID }, async (payload)=>{
        const blob = payload.new && payload.new.state;
        if(!blob || !blob.ct || !cryptoKey) return;
        if(JSON.stringify(blob) === lastPushed) return;   // 自分の書き込みのエコー
        try{ applyRemote(await decryptBlob(blob)); toast("🔄 他の端末から更新"); }catch(e){}
      })
      .subscribe();
  }
  function renderSync(){
    const chip=document.getElementById("syncChip"), txt=document.getElementById("syncText");
    if(!chip) return;
    chip.classList.remove("ok","off");
    if(!sb){ txt.textContent="この端末に保存"; return; }
    if(online===true){ chip.classList.add("ok"); txt.textContent="クラウド同期中"; }
    else if(online===false){ chip.classList.add("off"); txt.textContent="オフライン（この端末に保存）"; }
    else { txt.textContent="接続中…"; }
  }

  // ===== マスターパスワードのロック画面 =====
  function showLock(mode, onSubmit){
    const ov=document.getElementById("lockOverlay");
    const pw=document.getElementById("lockPw"), pw2=document.getElementById("lockPw2");
    const err=document.getElementById("lockErr"), btn=document.getElementById("lockBtn");
    err.textContent=""; pw.value=""; pw2.value="";
    if(mode==="setup"){
      document.getElementById("lockTitle").textContent="マスターパスワードを設定";
      document.getElementById("lockDesc").innerHTML="このパスワードでパスワード帳を暗号化して端末間を同期します。クラウドには暗号文だけが保存され、このパスワードを知らない限り誰も中身を読めません。<b>忘れると復元できない</b>ので大切に保管してください。";
      document.getElementById("lockConfirmGroup").style.display="block";
      btn.textContent="設定して同期を開始";
    }else{
      document.getElementById("lockTitle").textContent="ロックを解除";
      document.getElementById("lockDesc").innerHTML="クラウドのデータを読み込むには、設定したマスターパスワードを入力してください。";
      document.getElementById("lockConfirmGroup").style.display="none";
      btn.textContent="解除";
    }
    ov.classList.add("show");
    setTimeout(()=>pw.focus(),100);
    async function submit(){
      const v=pw.value;
      if(mode==="setup"){
        if(v.length<6){ err.textContent="6文字以上にしてください"; return; }
        if(v!==pw2.value){ err.textContent="確認用と一致しません"; return; }
      }else if(!v){ err.textContent="入力してください"; return; }
      btn.disabled=true; err.textContent="確認中…";
      let ok=false; try{ ok = await onSubmit(v); }catch(e){ ok=false; }
      btn.disabled=false;
      if(ok){ ov.classList.remove("show"); }
      else{ err.textContent="パスワードが違うようです"; }
    }
    btn.onclick=submit;
    pw.onkeydown=(e)=>{ if(e.key==="Enter" && mode!=="setup") submit(); };
    pw2.onkeydown=(e)=>{ if(e.key==="Enter") submit(); };
  }

  // ---- 描画 ----
  const listEl = document.getElementById("list");
  const chipsEl = document.getElementById("chips");

  function allCats(){
    const set = new Set();
    data.forEach(d=>{ if(d.category) set.add(d.category); });
    return [...set];
  }

  function renderChips(){
    const cats = ["すべて", ...allCats()];
    chipsEl.innerHTML = cats.map(c=>
      `<div class="chip ${c===filterCat?'active':''}" data-cat="${esc(c)}">${esc(c)}${c==="すべて"?` (${data.length})`:""}</div>`
    ).join("");
    chipsEl.querySelectorAll(".chip").forEach(el=>{
      el.onclick = ()=>{ filterCat = el.dataset.cat; render(); };
    });
  }

  function render(){
    renderChips();
    let items = data.slice();
    if(filterCat!=="すべて") items = items.filter(d=>d.category===filterCat);
    if(query){
      const q = query.toLowerCase();
      items = items.filter(d=>
        (d.title||"").toLowerCase().includes(q) ||
        (d.username||"").toLowerCase().includes(q) ||
        (d.category||"").toLowerCase().includes(q)
      );
    }
    items.sort((a,b)=> (a.title||"").localeCompare(b.title||"", "ja"));

    if(items.length===0){
      listEl.innerHTML = `<div class="empty"><div class="big">🗝️</div>${
        data.length===0 ? "まだパスワードがありません。<br>右下の ＋ から追加しましょう。" : "該当するパスワードがありません。"
      }</div>`;
      return;
    }

    listEl.innerHTML = items.map(d=>{
      const col = colorFor(d.category);
      const initial = (d.title||"?").trim().charAt(0).toUpperCase();
      return `
      <div class="item" data-id="${d.id}">
        <div class="item-head">
          <div class="badge-ico" style="background:${col}">${esc(initial)}</div>
          <div class="item-meta">
            <div class="item-title">${esc(d.title||"(無題)")}</div>
            <div class="item-cat">${esc(d.category||"未分類")}${d.username?` ・ ${esc(d.username)}`:""}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn js-toggle" title="表示">👁️</button>
            <button class="icon-btn js-edit" title="編集">✏️</button>
          </div>
        </div>
        <div class="fields">
          ${d.username?`
          <div class="field">
            <span class="field-label">ユーザー名</span>
            <span class="field-val">${esc(d.username)}</span>
            <button class="copy-btn js-copy" data-val="${esc(d.username)}">コピー</button>
          </div>`:""}
          <div class="field">
            <span class="field-label">パスワード</span>
            <span class="field-val mask js-pw" data-pw="${esc(d.password||"")}" data-shown="0">${"•".repeat(Math.min((d.password||"").length||6,12))}</span>
            <button class="copy-btn js-copy" data-val="${esc(d.password||"")}">コピー</button>
          </div>
          ${(d.fields||[]).map(f=>`
          <div class="field">
            <span class="field-label">${esc(f.label||"メモ")}</span>
            ${ f.secret
              ? `<span class="field-val mask js-pw" data-pw="${esc(f.value||"")}" data-shown="0">${"•".repeat(Math.min((f.value||"").length||6,12))}</span>`
              : `<span class="field-val">${esc(f.value||"")}</span>` }
            <button class="copy-btn js-copy" data-val="${esc(f.value||"")}">コピー</button>
          </div>`).join("")}
        </div>
      </div>`;
    }).join("");

    // イベント
    listEl.querySelectorAll(".item").forEach(item=>{
      const id = item.dataset.id;
      item.querySelector(".js-toggle").onclick = ()=>{
        item.classList.toggle("open");
      };
      item.querySelector(".js-edit").onclick = ()=> openSheet(id);
      item.querySelectorAll(".js-pw").forEach(pw=>{
        pw.onclick = ()=>{
          const shown = pw.dataset.shown==="1";
          if(shown){
            pw.textContent = "•".repeat(Math.min((pw.dataset.pw||"").length||6,12));
            pw.classList.add("mask"); pw.dataset.shown="0";
          }else{
            pw.textContent = pw.dataset.pw; pw.classList.remove("mask"); pw.dataset.shown="1";
          }
        };
      });
      item.querySelectorAll(".js-copy").forEach(b=>{
        b.onclick = ()=> copy(b.dataset.val);
      });
    });
  }

  function esc(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  // ---- コピー ----
  async function copy(text){
    try{
      await navigator.clipboard.writeText(text);
    }catch(e){
      const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove();
    }
    toast("コピーしました");
  }

  // ---- トースト ----
  let toastTimer;
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove("show"),1600);
  }

  // ---- シート（追加/編集） ----
  const overlay=document.getElementById("overlay");
  const fId=document.getElementById("editId");
  const fTitle=document.getElementById("fTitle");
  const fCat=document.getElementById("fCategory");
  const fUser=document.getElementById("fUser");
  const fPass=document.getElementById("fPass");

  // メモ項目（1件ごとの自由項目）
  let editFields = [];
  function renderCustomFields(){
    const wrap=document.getElementById("customFields");
    wrap.innerHTML = editFields.map((f,i)=>`
      <div class="cf-row" data-i="${i}">
        <input class="cf-label" placeholder="項目名" value="${esc(f.label||"")}">
        <input class="cf-value" placeholder="内容" value="${esc(f.value||"")}">
        <button type="button" class="cf-secret ${f.secret?'on':''}" title="隠す">${f.secret?'🙈':'👁️'}</button>
        <button type="button" class="cf-del" title="削除">✕</button>
      </div>`).join("");
    wrap.querySelectorAll(".cf-row").forEach(row=>{
      const i=+row.dataset.i;
      row.querySelector(".cf-label").oninput=e=>{ editFields[i].label=e.target.value; };
      row.querySelector(".cf-value").oninput=e=>{ editFields[i].value=e.target.value; };
      row.querySelector(".cf-secret").onclick=()=>{ editFields[i].secret=!editFields[i].secret; renderCustomFields(); };
      row.querySelector(".cf-del").onclick=()=>{ editFields.splice(i,1); renderCustomFields(); };
    });
  }
  document.getElementById("addFieldBtn").onclick=()=>{ editFields.push({label:"",value:"",secret:false}); renderCustomFields(); };

  function renderCatSuggest(){
    const cats = [...new Set([...allCats(), ...DEFAULT_CATS])];
    document.getElementById("catSuggest").innerHTML =
      cats.map(c=>`<span data-cat="${esc(c)}">${esc(c)}</span>`).join("");
    document.querySelectorAll("#catSuggest span").forEach(el=>{
      el.onclick=()=>{ fCat.value = el.dataset.cat; };
    });
  }

  function openSheet(id){
    renderCatSuggest();
    if(id){
      const d = data.find(x=>x.id===id);
      document.getElementById("sheetTitle").textContent="パスワードを編集";
      fId.value=d.id; fTitle.value=d.title||""; fCat.value=d.category||"";
      fUser.value=d.username||""; fPass.value=d.password||"";
      editFields = (d.fields||[]).map(f=>({label:f.label||"", value:f.value||"", secret:!!f.secret}));
      document.getElementById("deleteBtn").style.display="block";
    }else{
      document.getElementById("sheetTitle").textContent="新しいパスワード";
      fId.value=""; fTitle.value=""; fCat.value=""; fUser.value=""; fPass.value="";
      editFields = [];
      document.getElementById("deleteBtn").style.display="none";
    }
    renderCustomFields();
    overlay.classList.add("show");
    setTimeout(()=>fTitle.focus(),100);
  }
  function closeSheet(){ overlay.classList.remove("show"); }

  document.getElementById("addBtn").onclick=()=>openSheet(null);
  document.getElementById("cancelBtn").onclick=closeSheet;
  overlay.onclick=(e)=>{ if(e.target===overlay) closeSheet(); };

  document.getElementById("saveBtn").onclick=()=>{
    const title=fTitle.value.trim();
    const pass=fPass.value;
    if(!title){ toast("タイトルを入力してください"); fTitle.focus(); return; }
    if(!pass){ toast("パスワードを入力してください"); fPass.focus(); return; }
    const fields=editFields
      .map(f=>({label:(f.label||"").trim(), value:(f.value||"").trim(), secret:!!f.secret}))
      .filter(f=>f.label||f.value);
    const entry={
      title, category:fCat.value.trim(), username:fUser.value.trim(), password:pass, fields
    };
    if(fId.value){
      const i=data.findIndex(x=>x.id===fId.value);
      data[i]={...data[i],...entry};
      toast("更新しました");
    }else{
      entry.id=uid(); data.push(entry);
      toast("保存しました");
    }
    save(); render(); closeSheet();
  };

  document.getElementById("deleteBtn").onclick=()=>{
    if(!fId.value) return;
    if(!confirm("このパスワードを削除しますか？")) return;
    data=data.filter(x=>x.id!==fId.value);
    save(); render(); closeSheet(); toast("削除しました");
  };

  // ---- パスワード自動生成 ----
  document.getElementById("genBtn").onclick=()=>{
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%&*?";
    let out=""; const arr=new Uint32Array(16); crypto.getRandomValues(arr);
    for(let i=0;i<16;i++) out+=chars[arr[i]%chars.length];
    fPass.value=out;
    toast("16文字を生成しました");
  };

  // ---- 検索 ----
  document.getElementById("search").oninput=(e)=>{ query=e.target.value.trim(); render(); };

  // 初期描画
  render();
  renderSync();
  if(sb){ startSync(); subscribeRealtime(); }
</script>
<!-- tsumiki-back-button -->
<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>
</html>

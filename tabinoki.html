<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<link rel="apple-touch-icon" href="icons/icon-tabinoki.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="たびのき">
<meta name="theme-color" content="#0d9488">
<title>たびのき — ふたりの旅のしおり</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#f3f6f6; --card:#ffffff; --ink:#16211f; --sub:#6b7c79;
    --line:#e4ebea; --accent:#0d9488; --accent-soft:#d6f0ec; --accent-ink:#0a766c;
    --radius:20px; --warn:#e8843b;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{overscroll-behavior-y:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    line-height:1.6; -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 40px);
  }
  .wrap{max-width:680px; margin:0 auto; padding:0 16px;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,textarea,select{font-family:inherit; font-size:16px;}
  a{color:var(--accent-ink);}

  /* ===== トップバー ===== */
  .topbar{position:sticky; top:0; z-index:50; background:rgba(243,246,246,.86);
    backdrop-filter:saturate(160%) blur(14px); -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid var(--line);}
  .topbar .inner{max-width:680px; margin:0 auto; padding:10px 12px;
    display:flex; align-items:center; gap:8px; min-height:52px;}
  .tb-title{font-size:18px; font-weight:700; letter-spacing:-.01em; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tb-btn{font-size:15px; color:var(--accent-ink); font-weight:600; padding:8px 6px; flex:0 0 auto;}
  .tb-btn.back{display:flex; align-items:center; gap:2px;}
  .who-chip{flex:0 0 auto; font-size:13px; font-weight:600; color:var(--accent-ink);
    background:var(--accent-soft); border-radius:999px; padding:5px 11px;}

  /* ===== ホーム ===== */
  header.home{padding:26px 4px 14px; text-align:center;}
  header.home .logo{font-size:46px; line-height:1;}
  header.home h1{font-size:27px; font-weight:800; letter-spacing:-.02em; margin-top:8px;}
  header.home .tagline{color:var(--sub); font-size:14px; margin-top:6px;}

  .add-trip{display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:var(--accent); color:#fff; font-size:16px; font-weight:700;
    border-radius:16px; padding:15px; margin:14px 0 4px;
    box-shadow:0 6px 18px rgba(13,148,136,.28); transition:transform .12s ease;}
  .add-trip:active{transform:scale(.97);}

  .trips{display:flex; flex-direction:column; gap:13px; margin-top:18px;}
  .trip-card{display:block; width:100%; text-align:left; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
    transition:transform .12s ease, box-shadow .12s ease;}
  .trip-card:active{transform:scale(.985);}
  @media(hover:hover){ .trip-card:hover{box-shadow:0 10px 26px rgba(0,0,0,.07);} }
  .trip-top{display:flex; align-items:center; gap:14px; padding:16px 16px 12px;}
  .trip-emoji{font-size:30px; width:56px; height:56px; flex:0 0 auto; border-radius:16px;
    display:flex; align-items:center; justify-content:center; background:var(--accent-soft);}
  .trip-meta{min-width:0; flex:1;}
  .trip-name{font-size:18px; font-weight:700; letter-spacing:-.01em; line-height:1.25;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .trip-dest{font-size:13px; color:var(--sub); margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .trip-foot{display:flex; align-items:center; gap:10px; padding:0 16px 14px; flex-wrap:wrap;}
  .pill{font-size:12px; font-weight:600; color:var(--sub); background:var(--bg);
    border-radius:999px; padding:4px 10px;}
  .pill.count-d{color:#fff; background:var(--accent);}
  .pill.count-soon{color:#fff; background:var(--warn);}

  .empty{text-align:center; color:var(--sub); padding:60px 20px;}
  .empty .big{font-size:50px; display:block; margin-bottom:12px;}

  /* ===== 旅詳細 ===== */
  .trip-hero{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; margin:14px 0;}
  .trip-hero .h-emoji{font-size:34px;}
  .trip-hero h2{font-size:22px; font-weight:800; letter-spacing:-.02em; margin-top:6px;}
  .trip-hero .h-sub{color:var(--sub); font-size:14px; margin-top:4px;}
  .trip-hero .h-note{font-size:14px; margin-top:10px; white-space:pre-wrap; color:#3a4a47;}
  .trip-hero .h-edit{margin-top:12px; font-size:13px; font-weight:600; color:var(--accent-ink);}

  .tabs{display:flex; gap:6px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:4px; margin-bottom:16px; position:sticky;
    top:calc(env(safe-area-inset-top) + 60px); z-index:30;}
  .tabs button{flex:1; font-size:14px; font-weight:600; color:var(--sub);
    padding:9px 4px; border-radius:10px; transition:.15s;}
  .tabs button.on{background:var(--accent-soft); color:var(--accent-ink);}

  /* しおり（タイムライン） */
  .day-block{margin-bottom:22px;}
  .day-head{display:flex; align-items:center; gap:9px; padding:0 2px 8px;}
  .day-num{font-size:15px; font-weight:800; color:var(--accent-ink);
    background:var(--accent-soft); border-radius:8px; padding:2px 9px;}
  .day-date{font-size:14px; font-weight:600;}
  .day-dow{font-size:13px; color:var(--sub);}
  .day-wx{margin-left:auto; font-size:13px; font-weight:700; color:var(--sub); white-space:nowrap;}

  .tl{position:relative; padding-left:2px;}
  .ev{position:relative; display:flex; gap:12px; padding:0;}
  .ev .rail{flex:0 0 auto; width:46px; display:flex; flex-direction:column; align-items:flex-end; gap:5px; padding-top:1px;}
  .ev .time{font-size:13px; font-weight:700; color:var(--ink); white-space:nowrap;}
  .ev .time-end{font-size:11.5px; font-weight:600; color:var(--sub); white-space:nowrap; margin-top:-2px;}
  .grip{touch-action:none; cursor:grab; color:#cdd8d6; font-size:15px; line-height:1; padding:3px 1px;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;}
  .grip:active{cursor:grabbing; color:var(--accent);}
  .ev .col{flex:1; min-width:0; display:flex; flex-direction:column;}
  .gap{font-size:11.5px; color:var(--sub); margin:0 0 8px 2px; display:flex; align-items:center; gap:5px;}
  .ev .body{background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:12px 13px; margin-bottom:11px; position:relative;}
  .ev .body:active{background:#fafcfc;}
  .ev.dragging{opacity:.92;}
  .ev.dragging .body{box-shadow:0 14px 30px rgba(0,0,0,.16); border-color:var(--accent);}
  .ev .e-line{display:flex; align-items:center; gap:8px;}
  .ev .e-emoji{font-size:18px; flex:0 0 auto;}
  .ev .e-title{font-size:15.5px; font-weight:700; line-height:1.3; min-width:0; flex:1;}
  .ev .e-place{font-size:13px; color:var(--sub); margin-top:2px;}
  .ev .e-trans{font-size:13px; color:var(--accent-ink); margin-top:6px;
    background:var(--accent-soft); border-radius:8px; padding:5px 9px; display:inline-block;}
  .ev .e-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center;}
  .ev .tag{font-size:12px; color:var(--sub); background:var(--bg); border-radius:999px; padding:3px 9px;}
  .ev .tag.link{color:var(--accent-ink); background:var(--accent-soft);}
  .ev .e-note{font-size:13.5px; margin-top:8px; white-space:pre-wrap; color:#3a4a47;}

  /* コメント */
  .cmts{margin-top:10px; border-top:1px dashed var(--line); padding-top:9px;}
  .cmt{display:flex; gap:7px; font-size:13px; margin-bottom:6px;}
  .cmt .c-who{font-weight:700; flex:0 0 auto;}
  .cmt .c-who.kodai{color:#2f6fd0;} .cmt .c-who.yuzu{color:#e8843b;}
  .cmt .c-body{min-width:0; white-space:pre-wrap;}
  .cmt .c-del{margin-left:auto; color:#c7c7cc; flex:0 0 auto; padding:0 4px;}
  .cmt-add{display:flex; gap:7px; margin-top:8px;}
  .cmt-add input{flex:1; border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px;}
  .cmt-add button{flex:0 0 auto; color:var(--accent-ink); font-weight:700; font-size:14px; padding:0 6px;}

  .add-ev{display:flex; align-items:center; gap:7px; color:var(--accent-ink);
    font-size:14px; font-weight:600; padding:8px 6px; margin-left:58px;}

  /* マップ */
  #map{height:60vh; min-height:340px; border-radius:16px; overflow:hidden; border:1px solid var(--line);}
  .map-note{font-size:12.5px; color:var(--sub); margin:10px 2px 4px; line-height:1.6;}
  .map-legend{display:flex; flex-wrap:wrap; gap:10px; margin:10px 2px;}
  .map-legend span{display:flex; align-items:center; gap:5px; font-size:12.5px; color:var(--sub);}
  .map-legend i{width:12px; height:12px; border-radius:50%; display:inline-block;}
  .pin{color:#fff; border-radius:50% 50% 50% 0; width:24px; height:24px; transform:rotate(-45deg);
    display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.35);}
  .pin b{transform:rotate(45deg); font-size:12px; font-weight:800;}
  .leaflet-popup-content{font-size:13px; line-height:1.5; font-family:inherit;}

  /* 持ち物 */
  .check-list{display:flex; flex-direction:column; gap:2px;}
  .check{display:flex; align-items:center; gap:12px; padding:13px 6px; border-bottom:1px solid var(--line);}
  .check .box{width:24px; height:24px; flex:0 0 auto; border-radius:7px; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff;}
  .check.done .box{background:var(--accent); border-color:var(--accent);}
  .check .ctext{flex:1; font-size:15px; min-width:0;}
  .check.done .ctext{color:var(--sub); text-decoration:line-through;}
  .check .cwho{font-size:11px; color:var(--sub); flex:0 0 auto;}
  .check .cdel{color:#c7c7cc; flex:0 0 auto; padding:4px;}
  .add-row{display:flex; gap:8px; margin-top:14px;}
  .add-row input{flex:1; border:1px solid var(--line); border-radius:12px; padding:12px 14px; background:var(--card);}
  .add-row button{flex:0 0 auto; background:var(--accent); color:#fff; font-weight:700;
    border-radius:12px; padding:0 18px;}
  .progress{font-size:13px; color:var(--sub); margin-bottom:6px; padding:0 2px;}

  /* 費用 */
  .cost-sum{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;}
  .cost-total{font-size:30px; font-weight:800; letter-spacing:-.02em;}
  .cost-total small{font-size:15px; font-weight:600; color:var(--sub); margin-left:3px;}
  .cost-split{display:flex; gap:10px; margin-top:14px;}
  .cost-cell{flex:1; background:var(--bg); border-radius:12px; padding:11px 13px;}
  .cost-cell b{font-size:19px; font-weight:800; display:block; letter-spacing:-.01em;}
  .cost-cell span{font-size:12px; color:var(--sub);}
  .cost-row{display:flex; align-items:center; gap:10px; padding:12px 4px; border-bottom:1px solid var(--line);}
  .cost-row .cr-emoji{font-size:17px; flex:0 0 auto;}
  .cost-row .cr-t{flex:1; min-width:0;}
  .cost-row .cr-name{font-size:14.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cost-row .cr-meta{font-size:12px; color:var(--sub);}
  .cost-row .cr-amt{font-size:15px; font-weight:700; flex:0 0 auto;}

  /* ===== モーダル / シート ===== */
  .overlay{position:fixed; inset:0; z-index:100; background:rgba(20,30,28,.4);
    display:none; align-items:flex-end; justify-content:center;}
  .overlay.on{display:flex;}
  .sheet{background:var(--card); width:100%; max-width:680px;
    border-radius:22px 22px 0 0; padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);
    max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    animation:slideup .26s cubic-bezier(.22,.61,.36,1);}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .grab{width:38px; height:5px; background:#d6dedd; border-radius:3px; margin:8px auto 14px;}
  .sheet h3{font-size:19px; font-weight:800; letter-spacing:-.01em; margin-bottom:14px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--sub); margin-bottom:5px;}
  .field input, .field textarea, .field select{width:100%; border:1px solid var(--line);
    border-radius:12px; padding:12px 13px; background:#fafcfc;}
  .field textarea{min-height:74px; resize:vertical; line-height:1.5;}
  .field-2{display:flex; gap:10px;} .field-2 .field{flex:1;}
  .type-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .type-grid button{display:flex; flex-direction:column; align-items:center; gap:3px;
    border:1.5px solid var(--line); border-radius:12px; padding:10px 4px; font-size:12px; color:var(--sub);}
  .type-grid button .te{font-size:21px;}
  .type-grid button.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink); font-weight:700;}
  .emoji-pick{display:flex; gap:8px; flex-wrap:wrap;}
  .emoji-pick button{font-size:23px; width:44px; height:44px; border-radius:12px; border:1.5px solid var(--line);}
  .emoji-pick button.on{border-color:var(--accent); background:var(--accent-soft);}
  .sheet-actions{display:flex; gap:10px; margin-top:18px;}
  .btn-primary{flex:1; background:var(--accent); color:#fff; font-weight:700; font-size:16px;
    border-radius:14px; padding:14px;}
  .btn-ghost{flex:0 0 auto; color:var(--sub); font-weight:600; font-size:15px; padding:14px 16px;}
  .btn-danger{width:100%; color:#e0483b; font-weight:600; font-size:15px; padding:13px; margin-top:6px;}
  .who-pick{display:flex; gap:12px;}
  .who-pick button{flex:1; border:1.5px solid var(--line); border-radius:16px; padding:20px 10px;
    font-size:17px; font-weight:700;}
  .who-pick button .we{font-size:32px; display:block; margin-bottom:6px;}
  .who-pick button.kodai.on{border-color:#2f6fd0; background:#eaf2fd; color:#2f6fd0;}
  .who-pick button.yuzu.on{border-color:#e8843b; background:#fdf0e6; color:#e8843b;}

  .toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 26px);
    transform:translateX(-50%) translateY(20px); background:#16211f; color:#fff;
    font-size:14px; padding:11px 20px; border-radius:999px; opacity:0; pointer-events:none;
    transition:.25s; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,.2);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .sync-note{font-size:12px; color:var(--sub); text-align:center; margin:24px 0 8px; line-height:1.7;}
  .offline-badge{display:inline-block; font-size:11px; color:var(--warn); margin-left:6px;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="topbar"><div class="inner" id="topbar"></div></div>

<main class="wrap" id="view"></main>

<!-- 汎用シート -->
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<!-- 本人選択 -->
<div class="overlay" id="whoOverlay"><div class="sheet">
  <div class="grab"></div>
  <h3>あなたはどっち？ 🌴</h3>
  <p style="color:var(--sub); font-size:14px; margin:-6px 0 16px;">ふたりで共有する旅のしおりです。記録するときの名前を選んでね。</p>
  <div class="who-pick">
    <button class="kodai" data-who="こうだい"><span class="we">🧑</span>こうだい</button>
    <button class="yuzu" data-who="ゆずは"><span class="we">👩</span>ゆずは</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ Supabase（ゆずごはんと同じプロジェクト） ============ */
const SUPABASE_URL  = 'https://okbjqtdirrathscctyvx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y';
const sb = (window.supabase && window.supabase.createClient) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const STATE_TABLE = 'tabinoki_state';
const STATE_ID = 'shared';          // ふたり共有の1行
const LS_KEY = 'tabinoki_db_v1';
const WHO_KEY = 'tabinoki_who';

/* ============ ユーティリティ ============ */
const $ = s=>document.querySelector(s);
const uid = ()=> Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1700);}

const DOW = ['日','月','火','水','木','金','土'];
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseYmd(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDate(s){ const d=parseYmd(s); if(!d) return ''; return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtDow(s){ const d=parseYmd(s); return d?DOW[d.getDay()]:''; }
function todayYmd(){ return ymd(new Date()); }
function daysBetween(a,b){ // a,b: Date → 日数差
  const ms = parseYmd(b)-parseYmd(a); return Math.round(ms/86400000);
}
function rangeDates(start,end){ // YYYY-MM-DD 配列（含む両端）
  const out=[]; if(!start) return out;
  const s=parseYmd(start), e=parseYmd(end||start);
  if(e<s) return [start];
  for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)) out.push(ymd(new Date(d)));
  return out;
}
function yen(n){ return '¥'+Number(n||0).toLocaleString('ja-JP'); }
function timeToMin(t){ if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmtDur(min){ const h=Math.floor(min/60), m=min%60; return (h?h+'時間':'')+(m?m+'分':'')||'0分'; }
/* 並べ替えキー：手動order優先、無ければ時刻（分）。時刻なしは末尾へ */
function effOrder(i){ if(typeof i.order==='number') return i.order; const m=timeToMin(i.time); return m==null?100000:m; }

/* ===== 天気（Open-Meteo・APIキー不要） ===== */
const wxCache = {};
function wxEmoji(c){
  if(c===0) return '☀️'; if(c<=2) return '🌤'; if(c===3) return '☁️';
  if(c<=48) return '🌫'; if(c<=57) return '🌦'; if(c<=67) return '🌧';
  if(c<=77) return '🌨'; if(c<=82) return '🌦'; if(c<=86) return '🌨'; return '⛈';
}
/* 主要な日本の地名→緯度経度（Open-Meteoは漢字を解決できないため内蔵辞書で対応） */
const JP_GEO = {
  '札幌':[43.06,141.35],'函館':[41.77,140.73],'小樽':[43.19,140.99],'北海道':[43.06,141.35],
  '青森':[40.82,140.74],'弘前':[40.60,140.46],'仙台':[38.27,140.87],'宮城':[38.27,140.87],

function jpGeo(dest){
  const keys = Object.keys(JP_GEO).sort((a,b)=>b.length-a.length); // 長い（具体的な）地名を優先
  for(const k of keys){ if(dest.includes(k)) return JP_GEO[k]; }
  return null;
}
async function loadWeather(t){
  if(!t.destination || !t.startDate) return;
  const end = t.endDate || t.startDate;
  // 予報が取れる範囲（今日の少し前〜16日先）だけ問い合わせる
  if(daysBetween(todayYmd(), t.startDate) > 16) return;
  if(daysBetween(todayYmd(), end) < -1) return;
  const place = t.destination.split(/[・、,／/\s〜~]/)[0].trim();
  if(!place) return;
  const key = t.destination+'|'+t.startDate+'|'+end;
  let data = wxCache[key];
  if(!data){
    try{
      let lat, lon;
      const hit = jpGeo(t.destination);            // まず内蔵辞書（漢字対応）
      if(hit){ lat=hit[0]; lon=hit[1]; }
      else {                                        // 未知の地名はAPIへ（ローマ字など）
        const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(place)}&count=1&language=ja`).then(r=>r.json());
        const loc = g.results && g.results[0];
        if(!loc){ wxCache[key]={}; return; }
        lat=loc.latitude; lon=loc.longitude;
      }
      const f = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&start_date=${t.startDate}&end_date=${end}`).then(r=>r.json());
      data={};
      if(f.daily && f.daily.time){
        f.daily.time.forEach((d,idx)=>{ data[d]={ code:f.daily.weather_code[idx],
          max:Math.round(f.daily.temperature_2m_max[idx]), min:Math.round(f.daily.temperature_2m_min[idx]) }; });
      }
      wxCache[key]=data;
    }catch(e){ return; }
  }
  // 描画後のDOMが今もこの旅なら反映
  if(route.name!=='trip' || route.tripId!==t.id || route.tab!=='plan') return;
  document.querySelectorAll('.day-wx').forEach(span=>{
    const w=data[span.dataset.wxdate];
    if(w) span.innerHTML = `${wxEmoji(w.code)} ${w.max}°/${w.min}°`;
  });
}

/* ============ 永続化 ============ */
function loadLocal(){ try{ const s=localStorage.getItem(LS_KEY); if(s) db=JSON.parse(s); }catch(e){} }
let saveTimer=null;
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(db));
  if(!sb) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    const payload = JSON.stringify(db);
    lastPushed = payload;
    const { error } = await sb.from(STATE_TABLE)
      .upsert({ id:STATE_ID, state: db, updated_at:new Date().toISOString() });
    if(error){ online=false; renderTopbar(); }
  }, 350);
}
async function loadRemote(){
  if(!sb) return false;
  const { data, error } = await sb.from(STATE_TABLE).select('state').eq('id', STATE_ID).maybeSingle();
  if(error){ online=false; return false; }
  online = true;
  if(data && data.state && typeof data.state==='object'){
    // ローカルに何か未保存があり、リモートが空なら自分を残す。基本はリモート優先。
    db = data.state;
    if(!Array.isArray(db.trips)) db.trips=[];
    localStorage.setItem(LS_KEY, JSON.stringify(db));
  }
  return true;
}
function subscribeRealtime(){
  if(!sb) return;
  sb.channel('tabinoki-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:STATE_TABLE, filter:'id=eq.'+STATE_ID },
      (payload)=>{
        const incoming = JSON.stringify((payload.new && payload.new.state) || {});
        if(incoming === lastPushed) return;          // 自分の書き込みのエコー
        if(payload.new && payload.new.state){
          db = payload.new.state;
          if(!Array.isArray(db.trips)) db.trips=[];
          localStorage.setItem(LS_KEY, JSON.stringify(db));
          render();                                   // 画面を最新化（モーダル中でも背面更新）
          toast('🔄 更新されました');
        }
      })
    .subscribe();
}

function renderPlan(t){
  const items = t.items||[];
  const dayList = rangeDates(t.startDate, t.endDate);
  // 日程未定でも、itemsに付いている日付を拾う
  const extra = [...new Set(items.map(i=>i.date).filter(Boolean))].filter(d=>!dayList.includes(d));
  const days = [...dayList, ...extra].sort();
  const useDays = days.length? days : [t.startDate||'__none__'];

  let html='';
  useDays.forEach((date, idx)=>{
    const dayItems = items.filter(i=> (i.date||t.startDate||'__none__')===date)
      .sort((a,b)=> effOrder(a)-effOrder(b));
    const dnum = date==='__none__'? '' : `<span class="day-num">Day ${idx+1}</span>`;
    const dlabel = date==='__none__'? '<span class="day-date">予定</span>'
      : `<span class="day-date">${fmtDate(date)}</span><span class="day-dow">(${fmtDow(date)})</span><span class="day-wx" data-wxdate="${date}"></span>`;
    let evs='';
    let prevPlace='';
    dayItems.forEach((it,k)=>{
      let gap='';
      if(k>0){
        const prev=dayItems[k-1];
        const a=timeToMin(prev.endTime||prev.time), b=timeToMin(it.time);
        if(a!=null && b!=null && b-a>0) gap=`<div class="gap">⏱ あき ${fmtDur(b-a)}</div>`;
      }
      evs += evHtml(t, it, date, gap, prevPlace);
      if(it.place) prevPlace=it.place;
    });
    html += `<div class="day-block">
      <div class="day-head">${dnum}${dlabel}</div>
      <div class="tl">${evs || '<div style="color:var(--sub);font-size:13px;padding:4px 0 8px 58px;">まだ予定なし</div>'}
        <div class="add-ev" data-add="${date}">＋ 予定を追加</div>
      </div></div>`;
  });
  return html;
}

/* ===== ドラッグ並べ替え（Pointer Events・iPhoneタッチ対応） ===== */
function enableDragSort(t){
  $('#view').querySelectorAll('.grip').forEach(grip=>{
    grip.addEventListener('pointerdown', e=>{
      e.preventDefault();
      const ev = grip.closest('.ev');
      const tl = ev.parentElement;            // .tl（その日の枠）
      let moved=false;
      ev.classList.add('dragging');
      try{ grip.setPointerCapture(e.pointerId); }catch(_){}
      const move = me=>{
        moved=true;
        const others=[...tl.querySelectorAll('.ev:not(.dragging)')];
        let target=null;
        for(const o of others){ const r=o.getBoundingClientRect(); if(me.clientY < r.top+r.height/2){ target=o; break; } }
        if(target) tl.insertBefore(ev, target);
        else tl.insertBefore(ev, tl.querySelector('.add-ev'));
      };
      const up = ()=>{
        grip.removeEventListener('pointermove', move);
        grip.removeEventListener('pointerup', up);
        grip.removeEventListener('pointercancel', up);
        ev.classList.remove('dragging');
        if(moved) commitDragOrder(t, tl, ev.dataset.id);
      };
      grip.addEventListener('pointermove', move);
      grip.addEventListener('pointerup', up);
      grip.addEventListener('pointercancel', up);
    });
  });
}
/* ドロップ後：動かした予定だけ、前後の予定の中間にorderを差し込む（時刻スケールを維持） */
function commitDragOrder(t, tl, draggedId){
  const ids=[...tl.querySelectorAll('.ev')].map(e=>e.dataset.id);
  const pos=ids.indexOf(draggedId);
  const it=(t.items||[]).find(x=>x.id===draggedId); if(!it) return;
  const ord = id=>{ const x=(t.items||[]).find(y=>y.id===id); return x?effOrder(x):0; };
  const prev = pos>0 ? ord(ids[pos-1]) : null;
  const next = pos<ids.length-1 ? ord(ids[pos+1]) : null;
  if(prev==null && next==null) it.order = 0;
  else if(prev==null) it.order = next - 30;
  else if(next==null) it.order = prev + 30;
  else it.order = (prev+next)/2;
  save(); render();
  toast('並べ替えました');
}

/* ----- 持ち物 ----- */
function renderPack(t){
  const list = t.checklist||[];
  const done = list.filter(x=>x.done).length;
  const rows = list.map(c=>`<div class="check ${c.done?'done':''}" data-toggle="${c.id}">
      <span class="box">${c.done?'✓':''}</span>
      <span class="ctext">${esc(c.text)}</span>
      ${c.who?`<span class="cwho">${esc(c.who)}</span>`:''}
      <button class="cdel" data-delp="${c.id}">×</button>
    </div>`).join('');
  return `${list.length?`<div class="progress">${done} / ${list.length} 準備OK</div>`:''}
    <div class="check-list">${rows || '<div class="empty" style="padding:36px 0;"><span class="big">🎒</span>持ち物を追加しよう</div>'}</div>
    <div class="add-row"><input type="text" id="packInput" placeholder="持ち物を追加（例: 充電器）"><button id="packAdd">追加</button></div>`;
}
function bindPack(t){
  if(route.tab!=='pack') return;
  const v=$('#view');
  const add=()=>{
    const inp=$('#packInput'); const text=inp.value.trim(); if(!text) return;
    t.checklist=t.checklist||[]; t.checklist.push({id:uid(), text, done:false, who});
    save(); render(); setTimeout(()=>{const n=$('#packInput'); if(n) n.focus();},30);
  };
  $('#packAdd').onclick=add;
  $('#packInput').onkeydown=e=>{ if(e.key==='Enter') add(); };
  v.querySelectorAll('[data-toggle]').forEach(b=> b.onclick=()=>{
    const c=(t.checklist||[]).find(x=>x.id===b.dataset.toggle); if(c){ c.done=!c.done; save(); render(); }
  });
  v.querySelectorAll('[data-delp]').forEach(b=> b.onclick=(e)=>{
    e.stopPropagation();
    t.checklist=(t.checklist||[]).filter(x=>x.id!==b.dataset.delp); save(); render();
  });
}

/* ----- 費用 ----- */
function renderCost(t){
  const items=(t.items||[]).filter(i=>i.cost>0);
  const total=items.reduce((s,i)=>s+Number(i.cost||0),0);
  const by={'こうだい':0,'ゆずは':0,'ふたり':0,'':0};
  items.forEach(i=> by[i.payer||'']=(by[i.payer||'']||0)+Number(i.cost||0));
  const rows=[...items].sort((a,b)=>(a.date||'').localeCompare(b.date||''))
    .map(i=>{const ty=TYPES[i.type]||TYPES.other; return `<div class="cost-row">
      <span class="cr-emoji">${ty.emoji}</span>
      <span class="cr-t"><span class="cr-name">${esc(i.title||ty.label)}</span>
        <span class="cr-meta">${i.date?fmtDate(i.date)+' ':''}${i.payer?'・'+esc(i.payer):'支払者未設定'}</span></span>
      <span class="cr-amt">${yen(i.cost)}</span></div>`;}).join('');
  return `<div class="cost-sum">
      <div class="cost-total">${yen(total)}<small>の旅</small></div>
      <div class="cost-split">
        <div class="cost-cell"><b>${yen(by['こうだい'])}</b><span>こうだい立替</span></div>
        <div class="cost-cell"><b>${yen(by['ゆずは'])}</b><span>ゆずは立替</span></div>
        <div class="cost-cell"><b>${yen(by['ふたり']+by[''])}</b><span>ふたり/未設定</span></div>
      </div>
    </div>
    ${rows? rows : '<div class="empty" style="padding:30px 0;"><span class="big">💰</span>各予定に金額を入れると<br>ここに費用がまとまります</div>'}
    <p class="sync-note">金額は「しおり」の各予定を編集して入力できます</p>`;
}

/* ----- 地図（Leaflet + OpenStreetMap・キー不要） ----- */
const DAY_COLORS = ['#0d9488','#e8843b','#2f6fd0','#9b51e0','#e0483b','#c98a00','#1f8a55','#d6336c'];
const geoCache = (()=>{ try{ return JSON.parse(localStorage.getItem('tabinoki_geo')||'{}'); }catch(e){ return {}; } })();
const sleep = ms=>new Promise(r=>setTimeout(r,ms));
let _lastGeo = 0;
async function geocode(q){
  if(geoCache[q]) return geoCache[q];
  const wait = 1100-(Date.now()-_lastGeo); if(wait>0) await sleep(wait);  // Nominatimは1秒1回まで
  _lastGeo = Date.now();
  try{
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=jp&accept-language=ja&q=${encodeURIComponent(q)}`).then(x=>x.json());
    if(r && r[0]){ const c=[+r[0].lat, +r[0].lon]; geoCache[q]=c; localStorage.setItem('tabinoki_geo', JSON.stringify(geoCache)); return c; }
  }catch(e){}
  return null;
}
function renderMap(t){
  const hasPlace = (t.items||[]).some(i=>i.place);
  if(!hasPlace) return `<div class="empty" style="padding:50px 0;"><span class="big">🗺</span>予定に「場所」を入れると<br>ここに地図とピンが出ます</div>`;
  return `<div id="map"></div><div class="map-legend" id="mapLegend"></div><div class="map-note" id="mapNote">📍 場所を地図に並べています…</div>`;
}
let _leafletMap = null;
function bindMap(t){
  if(route.tab!=='map') return;
  const el = document.getElementById('map');
  if(!el) return;
  if(!window.L){ const n=document.getElementById('mapNote'); if(n) n.textContent='地図ライブラリを読み込めませんでした。通信環境をご確認ください。'; return; }
  if(_leafletMap){ try{ _leafletMap.remove(); }catch(e){} _leafletMap=null; }
  const map = L.map(el, {scrollWheelZoom:true}).setView([35.68,139.77], 9);
  _leafletMap = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
  setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 200);

  // 日ごとに、場所のある予定を時刻順で
  const dayList = rangeDates(t.startDate, t.endDate);
  const extra = [...new Set((t.items||[]).map(i=>i.date).filter(Boolean))].filter(d=>!dayList.includes(d));
  const days = [...dayList, ...extra].sort();
  const useDays = days.length? days : [t.startDate||'__none__'];

  (async()=>{
    const allLatLng = [];
    const failed = [];
    const legend = [];
    for(let di=0; di<useDays.length; di++){
      const date = useDays[di];
      const color = DAY_COLORS[di % DAY_COLORS.length];
      const dayItems = (t.items||[]).filter(i=> (i.date||t.startDate||'__none__')===date && i.place)
        .sort((a,b)=> effOrder(a)-effOrder(b));
      if(!dayItems.length) continue;
      const line = [];
      let n=0;
      for(const it of dayItems){
        if(route.name!=='trip' || route.tripId!==t.id || route.tab!=='map') return; // 画面を離れたら中断
        n++;
        const c = await geocode(geoCacheKey(t, it.place));
        if(!c){ failed.push(it.place); continue; }
        allLatLng.push(c); line.push(c);
        const icon = L.divIcon({ className:'', html:`<div class="pin" style="background:${color}"><b>${n}</b></div>`, iconSize:[24,24], iconAnchor:[12,24], popupAnchor:[0,-22] });
        const dayLabel = date==='__none__'? '' : `Day${di+1} `;
        L.marker(c, {icon}).addTo(map).bindPopup(`<b>${esc(it.title||it.place)}</b><br>${dayLabel}${it.time?esc(it.time)+' ':''}${esc(it.place)}`);
      }
      if(line.length>=2) L.polyline(line, {color, weight:3, opacity:.7}).addTo(map);
      if(line.length) legend.push(`<span><i style="background:${color}"></i>${date==='__none__'?'予定':'Day'+(di+1)}</span>`);
      if(line.length) try{ map.fitBounds(allLatLng, {padding:[40,40], maxZoom:15}); }catch(e){}
    }
    const lg=document.getElementById('mapLegend'); if(lg) lg.innerHTML=legend.join('');
    const note=document.getElementById('mapNote');
    if(note){
      if(!allLatLng.length) note.textContent='場所を地図に表示できませんでした（地名が見つからないかも）。';
      else note.innerHTML = '数字は1日の中の順番です。'+(failed.length? '<br>📍 見つからなかった場所: '+failed.map(esc).join('、') : '');
    }
  })();
}
function geoCacheKey(t, place){
  const tok=(t.destination||'').split(/[・、,／/\s〜~]/)[0].trim();
  return place + (tok && !place.includes(tok) ? ' '+tok : '');
}

/* 旅の作成・編集 */
function openTripForm(trip){
  const isNew = !trip;
  trip = trip || { id:uid(), title:'', destination:'', emoji:'🌴', startDate:'', endDate:'', memo:'', items:[], checklist:[] };
  const emojiBtns = TRIP_EMOJIS.map(e=>`<button data-e="${e}" class="${e===trip.emoji?'on':''}">${e}</button>`).join('');
  openSheet(`
    <h3>${isNew?'新しい旅 🌴':'旅を編集'}</h3>
    <div class="field"><label>旅の名前</label><input type="text" id="f-title" value="${esc(trip.title)}" placeholder="例: 京都ふたり旅"></div>
    <div class="field"><label>行き先</label><input type="text" id="f-dest" value="${esc(trip.destination)}" placeholder="例: 京都・大阪"></div>
    <div class="field-2">
      <div class="field"><label>出発日</label><input type="date" id="f-start" value="${esc(trip.startDate)}"></div>
      <div class="field"><label>帰る日</label><input type="date" id="f-end" value="${esc(trip.endDate)}"></div>
    </div>
    <div class="field"><label>アイコン</label><div class="emoji-pick" id="f-emoji">${emojiBtns}</div></div>
    <div class="field"><label>メモ（自由）</label><textarea id="f-memo" placeholder="集合場所、予算、持ち物の方針など…">${esc(trip.memo)}</textarea></div>
    <div class="sheet-actions">
      <button class="btn-primary" id="f-save">${isNew?'この旅を作る':'保存'}</button>
      <button class="btn-ghost" id="f-cancel">やめる</button>
    </div>
    ${isNew?'':'<button class="btn-danger" id="f-del">この旅を削除</button>'}
  `);
  let pickedEmoji = trip.emoji;
  sheet.querySelectorAll('#f-emoji button').forEach(b=> b.onclick=()=>{
    pickedEmoji=b.dataset.e;
    sheet.querySelectorAll('#f-emoji button').forEach(x=>x.classList.toggle('on', x===b));
  });
  $('#f-cancel').onclick=closeSheet;
  $('#f-save').onclick=()=>{
    const start=$('#f-start').value, end=$('#f-end').value;
    Object.assign(trip,{
      title:$('#f-title').value.trim()||'無題の旅',
      destination:$('#f-dest').value.trim(),
      startDate:start, endDate:end||start, emoji:pickedEmoji, memo:$('#f-memo').value.trim()
    });
    if(isNew) db.trips.push(trip);
    save(); closeSheet();
    if(isNew) go('trip', trip.id, 'plan'); else render();
    toast(isNew?'旅を作りました 🌴':'保存しました');
  };
  const del=$('#f-del'); if(del) del.onclick=()=>{
    if(!confirm('この旅と中のすべての予定を削除します。よろしいですか？')) return;
    db.trips=db.trips.filter(x=>x.id!==trip.id); save(); closeSheet(); go('home'); toast('削除しました');
  };
}

/* 予定の作成・編集 */
function openItemForm(t, item, presetDate){
  const isNew=!item;
  item = item || { id:uid(), date:presetDate||t.startDate||'', time:'', endTime:'', type:'spot', title:'', place:'', transport:'', url:'', cost:'', payer:'', note:'', comments:[] };
  const dayOpts = rangeDates(t.startDate,t.endDate);
  const dateField = dayOpts.length
    ? `<select id="i-date">${dayOpts.map((d,idx)=>`<option value="${d}" ${d===item.date?'selected':''}>Day${idx+1}・${fmtDate(d)}(${fmtDow(d)})</option>`).join('')}
        <option value="" ${!item.date?'selected':''}>日付なし</option></select>`
    : `<input type="date" id="i-date" value="${esc(item.date)}">`;
  const typeBtns = Object.entries(TYPES).map(([k,v])=>`<button data-t="${k}" class="${k===item.type?'on':''}"><span class="te">${v.emoji}</span>${v.label}</button>`).join('');
  const payerOpts = `<option value="">支払者…</option>`+PAYERS.map(p=>`<option value="${p}" ${p===item.payer?'selected':''}>${p}</option>`).join('');
  openSheet(`
    <h3>${isNew?'予定を追加':'予定を編集'}</h3>
    <div class="field"><label>種類</label><div class="type-grid" id="i-type">${typeBtns}</div></div>
    <div class="field"><label>日</label>${dateField}</div>
    <div class="field-2">
      <div class="field"><label>出発・開始</label><input type="time" id="i-time" value="${esc(item.time)}"></div>
      <div class="field"><label>到着・終了（任意）</label><input type="time" id="i-end" value="${esc(item.endTime||'')}"></div>
    </div>
    <div class="field"><label>タイトル</label><input type="text" id="i-title" value="${esc(item.title)}" placeholder="例: 清水寺を散策"></div>
    <div class="field"><label>場所</label><input type="text" id="i-place" value="${esc(item.place)}" placeholder="例: 清水寺"></div>
    <div class="field"><label>交通機関・駅メモ 🚃</label><input type="text" id="i-trans" value="${esc(item.transport)}" placeholder="例: 京都駅から市バス206系統で15分"></div>
    <div class="field"><label>地図・予約リンク 🔗</label><input type="url" id="i-url" value="${esc(item.url)}" placeholder="https://..."></div>
    <div class="field-2">
      <div class="field"><label>費用</label><input type="number" inputmode="numeric" id="i-cost" value="${esc(item.cost)}" placeholder="¥"></div>
      <div class="field"><label>支払</label><select id="i-payer">${payerOpts}</select></div>
    </div>
    <div class="field"><label>メモ</label><textarea id="i-note" placeholder="予約番号・補足など…">${esc(item.note)}</textarea></div>
    <div class="sheet-actions">
      <button class="btn-primary" id="i-save">${isNew?'追加する':'保存'}</button>
      <button class="btn-ghost" id="i-cancel">やめる</button>
    </div>
    ${isNew?'':'<button class="btn-danger" id="i-del">この予定を削除</button>'}
  `);
  let pickedType=item.type;
  sheet.querySelectorAll('#i-type button').forEach(b=> b.onclick=()=>{
    pickedType=b.dataset.t;
    sheet.querySelectorAll('#i-type button').forEach(x=>x.classList.toggle('on', x===b));
  });
  $('#i-cancel').onclick=closeSheet;
  $('#i-save').onclick=()=>{
    const costRaw=$('#i-cost').value;
    const newTime=$('#i-time').value;
    // 時刻を変えたら手動並べ替えは解除して時刻順に戻す
    if(newTime!==item.time) delete item.order;
    Object.assign(item,{
      date:$('#i-date').value, time:newTime, endTime:$('#i-end').value, type:pickedType,
      title:$('#i-title').value.trim(), place:$('#i-place').value.trim(),
      transport:$('#i-trans').value.trim(), url:$('#i-url').value.trim(),
      cost: costRaw===''?0:Number(costRaw), payer:$('#i-payer').value, note:$('#i-note').value.trim()
    });
    if(isNew){ t.items=t.items||[]; t.items.push(item); }
    save(); closeSheet(); render(); toast(isNew?'追加しました':'保存しました');
  };
  const del=$('#i-del'); if(del) del.onclick=()=>{
    t.items=(t.items||[]).filter(x=>x.id!==item.id); save(); closeSheet(); render(); toast('削除しました');
  };
}

<!-- tsumiki-back-button -->
<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>

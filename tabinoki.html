<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<link rel="apple-touch-icon" href="icons/icon-tabinoki.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="たびのき">
<meta name="theme-color" content="#0d9488">
<title>たびのき — ふたりの旅のしおり</title>
<style>
  :root{
    --bg:#f3f6f6; --card:#ffffff; --ink:#16211f; --sub:#6b7c79;
    --line:#e4ebea; --accent:#0d9488; --accent-soft:#d6f0ec; --accent-ink:#0a766c;
    --radius:20px; --warn:#e8843b;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{overscroll-behavior-y:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    line-height:1.6; -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 40px);
  }
  .wrap{max-width:680px; margin:0 auto; padding:0 16px;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,textarea,select{font-family:inherit; font-size:16px;}
  a{color:var(--accent-ink);}

  /* ===== トップバー ===== */
  .topbar{position:sticky; top:0; z-index:50; background:rgba(243,246,246,.86);
    backdrop-filter:saturate(160%) blur(14px); -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid var(--line);}
  .topbar .inner{max-width:680px; margin:0 auto; padding:10px 12px;
    display:flex; align-items:center; gap:8px; min-height:52px;}
  .tb-title{font-size:18px; font-weight:700; letter-spacing:-.01em; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tb-btn{font-size:15px; color:var(--accent-ink); font-weight:600; padding:8px 6px; flex:0 0 auto;}
  .tb-btn.back{display:flex; align-items:center; gap:2px;}
  .who-chip{flex:0 0 auto; font-size:13px; font-weight:600; color:var(--accent-ink);
    background:var(--accent-soft); border-radius:999px; padding:5px 11px;}

  /* ===== ホーム ===== */
  header.home{padding:26px 4px 14px; text-align:center;}
  header.home .logo{font-size:46px; line-height:1;}
  header.home h1{font-size:27px; font-weight:800; letter-spacing:-.02em; margin-top:8px;}
  header.home .tagline{color:var(--sub); font-size:14px; margin-top:6px;}

  .add-trip{display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:var(--accent); color:#fff; font-size:16px; font-weight:700;
    border-radius:16px; padding:15px; margin:14px 0 4px;
    box-shadow:0 6px 18px rgba(13,148,136,.28); transition:transform .12s ease;}
  .add-trip:active{transform:scale(.97);}

  .trips{display:flex; flex-direction:column; gap:13px; margin-top:18px;}
  .trip-card{display:block; width:100%; text-align:left; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
    transition:transform .12s ease, box-shadow .12s ease;}
  .trip-card:active{transform:scale(.985);}
  @media(hover:hover){ .trip-card:hover{box-shadow:0 10px 26px rgba(0,0,0,.07);} }
  .trip-top{display:flex; align-items:center; gap:14px; padding:16px 16px 12px;}
  .trip-emoji{font-size:30px; width:56px; height:56px; flex:0 0 auto; border-radius:16px;
    display:flex; align-items:center; justify-content:center; background:var(--accent-soft);}
  .trip-meta{min-width:0; flex:1;}
  .trip-name{font-size:18px; font-weight:700; letter-spacing:-.01em; line-height:1.25;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .trip-dest{font-size:13px; color:var(--sub); margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .trip-foot{display:flex; align-items:center; gap:10px; padding:0 16px 14px; flex-wrap:wrap;}
  .pill{font-size:12px; font-weight:600; color:var(--sub); background:var(--bg);
    border-radius:999px; padding:4px 10px;}
  .pill.count-d{color:#fff; background:var(--accent);}
  .pill.count-soon{color:#fff; background:var(--warn);}

  .empty{text-align:center; color:var(--sub); padding:60px 20px;}
  .empty .big{font-size:50px; display:block; margin-bottom:12px;}

  /* ===== 旅詳細 ===== */
  .trip-hero{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; margin:14px 0;}
  .trip-hero .h-emoji{font-size:34px;}
  .trip-hero h2{font-size:22px; font-weight:800; letter-spacing:-.02em; margin-top:6px;}
  .trip-hero .h-sub{color:var(--sub); font-size:14px; margin-top:4px;}
  .trip-hero .h-note{font-size:14px; margin-top:10px; white-space:pre-wrap; color:#3a4a47;}
  .trip-hero .h-acts{margin-top:12px; display:flex; gap:16px; flex-wrap:wrap;}
  .trip-hero .h-edit{font-size:13px; font-weight:600; color:var(--accent-ink); cursor:pointer;}

  .tabs{display:flex; gap:6px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:4px; margin-bottom:16px; position:sticky;
    top:calc(env(safe-area-inset-top) + 60px); z-index:30;}
  .tabs button{flex:1; font-size:14px; font-weight:600; color:var(--sub);
    padding:9px 4px; border-radius:10px; transition:.15s;}
  .tabs button.on{background:var(--accent-soft); color:var(--accent-ink);}

  /* しおり（タイムライン） */
  .day-block{margin-bottom:22px;}
  .day-head{display:flex; align-items:center; gap:9px; padding:0 2px 8px;}
  .day-num{font-size:15px; font-weight:800; color:var(--accent-ink);
    background:var(--accent-soft); border-radius:8px; padding:2px 9px;}
  .day-date{font-size:14px; font-weight:600;}
  .day-dow{font-size:13px; color:var(--sub);}
  .day-wx{margin-left:auto; font-size:13px; font-weight:700; color:var(--sub); white-space:nowrap;}

  .tl{position:relative; padding-left:2px;}
  .ev{position:relative; display:flex; gap:12px; padding:0;}
  .ev .rail{flex:0 0 auto; width:46px; display:flex; flex-direction:column; align-items:flex-end; gap:5px; padding-top:1px;}
  .ev .time{font-size:13px; font-weight:700; color:var(--ink); white-space:nowrap;}
  .ev .time-end{font-size:11.5px; font-weight:600; color:var(--sub); white-space:nowrap; margin-top:-2px;}
  .grip{touch-action:none; cursor:grab; color:#cdd8d6; font-size:15px; line-height:1; padding:3px 1px;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;}
  .grip:active{cursor:grabbing; color:var(--accent);}
  .ev .col{flex:1; min-width:0; display:flex; flex-direction:column;}
  .gap{font-size:11.5px; color:var(--sub); margin:0 0 8px 2px; display:flex; align-items:center; gap:5px;}
  .ev .body{background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:12px 13px; margin-bottom:11px; position:relative;}
  .ev .body:active{background:#fafcfc;}
  .ev.dragging{opacity:.92;}
  .ev.dragging .body{box-shadow:0 14px 30px rgba(0,0,0,.16); border-color:var(--accent);}
  .ev .e-line{display:flex; align-items:center; gap:8px;}
  .ev .e-emoji{font-size:18px; flex:0 0 auto;}
  .ev .e-title{font-size:15.5px; font-weight:700; line-height:1.3; min-width:0; flex:1;}
  .ev .e-place{font-size:13px; color:var(--sub); margin-top:2px;}
  .ev .e-trans{font-size:13px; color:var(--accent-ink); margin-top:6px;
    background:var(--accent-soft); border-radius:8px; padding:5px 9px; display:inline-block;}
  .ev .e-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center;}
  .ev .tag{font-size:12px; color:var(--sub); background:var(--bg); border-radius:999px; padding:3px 9px;}
  .ev .tag.link{color:var(--accent-ink); background:var(--accent-soft);}
  .ev .e-note{font-size:13.5px; margin-top:8px; white-space:pre-wrap; color:#3a4a47;}

  /* コメント */
  .cmts{margin-top:10px; border-top:1px dashed var(--line); padding-top:9px;}
  .cmt{display:flex; gap:7px; font-size:13px; margin-bottom:6px;}
  .cmt .c-who{font-weight:700; flex:0 0 auto;}
  .cmt .c-who.kodai{color:#2f6fd0;} .cmt .c-who.yuzu{color:#e8843b;}
  .cmt .c-body{min-width:0; white-space:pre-wrap;}
  .cmt .c-del{margin-left:auto; color:#c7c7cc; flex:0 0 auto; padding:0 4px;}
  .cmt-add{display:flex; gap:7px; margin-top:8px;}
  .cmt-add input{flex:1; border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px;}
  .cmt-add button{flex:0 0 auto; color:var(--accent-ink); font-weight:700; font-size:14px; padding:0 6px;}

  .add-ev{display:flex; align-items:center; gap:7px; color:var(--accent-ink);
    font-size:13.5px; font-weight:600; padding:7px 6px; margin-left:58px;}

  /* クイック追加（時刻＋タイトルだけでサッと足す） */
  .quick-add{display:flex; gap:7px; align-items:center; margin:4px 0 2px;}
  .quick-add .qa-time{flex:0 0 70px; width:70px; border:1px solid var(--line); border-radius:11px;
    padding:10px 8px; font-size:13px; background:var(--card); -webkit-appearance:none; appearance:none;}
  .quick-add .qa-title{flex:1; min-width:0; border:1px solid var(--line); border-radius:11px;
    padding:10px 12px; font-size:14px; background:var(--card);}
  .quick-add .qa-btn{flex:0 0 auto; width:40px; height:40px; border-radius:12px;
    background:var(--accent); color:#fff; font-size:22px; font-weight:700; line-height:1;}
  .quick-add .qa-btn:active{transform:scale(.94);}

  /* コメント折りたたみ */
  .cmts.empty-c{border-top:none; padding-top:2px; margin-top:4px;}
  .cmt-fold{margin-top:2px;}
  .cmt-fold>summary{list-style:none; cursor:pointer; font-size:12.5px; color:var(--sub);
    padding:3px 0; user-select:none; display:inline-flex; align-items:center; gap:4px;}
  .cmt-fold>summary::-webkit-details-marker{display:none;}
  .cmt-fold[open]>summary{color:var(--accent-ink);}

  /* フォーム：種類連動ブロック／詳細折りたたみ */
  .cond-block{display:none;}
  .cond-block.show{display:block;}
  .more{margin:4px 0 2px; border-top:1px dashed var(--line); padding-top:10px;}
  .more>summary{list-style:none; cursor:pointer; font-size:14px; font-weight:700;
    color:var(--accent-ink); padding:5px 0; user-select:none;}
  .more>summary::-webkit-details-marker{display:none;}
  .more>summary::before{content:'＋ ';}
  .more[open]>summary::before{content:'－ ';}

  /* マップ（Googleマップ埋め込み） */
  .map-days{display:flex; gap:8px; overflow-x:auto; padding:0 2px 12px; -webkit-overflow-scrolling:touch;}
  .map-days button{flex:0 0 auto; font-size:13px; font-weight:600; color:var(--sub);
    background:var(--card); border:1px solid var(--line); border-radius:999px; padding:7px 14px;}
  .map-days button.on{background:var(--accent-soft); color:var(--accent-ink); border-color:var(--accent-soft);}
  .map-open{display:flex; align-items:center; justify-content:center; gap:7px; width:100%;
    background:var(--accent); color:#fff; font-size:15px; font-weight:700; text-decoration:none;
    border-radius:13px; padding:13px; margin-bottom:11px; box-shadow:0 5px 15px rgba(13,148,136,.25);}
  .map-open:active{transform:scale(.98);}
  #map{height:54vh; min-height:320px; border-radius:16px; overflow:hidden; border:1px solid var(--line); background:#eef2f1;}
  #map iframe{width:100%; height:100%; border:0; display:block;}
  .map-note{font-size:12.5px; color:var(--sub); margin:11px 2px 4px; line-height:1.6;}

  /* 持ち物 */
  .check-list{display:flex; flex-direction:column; gap:2px;}
  .check{display:flex; align-items:center; gap:12px; padding:13px 6px; border-bottom:1px solid var(--line);}
  .check .box{width:24px; height:24px; flex:0 0 auto; border-radius:7px; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff;}
  .check.done .box{background:var(--accent); border-color:var(--accent);}
  .check .ctext{flex:1; font-size:15px; min-width:0;}
  .check.done .ctext{color:var(--sub); text-decoration:line-through;}
  .check .cwho{font-size:11px; color:var(--sub); flex:0 0 auto;}
  .check .cdel{color:#c7c7cc; flex:0 0 auto; padding:4px;}
  .add-row{display:flex; gap:8px; margin-top:14px;}
  .add-row input{flex:1; border:1px solid var(--line); border-radius:12px; padding:12px 14px; background:var(--card);}
  .add-row button{flex:0 0 auto; background:var(--accent); color:#fff; font-weight:700;
    border-radius:12px; padding:0 18px;}
  .progress{font-size:13px; color:var(--sub); margin-bottom:6px; padding:0 2px;}

  /* 費用 */
  .cost-sum{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;}
  .cost-total{font-size:30px; font-weight:800; letter-spacing:-.02em;}
  .cost-total small{font-size:15px; font-weight:600; color:var(--sub); margin-left:3px;}
  .cost-split{display:flex; gap:10px; margin-top:14px;}
  .cost-cell{flex:1; background:var(--bg); border-radius:12px; padding:11px 13px;}
  .cost-cell b{font-size:19px; font-weight:800; display:block; letter-spacing:-.01em;}
  .cost-cell span{font-size:12px; color:var(--sub);}
  .cost-row{display:flex; align-items:center; gap:10px; padding:12px 4px; border-bottom:1px solid var(--line);}
  .cost-row .cr-emoji{font-size:17px; flex:0 0 auto;}
  .cost-row .cr-t{flex:1; min-width:0;}
  .cost-row .cr-name{font-size:14.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cost-row .cr-meta{font-size:12px; color:var(--sub);}
  .cost-row .cr-amt{font-size:15px; font-weight:700; flex:0 0 auto;}
  .cr-split{font-size:10.5px; font-weight:700; color:var(--accent-ink); background:var(--accent-soft);
    border-radius:6px; padding:1px 6px; margin-left:6px; white-space:nowrap;}

  /* 精算 */
  .settle{background:linear-gradient(135deg,#0d9488,#0a766c); color:#fff; border-radius:var(--radius);
    padding:18px; margin-bottom:14px; box-shadow:0 8px 22px rgba(13,148,136,.3);}
  .settle .s-label{font-size:13px; font-weight:700; opacity:.92;}
  .settle .s-main{font-size:21px; font-weight:800; margin-top:8px; letter-spacing:-.01em;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .settle .s-arrow{font-size:17px; opacity:.85;}
  .settle .s-amt{font-size:27px; margin-left:auto;}
  .settle .s-none{font-size:19px; font-weight:800; margin-top:6px;}
  .settle .s-note{font-size:12px; opacity:.88; margin-top:9px; line-height:1.55;}

  /* 行きたい場所アイデア帳 */
  .ideas-entry{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:13px 15px; margin-top:11px;
    transition:transform .12s ease;}
  .ideas-entry:active{transform:scale(.985);}
  .ideas-entry .ie-emoji{font-size:23px; width:46px; height:46px; flex:0 0 auto; border-radius:13px;
    display:flex; align-items:center; justify-content:center; background:#fdf0e6;}
  .ideas-entry .ie-t{flex:1; min-width:0;}
  .ideas-entry .ie-name{font-size:16px; font-weight:700;}
  .ideas-entry .ie-sub{font-size:12.5px; color:var(--sub); margin-top:1px;}
  .ideas-entry .ie-arrow{color:#c7cfce; font-size:20px; flex:0 0 auto;}

  .idea-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 15px; margin-bottom:12px;}
  .idea-card.both{border-color:#f0b6c2; box-shadow:0 4px 16px rgba(232,90,122,.12);}
  .idea-card:active{background:#fafcfc;}
  .idea-top{display:flex; align-items:flex-start; gap:11px;}
  .idea-emoji{font-size:23px; width:44px; height:44px; flex:0 0 auto; border-radius:12px;
    display:flex; align-items:center; justify-content:center; background:var(--accent-soft);}
  .idea-meta{flex:1; min-width:0;}
  .idea-name{display:block; font-size:16.5px; font-weight:700; line-height:1.3;}
  .idea-area{display:block; font-size:13px; color:var(--sub); margin-top:1px;}
  .idea-like{flex:0 0 auto; font-size:21px; padding:4px 5px; line-height:1; border-radius:10px;}
  .idea-like:active{transform:scale(.85);}
  .idea-note{font-size:14px; margin-top:9px; white-space:pre-wrap; color:#3a4a47;}
  .idea-foot{display:flex; align-items:center; gap:7px; margin-top:10px; flex-wrap:wrap;}
  .like-chip{font-size:12px; font-weight:600; color:var(--sub); background:var(--bg);
    border-radius:999px; padding:4px 10px;}
  .both-pill{color:#c2456a; background:#fde8ee;}
  .idea-who{font-size:11.5px; color:var(--sub); margin-left:auto;}

  /* ===== モーダル / シート ===== */
  .overlay{position:fixed; inset:0; z-index:100; background:rgba(20,30,28,.4);
    display:none; align-items:flex-end; justify-content:center;}
  .overlay.on{display:flex;}
  .sheet{background:var(--card); width:100%; max-width:680px;
    border-radius:22px 22px 0 0; padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);
    max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    animation:slideup .26s cubic-bezier(.22,.61,.36,1);}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .grab{width:38px; height:5px; background:#d6dedd; border-radius:3px; margin:8px auto 14px;}
  .sheet h3{font-size:19px; font-weight:800; letter-spacing:-.01em; margin-bottom:14px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--sub); margin-bottom:5px;}
  .field input, .field textarea, .field select{width:100%; min-width:0; border:1px solid var(--line);
    border-radius:12px; padding:12px 13px; background:#fafcfc;}
  .field input[type=time], .field input[type=date]{-webkit-appearance:none; appearance:none; padding:12px 11px;}
  .field textarea{min-height:74px; resize:vertical; line-height:1.5;}
  .field .hint{font-size:11.5px; color:var(--sub); margin-top:4px; line-height:1.45;}
  .field-2{display:flex; gap:10px;} .field-2 .field{flex:1 1 0; min-width:0;}
  .autosave{font-size:13px; color:var(--accent-ink); font-weight:700; text-align:center;
    padding:10px; display:flex; align-items:center; justify-content:center; gap:6px;}
  .autosave.flash{animation:savepulse .5s ease;}
  @keyframes savepulse{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
  .type-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .type-grid button{display:flex; flex-direction:column; align-items:center; gap:3px;
    border:1.5px solid var(--line); border-radius:12px; padding:10px 4px; font-size:12px; color:var(--sub);}
  .type-grid button .te{font-size:21px;}
  .type-grid button.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink); font-weight:700;}
  .emoji-pick{display:flex; gap:8px; flex-wrap:wrap;}
  .emoji-pick button{font-size:23px; width:44px; height:44px; border-radius:12px; border:1.5px solid var(--line);}
  .emoji-pick button.on{border-color:var(--accent); background:var(--accent-soft);}
  .sheet-actions{display:flex; gap:10px; margin-top:18px;}
  .btn-primary{flex:1; background:var(--accent); color:#fff; font-weight:700; font-size:16px;
    border-radius:14px; padding:14px;}
  .btn-ghost{flex:0 0 auto; color:var(--sub); font-weight:600; font-size:15px; padding:14px 16px;}
  .btn-danger{width:100%; color:#e0483b; font-weight:600; font-size:15px; padding:13px; margin-top:6px;}
  .who-pick{display:flex; gap:12px;}
  .who-pick button{flex:1; border:1.5px solid var(--line); border-radius:16px; padding:20px 10px;
    font-size:17px; font-weight:700;}
  .who-pick button .we{font-size:32px; display:block; margin-bottom:6px;}
  .who-pick button.kodai.on{border-color:#2f6fd0; background:#eaf2fd; color:#2f6fd0;}
  .who-pick button.yuzu.on{border-color:#e8843b; background:#fdf0e6; color:#e8843b;}

  .toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 26px);
    transform:translateX(-50%) translateY(20px); background:#16211f; color:#fff;
    font-size:14px; padding:11px 20px; border-radius:999px; opacity:0; pointer-events:none;
    transition:.25s; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,.2);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

function jpGeo(dest){
  const keys = Object.keys(JP_GEO).sort((a,b)=>b.length-a.length); // 長い（具体的な）地名を優先
  for(const k of keys){ if(dest.includes(k)) return JP_GEO[k]; }

async function loadWeather(t){
  if(!t.destination || !t.startDate) return;
  const end = t.endDate || t.startDate;
  // 予報が取れる範囲（今日の少し前〜16日先）だけ問い合わせる
  if(daysBetween(todayYmd(), t.startDate) > 16) return;
  if(daysBetween(todayYmd(), end) < -1) return;
  const place = t.destination.split(/[・、,／/\s〜~]/)[0].trim();
  if(!place) return;
  const key = t.destination+'|'+t.startDate+'|'+end;
  let data = wxCache[key];
  if(!data){
    try{
      let lat, lon;
      const hit = jpGeo(t.destination);            // まず内蔵辞書（漢字対応）
      if(hit){ lat=hit[0]; lon=hit[1]; }
      else {                                        // 未知の地名はAPIへ（ローマ字など）
        const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(place)}&count=1&language=ja`).then(r=>r.json());
        const loc = g.results && g.results[0];
        if(!loc){ wxCache[key]={}; return; }
        lat=loc.latitude; lon=loc.longitude;
      }
      const f = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&start_date=${t.startDate}&end_date=${end}`).then(r=>r.json());
      data={};
      if(f.daily && f.daily.time){
        f.daily.time.forEach((d,idx)=>{ data[d]={ code:f.daily.weather_code[idx],
          max:Math.round(f.daily.temperature_2m_max[idx]), min:Math.round(f.daily.temperature_2m_min[idx]) }; });
      }
      wxCache[key]=data;
    }catch(e){ return; }
  }
  // 描画後のDOMが今もこの旅なら反映
  if(route.name!=='trip' || route.tripId!==t.id || route.tab!=='plan') return;
  document.querySelectorAll('.day-wx').forEach(span=>{
    const w=data[span.dataset.wxdate];
    if(w) span.innerHTML = `${wxEmoji(w.code)} ${w.max}°/${w.min}°`;
  });
}

/* ============ 永続化 ============ */
function loadLocal(){ try{ const s=localStorage.getItem(LS_KEY); if(s) db=JSON.parse(s); }catch(e){} }
let saveTimer=null, pendingSync=false;
function save(){
  db.updatedAt = Date.now();               // 更新時刻を記録（古いクラウドデータで上書きされるのを防ぐ）
  localStorage.setItem(LS_KEY, JSON.stringify(db));
  if(!sb) return;
  pendingSync = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 350);
}
// クラウドへ即送信（デバウンス完了時・アプリを閉じる直前に呼ぶ）
async function flushSave(){
  if(!sb || !pendingSync) return;
  clearTimeout(saveTimer);
  const payload = JSON.stringify(db);
  lastPushed = payload;
  pendingSync = false;
  try{
    const { error } = await sb.from(STATE_TABLE)
      .upsert({ id:STATE_ID, state: db, updated_at:new Date().toISOString() });
    if(error){ online=false; pendingSync=true; renderTopbar(); }
    else if(online!==true){ online=true; renderTopbar(); }
  }catch(e){ online=false; pendingSync=true; renderTopbar(); }
}
// アプリを閉じる/バックグラウンドにする直前に、未送信の変更を取りこぼさず送る
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushSave(); });
window.addEventListener('pagehide', ()=>{ flushSave(); });
async function loadRemote(){
  if(!sb){ online=false; return false; }
  const { data, error } = await sb.from(STATE_TABLE).select('state').eq('id', STATE_ID).maybeSingle();
  if(error){ online=false; return false; }
  online = true;
  if(data && data.state && typeof data.state==='object'){
    const remote = data.state;
    if(!Array.isArray(remote.trips)) remote.trips=[];
    const localT = db.updatedAt||0, remoteT = remote.updatedAt||0;
    if(remoteT >= localT){
      // クラウドの方が新しい（または同じ）→ クラウド優先
      db = remote;
      localStorage.setItem(LS_KEY, JSON.stringify(db));
    } else {
      // ローカルの方が新しい（前回まだ送れていなかった変更）→ ローカルを残してクラウドへ送り直す
      save();
    }
  }
  return true;
}
function subscribeRealtime(){
  if(!sb) return;
  sb.channel('tabinoki-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:STATE_TABLE, filter:'id=eq.'+STATE_ID },
      (payload)=>{
        const incomingState = payload.new && payload.new.state;
        if(!incomingState) return;
        if(JSON.stringify(incomingState) === lastPushed) return;   // 自分の書き込みのエコー
        if(overlay.classList.contains('on')) return;               // 編集中は上書きしない（入力が消えるのを防ぐ）
        if((incomingState.updatedAt||0) < (db.updatedAt||0)) return; // 自分の方が新しければ無視
        db = incomingState;
        if(!Array.isArray(db.trips)) db.trips=[];
        localStorage.setItem(LS_KEY, JSON.stringify(db));
        render();                                                  // 画面を最新化
        toast('🔄 更新されました');
      })
    .subscribe();
}

      if(i.url) foot.push(`<a class="like-chip" style="color:var(--accent-ink)" href="${esc(i.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 リンク</a>`);
      const footHtml = (foot.length||i.who) ? `<div class="idea-foot">${foot.join('')}<span class="idea-who">${i.who?'by '+esc(i.who):''}</span></div>` : '';
      return `<div class="idea-card ${both?'both':''}" data-edit="${i.id}">

            <button data-icmtbtn="${i.id}">送信</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  v.innerHTML = `
    <header class="home" style="padding-bottom:8px;">
      <div class="logo">💡</div>
      <h1>行きたい場所</h1>
      <p class="tagline">ふたりの「いつか行きたい」を集めよう</p>
    </header>
    <button class="add-trip" id="addIdea">＋ 行きたい場所を追加</button>
    <div style="margin-top:16px;">${cards}</div>`;
  $('#addIdea').onclick = ()=>openIdeaForm();
  bindIdeas();
}

    const it=(db.ideas||[]).find(x=>x.id===b.dataset.icmtbtn); if(!it) return;

function renderTrip(){

  if(!t){ go('home'); return; }
  const v = $('#view');
  const dates = (t.startDate? fmtDate(t.startDate)+'('+fmtDow(t.startDate)+')'+(t.endDate&&t.endDate!==t.startDate?' 〜 '+fmtDate(t.endDate)+'('+fmtDow(t.endDate)+')':'') : '日程未定');
  const nights = (t.startDate&&t.endDate)? Math.max(0, daysBetween(t.startDate,t.endDate)) : 0;
  const nightLabel = nights>0 ? `（${nights}泊${nights+1}日）` : '';
  const hero = `<div class="trip-hero">
      <div class="h-emoji">${esc(t.emoji||'🌴')}</div>
      <h2>${esc(t.title||'無題の旅')}</h2>
      <div class="h-sub">${t.destination?'📍 '+esc(t.destination)+'　':''}📅 ${esc(dates)} ${nightLabel}</div>

      <div class="h-acts"><span class="h-edit" id="editTrip">✎ 旅の情報を編集</span><span class="h-edit" id="exportTrip">📋 予定を書き出す</span></div>

      <button data-tab="plan" class="${route.tab==='plan'?'on':''}">🗓 しおり</button>
      <button data-tab="map" class="${route.tab==='map'?'on':''}">🗺 地図</button>
      <button data-tab="pack" class="${route.tab==='pack'?'on':''}">🎒 持ち物</button>
      <button data-tab="cost" class="${route.tab==='cost'?'on':''}">💰 費用</button>
    </div>`;
  let body='';
  if(route.tab==='plan') body = renderPlan(t);
  else if(route.tab==='map') body = renderMap(t);
  else if(route.tab==='pack') body = renderPack(t);
  else body = renderCost(t);

  v.innerHTML = hero + tabs + `<div id="tabbody">${body}</div>`;

  v.querySelectorAll('.tabs button').forEach(b=> b.onclick=()=>{ route.tab=b.dataset.tab; render(); });
  bindPlan(t); bindPack(t); bindCost(t);
  if(route.tab==='plan') loadWeather(t);

}

/* ----- しおり（タイムライン） ----- */
function renderPlan(t){
  const items = t.items||[];
  const dayList = rangeDates(t.startDate, t.endDate);
  // 日程未定でも、itemsに付いている日付を拾う
  const extra = [...new Set(items.map(i=>i.date).filter(Boolean))].filter(d=>!dayList.includes(d));
  const days = [...dayList, ...extra].sort();
  const useDays = days.length? days : [t.startDate||'__none__'];

  let html='';
  useDays.forEach((date, idx)=>{
    const dayItems = items.filter(i=> (i.date||t.startDate||'__none__')===date)
      .sort((a,b)=> effOrder(a)-effOrder(b));
    const dnum = date==='__none__'? '' : `<span class="day-num">Day ${idx+1}</span>`;
    const dlabel = date==='__none__'? '<span class="day-date">予定</span>'
      : `<span class="day-date">${fmtDate(date)}</span><span class="day-dow">(${fmtDow(date)})</span><span class="day-wx" data-wxdate="${date}"></span>`;
    let evs='';
    let prevPlace='';
    dayItems.forEach((it,k)=>{
      let gap='';
      if(k>0){
        const prev=dayItems[k-1];
        const a=timeToMin(prev.endTime||prev.time), b=timeToMin(it.time);
        if(a!=null && b!=null && b-a>0) gap=`<div class="gap">⏱ あき ${fmtDur(b-a)}</div>`;
      }
      evs += evHtml(t, it, date, gap, prevPlace);
      if(it.place) prevPlace=it.place;
    });
    html += `<div class="day-block">
      <div class="day-head">${dnum}${dlabel}</div>
      <div class="tl">${evs || '<div style="color:var(--sub);font-size:13px;padding:4px 0 8px 58px;">まだ予定なし</div>'}
        <div class="quick-add" data-qaday="${date}">
          <input type="time" class="qa-time" aria-label="時刻">
          <input type="text" class="qa-title" placeholder="予定をすばやく追加…">
          <button class="qa-btn" title="追加">＋</button>
        </div>
        <div class="add-ev" data-add="${date}">＋ くわしく追加（駅・費用など）</div>
      </div></div>`;
  });
  return html;
}
/* ----- 予定をテキストに書き出す ----- */
function tripToText(t){
  const items = t.items||[];
  const dayList = rangeDates(t.startDate, t.endDate);
  const extra = [...new Set(items.map(i=>i.date).filter(Boolean))].filter(d=>!dayList.includes(d));
  const days = [...dayList, ...extra].sort();
  const useDays = days.length? days : [t.startDate||'__none__'];

  const out = [];
  // ヘッダ
  out.push(`${t.emoji||'🌴'} ${t.title||'無題の旅'}`);
  const sub = [];
  if(t.destination) sub.push('📍 '+t.destination);
  if(t.startDate){
    const nights = (t.startDate&&t.endDate)? Math.max(0, daysBetween(t.startDate,t.endDate)) : 0;
    let d = fmtDate(t.startDate)+'('+fmtDow(t.startDate)+')';
    if(t.endDate&&t.endDate!==t.startDate) d += '〜'+fmtDate(t.endDate)+'('+fmtDow(t.endDate)+')';
    if(nights>0) d += `（${nights}泊${nights+1}日）`;
    sub.push('📅 '+d);
  } else sub.push('📅 日程未定');
  out.push(sub.join('  '));
  if(t.memo) out.push(t.memo);

  useDays.forEach((date, idx)=>{
    const dayItems = items.filter(i=> (i.date||t.startDate||'__none__')===date)
      .sort((a,b)=> effOrder(a)-effOrder(b));
    out.push('');
    const head = date==='__none__'
      ? '─────────────\n【日付未定の予定】'
      : `─────────────\n【Day ${idx+1}】${fmtDate(date)}(${fmtDow(date)})`;
    out.push(head);
    if(!dayItems.length){ out.push('（まだ予定なし）'); return; }
    dayItems.forEach(it=>{
      const ty = TYPES[it.type]||TYPES.other;
      let tm = '';
      if(it.time && it.endTime) tm = `${it.time}〜${it.endTime}`;
      else if(it.time) tm = it.time;
      out.push(`${tm?tm+' ':'・'}${ty.emoji} ${it.title||ty.label}`);
      if(it.place) out.push(`   📍 ${it.place}`);
      if(it.fromStation||it.toStation) out.push(`   🚉 ${it.fromStation||'？'} → ${it.toStation||'？'}`);
      if(it.transport) out.push(`   🚃 ${it.transport}`);
      if(it.note) out.push(`   📝 ${it.note}`);
      if(Number(it.cost)>0){
        const set=(it.payer==='こうだい'||it.payer==='ゆずは'); const sp=it.split||'half';
        const spL = set ? (sp==='kodai'?'こうだい持ち':sp==='yuzu'?'ゆずは持ち':'折半') : '';
        out.push(`   💰 ${yen(it.cost)}${it.payer?' '+it.payer+(set?'立替':''):''}${spL?'・'+spL:''}`);
      }
      (it.comments||[]).forEach(c=> out.push(`   💬 ${c.who}: ${c.body}`));
    });
  });
  return out.join('\n');
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    try{
      const ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok=document.execCommand('copy'); document.body.removeChild(ta); return ok;
    }catch(_){ return false; }
  }
}
function openExport(t){
  const text = tripToText(t);
  openSheet(`
    <h3>📋 予定を書き出す</h3>
    <p style="color:var(--sub);font-size:13px;margin:-4px 0 10px;">今の予定をテキストにしました。LINEやメモに貼れます。</p>
    <textarea id="exp-text" readonly style="width:100%;min-height:240px;font-size:13px;line-height:1.6;white-space:pre;overflow:auto;resize:vertical;">${esc(text)}</textarea>
    <div class="sheet-actions">
      <button class="btn-primary" id="exp-copy">📋 コピー</button>
      <button class="btn-ghost" id="exp-close">閉じる</button>
    </div>
  `);
  $('#exp-copy').onclick = async ()=>{
    const ok = await copyText(text);

  };
  $('#exp-close').onclick = closeSheet;
}
function mapQ(t, place){ // 地名＋行き先で精度を上げる
  const tok=(t.destination||'').split(/[・、,／/\s〜~]/)[0].trim();
  return encodeURIComponent(place + (tok && !place.includes(tok) ? ' '+tok : ''));
}
function evHtml(t,i,date,gap,prevPlace){
  const ty = TYPES[i.type]||TYPES.other;
  const tags=[];
  const dur = (i.endTime && timeToMin(i.time)!=null && timeToMin(i.endTime)!=null && timeToMin(i.endTime)-timeToMin(i.time)>0)
    ? (timeToMin(i.endTime)-timeToMin(i.time)) : 0;
  if(dur) tags.push(`<span class="tag">⏱ 所要 ${fmtDur(dur)}</span>`);
  if(i.place){
    tags.push(`<a class="tag link" title="地図" href="https://www.google.com/maps/search/?api=1&query=${mapQ(t,i.place)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🗺</a>`);
    if(prevPlace) tags.push(`<a class="tag link" title="道順" href="https://www.google.com/maps/dir/?api=1&origin=${mapQ(t,prevPlace)}&destination=${mapQ(t,i.place)}&travelmode=transit" target="_blank" rel="noopener" onclick="event.stopPropagation()">🚶</a>`);
  }
  if(i.fromStation && i.toStation) tags.push(`<a class="tag link" href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(i.fromStation)}&destination=${encodeURIComponent(i.toStation)}&travelmode=transit" target="_blank" rel="noopener" onclick="event.stopPropagation()">🚃 乗換</a>`);
  if(i.url) tags.push(`<a class="tag link" title="リンク" href="${esc(i.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗</a>`);
  if(Number(i.cost)>0){
    const set=(i.payer==='こうだい'||i.payer==='ゆずは'); const sp=i.split||'half';
    const spL = set ? (sp==='kodai'?'こうだい持ち':sp==='yuzu'?'ゆずは持ち':'折半') : '';
    tags.push(`<span class="tag">${yen(i.cost)}${i.payer?'・'+esc(i.payer)+(set?'立替':''):''}${spL?'・'+spL:''}</span>`);
  }
  const comments = (i.comments||[]);
  const cmtHtml = comments.map(c=>`<div class="cmt">
      <span class="c-who ${c.who==='こうだい'?'kodai':'yuzu'}">${esc(c.who)}</span>
      <span class="c-body">${esc(c.body)}</span>
      <button class="c-del" data-delc="${i.id}|${c.id}" onclick="event.stopPropagation()">×</button>
    </div>`).join('');
  return `<div class="ev" data-id="${i.id}" data-day="${esc(date)}">
    <div class="rail"><span class="time">${esc(i.time||'')}</span>${i.endTime?`<span class="time-end">▾${esc(i.endTime)}</span>`:''}<span class="grip" title="ドラッグで並べ替え">⠿</span></div>
    <div class="col">${gap||''}
      <div class="body" data-edit="${i.id}">
        <div class="e-line"><span class="e-emoji">${ty.emoji}</span><span class="e-title">${esc(i.title||ty.label)}</span></div>
        ${i.place?`<div class="e-place">📍 ${esc(i.place)}</div>`:''}
        ${(i.fromStation||i.toStation)?`<div class="e-trans">🚉 ${esc(i.fromStation||'？')} → ${esc(i.toStation||'？')}</div>`:''}
        ${i.transport?`<div class="e-trans">🚃 ${esc(i.transport)}</div>`:''}
        ${i.note?`<div class="e-note">${esc(i.note)}</div>`:''}
        ${tags.length?`<div class="e-row">${tags.join('')}</div>`:''}
        <div class="cmts ${comments.length?'':'empty-c'}" onclick="event.stopPropagation()">
          ${cmtHtml}
          <details class="cmt-fold">
            <summary>💬 ${comments.length?'返信する':'ひとこと'}</summary>
            <div class="cmt-add">
              <input type="text" placeholder="ひとことメモ…" data-cmt="${i.id}">
              <button data-cmtbtn="${i.id}">送信</button>
            </div>
          </details>
        </div>
      </div>
    </div></div>`;
}
/* タイトルから種類をおおまかに推測（クイック追加用・あとで変更可） */
function guessType(title){
  const s = title||'';
  if(/駅|移動|電車|バス|新幹線|地下鉄|タクシー|徒歩|歩い|フェリー|飛行機|空港|乗換|戻る|向か/.test(s)) return 'move';
  if(/朝食|昼食|夕食|ランチ|ディナー|ごはん|ご飯|めし|食べ|食事|カフェ|喫茶|レストラン|居酒屋|ビール|スイーツ|団子|甘味/.test(s)) return 'food';
  if(/ホテル|宿|旅館|チェックイン|チェックアウト|泊|就寝|温泉|サウナ|プール/.test(s)) return 'stay';
  if(/買い|土産|ショッピング|買物|お土産/.test(s)) return 'shop';
  return 'spot';
}
function quickAdd(t, dayKey, time, title){
  const date = dayKey==='__none__' ? '' : dayKey;
  const item = { id:uid(), date, time:time||'', endTime:'', type:guessType(title), title:title.trim(),
    place:'', transport:'', fromStation:'', toStation:'', url:'', cost:0, payer:'', split:'half', note:'', comments:[] };
  t.items = t.items||[]; t.items.push(item);
  _focusQA = dayKey;          // 追加後、同じ日の入力欄に戻る
  save(); render();
}
function bindPlan(t){
  if(route.tab!=='plan') return;
  const v=$('#view');
  v.querySelectorAll('[data-add]').forEach(b=> b.onclick=()=>openItemForm(t, null, b.dataset.add==='__none__'?'':b.dataset.add));
  v.querySelectorAll('.quick-add').forEach(qa=>{
    const titleEl=qa.querySelector('.qa-title'), timeEl=qa.querySelector('.qa-time');

    qa.querySelector('.qa-btn').onclick=fire;
    titleEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); fire(); } });
  });
  if(_focusQA!=null){
    const sel=v.querySelector('.quick-add[data-qaday="'+_focusQA+'"] .qa-title');
    _focusQA=null;
    if(sel){ try{ sel.focus({preventScroll:true}); }catch(_){ sel.focus(); } }
  }
  v.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{
    const it=(t.items||[]).find(x=>x.id===b.dataset.edit); if(it) openItemForm(t, it);
  });
  v.querySelectorAll('[data-cmtbtn]').forEach(b=> b.onclick=()=>{
    if(!who){ openWho(); return; }
    const inp=v.querySelector(`[data-cmt="${b.dataset.cmtbtn}"]`); const body=inp.value.trim();
    if(!body) return;
    const it=(t.items||[]).find(x=>x.id===b.dataset.cmtbtn); if(!it) return;
    it.comments = it.comments||[]; it.comments.push({id:uid(), who, body, ts:Date.now()});
    save(); render();
  });
  v.querySelectorAll('[data-delc]').forEach(b=> b.onclick=()=>{
    const [iid,cid]=b.dataset.delc.split('|');
    const it=(t.items||[]).find(x=>x.id===iid); if(!it) return;
    it.comments=(it.comments||[]).filter(c=>c.id!==cid); save(); render();
  });

/* ===== ドラッグ並べ替え（Pointer Events・iPhoneタッチ対応） ===== */
function enableDragSort(t){
  $('#view').querySelectorAll('.grip').forEach(grip=>{
    grip.addEventListener('pointerdown', e=>{
      e.preventDefault();
      const ev = grip.closest('.ev');
      const tl = ev.parentElement;            // .tl（その日の枠）
      let moved=false;
      ev.classList.add('dragging');
      try{ grip.setPointerCapture(e.pointerId); }catch(_){}
      const move = me=>{
        moved=true;
        const others=[...tl.querySelectorAll('.ev:not(.dragging)')];
        let target=null;
        for(const o of others){ const r=o.getBoundingClientRect(); if(me.clientY < r.top+r.height/2){ target=o; break; } }
        if(target) tl.insertBefore(ev, target);
        else tl.insertBefore(ev, tl.querySelector('.add-ev'));
      };
      const up = ()=>{
        grip.removeEventListener('pointermove', move);
        grip.removeEventListener('pointerup', up);
        grip.removeEventListener('pointercancel', up);
        ev.classList.remove('dragging');
        if(moved) commitDragOrder(t, tl, ev.dataset.id);
      };
      grip.addEventListener('pointermove', move);
      grip.addEventListener('pointerup', up);
      grip.addEventListener('pointercancel', up);
    });
  });
}
/* ドロップ後：動かした予定だけ、前後の予定の中間にorderを差し込む（時刻スケールを維持） */
function commitDragOrder(t, tl, draggedId){
  const ids=[...tl.querySelectorAll('.ev')].map(e=>e.dataset.id);
  const pos=ids.indexOf(draggedId);
  const it=(t.items||[]).find(x=>x.id===draggedId); if(!it) return;
  const ord = id=>{ const x=(t.items||[]).find(y=>y.id===id); return x?effOrder(x):0; };
  const prev = pos>0 ? ord(ids[pos-1]) : null;
  const next = pos<ids.length-1 ? ord(ids[pos+1]) : null;
  if(prev==null && next==null) it.order = 0;
  else if(prev==null) it.order = next - 30;
  else if(next==null) it.order = prev + 30;
  else it.order = (prev+next)/2;
  save(); render();
  toast('並べ替えました');
}

/* ----- 費用 ----- */
function renderCost(t){
  const items=(t.items||[]).filter(i=>Number(i.cost)>0);
  const total=items.reduce((s,i)=>s+Number(i.cost||0),0);
  const paid={'こうだい':0,'ゆずは':0};      // 実際に立て替えた額
  const burden={'こうだい':0,'ゆずは':0};    // 割り勘後に各自が持つべき額
  let shared=0;                              // ふたりで支払い／立替者なし（精算対象外）
  items.forEach(i=>{
    const amt=Number(i.cost||0);
    const payer=i.payer;
    if(payer!=='こうだい' && payer!=='ゆずは'){ shared+=amt; return; }
    paid[payer]+=amt;
    const sp=i.split||'half';
    if(sp==='kodai') burden['こうだい']+=amt;
    else if(sp==='yuzu') burden['ゆずは']+=amt;
    else { burden['こうだい']+=amt/2; burden['ゆずは']+=amt/2; }
  });
  const netK = paid['こうだい']-burden['こうだい'];   // +なら こうだい が受け取る側
  const diff = Math.round(Math.abs(netK));
  let settleHtml='';
  const settleable = paid['こうだい']+paid['ゆずは']>0;
  if(settleable){
    if(diff<1){
      settleHtml=`<div class="settle"><div class="s-label">💸 精算（割り勘の結果）</div>
        <div class="s-none">いまのところチャラ ✨</div>
        ${shared>0?`<div class="s-note">共同・立替者なしの ${yen(shared)} は精算に含めていません</div>`:''}</div>`;
    } else {
      const from = netK>0?'ゆずは':'こうだい';
      const to   = netK>0?'こうだい':'ゆずは';
      settleHtml=`<div class="settle"><div class="s-label">💸 精算（割り勘の結果）</div>
        <div class="s-main"><span>${from}</span><span class="s-arrow">→</span><span>${to}</span><span class="s-amt">${yen(diff)}</span></div>
        <div class="s-note">${from} が ${to} に ${yen(diff)} 渡すとチャラになります${shared>0?`（共同・立替者なしの ${yen(shared)} は精算に含めていません）`:''}</div></div>`;
    }
  }
  const rows=[...items].sort((a,b)=>(a.date||'').localeCompare(b.date||''))
    .map(i=>{
      const ty=TYPES[i.type]||TYPES.other;
      const payer=i.payer;
      const set=(payer==='こうだい'||payer==='ゆずは');
      const sp=i.split||'half';
      const splitLabel = set ? (sp==='kodai'?'こうだい持ち':sp==='yuzu'?'ゆずは持ち':'折半') : '';
      const meta = set ? esc(payer)+' が立替' : (payer==='ふたり'?'ふたりで支払い':'立替者なし');
      return `<div class="cost-row">
      <span class="cr-emoji">${ty.emoji}</span>
      <span class="cr-t"><span class="cr-name">${esc(i.title||ty.label)}${splitLabel?`<span class="cr-split">${splitLabel}</span>`:''}</span>
        <span class="cr-meta">${i.date?fmtDate(i.date)+'・':''}${meta}</span></span>
      <span class="cr-amt">${yen(i.cost)}</span></div>`;}).join('');
  return `<div class="cost-sum">
      <div class="cost-total">${yen(total)}<small>の旅</small></div>
      <div class="cost-split">
        <div class="cost-cell"><b>${yen(paid['こうだい'])}</b><span>こうだい立替</span></div>
        <div class="cost-cell"><b>${yen(paid['ゆずは'])}</b><span>ゆずは立替</span></div>
      </div>
      <div class="cost-split">
        <div class="cost-cell"><b>${yen(Math.round(burden['こうだい']))}</b><span>こうだい負担</span></div>
        <div class="cost-cell"><b>${yen(Math.round(burden['ゆずは']))}</b><span>ゆずは負担</span></div>
      </div>
    </div>
    ${settleHtml}
    ${rows? rows : '<div class="empty" style="padding:30px 0;"><span class="big">💰</span>各予定に金額・立替・割り勘を入れると<br>ここに「だれがだれに払うか」が出ます</div>'}
    <p class="sync-note">金額・立替・割り勘は「しおり」の各予定を編集して入力できます</p>`;
}
function bindCost(t){ /* 表示のみ */ }

/* ----- 地図（Googleマップ埋め込み・キー不要。日本のお店もそのままヒット） ----- */
let _mapDay = null;
function mapDays(t){
  const dayList = rangeDates(t.startDate, t.endDate);
  const extra = [...new Set((t.items||[]).map(i=>i.date).filter(Boolean))].filter(d=>!dayList.includes(d));
  const days = [...dayList, ...extra].sort();
  return days.length? days : [t.startDate||'__none__'];
}
function dayPlaceItems(t, date){
  return (t.items||[]).filter(i=> (i.date||t.startDate||'__none__')===date && i.place)
    .sort((a,b)=> effOrder(a)-effOrder(b));
}
function mapEmbedSrc(t, items){
  const q = p => mapQ(t, p);   // 場所＋行き先で精度UP（encodeURIComponent済み）
  if(items.length===1) return `https://www.google.com/maps?q=${q(items[0].place)}&z=15&hl=ja&output=embed`;
  const saddr = q(items[0].place);
  const daddr = items.slice(1).map(i=>q(i.place)).join('+to:');   // 経由地つき
  return `https://www.google.com/maps?saddr=${saddr}&daddr=${daddr}&dirflg=r&hl=ja&output=embed`;
}
function mapRouteUrl(t, items){   // 本物のGoogleマップを開く（経由地つき・確実）
  const q = p => mapQ(t, p);
  if(items.length===1) return `https://www.google.com/maps/search/?api=1&query=${q(items[0].place)}`;
  const origin=q(items[0].place), dest=q(items[items.length-1].place);
  const way = items.slice(1,-1).map(i=>q(i.place)).join('%7C');   // %7C = |
  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=transit`+(way?`&waypoints=${way}`:'');
}
function renderMap(t){
  const useDays = mapDays(t);
  const withPlaces = useDays.filter(d=> dayPlaceItems(t,d).length>0);
  if(!withPlaces.length){
    return `<div class="empty" style="padding:50px 0;"><span class="big">🗺</span>予定に「場所」を入れると<br>その日のルートを地図に表示します</div>`;
  }
  const sel = withPlaces.includes(_mapDay)? _mapDay : withPlaces[0];
  const chips = withPlaces.map(d=>{
    const label = d==='__none__'? '予定' : 'Day'+(useDays.indexOf(d)+1);
    return `<button data-mapday="${esc(d)}" class="${d===sel?'on':''}">${label}</button>`;
  }).join('');
  const items = dayPlaceItems(t, sel);
  const src = mapEmbedSrc(t, items);
  const routeUrl = mapRouteUrl(t, items);
  return `${withPlaces.length>1?`<div class="map-days">${chips}</div>`:''}
    <a class="map-open" href="${routeUrl}" target="_blank" rel="noopener">↗ この日のルートをGoogleマップで開く</a>
    <div id="map"><iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${src}"></iframe></div>
    <div class="map-note">📍 地図はGoogleマップのプレビュー（${items.length}か所）。うまく出ないときは上の「Googleマップで開く」か、各予定の「🚶 道順」が確実です。</div>`;
}
function bindMap(t){
  if(route.tab!=='map') return;
  document.querySelectorAll('.map-days button').forEach(b=> b.onclick=()=>{ _mapDay=b.dataset.mapday; render(); });
}

    });

/* 予定の作成・編集（打ち込んだそばから自動保存） */
function itemIsEmpty(i){
  return !i.title && !i.place && !i.time && !i.endTime && !i.transport && !i.url
    && !i.fromStation && !i.toStation
    && !i.cost && !i.note && (!i.comments || !i.comments.length);
}
function openItemForm(t, item, presetDate){
  const wasNew = !item;
  item = item || { id:uid(), date:presetDate||t.startDate||'', time:'', endTime:'', type:'spot', title:'', place:'', transport:'', fromStation:'', toStation:'', url:'', cost:'', payer:'', split:'half', note:'', comments:[] };
  if(wasNew){ t.items=t.items||[]; t.items.push(item); }   // 先に登録して、入力＝即反映・即保存
  const dayOpts = rangeDates(t.startDate,t.endDate);
  const dateField = dayOpts.length
    ? `<select id="i-date">${dayOpts.map((d,idx)=>`<option value="${d}" ${d===item.date?'selected':''}>Day${idx+1}・${fmtDate(d)}(${fmtDow(d)})</option>`).join('')}
        <option value="" ${!item.date?'selected':''}>日付なし</option></select>`
    : `<input type="date" id="i-date" value="${esc(item.date)}">`;
  const typeBtns = Object.entries(TYPES).map(([k,v])=>`<button data-t="${k}" class="${k===item.type?'on':''}"><span class="te">${v.emoji}</span>${v.label}</button>`).join('');
  const payerOpts = `<option value="">立替者なし / 無料</option>`+PAYERS.map(p=>`<option value="${p}" ${p===item.payer?'selected':''}>${p==='ふたり'?'ふたりで（精算なし）':p}</option>`).join('');
  const splitOpts = Object.entries(SPLITS).map(([k,v])=>`<option value="${k}" ${k===(item.split||'half')?'selected':''}>${k==='half'?'折半（半分こ）':v+'が全部もつ'}</option>`).join('');
  const moveShow = (item.type==='move' || item.fromStation || item.toStation || item.transport) ? ' show' : '';
  const moneyOpen = (Number(item.cost)>0) ? ' open' : '';
  openSheet(`
    <h3>${wasNew?'予定を追加':'予定を編集'}</h3>
    <div class="field"><label>種類</label><div class="type-grid" id="i-type">${typeBtns}</div></div>
    <div class="field"><label>日</label>${dateField}</div>
    <div class="field-2">
      <div class="field"><label>開始</label><input type="time" id="i-time" value="${esc(item.time)}"></div>
      <div class="field"><label>終了（任意）</label><input type="time" id="i-end" value="${esc(item.endTime||'')}"></div>
    </div>
    <div class="field"><label>タイトル（何をする？）</label><input type="text" id="i-title" value="${esc(item.title)}" placeholder="例: 清水寺を散策"></div>
    <div class="field"><label>📍 場所（どこ？）</label><input type="text" id="i-place" value="${esc(item.place)}" placeholder="例: 清水寺"></div>
    <div class="cond-block${moveShow}" id="i-moveblock">
      <div class="field-2">
        <div class="field"><label>🚉 出発駅</label><input type="text" id="i-from" value="${esc(item.fromStation||'')}" placeholder="例: 京都駅"></div>
        <div class="field"><label>到着駅</label><input type="text" id="i-to" value="${esc(item.toStation||'')}" placeholder="例: 大阪駅"></div>
      </div>
      <div class="field"><label>🚃 交通メモ</label><input type="text" id="i-trans" value="${esc(item.transport)}" placeholder="例: JR嵯峨野線で約16分"></div>
    </div>
    <div class="field"><label>📝 メモ（任意）</label><textarea id="i-note" placeholder="予約番号・補足など…">${esc(item.note)}</textarea></div>
    <details class="more"${moneyOpen}>
      <summary>💰 費用・割り勘をつける</summary>
      <div class="field-2">
        <div class="field"><label>費用</label><input type="number" inputmode="numeric" id="i-cost" value="${esc(item.cost)}" placeholder="¥"></div>
        <div class="field"><label>立て替えた人</label><select id="i-payer">${payerOpts}</select></div>
      </div>
      <div class="field"><label>割り勘（だれの負担？）</label><select id="i-split">${splitOpts}</select></div>
    </details>
    <div class="autosave" id="i-status">✓ 自動保存されます</div>
    <div class="sheet-actions">
      <button class="btn-primary" id="i-done">完了</button>
    </div>
    <button class="btn-danger" id="i-del">${wasNew?'この予定をやめる':'この予定を削除'}</button>
  `);
  let pickedType=item.type;
  const status=$('#i-status');
  const flashSaved=()=>{ status.textContent='✓ 自動保存しました'; status.classList.remove('flash'); void status.offsetWidth; status.classList.add('flash'); };
  const apply=()=>{
    const costRaw=$('#i-cost').value, newTime=$('#i-time').value;
    if(newTime!==item.time) delete item.order;   // 時刻を変えたら手動並べ替えを解除
    item.date=$('#i-date').value; item.time=newTime; item.endTime=$('#i-end').value; item.type=pickedType;
    item.title=$('#i-title').value.trim(); item.place=$('#i-place').value.trim();
    item.transport=$('#i-trans').value.trim();
    item.fromStation=$('#i-from').value.trim(); item.toStation=$('#i-to').value.trim();
    item.cost = costRaw===''?0:Number(costRaw); item.payer=$('#i-payer').value; item.split=$('#i-split').value; item.note=$('#i-note').value.trim();
    save(); flashSaved();
  };
  const moveBlock = $('#i-moveblock');
  const syncMove = ()=>{ if(moveBlock) moveBlock.classList.toggle('show',
      pickedType==='move' || !!$('#i-from').value || !!$('#i-to').value || !!$('#i-trans').value); };
  sheet.querySelectorAll('#i-type button').forEach(b=> b.onclick=()=>{
    pickedType=b.dataset.t;
    sheet.querySelectorAll('#i-type button').forEach(x=>x.classList.toggle('on', x===b));

  };

    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>
</html>

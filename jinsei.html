<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>じんせいすごろく</title>
<link rel="apple-touch-icon" href="icons/icon-jinsei.png">
<meta name="apple-mobile-web-app-title" content="すごろく">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="jinsei-mg.js"></script>
<style>
  :root{
    --pink:#ff9ad5; --blue:#4da3ff; --red:#ff6b6b; --yellow:#ffd166; --green:#5ed47a;
    --ink:#3b3354; --card:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100dvh;overflow:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#8fd0f0; color:var(--ink); touch-action:none; user-select:none;-webkit-user-select:none;
  }
  input{user-select:text;-webkit-user-select:text;}

  /* ===== ゲーム全体ラッパ（縦持ちのときはCSS回転で横画面化） ===== */
  #gameWrap{position:fixed;left:0;top:0;width:100vw;height:100dvh;display:none;overflow:hidden;background:#8fd0f0;}
  body.rot #gameWrap{
    width:100dvh;height:100vw;left:100vw;top:0;
    transform:rotate(90deg);transform-origin:left top;
  }
  #cv{position:absolute;inset:0;display:block;}

  /* ===== タイトル / 設定（縦のまま） ===== */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#ffe3f3 0%,#dceeff 60%,#d8ffe6 100%);z-index:50;padding:24px;
    transition:opacity .5s;overflow-y:auto;}
  .screen.hide{opacity:0;pointer-events:none;}
  .logo{font-size:min(42px,10vw);font-weight:800;letter-spacing:2px;color:var(--ink);text-shadow:0 3px 0 #fff;white-space:nowrap;}
  .logo small{display:block;font-size:14px;font-weight:600;color:#8b7fa8;letter-spacing:6px;margin-bottom:6px;text-align:center;}
  .dice{font-size:64px;margin:10px 0 18px;animation:bob 2.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-10px) rotate(8deg)}}
  .panel{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-radius:24px;padding:20px;width:min(420px,100%);
    box-shadow:0 10px 30px rgba(80,60,120,.18);}
  .panel h2{font-size:15px;color:#8b7fa8;margin-bottom:12px;text-align:center;}
  .cnt-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
  .cnt-btn{flex:1;max-width:90px;padding:12px 0;border:2px solid #e6def5;border-radius:16px;background:#fff;
    font-size:17px;font-weight:700;color:#8b7fa8;}
  .cnt-btn.on{border-color:var(--pink);background:#fff0f8;color:#e0559f;}
  .name-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .name-dot{width:26px;height:26px;border-radius:50%;flex:none;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);}
  .name-row input{flex:1;font-size:16px;padding:11px 14px;border:2px solid #e6def5;border-radius:14px;outline:none;background:#fff;min-width:0;}
  .name-row input:focus{border-color:var(--blue);}
  .go-btn{display:block;width:100%;margin-top:14px;padding:16px;border:none;border-radius:18px;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);color:#fff;font-size:19px;font-weight:800;letter-spacing:2px;
    box-shadow:0 6px 16px rgba(160,90,220,.35);}
  .go-btn:active{transform:scale(.97);}
  .go-btn:disabled{opacity:.45;}
  .mode-btn{display:block;width:100%;margin-bottom:12px;padding:16px;border:2px solid #e6def5;border-radius:18px;
    background:#fff;font-size:17px;font-weight:800;color:var(--ink);text-align:center;}
  .mode-btn small{display:block;font-size:12px;font-weight:600;color:#8b7fa8;margin-top:4px;}
  .mode-btn:active{transform:scale(.97);border-color:var(--pink);}
  .sub-btn{display:block;width:100%;margin-top:10px;padding:14px;border:none;border-radius:16px;
    background:linear-gradient(135deg,#6fb6ff,#7a8cff);color:#fff;font-size:16px;font-weight:800;}
  .sub-btn:active{transform:scale(.97);}
  .sub-btn.pink{background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  .back-link{display:block;text-align:center;margin-top:14px;font-size:13px;font-weight:700;color:#8b7fa8;background:none;border:none;width:100%;}
  .joinrow{display:flex;gap:8px;margin-top:10px;}
  .joinrow input{flex:1;font-size:18px;padding:12px;border:2px solid #e6def5;border-radius:14px;outline:none;text-align:center;
    letter-spacing:6px;font-weight:800;min-width:0;}
  .divider{display:flex;align-items:center;gap:10px;color:#b6abd0;font-size:12px;font-weight:700;margin:16px 0 6px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:#e6def5;}
  .hint-rotate{font-size:12.5px;color:#8b7fa8;font-weight:700;text-align:center;margin-top:10px;}

  /* ===== ロビー ===== */
  .room-code{font-size:52px;font-weight:900;letter-spacing:14px;text-align:center;color:#7a4ddb;margin:4px 0 2px;text-indent:14px;}
  .lobby-note{font-size:12.5px;color:#8b7fa8;font-weight:600;text-align:center;line-height:1.7;margin-bottom:14px;}
  .lobby-row{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #efe9fb;border-radius:14px;
    padding:10px 14px;margin-bottom:8px;font-weight:800;font-size:15px;}
  .lobby-row .dot{width:14px;height:14px;border-radius:50%;flex:none;}
  .lobby-row .you{margin-left:auto;font-size:11px;color:#fff;background:var(--pink);border-radius:999px;padding:2px 10px;}
  .lobby-row.empty{color:#c9c0de;border-style:dashed;font-weight:600;}
  #lobbyWaitMsg{text-align:center;font-size:14px;font-weight:700;color:#8b7fa8;margin-top:14px;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* ===== HUD（横画面内・上中央） ===== */
  #hud{position:absolute;top:6px;left:60px;right:60px;z-index:20;pointer-events:none;}
  #chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .chip{background:rgba(255,255,255,.92);border-radius:14px;padding:5px 10px;display:flex;align-items:center;gap:6px;
    box-shadow:0 3px 10px rgba(60,40,100,.15);border:2px solid transparent;transition:.25s;min-width:0;}
  .chip.cur{border-color:#ffb53e;background:#fffbe8;}
  .chip .dot{width:12px;height:12px;border-radius:50%;flex:none;position:relative;}
  .chip .dot.on::after{content:"";position:absolute;right:-3px;top:-3px;width:7px;height:7px;border-radius:50%;
    background:#2ee06a;border:1.5px solid #fff;}
  .chip .nm{font-size:12px;font-weight:700;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip .yen{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .chip .yen.minus{color:#e34a4a;}
  .chip.flash{animation:flash .6s;}
  @keyframes flash{0%{background:#fff3b8}100%{background:rgba(255,255,255,.92)}}
  .chip .goalmark{font-size:11px;}
  .chip .bag{font-size:10.5px;color:#8b7fa8;font-weight:800;}

  /* ===== 下部（横画面内） ===== */
  #bottom{position:absolute;left:0;right:0;bottom:10px;z-index:20;display:flex;justify-content:center;pointer-events:none;}
  #bottom > *{pointer-events:auto;}
  #spinBtn{padding:13px 26px;border:none;border-radius:999px;font-size:16px;font-weight:800;color:#fff;letter-spacing:1px;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);box-shadow:0 8px 20px rgba(140,80,220,.4);
    display:flex;align-items:center;gap:10px;max-width:100%;white-space:nowrap;}
  #spinBtn:active{transform:scale(.96);}
  #spinBtn .who{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);
    border-radius:999px;padding:3px 10px;font-size:13px;max-width:32vmax;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #spinBtn .who i{width:11px;height:11px;border-radius:50%;flex:none;}
  #spinBtn:disabled{display:none;}
  #turnBanner{display:none;padding:11px 24px;border-radius:999px;font-size:14px;font-weight:800;color:#6c5f8d;
    background:rgba(255,255,255,.92);box-shadow:0 6px 16px rgba(60,40,100,.18);white-space:nowrap;max-width:92%;
    overflow:hidden;text-overflow:ellipsis;animation:pulse 1.8s infinite;}
  #turnBanner button{border:none;background:#ffe1ef;color:#e0559f;font-weight:800;border-radius:999px;padding:4px 12px;font-size:12px;margin-left:8px;}

  /* アイテムバー */
  #itemBar{position:absolute;left:50%;transform:translateX(-50%);bottom:64px;z-index:20;display:none;gap:8px;}
  .item-chip{display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(255,255,255,.94);
    border:2px solid #efe9fb;border-radius:14px;padding:6px 10px;min-width:58px;}
  .item-chip .ie{font-size:20px;line-height:1.1;}
  .item-chip .in{font-size:9.5px;font-weight:800;color:#6c5f8d;white-space:nowrap;}
  .item-chip:active{transform:scale(.94);}
  .item-chip.dis{opacity:.45;pointer-events:none;}

  /* 右上ミニボタン・部屋コード */
  #miniBtns{position:absolute;right:10px;top:8px;z-index:21;display:flex;flex-direction:column;gap:7px;align-items:flex-end;}
  .mini{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.9);font-size:18px;
    box-shadow:0 3px 10px rgba(60,40,100,.2);}
  .mini:active{transform:scale(.92);}
  #codePill{display:none;background:rgba(255,255,255,.9);border-radius:999px;padding:4px 10px;font-size:10.5px;font-weight:800;
    color:#7a4ddb;box-shadow:0 3px 10px rgba(60,40,100,.2);}

  /* ===== 2Dミニマップ（左下） ===== */
  #minimapBox{position:absolute;left:10px;bottom:10px;z-index:19;background:rgba(255,255,255,.82);
    border-radius:14px;box-shadow:0 4px 14px rgba(60,40,100,.22);padding:5px;line-height:0;transition:width .25s,height .25s;}
  #minimap{border-radius:10px;display:block;}

  /* ===== ルーレット（横画面内・SVG完結の真円） ===== */
  #rouletteWrap{position:absolute;inset:0;z-index:30;background:rgba(40,25,70,.45);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;flex-direction:column;}
  #wheelBox{position:relative;width:min(56vmin,300px);height:min(56vmin,300px);}
  #wheelBox .ptr{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:28px;z-index:2;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));}
  #wheel{width:100%;height:100%;display:block;filter:drop-shadow(0 12px 30px rgba(0,0,0,.35));}
  #wheelNum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:84px;font-weight:900;
    color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.25);opacity:0;transform:scale(.3);pointer-events:none;z-index:3;}
  #wheelNum.pop{animation:numpop .7s forwards;}
  @keyframes numpop{0%{opacity:0;transform:scale(.3)}55%{opacity:1;transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}
  #rouletteHint{margin-top:16px;color:#fff;font-weight:700;font-size:15px;text-shadow:0 2px 6px rgba(0,0,0,.4);}

  /* ===== カード（横画面内） ===== */
  #modal{position:absolute;inset:0;z-index:35;background:rgba(40,25,70,.45);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:18px;}
  .card{background:var(--card);border-radius:24px;padding:18px 20px 16px;width:min(380px,94%);max-height:94%;overflow-y:auto;
    text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.3);animation:cardin .4s cubic-bezier(.2,1.4,.4,1);}
  @keyframes cardin{from{transform:translateY(36px) scale(.85);opacity:0}to{transform:none;opacity:1}}
  .card .cat{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;padding:3px 13px;border-radius:999px;margin-bottom:6px;color:#fff;}
  .card .emo{font-size:46px;line-height:1.15;margin:2px 0;}
  .card .txt{font-size:15px;font-weight:700;line-height:1.6;margin:6px 0 2px;}
  .card .delta{font-size:23px;font-weight:900;margin:6px 0 0;font-variant-numeric:tabular-nums;}
  .card .delta.plus{color:#1fa45c;} .card .delta.minus{color:#e34a4a;} .card .delta.zero{color:#8b7fa8;font-size:16px;}
  .card .ok{margin-top:12px;width:100%;padding:12px;border:none;border-radius:14px;font-size:16px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  .card .ok:active{transform:scale(.97);}
  .card .ghost{margin-top:8px;width:100%;padding:10px;border:none;border-radius:14px;font-size:14px;font-weight:800;
    color:#8b7fa8;background:#f3effb;}
  .numpick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
  .numpick button{padding:12px 0;border:2px solid #e6def5;border-radius:12px;background:#fff;font-size:18px;font-weight:900;color:var(--ink);}
  .numpick button:active{background:#fff0f8;border-color:var(--pink);}
  .mgrank{display:flex;align-items:center;gap:8px;background:#f7f4ff;border-radius:12px;padding:8px 12px;margin-top:6px;font-weight:800;font-size:14px;}
  .mgrank .dot{width:12px;height:12px;border-radius:50%;flex:none;}
  .mgrank .sc{margin-left:auto;font-variant-numeric:tabular-nums;}
  .mgrank.win{background:#fff6da;box-shadow:inset 0 0 0 2px #ffd76a;}

  /* ===== ミニゲーム（横画面内） ===== */
  #mgWrap{position:absolute;inset:0;z-index:38;background:rgba(40,25,70,.55);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:12px;}
  #mgCard{background:#fff;border-radius:22px;width:min(560px,96%);max-height:96%;overflow-y:auto;padding:14px 18px 16px;
    text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.35);animation:cardin .35s cubic-bezier(.2,1.4,.4,1);}
  #mgHead{font-size:14px;font-weight:800;color:#8b5fd6;letter-spacing:1px;margin-bottom:4px;}
  .mg-big{font-size:34px;font-weight:900;color:var(--ink);margin:6px 0 2px;}
  .mg-sub{font-size:13px;font-weight:700;color:#8b7fa8;margin:4px 0;}
  .mg-mainbtn{margin-top:12px;width:100%;padding:16px;border:none;border-radius:16px;font-size:18px;font-weight:900;color:#fff;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  .mg-rushbtn{margin-top:10px;width:100%;padding:30px 0;border:none;border-radius:20px;font-size:24px;font-weight:900;color:#fff;
    background:linear-gradient(135deg,#ffb13d,#ff7a59);box-shadow:0 6px 0 #e0662f;}
  .mg-rushbtn:active{transform:translateY(3px);box-shadow:0 3px 0 #e0662f;}
  .mg-barwrap{position:relative;height:34px;background:#f0ecfa;border-radius:999px;margin:14px 6px 4px;overflow:hidden;}
  .mg-barcenter{position:absolute;left:50%;top:0;bottom:0;width:14%;transform:translateX(-50%);background:#c9f3d4;border-left:2px dashed #58c97c;border-right:2px dashed #58c97c;}
  .mg-cursor{position:absolute;top:2px;bottom:2px;width:10px;border-radius:6px;background:#ff5fa8;left:0;}
  .mg-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px;}
  .mg-key{padding:11px 0;border:2px solid #e6def5;border-radius:12px;background:#fff;font-size:17px;font-weight:900;color:var(--ink);}
  .mg-key:active{background:#fff0f8;}
  .mg-cardface{font-size:56px;font-weight:900;color:var(--ink);background:#f7f4ff;border-radius:16px;padding:10px 0;margin:8px 30%;border:2px solid #e6def5;}
  .mg-row{display:flex;gap:8px;justify-content:center;margin-top:8px;}
  .mg-hl,.mg-hand{flex:1;max-width:150px;padding:13px 0;border:none;border-radius:14px;font-size:17px;font-weight:900;color:#fff;background:linear-gradient(135deg,#6fb6ff,#7a8cff);}
  .mg-hand{font-size:26px;background:#fff;border:2px solid #e6def5;}
  .mg-hand:active,.mg-hl:active{transform:scale(.95);}
  .mg-flash{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);background:rgba(45,32,80,.85);color:#fff;
    font-size:18px;font-weight:900;padding:10px 22px;border-radius:14px;pointer-events:none;animation:numpop .5s;}
  #mgCard{position:relative;}

  /* ===== トースト（横画面内） ===== */
  #toast{position:absolute;left:50%;top:36%;transform:translate(-50%,-50%) scale(.9);z-index:36;
    background:rgba(45,32,80,.88);color:#fff;font-size:16px;font-weight:700;padding:14px 24px;border-radius:18px;
    opacity:0;transition:.3s;pointer-events:none;text-align:center;line-height:1.6;max-width:80%;}
  #toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

  /* ===== 結果（縦・全画面） ===== */
  #result{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;flex-direction:column;
    background:linear-gradient(180deg,rgba(70,40,120,.92),rgba(30,20,60,.95));padding:24px;}
  #result h1{color:#ffd76a;font-size:28px;letter-spacing:3px;margin-bottom:18px;text-shadow:0 3px 0 rgba(0,0,0,.3);}
  .rank{background:rgba(255,255,255,.95);border-radius:20px;padding:14px 18px;width:min(360px,100%);margin-bottom:10px;
    display:flex;align-items:center;gap:12px;animation:cardin .5s both;}
  .rank .pos{font-size:26px;width:40px;text-align:center;}
  .rank .dot{width:16px;height:16px;border-radius:50%;flex:none;}
  .rank .nm{font-weight:800;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank .yen{font-weight:900;font-size:16px;font-variant-numeric:tabular-nums;}
  .rank.first{transform:scale(1.06);box-shadow:0 0 30px rgba(255,215,106,.6);}
  #againBtn{margin-top:16px;padding:15px 44px;border:none;border-radius:999px;font-size:17px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  #confetti{position:fixed;inset:0;z-index:61;pointer-events:none;}
</style>
</head>
<body>

<!-- タイトル & 設定（縦） -->
<div class="screen" id="title">
  <div class="logo"><small>FUTARI NO</small>じんせいすごろく</div>
  <div class="dice">🎲</div>
  <div class="panel" id="panel"></div>
</div>

<!-- ロビー（縦） -->
<div class="screen" id="lobby" style="display:none;">
  <div class="panel" id="lobbyPanel"></div>
</div>

<!-- ゲーム本体（横画面構造） -->
<div id="gameWrap">
  <canvas id="cv"></canvas>
  <div id="hud"><div id="chips"></div></div>
  <div id="miniBtns">
    <button class="mini" id="viewBtn" title="ぜんたいマップ">🗺️</button>
    <button class="mini" id="muteBtn" title="こうかおん">🔊</button>
    <button class="mini" id="bgmBtn" title="BGM">🎵</button>
    <div id="codePill"></div>
  </div>
  <div id="minimapBox"><canvas id="minimap"></canvas></div>
  <div id="itemBar"></div>
  <div id="bottom">
    <button id="spinBtn" disabled></button>
    <div id="turnBanner"></div>
  </div>
  <div id="rouletteWrap">
    <div id="wheelBox">
      <div class="ptr">🔻</div>
      <svg id="wheel" viewBox="0 0 220 220"></svg>
      <div id="wheelNum"></div>
    </div>
    <div id="rouletteHint">ルーレット回転中…</div>
  </div>
  <div id="modal"></div>
  <div id="mgWrap"><div id="mgCard"><div id="mgHead"></div><div id="mgStage"></div></div></div>
  <div id="toast"></div>
</div>

<!-- 結果（縦） -->
<div id="result"></div>
<canvas id="confetti"></canvas>

<script>
/* テスト専用（?sbtest=1）：iframe同居のテスト環境では描画ループ(rAF)が止まることがあるためタイマーで代替。実機では無効 */
if(new URLSearchParams(location.search).get('sbtest')==='1'){
  window.requestAnimationFrame = cb => setTimeout(()=>cb(performance.now()), 33);
}
</script>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ============================================================
   マスのデータ（全50マス）
   t: start/goal/p(臨時収入)/m(出費)/lv(ふたり)/ev(移動・休み)/sal(給料)/item(アイテム)
   ============================================================ */
const TILES = [

async function sbGetRoom(code){
  const r = await fetch(`${SB_URL}/rest/v1/jinsei_rooms?code=eq.${encodeURIComponent(code)}&select=state`, {headers:SBH});
  if(r.status === 404) throw new TableMissing();
  if(!r.ok) throw new Error('get '+r.status);
  const j = await r.json();
  return j.length ? j[0].state : null;
}
async function sbInsert(code, state){
  const r = await fetch(`${SB_URL}/rest/v1/jinsei_rooms`, {method:'POST',
    headers:{...SBH, Prefer:'return=minimal'}, body: JSON.stringify({code, state})});
  if(r.status === 404) throw new TableMissing();
  if(r.status === 409) return false;
  if(!r.ok) throw new Error('insert '+r.status);
  return true;
}
async function sbCas(code, expectV, state){
  const r = await fetch(`${SB_URL}/rest/v1/jinsei_rooms?code=eq.${encodeURIComponent(code)}&state->>v=eq.${expectV}`,
    {method:'PATCH', headers:{...SBH, Prefer:'return=representation'},
     body: JSON.stringify({state, updated_at: new Date().toISOString()})});
  if(r.status === 404) throw new TableMissing();
  if(!r.ok) throw new Error('patch '+r.status);
  const j = await r.json().catch(()=>[]);
  return Array.isArray(j) && j.length > 0;
}

    if(mut(next) === false) return null;
    next.v = cur.v + 1;

  }

function connectRealtime(code){
  try{
    if(!window.supabase || SB_TEST) return;
    sbClient = sbClient || window.supabase.createClient(SB_URL, SB_KEY);
    channel = sbClient.channel('jinsei-'+code, {config:{presence:{key:String(Math.random())}}})
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'jinsei_rooms', filter:'code=eq.'+code},
        p => { if(p.new && p.new.state) onRemote(p.new.state); })
      .on('presence', {event:'sync'}, ()=>{
        presentSeats = new Set();
        const st = channel.presenceState();
        Object.values(st).forEach(arr=>arr.forEach(m=>{ if(typeof m.seat==='number') presentSeats.add(m.seat); }));
        renderChips(); if(room && room.state.phase==='lobby') renderLobby();
      })
      .subscribe(status=>{
        if(status==='SUBSCRIBED'){ try{ channel.track({seat:mySeat}); }catch(e){} }
      });
  }catch(e){}
}

function onRemote(s){
  if(!room || !s || typeof s.v !== 'number') return;
  const maxv = Math.max(room.state.v, ...inbox.map(x=>x.v), 0);
  if(s.v <= maxv) return;
  inbox.push(s);
  pump();
}
async function pump(){
  if(processing) return; processing = true;
  try{
    while(inbox.length){
      const s = inbox.shift();
      if(!room || s.v <= room.state.v) continue;
      const prev = room.state;
      const newTurn = s.last && (!prev.last || s.last.id !== prev.last.id);
      const canReplay = started && prev.phase === 'play' && newTurn && s.last.by !== mySeat;
      if(canReplay) await replayTurn(s);
      enterState(s);
    }
  } finally { processing = false; }
}

function beep(freq, dur=0.07, type='sine', vol=0.18, when=0){
  if(!actx || muted) return;
  const t = actx.currentTime + when;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
}

/* --- BGM：内蔵シンセのループ（C–G–Am–F・112BPM） --- */
const BGM = (()=>{
  let timer = null, nextT = 0, step = 0, gain = null;
  const BPS = 112/60, STEP = 0.5/BPS;                  // 8分音符
  const CH = [[60,64,67],[55,59,62],[57,60,64],[53,57,60]];   // C G Am F
  const MEL = [0,2,1,2, 0,2,1,-1, 2,1,0,1, 2,-1,0,-1];        // コード内インデックス（-1=休符）
  const f = m => 440*Math.pow(2,(m-69)/12);
  function note(freq, t, dur, type, vol){
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(gain); o.start(t); o.stop(t+dur+0.05);
  }
  function tick(){
    if(!actx) return;
    while(nextT < actx.currentTime + 0.65){
      const bar = Math.floor(step/8) % 4, pos = step % 8;
      const ch = CH[bar];
      if(pos===0 || pos===4) note(f(ch[0]-24), nextT, STEP*1.8, 'triangle', 0.10);   // ベース
      if(pos%2===0) note(f(ch[(pos/2)%3]), nextT, STEP*0.9, 'sine', 0.045);          // アルペジオ
      const mi = MEL[(step + Math.floor(step/32)*4) % 16];
      if(mi>=0 && pos%2===1) note(f(ch[mi%3]+12), nextT, STEP*0.8, 'square', 0.028);  // メロディ
      nextT += STEP; step++;
    }
  }
  return {
    start(){
      if(!actx || timer) return;
      if(!gain){ gain = actx.createGain(); gain.connect(actx.destination); }
      gain.gain.value = bgmOn ? 0.9 : 0;
      nextT = actx.currentTime + 0.1; step = 0;
      timer = setInterval(tick, 200); tick();
    },
    setOn(on){ bgmOn = on; if(gain) gain.gain.value = on ? 0.9 : 0; },
  };
})();

function camGoal(){

    return { pos:new THREE.Vector3(camCtl.ovC.x, camCtl.ovH, camCtl.ovC.z + camCtl.ovH*0.45),
             look:new THREE.Vector3(camCtl.ovC.x, 0, camCtl.ovC.z) };
  }
  const t=camCtl.target, d=camCtl.dist, pit=camCtl.pitch, yaw=camCtl.yaw;
  return {
    pos:new THREE.Vector3(t.x+d*Math.cos(pit)*Math.cos(yaw), t.y+d*Math.sin(pit), t.z+d*Math.cos(pit)*Math.sin(yaw)),
    look:new THREE.Vector3(t.x, t.y+1, t.z)
  };
}

/* 入力：回転表示中は座標系を変換（dgx=dvy, dgy=-dvx） */
let dragging=false, px=0, py=0, pinch0=0, pinchBase=0;
function gameDelta(dvx, dvy){ return isRot() ? {x:dvy, y:-dvx} : {x:dvx, y:dvy}; }
cvs.addEventListener('pointerdown', e=>{ dragging=true; px=e.clientX; py=e.clientY; });
addEventListener('pointermove', e=>{
  if(!dragging) return;
  const d = gameDelta(e.clientX-px, e.clientY-py);
  px=e.clientX; py=e.clientY;
  if(camCtl.overview){
    const s = camCtl.ovH/520;
    camCtl.ovC.x = Math.max(-62, Math.min(62, camCtl.ovC.x - d.x*s));
    camCtl.ovC.z = Math.max(-62, Math.min(62, camCtl.ovC.z - d.y*s));
  }else{
    camCtl.yaw += d.x*0.008;
    camCtl.pitch = Math.min(1.25, Math.max(0.35, camCtl.pitch + d.y*0.004));
  }
});
addEventListener('pointerup', ()=>dragging=false);
cvs.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    pinch0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinchBase = camCtl.overview ? camCtl.ovH : camCtl.dist;
  }
},{passive:true});
cvs.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinch0>0){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const v = pinchBase * pinch0/d;
    if(camCtl.overview) camCtl.ovH = Math.min(130, Math.max(35, v));
    else camCtl.dist = Math.min(34, Math.max(8, v));
  }
},{passive:true});
addEventListener('wheel', e=>{
  if(camCtl.overview) camCtl.ovH = Math.min(130, Math.max(35, camCtl.ovH + e.deltaY*0.06));
  else camCtl.dist = Math.min(34, Math.max(8, camCtl.dist + e.deltaY*0.02));
},{passive:true});

const clock = new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime();
  clouds.forEach((c,i)=>{ c.position.x += Math.sin(t*0.1+i)*0.01; });
  waves.forEach((w,i)=>{
    const k = 1 + 0.025*Math.sin(t*0.9 + i*2.1);
    w.scale.set(k,k,1);
    w.material.opacity = 0.18 + 0.14*(0.5+0.5*Math.sin(t*0.9+i*2.1));
  });
  sparks.rotation.y = t*0.02;
  sparks.material.opacity = 0.55 + 0.3*Math.sin(t*1.7);
  if(marker.visible){
    marker.position.y = 3.3 + Math.sin(t*4)*0.18;
    marker.rotation.y = t*2;
  }
  const g = camGoal();
  camera.position.lerp(g.pos, camLerp);
  lookCur.lerp(g.look, camLerp);

  renderer.render(scene, camera);
}

/* ============================================================
   2Dミニマップ
   ============================================================ */
const mmCv = $('minimap');
let mmBig = false;
const MM = (()=>{   // 盤面の範囲 → キャンバス座標
  let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9;
  pts.forEach(p=>{ minx=Math.min(minx,p.x); maxx=Math.max(maxx,p.x); minz=Math.min(minz,p.z); maxz=Math.max(maxz,p.z); });
  return {minx,maxx,minz,maxz};
})();
function drawMinimap(){
  if(!started) return;
  const big = mmBig;
  const W = big ? Math.min(420, gameDims().w*0.55) : 168;
  const H = Math.round(W * 0.74);
  const dpr = Math.min(devicePixelRatio,2);
  mmCv.width = W*dpr; mmCv.height = H*dpr;
  mmCv.style.width = W+'px'; mmCv.style.height = H+'px';
  const g = mmCv.getContext('2d');
  g.setTransform(dpr,0,0,dpr,0,0);
  g.clearRect(0,0,W,H);
  const pad = 13;
  const sx = x => pad + (x-MM.minx)/(MM.maxx-MM.minx)*(W-pad*2);
  const sz = z => pad + (z-MM.minz)/(MM.maxz-MM.minz)*(H-pad*2);
  /* 道 */
  g.beginPath();
  pts.forEach((p,i)=>{ const X=sx(p.x), Y=sz(p.z); i?g.lineTo(X,Y):g.moveTo(X,Y); });
  g.lineCap='round'; g.lineJoin='round';
  g.strokeStyle='rgba(150,130,180,.35)'; g.lineWidth = big?7:5; g.stroke();
  /* マスの点 */
  pts.forEach((p,i)=>{
    const tl=TILES[i];
    g.beginPath();
    g.arc(sx(p.x), sz(p.z), tl.star?(big?4.5:3.2):(big?3:2.1), 0, 7);
    g.fillStyle = '#'+TYPE_COLOR[tl.t].toString(16).padStart(6,'0');
    g.fill();
  });
  /* START/GOAL */
  g.font = `${big?15:11}px sans-serif`; g.textAlign='center';
  g.fillText('🏁', sx(pts[0].x), sz(pts[0].z)-(big?8:6));
  g.fillText('👑', sx(pts[N-1].x), sz(pts[N-1].z)-(big?8:6));
  /* プレイヤー */
  players.forEach((p,i)=>{
    const wp = pts[p.pos];
    const ox = (i%2?1:-1)*(big?4:2.6), oy = (i<2?-1:1)*(big?4:2.6);
    const X = sx(wp.x)+ox, Y = sz(wp.z)+oy;
    if(i===cur && !p.done){
      g.beginPath(); g.arc(X,Y,big?9:6.5,0,7); g.fillStyle='rgba(255,181,62,.5)'; g.fill();
    }
    g.beginPath(); g.arc(X,Y,big?6:4.2,0,7);
    g.fillStyle=p.color; g.fill();
    g.lineWidth=2; g.strokeStyle='#fff'; g.stroke();
  });
}
$('minimapBox').addEventListener('click', ()=>{ mmBig=!mmBig; drawMinimap(); });

      items:(sp.items||[]).slice(), fx:Object.assign({}, sp.fx||{}), pawn};
    pawn.position.copy(pawnWorldPos(pl, pl.pos));
    scene.add(pawn);
    return pl;
  });
}

   オンライン：部屋の作成 / 参加 / ロビー
   ============================================================ */
function freshSeatState(name, cid, seat){
  return {name, cid, seat, money:START_MONEY, pos:0, skip:0, done:false, goalOrder:0, items:[], fx:{}};
}
function onlineError(e){
  if(e instanceof TableMissing){
    showToastPortrait('🛠️ オンライン機能は じゅんびちゅう…');
  }else{
    showToastPortrait('⚠️ つうしんエラー…でんぱの良いところで もういちど');
  }
}
/* タイトル/ロビー（縦画面）用のトースト：ゲーム内トーストと使い分け */
function showToastPortrait(msg){
  if(started){ showToast(msg); return; }
  const t = $('toast');
  document.body.appendChild(t);          // 一時的にラッパ外へ
  t.innerHTML = msg; t.classList.add('show');
  setTimeout(()=>{ t.classList.remove('show'); $('gameWrap').appendChild(t); }, 2200);
}
async function createRoom(){
  const name = ($('onName').value.trim() || 'こうだい').slice(0,8);
  myName = name; myCid = Math.random().toString(36).slice(2,10);
  const state = {v:1, phase:'lobby', players:[freshSeatState(name, myCid, 0)], cur:0, goalCount:0,
    turnsSinceMg:0, mgId:0, minigame:null, lastMg:null, last:null};
  try{
    let code = null;
    for(let i=0;i<8;i++){
      const c = String(1000 + Math.floor(Math.random()*9000));
      if(await sbInsert(c, state)){ code = c; break; }
    }
    if(!code){ showToastPortrait('⚠️ へやが つくれなかった…もういちど'); return; }
    room = {code, state};
    mySeat = 0;
    saveSession();
    connectRealtime(code);
    showLobby();
  }catch(e){ onlineError(e); }
}
async function joinRoom(){
  const code = ($('joinCode').value||'').trim();
  if(!/^\d{4}$/.test(code)){ showToastPortrait('4けたの へやコードを入れてね'); return; }
  const name = ($('onName').value.trim() || 'ゆずは').slice(0,8);
  try{
    const s = await sbGetRoom(code);
    if(!s){ showToastPortrait('🔍 そのへやは 見つからないよ'); return; }
    if(s.phase !== 'lobby'){
      const seat = s.players.findIndex(p=>p.name===name);
      if(seat >= 0){
        myName = name; myCid = s.players[seat].cid; mySeat = seat;
        room = {code, state:{v:0}};
        saveSession(); connectRealtime(code);
        enterState(s);
        return;
      }
      showToastPortrait('このへやは もうスタートしてるよ'); return;
    }
    if(s.players.length >= 4){ showToastPortrait('このへやは まんいん…'); return; }
    myName = name; myCid = Math.random().toString(36).slice(2,10);
    room = {code, state:s};
    const next = await casMutate(st=>{
      if(st.phase!=='lobby' || st.players.length>=4) return false;
      st.players.push(freshSeatState(name, myCid, st.players.length));
    });
    if(!next){ showToastPortrait('はいれなかった…もういちど'); room=null; return; }
    room.state = next;
    mySeat = next.players.findIndex(p=>p.cid===myCid);
    saveSession();
    connectRealtime(code);
    showLobby();
  }catch(e){ onlineError(e); room = null; }
}
async function resumeSession(saved){
  try{
    const s = await sbGetRoom(saved.code);
    if(!s || s.phase==='end'){ clearSession(); showToastPortrait('まえのゲームは おわってたよ'); vModeSelect(); return; }
    const seat = s.players.findIndex(p=>p.cid===saved.cid);
    if(seat < 0){ clearSession(); showToastPortrait('まえのゲームには もどれなかった…'); vModeSelect(); return; }
    MODE='online'; mySeat=seat; myName=s.players[seat].name; myCid=saved.cid;
    room = {code:saved.code, state:{v:0}};
    connectRealtime(saved.code);
    enterState(s);
  }catch(e){ onlineError(e); }
}
function showLobby(){
  $('title').classList.add('hide');
  $('lobby').style.display='flex';
  renderLobby();
}
function renderLobby(){
  if(!room || room.state.phase!=='lobby') return;
  const s = room.state;
  const isHost = mySeat===0;
  const rows = [];
  for(let i=0;i<4;i++){
    const p = s.players[i];
    if(p) rows.push(`<div class="lobby-row"><div class="dot" style="background:${PLAYER_COLORS[i]}"></div>${esc(p.name)}${i!==mySeat&&presentSeats.has(i)?' 🟢':''}${i===mySeat?'<span class="you">あなた</span>':''}</div>`);
    else  rows.push(`<div class="lobby-row empty">… まちあわせちゅう …</div>`);
  }
  $('lobbyPanel').innerHTML = `
    <h2>へやコード</h2>
    <div class="room-code">${esc(room.code)}</div>
    <div class="lobby-note">あいてのスマホで「べつべつのスマホで」→<br>この4けたを入力すると 入ってこられるよ</div>
    ${rows.join('')}
    ${isHost
      ? `<button class="go-btn" id="lobbyStart" ${s.players.length<2?'disabled':''}>スタート！${s.players.length<2?'（2人いれば押せるよ）':''}</button>`
      : `<div id="lobbyWaitMsg">ホストのスタートを まってるよ…</div>`}
    <button class="back-link" id="lobbyLeave">‹ やめる</button>`;
  if(isHost) $('lobbyStart').onclick = async ()=>{
    audio();
    try{
      const next = await casMutate(st=>{
        if(st.phase!=='lobby' || st.players.length<2) return false;
        st.phase='play'; st.cur=0;
      });
      if(next) enterState(next);
    }catch(e){ onlineError(e); }
  };
  $('lobbyLeave').onclick = ()=>{ clearSession(); location.reload(); };
}

/* ============================================================
   オンライン：状態適用・手番・リプレイ
   ============================================================ */
function beginOnlineGame(){
  buildPlayers(room.state.players);
  started = true;
  showGameUI();
  $('codePill').style.display='block';
  $('codePill').textContent = 'へや ' + room.code;
  sFanfare();
  camCtl.target.copy(pts[players[mySeat].pos]); camLerp = 0.03;
  setTimeout(()=>{ camLerp = 0.06; }, 2200);
}
function syncFromState(){
  const s = room.state;
  goalCount = s.goalCount;
  cur = s.cur;
  s.players.forEach((sp,i)=>{
    const p = players[i]; if(!p) return;
    p.money=sp.money; p.skip=sp.skip; p.done=sp.done; p.goalOrder=sp.goalOrder;
    p.items=(sp.items||[]).slice(); p.fx=Object.assign({}, sp.fx||{});
    if(p.pos!==sp.pos){ p.pos=sp.pos; p.pawn.position.copy(pawnWorldPos(p,p.pos)); }
  });
}
function enterState(s){
  room.state = s;
  if(s.phase==='lobby'){ renderLobby(); return; }
  if(!started) beginOnlineGame();
  syncFromState();
  renderChips();
  if(s.phase==='end'){
    clearSession();
    if(!resultShown) showResult();
    return;
  }
  if(s.lastMg && s.lastMg.id !== lastMgShown){
    lastMgShown = s.lastMg.id;
    showMgResultCard(s.lastMg, ()=>{});
  }
  if(s.minigame){ handleOnlineMinigame(s); return; }
  prepareTurnUI();
}
function prepareTurnUI(){
  const s = room.state;
  renderChips();
  camCtl.overview=false; $('viewBtn').textContent='🗺️';
  const plc = players[s.cur];
  camCtl.target.copy(pts[plc.pos]);
  const mp = pawnWorldPos(plc, plc.pos);
  marker.visible = true;
  marker.position.set(mp.x, 3.3, mp.z);
  marker.material.color.set(plc.color);
  if(s.cur === mySeat){
    const me = players[mySeat];
    if(me.skip > 0){
      showBanner('💤 おやすみ しょうかちゅう…');
      showToast(`💤 ${esc(me.name)} は おやすみ中…<br>1回パス！`);
      me.skip--;
      setTimeout(()=>{ busy=true; commitTurn([{sleep:{seat:mySeat}}]); }, 1900);
      return;
    }
    itemUsed = false; pendingUses.length = 0;
    showSpinFor(me);
  }else{
    showBanner(`🎲 ${esc(plc.name)} のばん…`);
  }
}
function advanceCur(st){
  if(st.players.every(p=>p.done)){ st.phase='end'; return; }
  let c = st.cur;
  do{ c = (c+1) % st.players.length; }while(st.players[c].done);
  st.cur = c;
}
function maybeStartMinigame(st){
  /* 全員が1回ずつ回したらミニゲーム（参加=まだゴールしていない人・2人以上）*/
  st.turnsSinceMg = (st.turnsSinceMg||0) + 1;
  const act = st.players.filter(p=>!p.done);
  if(st.phase==='play' && act.length>=2 && st.turnsSinceMg >= act.length){
    st.turnsSinceMg = 0;
    st.mgId = (st.mgId||0) + 1;
    st.minigame = {
      id: st.mgId,
      key: window.MG.KEYS[st.v % window.MG.KEYS.length],
      seed: (st.v*48271 + st.mgId*9301) % 2147483647,
      need: act.map(p=>p.seat),
      scores: {},
    };
  }
}
async function commitTurn(anim, opts={}){
  try{
    const next = await casMutate(st=>{
      players.forEach((p,i)=>{
        const sp = st.players[i];
        sp.money=p.money; sp.pos=p.pos; sp.skip=p.skip; sp.done=p.done; sp.goalOrder=p.goalOrder;
        sp.items=p.items.slice(); sp.fx=Object.assign({},p.fx);
      });
      st.goalCount = goalCount;
      maybeStartMinigame(st);
      if(!opts.again) advanceCur(st);
      else if(st.players.every(p=>p.done)) st.phase='end';
      st.last = {id:st.v+1, by:mySeat, anim};
    });
    busy = false;
    if(next) enterState(next);
  }catch(e){
    busy = false;
    if(e instanceof TableMissing) onlineError(e);
    else showToast('⚠️ つうしんエラー…<br>でんぱの良いところで もういちど', 2600);
    prepareTurnUI();
  }
}
async function replayTurn(s){
  const anim = (s.last && s.last.anim) || [];
  const actor = players[s.last.by];
  const actorName = actor ? actor.name : '';
  marker.visible = false;
  for(const step of anim){
    if(step.spin){
      showBanner(`🎲 ${esc(actorName)} がルーレット…`);
      await P(done=>runRoulette(step.spin.n, done, step.spin.b||0));
    }else if(step.move){
      const p = players[step.move.seat]; if(!p) continue;
      await P(done=>animateHops(p, step.move.from, step.move.to, done));
      p.pos = step.move.to; drawMinimap();
    }else if(step.card){
      const tl = TILES[step.card.idx]; const p = players[step.card.seat];
      await P(done=>showTileCard(tl, done, step.card.sh));
      if(p && tl.$ && !step.card.sh){ p.money += tl.$; renderChips(p.idx); }
      if(step.card.sh){ showToast('🛡️ おまもりで まもった！'); await wait(1200); }
    }else if(step.sleep){
      const p = players[step.sleep.seat];
      showToast(`💤 ${esc(p?p.name:'')} は おやすみ…<br>1回パス！`);
      await wait(1900);
    }else if(step.goal){
      const p = players[step.goal.seat];
      sFanfare();
      await P(done=>showGoalCard(p, step.goal.order, step.goal.bonus, done));
      if(p){ renderChips(p.idx); }
    }else if(step.gift){
      const p = players[step.gift.seat]; const it = ITEMS[step.gift.item];
      if(it){ await P(done=>showInfoCard('🎁', `${esc(p?p.name:'')} がアイテムをゲット！`, `${it.e} <b>${it.n}</b><br><small>${it.d}</small>`, done)); }
    }else if(step.use){
      const p = players[step.use.seat]; const it = ITEMS[step.use.item];
      if(it){
        let txt = `${it.e} <b>${it.n}</b> をつかった！`;
        if(step.use.item==='pitatto') txt += `<br>${step.use.n}マス すすむ！`;
        if(step.use.item==='letter' && players[step.use.t]) txt += `<br>${esc(players[step.use.t].name)} から ¥5,000`;
        showToast(`${esc(p?p.name:'')}：${txt}`, 2000);
        await wait(2100);
      }
    }
  }
}

/* ============================================================
   オンライン：ミニゲーム進行
   ============================================================ */
function handleOnlineMinigame(s){
  const mg = s.minigame;
  const mine = mg.need.includes(mySeat) && !(mySeat in mg.scores);
  marker.visible = false;
  if(mine && !mgActive){
    mgActive = true;
    hideSpin();
    runOnlineMg(mg).catch(()=>{ mgActive=false; });
  }else if(!mine){
    showBanner('🎮 あいての ミニゲームちゅう…');
    if(mgSkipTimer) clearTimeout(mgSkipTimer);
    mgSkipTimer = setTimeout(()=>{
      if(room.state.minigame && room.state.minigame.id===mg.id){
        showBanner(`🎮 あいての ミニゲームちゅう…<button id="mgSkipBtn">スキップする</button>`);
        const b = document.getElementById('mgSkipBtn');
        if(b) b.onclick = ()=>resolveMgWithZero(mg.id);
      }
    }, 30000);
  }
}
async function runOnlineMg(mg){
  await mgIntro(mg.key, myName);
  const score = await window.MG.play($('mgStage'), mg.key, mg.seed, MG_SFX);
  $('mgHead').textContent = 'けっかを そうしんちゅう…';
  $('mgStage').innerHTML = `<div class="mg-big">${score}てん！</div><div class="mg-sub">あいてを まってるよ…</div>`;
  try{
    const next = await casMutate(st=>{
      if(!st.minigame || st.minigame.id!==mg.id) return false;   // すでに解決済み
      st.minigame.scores[mySeat] = score;
      finishMgIfComplete(st);
    });
    mgActive = false;
    hideMg();
    if(next) enterState(next);
  }catch(e){
    mgActive = false; hideMg(); onlineError(e);
  }
}
async function resolveMgWithZero(mgId){
  try{
    const next = await casMutate(st=>{
      if(!st.minigame || st.minigame.id!==mgId) return false;
      st.minigame.need.forEach(seat=>{ if(!(seat in st.minigame.scores)) st.minigame.scores[seat]=0; });
      finishMgIfComplete(st);
    });
    if(next) enterState(next);
  }catch(e){ onlineError(e); }
}
function finishMgIfComplete(st){
  const mg = st.minigame;
  if(!mg) return;
  if(!mg.need.every(seat=>seat in mg.scores)) return;
  const best = Math.max(...mg.need.map(s=>mg.scores[s]));
  const winners = mg.need.filter(s=>mg.scores[s]===best && best>0);
  winners.forEach(seat=>{ st.players[seat].money += MG_PRIZE; });
  st.lastMg = {id:mg.id, key:mg.key, scores:mg.scores, winners};
  st.minigame = null;
}

/* ============================================================
   ローカル：ターン進行 & ミニゲーム
   ============================================================ */
function startTurn(){
  if(players.every(p=>p.done)){ showResult(); return; }
  const pl = players[cur];
  if(pl.done){ nextPlayer(); return; }
  renderChips();
  camCtl.overview = false; $('viewBtn').textContent='🗺️';
  camCtl.target.copy(pts[pl.pos]);
  marker.visible = true;
  const mp = pawnWorldPos(pl, pl.pos);
  marker.position.set(mp.x, 3.3, mp.z);
  marker.material.color.set(pl.color);
  if(pl.skip > 0){
    pl.skip--;
    showToast(`💤 ${esc(pl.name)} は おやすみ中…<br>1回パス！`);
    setTimeout(afterTurnLocal, 1900);
    return;
  }
  itemUsed = false; pendingUses.length = 0;
  showSpinFor(pl);
}
function nextPlayer(){
  cur = (cur+1) % players.length;
  startTurn();
}
function afterTurnLocal(){
  busy = false;
  const pl = players[cur];
  if(pl.fx.again && !pl.done){
    pl.fx.again = 0;
    showToast('🔁 もういちど じぶんの番！');
    setTimeout(startTurn, 1200);
    return;
  }
  pl.fx.again = 0;
  turnsSinceMgL++;
  const act = players.filter(p=>!p.done);
  if(act.length>=2 && turnsSinceMgL >= act.length){
    turnsSinceMgL = 0;
    runLocalMgRound().then(()=>setTimeout(nextPlayer, 300));
  }else{
    setTimeout(nextPlayer, 250);
  }
}
function endTurn(){
  if(MODE==='online'){
    const me = players[mySeat];
    const again = !!(me && me.fx.again && !me.done);
    if(me) me.fx.again = 0;
    commitTurn(turnLog, {again});
  }else{
    afterTurnLocal();
  }
}
async function runLocalMgRound(){
  const act = players.filter(p=>!p.done);
  const key = window.MG.KEYS[Math.floor(Math.random()*window.MG.KEYS.length)];
  const seed = (Math.random()*2147483647)|0;
  const scores = {};
  for(const p of act){
    await mgIntro(key, p.name, true);
    scores[p.idx] = await window.MG.play($('mgStage'), key, seed, MG_SFX);
    $('mgStage').innerHTML = `<div class="mg-big">${scores[p.idx]}てん！</div>`;
    await wait(1100);
  }
  hideMg();
  const seats = act.map(p=>p.idx);
  const best = Math.max(...seats.map(s=>scores[s]));
  const winners = seats.filter(s=>scores[s]===best && best>0);
  winners.forEach(s=>{ players[s].money += MG_PRIZE; });
  renderChips();
  await P(done=>showMgResultCard({key, scores, winners}, done));
}

/* ============================================================
   アイテム
   ============================================================ */
function renderItemBar(pl){
  const bar = $('itemBar');
  if(!pl.items.length){ bar.style.display='none'; return; }
  bar.style.display='flex';
  bar.innerHTML = pl.items.map((k,i)=>{
    const it = ITEMS[k];
    return `<div class="item-chip ${itemUsed?'dis':''}" data-i="${i}">
      <span class="ie">${it.e}</span><span class="in">${it.n}</span></div>`;
  }).join('');
  bar.querySelectorAll('.item-chip').forEach(el=>{
    el.onclick = ()=>confirmItem(pl, +el.dataset.i);
  });
}
function confirmItem(pl, idx){
  if(busy || itemUsed) return;
  const k = pl.items[idx]; const it = ITEMS[k];
  if(!it) return;
  showInfoCard(it.e, it.n, `${it.d}<br><br>つかう？`, null, [
    {label:'つかう！', cb:()=>useItem(pl, idx)},
    {label:'やめておく', ghost:true, cb:()=>{}},
  ]);
}
function useItem(pl, idx){
  const k = pl.items[idx];
  pl.items.splice(idx,1);
  itemUsed = true;
  turnLog = turnLog || [];
  if(k==='rocket'){
    pl.fx.rocket = 1;
    showToast('🚀 つぎのルーレットが ＋3！');
    turnLogPushUse(pl,'rocket');
    renderItemBar(pl); renderChips();
  }else if(k==='omamori'){
    pl.fx.shield = 1;
    showToast('🛡️ つぎの出費マスを むこうか！');
    turnLogPushUse(pl,'omamori');
    renderItemBar(pl); renderChips();
  }else if(k==='onemore'){
    pl.fx.again = 1;
    showToast('🔁 このターンのあと もういちど！');
    turnLogPushUse(pl,'onemore');
    renderItemBar(pl); renderChips();
  }else if(k==='letter'){
    const others = players.filter(q=>q.idx!==pl.idx && !q.done);
    if(others.length){
      const rich = others.reduce((a,b)=>a.money>=b.money?a:b);
      rich.money -= 5000; pl.money += 5000;
      showToast(`💌 ${esc(rich.name)} から ¥5,000 もらった！`);
      pendingUses.push({use:{seat:pl.idx, item:'letter', t:rich.idx}});
    }
    renderItemBar(pl); renderChips();
  }else if(k==='pitatto'){
    showNumberPicker(n=>{
      busy = true;
      hideSpin(); marker.visible=false;
      turnLog = [{use:{seat:pl.idx, item:'pitatto', n}}];
      showToast(`🎯 ピタッと！ ${n}マス すすむ`);
      setTimeout(()=>actorMove(pl, n, 0), 900);
    });
  }
}
function turnLogPushUse(pl, item){
  /* 移動前に使ったアイテムは、次のcommitのanimの先頭に積む */
  pendingUses.push({use:{seat:pl.idx, item}});
}
let pendingUses = [];
function showNumberPicker(cb){
  $('modal').innerHTML = `
    <div class="card">
      <span class="cat" style="background:#8e5df0">アイテム</span>
      <div class="emo">🎯</div>
      <div class="txt">なんマス すすむ？</div>
      <div class="numpick">${[1,2,3,4,5,6,7,8].map(n=>`<button data-n="${n}">${n}</button>`).join('')}</div>

    </div>`;

  });
  $('npCancel').onclick = ()=>{ $('modal').style.display='none'; itemUsed=false; const pl=players[cur]; pl.items.push('pitatto'); renderItemBar(pl); };
}

/* ============================================================
   ルーレット（SVG内で完結する真円・JSアニメ）
   ============================================================ */
const SEG = 8;
const SEG_COLORS = ['#ff8fb8','#ffd166','#7ec8ff','#8fe6a3','#c9a7ff','#ffb47a','#7fe0d8','#ff9d9d'];
(function buildWheel(){
  const svg = $('wheel');
  let segs = '';
  for(let i=0;i<SEG;i++){
    const a0 = (i/SEG)*Math.PI*2 - Math.PI/2 - Math.PI/SEG;
    const a1 = a0 + Math.PI*2/SEG;
    const x0 = 110+92*Math.cos(a0), y0 = 110+92*Math.sin(a0);
    const x1 = 110+92*Math.cos(a1), y1 = 110+92*Math.sin(a1);
    segs += `<path d="M110,110 L${x0},${y0} A92,92 0 0 1 ${x1},${y1} Z" fill="${SEG_COLORS[i]}"/>`;
    const am = (a0+a1)/2;
    const tx = 110+60*Math.cos(am), ty = 110+60*Math.sin(am);
    segs += `<text x="${tx}" y="${ty}" font-size="28" font-weight="900" fill="#fff" text-anchor="middle" dominant-baseline="central" transform="rotate(${(am+Math.PI/2)*180/Math.PI} ${tx} ${ty})">${i+1}</text>`;
  }
  svg.innerHTML = `
    <circle cx="110" cy="110" r="106" fill="#ffffff"/>
    <circle cx="110" cy="110" r="98" fill="#f3effb"/>
    <g id="wheelG">${segs}
      <circle cx="110" cy="110" r="17" fill="#fff"/>
      <text x="110" y="111" font-size="15" text-anchor="middle" dominant-baseline="central">🎲</text>
    </g>`;
})();
function runRoulette(result, done, bonus=0){
  const wrap = $('rouletteWrap');
  const g = document.getElementById('wheelG');
  const num = $('wheelNum');
  num.classList.remove('pop'); num.textContent = '';
  wrap.style.display = 'flex';
  $('rouletteHint').textContent = 'ルーレット回転中…';
  const final = 360*5 - (result-1)*(360/SEG) + (Math.random()*22-11);
  const dur = 3100, t0 = performance.now();
  let lastTickAt = 0, tickGap = 40;
  (function anim(){
    const k = Math.min(1, (performance.now()-t0)/dur);
    const e = 1 - Math.pow(1-k, 3);           // easeOutCubic
    g.setAttribute('transform', `rotate(${e*final} 110 110)`);
    if(performance.now()-lastTickAt > tickGap && k < 0.93){
      sTick(); lastTickAt = performance.now(); tickGap *= 1.09;
    }
    if(k < 1){ requestAnimationFrame(anim); return; }
    num.textContent = result;
    num.classList.add('pop');
    const total = result + bonus;
    $('rouletteHint').textContent = bonus ? `${result} ＋🚀${bonus} ＝ ${total} マスすすむ！` : `${result} マスすすむ！`;
    sCoin();
    setTimeout(()=>{ wrap.style.display = 'none'; done(); }, 1000);
  })();
}

$('spinBtn').onclick = ()=>{
  if(busy || !started) return;
  if(MODE==='online' && (!room || room.state.phase!=='play' || room.state.cur!==mySeat || room.state.minigame)) return;
  audio(); busy = true;
  hideSpin();
  marker.visible = false;
  const pl = players[cur];
  turnLog = pendingUses.splice(0);
  let result = 1 + Math.floor(Math.random()*SEG);
  let bonus = 0;
  if(pl.fx.rocket){ bonus = 3; pl.fx.rocket = 0; }
  turnLog.push({spin:{seat:pl.idx, n:result, b:bonus}});
  runRoulette(result, ()=>actorMove(pl, result+bonus, 0), bonus);
};

/* ============================================================
   移動・マス処理
   ============================================================ */
function animateHops(pl, from, to, done){
  if(from === to){ done(); return; }
  let pos = from;
  const dir = to > from ? 1 : -1;
  function hop(){
    const a = pawnWorldPos(pl, pos);
    pos += dir;
    const b = pawnWorldPos(pl, pos);
    const t0 = performance.now(), dur = 270;
    sHop();
    (function anim(){
      const k = Math.min(1, (performance.now()-t0)/dur);
      pl.pawn.position.lerpVectors(a, b, k);
      pl.pawn.position.y = 0.5 + Math.sin(k*Math.PI)*1.3;
      camCtl.target.lerp(pts[pos], 0.4);
      if(k < 1){ requestAnimationFrame(anim); }
      else{
        pl.pawn.position.copy(b);
        if(pos !== to) setTimeout(hop, 60);
        else setTimeout(done, 350);
      }
    })();
  }
  hop();
}
function actorMove(pl, steps, chain){
  const target = Math.max(0, Math.min(N-1, pl.pos + steps));
  if(target === pl.pos){ actorLanded(pl, chain); return; }
  turnLog.push({move:{seat:pl.idx, from:pl.pos, to:target}});
  animateHops(pl, pl.pos, target, ()=>{
    pl.pos = target;
    drawMinimap();
    actorLanded(pl, chain);
  });
}
function actorLanded(pl, chain){
  const tl = TILES[pl.pos];
  if(tl.t === 'goal'){
    goalCount++;
    pl.done = true; pl.goalOrder = goalCount;
    const bonus = GOAL_BONUS[goalCount-1] || 0;
    pl.money += bonus;
    turnLog.push({goal:{seat:pl.idx, order:goalCount, bonus}});
    sFanfare();
    renderChips(pl.idx);
    showGoalCard(pl, goalCount, bonus, endTurn);
    return;
  }
  if(tl.t === 'start'){ endTurn(); return; }
  if(tl.t === 'item'){
    const k = ITEM_KEYS[Math.floor(Math.random()*ITEM_KEYS.length)];
    if(pl.items.length >= 3) pl.items.shift();
    pl.items.push(k);
    turnLog.push({gift:{seat:pl.idx, item:k}});
    const it = ITEMS[k];
    sCoin();
    renderChips(pl.idx);
    showInfoCard('🎁', tl.x, `${it.e} <b>${it.n}</b><br><small>${it.d}</small>`, endTurn);
    return;
  }
  const shielded = tl.$ < 0 && pl.fx.shield;
  turnLog.push({card:{seat:pl.idx, idx:pl.pos, sh:shielded?1:0}});
  showTileCard(tl, ()=>{
    if(shielded){
      pl.fx.shield = 0;
      showToast('🛡️ おまもりで まもった！ 出費 0円');
    }else if(tl.$){
      pl.money += tl.$;
    }
    renderChips(pl.idx);
    if(tl.skip){ pl.skip = tl.skip; }
    if(tl.mv && chain < 3){
      setTimeout(()=>actorMove(pl, tl.mv, chain+1), 350);
      return;
    }
    endTurn();
  }, shielded);
}

/* ============================================================
   カード類
   ============================================================ */
function showTileCard(tl, cb, shielded=0){
  const [label, lcolor] = TYPE_LABEL[tl.t];
  const delta = tl.$ || 0;
  let deltaHtml = '';
  if(delta > 0) deltaHtml = `<div class="delta plus">＋¥${delta.toLocaleString('ja-JP')}</div>`;
  else if(delta < 0) deltaHtml = shielded
    ? `<div class="delta zero">🛡️ おまもりで 0円！</div>`
    : `<div class="delta minus">−¥${Math.abs(delta).toLocaleString('ja-JP')}</div>`;
  let subHtml = '';
  if(tl.mv) subHtml = `<div class="delta zero">${tl.mv>0?`🚶 ${tl.mv}マス すすむ`:`🔙 ${-tl.mv}マス もどる`}</div>`;
  if(tl.skip) subHtml = `<div class="delta zero">💤 1回休み</div>`;
  $('modal').innerHTML = `
    <div class="card">
      <span class="cat" style="background:${lcolor}">${label}</span>
      <div class="emo">${tl.e}</div>
      <div class="txt">${tl.x}</div>
      ${deltaHtml}${subHtml}
      <button class="ok" id="okBtn">OK</button>
    </div>`;
  $('modal').style.display = 'flex';
  if(tl.t==='lv') sLove(); else if(delta>0) sCoin(); else if(delta<0 && !shielded) sBad(); else sHop();
  $('okBtn').onclick = ()=>{ $('modal').style.display = 'none'; cb(); };
}
function showGoalCard(pl, order, bonus, cb){
  $('modal').innerHTML = `
    <div class="card">
      <span class="cat" style="background:#d8a800">ゴール</span>
      <div class="emo">👑</div>
      <div class="txt">${esc(pl?pl.name:'')} が <b>${order}位</b> でゴール！</div>
      <div class="delta plus">ゴールボーナス ＋¥${bonus.toLocaleString('ja-JP')}</div>
      <button class="ok" id="okBtn">やったー！</button>
    </div>`;
  $('modal').style.display = 'flex';
  $('okBtn').onclick = ()=>{ $('modal').style.display = 'none'; cb(); };
}
function showInfoCard(emo, title, html, cb, buttons){
  const btns = buttons || [{label:'OK', cb:cb||(()=>{})}];
  $('modal').innerHTML = `
    <div class="card">
      <div class="emo">${emo}</div>
      <div class="txt">${title}</div>
      <div class="delta zero" style="line-height:1.7;">${html}</div>
      ${btns.map((b,i)=>`<button class="${b.ghost?'ghost':'ok'}" data-b="${i}">${b.label}</button>`).join('')}
    </div>`;
  $('modal').style.display = 'flex';
  $('modal').querySelectorAll('[data-b]').forEach(el=>{
    el.onclick = ()=>{ $('modal').style.display='none'; const b=btns[+el.dataset.b]; b.cb&&b.cb(); };
  });
}

/* ============================================================
   結果発表
   ============================================================ */
function showResult(){
  resultShown = true;
  marker.visible = false;
  hideSpin(); $('turnBanner').style.display='none';
  applyOrientation();
  camCtl.overview = true;
  const order = [...players].sort((a,b)=>b.money-a.money);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  $('result').innerHTML = `
    <h1>けっか はっぴょう！</h1>
    ${order.map((p,i)=>`
      <div class="rank ${i===0?'first':''}" style="animation-delay:${0.4+i*0.35}s">
        <div class="pos">${medals[i]}</div>
        <div class="dot" style="background:${p.color}"></div>
        <div class="nm">${esc(p.name)}</div>
        <div class="yen">${fmt(p.money)}</div>
      </div>`).join('')}
    <button id="againBtn">もういちど あそぶ</button>`;
  $('result').style.display = 'flex';
  $('againBtn').onclick = ()=>{ clearSession(); location.reload(); };
  sFanfare(); setTimeout(sFanfare, 900);
  confetti();
}
function confetti(){
  const c = $('confetti'), g = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const ps = Array.from({length:120}, ()=>({
    x: Math.random()*c.width, y: -20 - Math.random()*c.height,
    w: 6+Math.random()*6, h: 8+Math.random()*8,
    v: 1.5+Math.random()*2.5, r: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.2,
    col: SEG_COLORS[Math.floor(Math.random()*SEG_COLORS.length)]
  }));
  let frames = 0;
  (function draw(){
    g.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      p.y += p.v; p.r += p.vr; p.x += Math.sin(p.y*0.02)*0.8;
      if(p.y > c.height+20){ p.y = -20; p.x = Math.random()*c.width; }
      g.save(); g.translate(p.x,p.y); g.rotate(p.r);
      g.fillStyle = p.col; g.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      g.restore();
    });
    if(++frames < 60*18) requestAnimationFrame(draw);
    else g.clearRect(0,0,c.width,c.height);
  })();
}

<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>

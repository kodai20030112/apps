<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>じんせいすごろく</title>
<link rel="apple-touch-icon" href="icons/icon-jinsei.png">
<meta name="apple-mobile-web-app-title" content="すごろく">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --pink:#ff9ad5; --blue:#4da3ff; --red:#ff6b6b; --yellow:#ffd166; --green:#5ed47a;
    --ink:#3b3354; --card:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#bfe7ff; color:var(--ink); touch-action:none; user-select:none;-webkit-user-select:none;
  }
  input{user-select:text;-webkit-user-select:text;}
  #cv{position:fixed;inset:0;display:block;}

  /* ===== タイトル / 設定 ===== */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#ffe3f3 0%,#dceeff 60%,#d8ffe6 100%);z-index:50;padding:24px;
    transition:opacity .5s;}
  .screen.hide{opacity:0;pointer-events:none;}
  .logo{font-size:min(42px, 10vw);font-weight:800;letter-spacing:2px;color:var(--ink);text-shadow:0 3px 0 #fff;white-space:nowrap;}
  .logo small{display:block;font-size:14px;font-weight:600;color:#8b7fa8;letter-spacing:6px;margin-bottom:6px;text-align:center;}
  .dice{font-size:64px;margin:10px 0 18px;animation:bob 2.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-10px) rotate(8deg)}}
  .panel{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-radius:24px;padding:20px;width:min(420px,100%);
    box-shadow:0 10px 30px rgba(80,60,120,.18);}
  .panel h2{font-size:15px;color:#8b7fa8;margin-bottom:12px;text-align:center;}
  .cnt-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
  .cnt-btn{flex:1;max-width:90px;padding:12px 0;border:2px solid #e6def5;border-radius:16px;background:#fff;
    font-size:17px;font-weight:700;color:#8b7fa8;}
  .cnt-btn.on{border-color:var(--pink);background:#fff0f8;color:#e0559f;}
  .name-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .name-dot{width:26px;height:26px;border-radius:50%;flex:none;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);}
  .name-row input{flex:1;font-size:16px;padding:11px 14px;border:2px solid #e6def5;border-radius:14px;outline:none;background:#fff;min-width:0;}
  .name-row input:focus{border-color:var(--blue);}
  .go-btn{display:block;width:100%;margin-top:14px;padding:16px;border:none;border-radius:18px;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);color:#fff;font-size:19px;font-weight:800;letter-spacing:2px;
    box-shadow:0 6px 16px rgba(160,90,220,.35);}
  .go-btn:active{transform:scale(.97);}
  .go-btn:disabled{opacity:.45;}
  .mode-btn{display:block;width:100%;margin-bottom:12px;padding:16px;border:2px solid #e6def5;border-radius:18px;
    background:#fff;font-size:17px;font-weight:800;color:var(--ink);text-align:center;}
  .mode-btn small{display:block;font-size:12px;font-weight:600;color:#8b7fa8;margin-top:4px;}
  .mode-btn:active{transform:scale(.97);border-color:var(--pink);}
  .sub-btn{display:block;width:100%;margin-top:10px;padding:14px;border:none;border-radius:16px;
    background:linear-gradient(135deg,#6fb6ff,#7a8cff);color:#fff;font-size:16px;font-weight:800;}
  .sub-btn:active{transform:scale(.97);}
  .sub-btn.pink{background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  .back-link{display:block;text-align:center;margin-top:14px;font-size:13px;font-weight:700;color:#8b7fa8;background:none;border:none;width:100%;}
  .joinrow{display:flex;gap:8px;margin-top:10px;}
  .joinrow input{flex:1;font-size:18px;padding:12px;border:2px solid #e6def5;border-radius:14px;outline:none;text-align:center;
    letter-spacing:6px;font-weight:800;min-width:0;}
  .divider{display:flex;align-items:center;gap:10px;color:#b6abd0;font-size:12px;font-weight:700;margin:16px 0 6px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:#e6def5;}

  /* ===== ロビー ===== */
  .room-code{font-size:52px;font-weight:900;letter-spacing:14px;text-align:center;color:#7a4ddb;margin:4px 0 2px;text-indent:14px;}
  .lobby-note{font-size:12.5px;color:#8b7fa8;font-weight:600;text-align:center;line-height:1.7;margin-bottom:14px;}
  .lobby-row{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #efe9fb;border-radius:14px;
    padding:10px 14px;margin-bottom:8px;font-weight:800;font-size:15px;}
  .lobby-row .dot{width:14px;height:14px;border-radius:50%;flex:none;}
  .lobby-row .you{margin-left:auto;font-size:11px;color:#fff;background:var(--pink);border-radius:999px;padding:2px 10px;}
  .lobby-row.empty{color:#c9c0de;border-style:dashed;font-weight:600;}
  #lobbyWaitMsg{text-align:center;font-size:14px;font-weight:700;color:#8b7fa8;margin-top:14px;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* ===== HUD ===== */
  #hud{position:fixed;top:0;left:0;right:0;z-index:20;display:none;padding:calc(env(safe-area-inset-top) + 8px) 10px 0;
    pointer-events:none;}
  #chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .chip{background:rgba(255,255,255,.92);border-radius:14px;padding:6px 10px;display:flex;align-items:center;gap:6px;
    box-shadow:0 3px 10px rgba(60,40,100,.15);border:2px solid transparent;transition:.25s;min-width:0;}
  .chip.cur{border-color:#ffb53e;background:#fffbe8;transform:translateY(2px);}
  .chip .dot{width:13px;height:13px;border-radius:50%;flex:none;}
  .chip .nm{font-size:12px;font-weight:700;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip .yen{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .chip .yen.minus{color:#e34a4a;}
  .chip.flash{animation:flash .6s;}
  @keyframes flash{0%{background:#fff3b8}100%{background:rgba(255,255,255,.92)}}
  .chip .goalmark{font-size:12px;}

  /* ===== 下部ボタン ===== */
  #bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;display:none;justify-content:center;
    padding:0 16px calc(env(safe-area-inset-bottom) + 16px);}
  #spinBtn{padding:16px 28px;border:none;border-radius:999px;font-size:18px;font-weight:800;color:#fff;letter-spacing:1px;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);box-shadow:0 8px 20px rgba(140,80,220,.4);
    display:flex;align-items:center;gap:10px;max-width:100%;white-space:nowrap;}
  @media (max-width:430px){
    #spinBtn{font-size:16px;padding:15px 18px;gap:8px;letter-spacing:0;}
    #spinBtn .who{font-size:13px;padding:4px 10px;max-width:34vw;}
    #turnBanner{font-size:14px;}
  }
  #spinBtn:active{transform:scale(.96);}
  #spinBtn .who{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);
    border-radius:999px;padding:4px 12px;font-size:14px;max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #spinBtn .who i{width:12px;height:12px;border-radius:50%;flex:none;}
  #spinBtn:disabled{display:none;}
  #turnBanner{display:none;padding:14px 26px;border-radius:999px;font-size:15px;font-weight:800;color:#6c5f8d;
    background:rgba(255,255,255,.92);box-shadow:0 6px 16px rgba(60,40,100,.18);white-space:nowrap;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;animation:pulse 1.8s infinite;}

  /* 右上小ボタン・部屋コードピル */
  #miniBtns{position:fixed;right:10px;top:calc(env(safe-area-inset-top) + 56px);z-index:21;display:none;flex-direction:column;gap:8px;align-items:flex-end;}
  .mini{width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.9);font-size:19px;
    box-shadow:0 3px 10px rgba(60,40,100,.2);}
  .mini:active{transform:scale(.92);}
  #codePill{display:none;background:rgba(255,255,255,.9);border-radius:999px;padding:5px 12px;font-size:11px;font-weight:800;
    color:#7a4ddb;box-shadow:0 3px 10px rgba(60,40,100,.2);}

  /* ===== ルーレット ===== */
  #rouletteWrap{position:fixed;inset:0;z-index:30;background:rgba(40,25,70,.45);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;flex-direction:column;}
  #wheelBox{position:relative;width:min(72vw,300px);height:min(72vw,300px);}
  #wheelBox .ptr{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:30px;z-index:2;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));}
  #wheel{width:100%;height:100%;border-radius:50%;box-shadow:0 0 0 10px #fff,0 14px 40px rgba(0,0,0,.35);}
  #wheelNum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:96px;font-weight:900;
    color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.25);opacity:0;transform:scale(.3);pointer-events:none;z-index:3;}
  #wheelNum.pop{animation:numpop .7s forwards;}
  @keyframes numpop{0%{opacity:0;transform:scale(.3)}55%{opacity:1;transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}
  #rouletteHint{margin-top:22px;color:#fff;font-weight:700;font-size:15px;text-shadow:0 2px 6px rgba(0,0,0,.4);}

  /* ===== イベントカード ===== */
  #modal{position:fixed;inset:0;z-index:35;background:rgba(40,25,70,.45);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--card);border-radius:26px;padding:26px 22px 20px;width:min(360px,100%);text-align:center;
    box-shadow:0 16px 50px rgba(0,0,0,.3);animation:cardin .4s cubic-bezier(.2,1.4,.4,1);}
  @keyframes cardin{from{transform:translateY(36px) scale(.85);opacity:0}to{transform:none;opacity:1}}
  .card .cat{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;padding:4px 14px;border-radius:999px;margin-bottom:10px;color:#fff;}
  .card .emo{font-size:58px;line-height:1.2;margin:4px 0;}
  .card .txt{font-size:16px;font-weight:700;line-height:1.7;margin:8px 0 4px;}
  .card .delta{font-size:26px;font-weight:900;margin:8px 0 2px;font-variant-numeric:tabular-nums;}
  .card .delta.plus{color:#1fa45c;} .card .delta.minus{color:#e34a4a;} .card .delta.zero{color:#8b7fa8;font-size:18px;}
  .card .ok{margin-top:14px;width:100%;padding:14px;border:none;border-radius:16px;font-size:17px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  .card .ok:active{transform:scale(.97);}

  /* ===== トースト ===== */
  #toast{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(.9);z-index:36;
    background:rgba(45,32,80,.88);color:#fff;font-size:17px;font-weight:700;padding:16px 26px;border-radius:20px;
    opacity:0;transition:.3s;pointer-events:none;text-align:center;line-height:1.6;max-width:84vw;}
  #toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

  /* ===== 結果 ===== */
  #result{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;flex-direction:column;
    background:linear-gradient(180deg,rgba(70,40,120,.92),rgba(30,20,60,.95));padding:24px;}
  #result h1{color:#ffd76a;font-size:30px;letter-spacing:3px;margin-bottom:18px;text-shadow:0 3px 0 rgba(0,0,0,.3);}
  .rank{background:rgba(255,255,255,.95);border-radius:20px;padding:14px 18px;width:min(360px,100%);margin-bottom:10px;
    display:flex;align-items:center;gap:12px;animation:cardin .5s both;}
  .rank .pos{font-size:26px;width:40px;text-align:center;}
  .rank .dot{width:16px;height:16px;border-radius:50%;flex:none;}
  .rank .nm{font-weight:800;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank .yen{font-weight:900;font-size:16px;font-variant-numeric:tabular-nums;}
  .rank.first{transform:scale(1.06);box-shadow:0 0 30px rgba(255,215,106,.6);}
  #againBtn{margin-top:16px;padding:15px 44px;border:none;border-radius:999px;font-size:17px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#ff7ac8,#a07aff);}
  #confetti{position:fixed;inset:0;z-index:41;pointer-events:none;}
</style>
</head>
<body>

<canvas id="cv"></canvas>

<!-- タイトル & 設定 -->
<div class="screen" id="title">
  <div class="logo"><small>FUTARI NO</small>じんせいすごろく</div>
  <div class="dice">🎲</div>
  <div class="panel" id="panel"></div>
</div>

<!-- オンライン ロビー -->
<div class="screen" id="lobby" style="display:none;">
  <div class="panel" id="lobbyPanel"></div>
</div>

<!-- HUD -->
<div id="hud"><div id="chips"></div></div>
<div id="miniBtns">
  <button class="mini" id="viewBtn" title="ぜんたいを見る">🗺️</button>
  <button class="mini" id="muteBtn" title="サウンド">🔊</button>
  <div id="codePill"></div>
</div>
<div id="bottom">
  <button id="spinBtn" disabled></button>
  <div id="turnBanner"></div>
</div>

<!-- ルーレット -->
<div id="rouletteWrap">
  <div id="wheelBox">
    <div class="ptr">🔻</div>
    <svg id="wheel" viewBox="0 0 200 200"></svg>
    <div id="wheelNum"></div>
  </div>
  <div id="rouletteHint">ルーレット回転中…</div>
</div>

<!-- イベントカード -->
<div id="modal"></div>
<div id="toast"></div>

<!-- 結果 -->
<div id="result"></div>
<canvas id="confetti"></canvas>

<script>
/* テスト専用（?sbtest=1）：iframe同居のテスト環境では描画ループ(rAF)が止まることがあるためタイマーで代替。実機では無効 */
if(new URLSearchParams(location.search).get('sbtest')==='1'){
  window.requestAnimationFrame = cb => setTimeout(()=>cb(performance.now()), 33);
}
</script>

async function sbGetRoom(code){
  const r = await fetch(`${SB_URL}/rest/v1/jinsei_rooms?code=eq.${encodeURIComponent(code)}&select=state`, {headers:SBH});
  if(r.status === 404) throw new TableMissing();
  if(!r.ok) throw new Error('get '+r.status);
  const j = await r.json();
  return j.length ? j[0].state : null;

async function sbInsert(code, state){
  const r = await fetch(`${SB_URL}/rest/v1/jinsei_rooms`, {method:'POST',
    headers:{...SBH, Prefer:'return=minimal'}, body: JSON.stringify({code, state})});
  if(r.status === 404) throw new TableMissing();
  if(r.status === 409) return false;                 // コード衝突 → 取り直し
  if(!r.ok) throw new Error('insert '+r.status);
  return true;
}
async function sbCas(code, expectV, state){
  /* 楽観ロック（＝「自分が読んだ版のままなら書く」方式）。state->>v が一致した行だけ更新 */
  const r = await fetch(`${SB_URL}/rest/v1/jinsei_rooms?code=eq.${encodeURIComponent(code)}&state->>v=eq.${expectV}`,
    {method:'PATCH', headers:{...SBH, Prefer:'return=representation'},
     body: JSON.stringify({state, updated_at: new Date().toISOString()})});
  if(r.status === 404) throw new TableMissing();
  if(!r.ok) throw new Error('patch '+r.status);
  const j = await r.json().catch(()=>[]);
  return Array.isArray(j) && j.length > 0;
}

async function casMutate(mut){
  for(let i=0; i<6; i++){
    const cur = room.state;
    const next = JSON.parse(JSON.stringify(cur));
    if(mut(next) === false) return null;
    next.v = cur.v + 1;
    if(await sbCas(room.code, cur.v, next)){ return next; }
    const fresh = await sbGetRoom(room.code);   // 競合 → 最新を読み直して再挑戦
    if(fresh) room.state = fresh;
  }
  throw new Error('conflict');
}

function connectRealtime(code){
  try{
    if(!window.supabase || SB_TEST) return;   // テスト時はポーリングのみ
    sbClient = sbClient || window.supabase.createClient(SB_URL, SB_KEY);
    channel = sbClient.channel('jinsei-'+code)
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'jinsei_rooms', filter:'code=eq.'+code},
        p => { if(p.new && p.new.state) onRemote(p.new.state); })
      .subscribe();
  }catch(e){ /* ポーリングが保険として動く */ }
}

function onRemote(s){
  if(!room || !s || typeof s.v !== 'number') return;
  const maxv = Math.max(room.state.v, ...inbox.map(x=>x.v), 0);
  if(s.v <= maxv) return;
  inbox.push(s);
  pump();
}
async function pump(){
  if(processing) return; processing = true;
  try{
    while(inbox.length){
      const s = inbox.shift();
      if(!room || s.v <= room.state.v) continue;
      const prev = room.state;
      const canReplay = started && prev.phase === 'play' && s.last && s.last.by !== mySeat && s.v === prev.v + 1;
      if(canReplay) await replayTurn(s);
      enterState(s);
    }
  } finally { processing = false; }
}

function beep(freq, dur=0.07, type='sine', vol=0.18, when=0){
  if(!actx || muted) return;
  const t = actx.currentTime + when;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
}

/* ============================================================
   ローカルモード開始
   ============================================================ */
function buildPlayers(names, posArr=null){
  players = names.map((name,i)=>{
    const pawn = makePawn(new THREE.Color(PLAYER_COLORS[i]));
    const pl = {idx:i, name, color:PLAYER_COLORS[i], money:START_MONEY, pos:(posArr?posArr[i]:0), skip:0, done:false, goalOrder:0, pawn};
    pawn.position.copy(pawnWorldPos(pl, pl.pos));
    scene.add(pawn);
    return pl;
  });
}
function showGameUI(){
  $('title').classList.add('hide');
  $('lobby').style.display='none';
  $('hud').style.display='block';
  $('miniBtns').style.display='flex';
  $('bottom').style.display='flex';
}
function startLocalGame(){
  audio();
  const names = [...document.querySelectorAll('#nameRows input')].map((inp,i)=> inp.value.trim() || DEFAULT_NAMES[i]);
  buildPlayers(names);
  showGameUI();
  renderChips();
  sFanfare();
  camCtl.target.copy(pts[0]); camLerp = 0.03;
  setTimeout(()=>{ camLerp = 0.06; }, 2200);
  started = true;
  setTimeout(startTurn, 1500);
}

/* ============================================================
   オンライン：部屋の作成 / 参加 / ロビー
   ============================================================ */
function freshSeatState(name, cid, seat){
  return {name, cid, seat, money:START_MONEY, pos:0, skip:0, done:false, goalOrder:0};
}
function onlineError(e){
  if(e instanceof TableMissing){
    showToast('🛠️ オンライン機能は じゅんびちゅう…<br><small>（Supabaseで jinsei_rooms.sql の実行が必要です）</small>', 3400);
  }else{
    showToast('⚠️ つうしんエラー…<br>でんぱの良いところで もういちど', 2400);
  }
}
async function createRoom(){
  const name = ($('onName').value.trim() || 'こうだい').slice(0,8);
  myName = name; myCid = Math.random().toString(36).slice(2,10);
  const state = {v:1, phase:'lobby', players:[freshSeatState(name, myCid, 0)], cur:0, goalCount:0, last:null};
  try{
    let code = null;
    for(let i=0;i<8;i++){
      const c = String(1000 + Math.floor(Math.random()*9000));
      if(await sbInsert(c, state)){ code = c; break; }
    }
    if(!code){ showToast('⚠️ へやが つくれなかった…もういちど'); return; }
    room = {code, state};
    mySeat = 0;
    saveSession();
    connectRealtime(code);
    showLobby();
  }catch(e){ onlineError(e); }
}
async function joinRoom(){
  const code = ($('joinCode').value||'').trim();
  if(!/^\d{4}$/.test(code)){ showToast('4けたの へやコードを入れてね'); return; }
  const name = ($('onName').value.trim() || 'ゆずは').slice(0,8);
  try{
    const s = await sbGetRoom(code);
    if(!s){ showToast('🔍 そのへやは 見つからないよ'); return; }
    if(s.phase !== 'lobby'){
      /* 開始済み → 同じ名前のプレイヤーがいれば再接続として入る */
      const seat = s.players.findIndex(p=>p.name===name);
      if(seat >= 0){
        myName = name; myCid = s.players[seat].cid; mySeat = seat;
        room = {code, state:{v:0}};
        saveSession(); connectRealtime(code);
        enterState(s);
        return;
      }
      showToast('このへやは もうスタートしてるよ'); return;
    }
    if(s.players.length >= 4){ showToast('このへやは まんいん…'); return; }
    myName = name; myCid = Math.random().toString(36).slice(2,10);
    room = {code, state:s};
    const next = await casMutate(st=>{
      if(st.phase!=='lobby' || st.players.length>=4) return false;
      st.players.push(freshSeatState(name, myCid, st.players.length));
    });
    if(!next){ showToast('はいれなかった…もういちど'); room=null; return; }
    room.state = next;
    mySeat = next.players.findIndex(p=>p.cid===myCid);
    saveSession();
    connectRealtime(code);
    showLobby();
  }catch(e){ onlineError(e); room = null; }
}
async function resumeSession(saved){
  try{
    const s = await sbGetRoom(saved.code);
    if(!s || s.phase==='end'){ clearSession(); showToast('まえのゲームは おわってたよ'); vModeSelect(); return; }
    const seat = s.players.findIndex(p=>p.cid===saved.cid);
    if(seat < 0){ clearSession(); showToast('まえのゲームには もどれなかった…'); vModeSelect(); return; }
    MODE='online'; mySeat=seat; myName=s.players[seat].name; myCid=saved.cid;
    room = {code:saved.code, state:{v:0}};
    connectRealtime(saved.code);
    enterState(s);
  }catch(e){ onlineError(e); }
}
function showLobby(){
  $('title').classList.add('hide');
  $('lobby').style.display='flex';
  renderLobby();
}
function renderLobby(){
  if(!room || room.state.phase!=='lobby') return;
  const s = room.state;
  const isHost = mySeat===0;
  const rows = [];
  for(let i=0;i<4;i++){
    const p = s.players[i];
    if(p) rows.push(`<div class="lobby-row"><div class="dot" style="background:${PLAYER_COLORS[i]}"></div>${esc(p.name)}${i===mySeat?'<span class="you">あなた</span>':''}</div>`);
    else  rows.push(`<div class="lobby-row empty">… まちあわせちゅう …</div>`);
  }
  $('lobbyPanel').innerHTML = `
    <h2>へやコード</h2>
    <div class="room-code">${esc(room.code)}</div>
    <div class="lobby-note">あいてのスマホで「べつべつのスマホで」→<br>この4けたを入力すると 入ってこられるよ</div>
    ${rows.join('')}
    ${isHost
      ? `<button class="go-btn" id="lobbyStart" ${s.players.length<2?'disabled':''}>スタート！${s.players.length<2?'（2人いれば押せるよ）':''}</button>`
      : `<div id="lobbyWaitMsg">ホストのスタートを まってるよ…</div>`}
    <button class="back-link" id="lobbyLeave">‹ やめる</button>`;
  if(isHost) $('lobbyStart').onclick = async ()=>{
    audio();
    try{
      const next = await casMutate(st=>{
        if(st.phase!=='lobby' || st.players.length<2) return false;
        st.phase='play'; st.cur=0;
      });
      if(next) enterState(next);
    }catch(e){ onlineError(e); }
  };
  $('lobbyLeave').onclick = ()=>{ clearSession(); location.reload(); };
}

/* ============================================================
   オンライン：状態の適用・手番UI・リプレイ
   ============================================================ */
function beginOnlineGame(){
  buildPlayers(room.state.players.map(p=>p.name), room.state.players.map(p=>p.pos));
  showGameUI();
  $('codePill').style.display='block';
  $('codePill').textContent = 'へや ' + room.code;
  sFanfare();
  camCtl.target.copy(pts[players[mySeat].pos]); camLerp = 0.03;
  setTimeout(()=>{ camLerp = 0.06; }, 2200);
  started = true;
}
function syncFromState(){
  const s = room.state;
  goalCount = s.goalCount;
  cur = s.cur;
  s.players.forEach((sp,i)=>{
    const p = players[i]; if(!p) return;
    p.money=sp.money; p.skip=sp.skip; p.done=sp.done; p.goalOrder=sp.goalOrder;
    if(p.pos!==sp.pos){ p.pos=sp.pos; p.pawn.position.copy(pawnWorldPos(p,p.pos)); }
  });
}
function enterState(s){
  room.state = s;
  if(s.phase==='lobby'){ renderLobby(); return; }
  if(!started) beginOnlineGame();
  syncFromState();
  renderChips();
  if(s.phase==='end'){
    clearSession();
    if(!resultShown) showResult();
    return;
  }
  prepareTurnUI();
}
function prepareTurnUI(){
  const s = room.state;
  renderChips();
  camCtl.overview=false; $('viewBtn').textContent='🗺️';
  const plc = players[s.cur];
  camCtl.target.copy(pts[plc.pos]);
  const mp = pawnWorldPos(plc, plc.pos);
  marker.visible = true;
  marker.position.set(mp.x, 2.6, mp.z);
  marker.material.color.set(plc.color);
  if(s.cur === mySeat){
    const me = players[mySeat];
    if(me.skip > 0){
      showBanner('💤 おやすみ しょうかちゅう…');
      showToast(`💤 ${esc(me.name)} は おやすみ中…<br>1回パス！`);
      me.skip--;
      setTimeout(()=>commitTurn([{sleep:{seat:mySeat}}]), 1900);
      return;
    }
    showSpinFor(me);
  }else{
    showBanner(`🎲 ${esc(plc.name)} のばん…`);
  }
}
function advanceCur(st){
  if(st.players.every(p=>p.done)){ st.phase='end'; return; }
  let c = st.cur;
  do{ c = (c+1) % st.players.length; }while(st.players[c].done);
  st.cur = c;
}
async function commitTurn(anim){
  try{
    const next = await casMutate(st=>{
      players.forEach((p,i)=>{
        const sp = st.players[i];
        sp.money=p.money; sp.pos=p.pos; sp.skip=p.skip; sp.done=p.done; sp.goalOrder=p.goalOrder;
      });
      st.goalCount = goalCount;
      advanceCur(st);
      st.last = {by:mySeat, anim};
    });
    busy = false;
    if(next) enterState(next);
  }catch(e){
    busy = false;
    if(e instanceof TableMissing) onlineError(e);
    else showToast('⚠️ つうしんエラー…<br>でんぱの良いところで もういちど', 2600);
    prepareTurnUI();
  }
}
async function replayTurn(s){
  const anim = (s.last && s.last.anim) || [];
  const actorName = players[s.last.by] ? players[s.last.by].name : '';
  marker.visible = false;
  for(const step of anim){
    if(step.spin){
      showBanner(`🎲 ${esc(actorName)} がルーレット…`);
      await P(done=>runRoulette(step.spin.n, done));
    }else if(step.move){
      const p = players[step.move.seat]; if(!p) continue;
      await P(done=>animateHops(p, step.move.from, step.move.to, done));
      p.pos = step.move.to;
    }else if(step.card){
      const tl = TILES[step.card.idx]; const p = players[step.card.seat];
      await P(done=>showTileCard(tl, done));
      if(p && tl.$){ p.money += tl.$; renderChips(p.idx); }
    }else if(step.sleep){
      const p = players[step.sleep.seat];
      showToast(`💤 ${esc(p?p.name:'')} は おやすみ…<br>1回パス！`);
      await wait(1900);
    }else if(step.goal){
      const p = players[step.goal.seat];
      sFanfare();
      if(p){ p.money += 0; }
      await P(done=>showGoalCard(p, step.goal.order, step.goal.bonus, done));
      if(p){ renderChips(p.idx); }
    }
  }
}

/* ============================================================
   ローカルモードのターン進行
   ============================================================ */
function startTurn(){
  if(players.every(p=>p.done)){ showResult(); return; }
  const pl = players[cur];
  if(pl.done){ nextPlayer(); return; }
  renderChips();
  camCtl.overview = false; $('viewBtn').textContent='🗺️';
  camCtl.target.copy(pts[pl.pos]);
  marker.visible = true;
  const mp = pawnWorldPos(pl, pl.pos);
  marker.position.set(mp.x, 2.6, mp.z);
  marker.material.color.set(pl.color);
  if(pl.skip > 0){
    pl.skip--;
    showToast(`💤 ${esc(pl.name)} は おやすみ中…<br>1回パス！`);
    setTimeout(nextPlayer, 1900);
    return;
  }
  showSpinFor(pl);
}
function nextPlayer(){
  cur = (cur+1) % players.length;
  startTurn();
}
function endTurn(){
  if(MODE==='online'){ commitTurn(turnLog); }
  else { busy = false; setTimeout(nextPlayer, 250); }
}

/* ============================================================
   ルーレット（1〜8）
   ============================================================ */
const SEG = 8;
const SEG_COLORS = ['#ff8fb8','#ffd166','#7ec8ff','#8fe6a3','#c9a7ff','#ffb47a','#7fe0d8','#ff9d9d'];
(function buildWheel(){
  const svg = $('wheel');
  let s = '';
  for(let i=0;i<SEG;i++){
    const a0 = (i/SEG)*Math.PI*2 - Math.PI/2 - Math.PI/SEG;
    const a1 = a0 + Math.PI*2/SEG;
    const x0 = 100+96*Math.cos(a0), y0 = 100+96*Math.sin(a0);
    const x1 = 100+96*Math.cos(a1), y1 = 100+96*Math.sin(a1);
    s += `<path d="M100,100 L${x0},${y0} A96,96 0 0 1 ${x1},${y1} Z" fill="${SEG_COLORS[i]}"/>`;
    const am = (a0+a1)/2;
    const tx = 100+62*Math.cos(am), ty = 100+62*Math.sin(am);
    s += `<text x="${tx}" y="${ty}" font-size="30" font-weight="900" fill="#fff" text-anchor="middle" dominant-baseline="central" transform="rotate(${(am+Math.PI/2)*180/Math.PI} ${tx} ${ty})">${i+1}</text>`;
  }
  s += `<circle cx="100" cy="100" r="18" fill="#fff"/><text x="100" y="101" font-size="16" text-anchor="middle" dominant-baseline="central">🎲</text>`;
  svg.innerHTML = s;
})();

function runRoulette(result, done){
  const wrap = $('rouletteWrap');
  const wheel = $('wheel');
  const num = $('wheelNum');
  num.classList.remove('pop'); num.textContent = '';
  wrap.style.display = 'flex';
  $('rouletteHint').textContent = 'ルーレット回転中…';
  wheel.style.transition = 'none';
  wheel.style.transform = 'rotate(0deg)';
  void wheel.getBoundingClientRect();
  const final = 360*5 - (result-1)*(360/SEG) + (Math.random()*24-12);
  wheel.style.transition = 'transform 3.1s cubic-bezier(.12,.67,.08,1)';
  wheel.style.transform = `rotate(${final}deg)`;
  let delay = 40;
  (function tickLoop(elapsed){
    if(elapsed > 2700) return;
    sTick();
    delay *= 1.13;
    setTimeout(()=>tickLoop(elapsed+delay), delay);
  })(0);
  setTimeout(()=>{
    num.textContent = result;
    num.classList.add('pop');
    $('rouletteHint').textContent = `${result} マスすすむ！`;
    sCoin();
    setTimeout(()=>{ wrap.style.display = 'none'; done(); }, 950);
  }, 3250);
}

$('spinBtn').onclick = ()=>{
  if(busy || !started) return;
  if(MODE==='online' && (!room || room.state.phase!=='play' || room.state.cur!==mySeat)) return;
  audio(); busy = true;
  hideSpin();
  marker.visible = false;
  const pl = players[cur];
  turnLog = [];
  const result = 1 + Math.floor(Math.random()*SEG);
  turnLog.push({spin:{seat:pl.idx, n:result}});
  runRoulette(result, ()=>actorMove(pl, result, 0));
};

/* ============================================================
   コマ移動（1マスずつぴょこぴょこ）
   ============================================================ */
function animateHops(pl, from, to, done){
  if(from === to){ done(); return; }
  let pos = from;
  const dir = to > from ? 1 : -1;
  function hop(){
    const a = pawnWorldPos(pl, pos);
    pos += dir;
    const b = pawnWorldPos(pl, pos);
    const t0 = performance.now(), dur = 270;
    sHop();
    (function anim(){
      const k = Math.min(1, (performance.now()-t0)/dur);
      pl.pawn.position.lerpVectors(a, b, k);
      pl.pawn.position.y = 0.5 + Math.sin(k*Math.PI)*1.3;
      camCtl.target.lerp(pts[pos], 0.4);
      if(k < 1){ requestAnimationFrame(anim); }
      else{
        pl.pawn.position.copy(b);
        if(pos !== to) setTimeout(hop, 60);
        else setTimeout(done, 350);
      }
    })();
  }
  hop();
}
function actorMove(pl, steps, chain){
  const target = Math.max(0, Math.min(N-1, pl.pos + steps));
  if(target === pl.pos){ actorLanded(pl, chain); return; }
  turnLog.push({move:{seat:pl.idx, from:pl.pos, to:target}});
  animateHops(pl, pl.pos, target, ()=>{
    pl.pos = target;
    actorLanded(pl, chain);
  });
}

/* ============================================================
   マス到着 → イベント
   ============================================================ */
function actorLanded(pl, chain){
  const tl = TILES[pl.pos];
  if(tl.t === 'goal'){
    goalCount++;
    pl.done = true; pl.goalOrder = goalCount;
    const bonus = GOAL_BONUS[goalCount-1] || 0;
    pl.money += bonus;
    turnLog.push({goal:{seat:pl.idx, order:goalCount, bonus}});
    sFanfare();
    renderChips(pl.idx);
    showGoalCard(pl, goalCount, bonus, endTurn);
    return;
  }
  if(tl.t === 'start'){ endTurn(); return; }
  turnLog.push({card:{seat:pl.idx, idx:pl.pos}});
  showTileCard(tl, ()=>{
    if(tl.$){ pl.money += tl.$; renderChips(pl.idx); }
    if(tl.skip){ pl.skip = tl.skip; }
    if(tl.mv && chain < 3){
      setTimeout(()=>actorMove(pl, tl.mv, chain+1), 350);
      return;
    }
    endTurn();
  });
}

function showTileCard(tl, cb){
  const [label, lcolor] = TYPE_LABEL[tl.t];
  const delta = tl.$ || 0;
  let deltaHtml = '';
  if(delta > 0) deltaHtml = `<div class="delta plus">＋¥${delta.toLocaleString('ja-JP')}</div>`;
  else if(delta < 0) deltaHtml = `<div class="delta minus">−¥${Math.abs(delta).toLocaleString('ja-JP')}</div>`;
  let subHtml = '';
  if(tl.mv) subHtml = `<div class="delta zero">${tl.mv>0?`🚶 ${tl.mv}マス すすむ`:`🔙 ${-tl.mv}マス もどる`}</div>`;
  if(tl.skip) subHtml = `<div class="delta zero">💤 1回休み</div>`;
  $('modal').innerHTML = `
    <div class="card">
      <span class="cat" style="background:${lcolor}">${label}</span>
      <div class="emo">${tl.e}</div>
      <div class="txt">${tl.x}</div>
      ${deltaHtml}${subHtml}
      <button class="ok" id="okBtn">OK</button>
    </div>`;
  $('modal').style.display = 'flex';
  if(tl.t==='lv') sLove(); else if(delta>0) sCoin(); else if(delta<0) sBad(); else sHop();
  $('okBtn').onclick = ()=>{
    $('modal').style.display = 'none';
    cb();
  };
}
function showGoalCard(pl, order, bonus, cb){
  $('modal').innerHTML = `
    <div class="card">
      <span class="cat" style="background:#d8a800">ゴール</span>
      <div class="emo">👑</div>
      <div class="txt">${esc(pl?pl.name:'')} が <b>${order}位</b> でゴール！</div>
      <div class="delta plus">ゴールボーナス ＋¥${bonus.toLocaleString('ja-JP')}</div>
      <button class="ok" id="okBtn">やったー！</button>
    </div>`;
  $('modal').style.display = 'flex';
  $('okBtn').onclick = ()=>{
    $('modal').style.display = 'none';
    cb();
  };
}

/* ============================================================
   結果発表
   ============================================================ */
function showResult(){
  resultShown = true;
  marker.visible = false;
  $('bottom').style.display = 'none';
  camCtl.overview = true;
  const order = [...players].sort((a,b)=>b.money-a.money);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  $('result').innerHTML = `
    <h1>けっか はっぴょう！</h1>
    ${order.map((p,i)=>`
      <div class="rank ${i===0?'first':''}" style="animation-delay:${0.4+i*0.35}s">
        <div class="pos">${medals[i]}</div>
        <div class="dot" style="background:${p.color}"></div>
        <div class="nm">${esc(p.name)}</div>
        <div class="yen">${fmt(p.money)}</div>
      </div>`).join('')}
    <button id="againBtn">もういちど あそぶ</button>`;
  $('result').style.display = 'flex';
  $('againBtn').onclick = ()=>{ clearSession(); location.reload(); };
  sFanfare(); setTimeout(sFanfare, 900);
  confetti();
}

/* 紙吹雪 */
function confetti(){
  const c = $('confetti'), g = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const ps = Array.from({length:120}, ()=>({
    x: Math.random()*c.width, y: -20 - Math.random()*c.height,
    w: 6+Math.random()*6, h: 8+Math.random()*8,
    v: 1.5+Math.random()*2.5, r: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.2,
    col: SEG_COLORS[Math.floor(Math.random()*SEG_COLORS.length)]
  }));
  let frames = 0;
  (function draw(){
    g.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      p.y += p.v; p.r += p.vr; p.x += Math.sin(p.y*0.02)*0.8;
      if(p.y > c.height+20){ p.y = -20; p.x = Math.random()*c.width; }
      g.save(); g.translate(p.x,p.y); g.rotate(p.r);
      g.fillStyle = p.col; g.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      g.restore();
    });
    if(++frames < 60*18) requestAnimationFrame(draw);
    else g.clearRect(0,0,c.width,c.height);
  })();
}
</script>
<!-- tsumiki-back-button -->
<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>チェックルーム</title>
<link rel="apple-touch-icon" href="icons/icon-check.png">
<meta name="apple-mobile-web-app-title" content="チェック">
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#f4f6fa;color:#1c2433;
  padding:calc(env(safe-area-inset-top,0px) + 28px) 18px 48px;min-height:100vh}
h1{font-size:22px;margin-bottom:4px}
.sub{font-size:13px;color:#6b7689;margin-bottom:22px}
.list{display:flex;flex-direction:column;gap:12px}
.card{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:#fff;border-radius:16px;padding:16px 18px;text-decoration:none;color:inherit;
  box-shadow:0 1px 4px rgba(20,30,60,.08)}
.card:active{transform:scale(.98)}
.t{font-size:17px;font-weight:700}
.s{font-size:12px;color:#8a93a5;margin-top:4px}
.ch{font-size:22px;color:#c2c9d6}
.empty{text-align:center;color:#8a93a5;font-size:15px;padding:64px 0}
.hint{font-size:13px;color:#6b7689;line-height:1.9;margin-top:26px}
#reloadBtn{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
  width:56px;height:56px;border:none;border-radius:50%;cursor:pointer;padding:0;
  background:#54648c;color:#fff;
  box-shadow:0 4px 14px rgba(20,30,60,.28);
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s ease}
#reloadBtn svg{width:26px;height:26px;display:block}
#reloadBtn:active{transform:scale(.9)}
#reloadBtn.spin svg{animation:reloadSpin .55s ease}
@keyframes reloadSpin{to{transform:rotate(360deg)}}
@media(prefers-color-scheme:dark){
  body{background:#11151d;color:#e8ecf4}
  .card{background:#1c2230;box-shadow:none}
  .sub,.s,.empty,.hint{color:#8d97ab}
}
</style>
</head>
<body>
<h1>🔍 チェックルーム</h1>
<p class="sub">公開前のアプリをここで実機チェックできます</p>
<div class="list"><a class="card" href="check-forecast.html"><div><div class="t">資産予測グラフ</div><div class="s">check-forecast.html ・ 6/11 21:42 更新</div></div><div class="ch">›</div></a>
<a class="card" href="check-money.html"><div><div class="t">お金の残高 計算ツール</div><div class="s">check-money.html ・ 6/11 21:42 更新</div></div><div class="ch">›</div></a></div>
<p class="hint">✅ 確認できたら Claude に「OK、公開して」と伝えてください。<br>🔧 直したい点があれば、そのまま言葉で伝えてもらえれば修正します。</p>
<button id="reloadBtn" aria-label="最新に更新" title="最新に更新"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg></button>
<script>
document.getElementById('reloadBtn').addEventListener('click', function(){
  this.classList.add('spin');
  setTimeout(function(){ location.reload(true); }, 420);
});
</script>
<!-- tsumiki-back-button -->
<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>
</html>

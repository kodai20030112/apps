<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="icons/icon-tsugi.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="つぎいつ？">
<meta name="theme-color" content="#f5f5f7">
<title>つぎいつ？</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --sub: #6e6e73;
    --line: #e3e3e6;
    --blue: #0071e3;
    --blue-soft: #eaf3fe;
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --chip: #f0f0f2;
    --accent: #15a892;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(96px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }

  /* ===== ヘッダー ===== */
  header.app { text-align: center; padding: 22px 16px 8px; position: relative; }
  header.app .logo { font-size: 30px; line-height: 1; }
  header.app h1 { font-size: 22px; font-weight: 600; margin: 6px 0 2px; letter-spacing: .01em; }
  header.app .tagline { color: var(--sub); font-size: 12.5px; }
  .sync { color: var(--sub); font-size: 11.5px; margin-top: 4px; min-height: 14px; }

  /* ===== 通知バナー ===== */
  .notify-banner {
    background: var(--blue-soft); border: 1px solid #cfe4fb; border-radius: 14px;
    padding: 12px 14px; margin: 12px 0 4px; display: flex; align-items: center; gap: 12px;
  }
  .notify-banner .nb-txt { flex: 1; min-width: 0; }
  .notify-banner .nb-title { font-size: 13.5px; font-weight: 600; }
  .notify-banner .nb-desc { font-size: 11.5px; color: var(--sub); margin-top: 1px; }
  .notify-banner button {
    flex: 0 0 auto; background: var(--blue); color: #fff; border: none;
    border-radius: 999px; font-size: 13px; font-weight: 600; padding: 8px 14px;
    font-family: inherit; cursor: pointer;
  }
  .notify-banner button:active { opacity: .7; }
  .notify-banner.ok { background: #eafaf0; border-color: #c7eed6; }
  .notify-banner.ok button { background: var(--green); }

  /* ===== リスト ===== */
  .list { margin-top: 12px; display: flex; flex-direction: column; gap: 12px; }
  .item {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); display: flex; align-items: center; gap: 13px;
    cursor: pointer; border: 1px solid transparent;
  }
  .item:active { background: #fafafa; }
  .item.overdue { border-color: #ffd9d6; }
  .item .emoji {
    flex: 0 0 auto; width: 44px; height: 44px; border-radius: 12px;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .item .body { flex: 1; min-width: 0; }
  .item .name {
    font-size: 15.5px; font-weight: 600; letter-spacing: .01em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .item .meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .item .right { flex: 0 0 auto; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .item .count { font-size: 13px; font-weight: 700; letter-spacing: .01em; white-space: nowrap; }
  .item .count.soon { color: var(--orange); }
  .item .count.over { color: var(--red); }
  .item .count.far { color: var(--text); }
  .item .done-btn {
    background: var(--chip); color: var(--text); border: none; border-radius: 999px;
    font-size: 12px; font-weight: 600; padding: 6px 11px; font-family: inherit; cursor: pointer;
    white-space: nowrap;
  }
  .item .done-btn:active { background: #e3e3e6; }
  .item.booking { border-color: #b9e7df; background: #f4fcfa; }
  .item .book-note { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 3px; }
  .item .booked-chip { display: inline-block; font-size: 11px; font-weight: 600; color: var(--accent);
    background: #e7f7f3; border-radius: 999px; padding: 2px 8px; margin-top: 3px; cursor: pointer; }
  .item .booked-chip:active { background: #d5f0e9; }
  .item .book-btn { background: var(--accent); color: #fff; }
  .item .book-btn:active { background: #128a78; }

  /* ===== 空状態 ===== */
  .empty { text-align: center; color: var(--sub); padding: 48px 20px; }
  .empty .ee { font-size: 40px; }
  .empty p { font-size: 14px; margin-top: 12px; }

  /* ===== 追加ボタン（固定） ===== */
  .fab {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 20;
    background: var(--accent); color: #fff; border: none; border-radius: 999px;
    font-size: 15px; font-weight: 600; padding: 14px 24px; font-family: inherit; cursor: pointer;
    box-shadow: 0 6px 20px rgba(21,168,146,.38); display: inline-flex; align-items: center; gap: 7px;
  }
  .fab:active { transform: translateX(-50%) scale(.97); }

  /* ===== フォーム（シート） ===== */
  .sheet-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.32); z-index: 30;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .sheet-bg.show { opacity: 1; pointer-events: auto; }
  .sheet {
    background: var(--card); width: 100%; max-width: 640px;
    border-radius: 22px 22px 0 0; padding: 8px 20px calc(28px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .25s cubic-bezier(.2,.8,.2,1);
    max-height: 92vh; overflow-y: auto;
  }
  .sheet-bg.show .sheet { transform: translateY(0); }
  .sheet .grab { width: 38px; height: 5px; background: #d9d9de; border-radius: 3px; margin: 8px auto 14px; }
  .sheet h2 { font-size: 18px; font-weight: 700; text-align: center; margin: 0 0 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
  .field input[type=text], .field input[type=number], .field input[type=date], .field select {
    width: 100%; font-size: 16px; font-family: inherit; color: var(--text);
    background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .interval-row { display: flex; gap: 10px; }
  .interval-row input { flex: 1; }
  .interval-row select { flex: 1; background-image: none; }
  .seg { display: flex; gap: 6px; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 4px; }
  .seg button {
    flex: 1; border: none; background: transparent; border-radius: 9px; padding: 9px;
    font-size: 14px; font-weight: 600; font-family: inherit; color: var(--sub); cursor: pointer;
  }
  .seg button.sel { background: var(--card); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; }
  .emoji-picker button {
    width: 44px; height: 44px; border-radius: 12px; border: 1.5px solid var(--line);
    background: var(--bg); font-size: 22px; cursor: pointer; padding: 0;
  }
  .emoji-picker button.sel { border-color: var(--accent); background: #e7f7f3; }
  .hint { font-size: 11.5px; color: var(--sub); margin-top: 6px; }
  .preview-next { font-size: 13px; color: var(--accent); font-weight: 600; margin-top: 6px; min-height: 18px; }
  /* 予約トグル（iOS標準風スイッチ） */
  /* .field label{display:block} に勝つよう詳細度を上げる（label.toggle-row） */
  .field label.toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; margin-bottom: 0; }
  .toggle-row span.tl { font-size: 15px; font-weight: 600; color: var(--text); }
  .switch { display: inline-block; position: relative; width: 51px; height: 31px; flex: 0 0 auto; }
  .switch input { position: absolute; opacity: 0; margin: 0; width: 100%; height: 100%; }
  .switch .track {
    position: absolute; inset: 0; background: #e4e4ea; border-radius: 999px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.05); transition: background .25s ease;
  }
  .switch .track::before {
    content: ""; position: absolute; left: 2px; top: 2px; width: 27px; height: 27px;
    background: #fff; border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,.28), 0 2px 6px rgba(0,0,0,.14);
    transition: transform .25s cubic-bezier(.3,.7,.4,1);
  }
  .switch input:checked + .track { background: var(--green); box-shadow: none; }
  .switch input:checked + .track::before { transform: translateX(20px); }
  .sheet-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn {
    flex: 1; border: none; border-radius: 13px; font-size: 15px; font-weight: 600;
    padding: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { opacity: .8; }
  .btn-primary:disabled { opacity: .4; }
  .btn-ghost { background: var(--chip); color: var(--text); }
  .btn-del {
    width: 100%; margin-top: 12px; background: none; border: none; color: var(--red);
    font-size: 14px; font-family: inherit; cursor: pointer; padding: 10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">⏰</div>
    <h1>つぎいつ？</h1>
    <p class="tagline">次に行く日を、忘れない</p>
    <p class="sync" id="syncStatus"></p>
  </header>

  <div id="notifyBanner"></div>
  <main id="app"></main>
</div>

<button class="fab" id="addBtn">＋ 新しい予定</button>

<!-- 追加 / 編集シート -->
<div class="sheet-bg" id="sheetBg">
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <h2 id="sheetTitle">新しい予定</h2>

    <div class="field">
      <label>名前</label>
      <input type="text" id="fName" placeholder="例）美容室、脱毛、歯科クリーニング" maxlength="40">
    </div>

    <div class="field">
      <label>アイコン</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>

    <div class="field">
      <label>繰り返し方</label>
      <div class="seg" id="modeSeg">
        <button type="button" data-mode="interval" class="sel">周期で</button>
        <button type="button" data-mode="fixed">曜日・日付で</button>
      </div>
    </div>

    <div class="field" id="intervalBlock">
      <label>どのくらいの周期で？</label>
      <div class="interval-row">
        <input type="number" id="fValue" min="1" max="999" inputmode="numeric" placeholder="6">
        <select id="fUnit">
          <option value="day">日ごと</option>
          <option value="week">週間ごと</option>
          <option value="month">ヶ月ごと</option>
          <option value="year">年ごと</option>
        </select>
      </div>
    </div>

    <div class="field" id="fixedBlock" style="display:none">
      <label>いつ繰り返す？</label>
      <div class="interval-row">
        <select id="fFixedType">
          <option value="weekly">毎週</option>
          <option value="monthly">毎月</option>
        </select>
        <select id="fWeekday">
          <option value="0">日曜</option>
          <option value="1">月曜</option>
          <option value="2">火曜</option>
          <option value="3">水曜</option>
          <option value="4">木曜</option>
          <option value="5">金曜</option>
          <option value="6">土曜</option>
        </select>
        <input type="number" id="fMonthDay" min="1" max="31" inputmode="numeric" placeholder="15" style="display:none">
      </div>
      <div class="hint">毎週○曜、または毎月○日にくり返します。「最後に行った日」より後の最初の該当日が次回になります。</div>
    </div>

    <div class="field">
      <label>最後に行った日</label>
      <input type="date" id="fLast">
      <div class="preview-next" id="nextPreview"></div>
    </div>

    <div class="field">
      <label>何日前に通知する？</label>
      <input type="number" id="fLead" min="0" max="60" inputmode="numeric" placeholder="3">
      <div class="hint">予定日の◯日前にプッシュ通知でお知らせします（0＝当日）。</div>
    </div>

    <div class="field">
      <label class="toggle-row" for="fNeedsBooking">
        <span class="tl">📅 予約が必要</span>
        <span class="switch"><input type="checkbox" id="fNeedsBooking"><span class="track"></span></span>
      </label>
      <div class="hint">病院など、事前に予約を取る必要がある予定。予定日より早めに「そろそろ予約を」と促します。</div>
    </div>

    <div class="field" id="bookLeadField" style="display:none">
      <label>予約は予定日の何日前から促す？</label>
      <input type="number" id="fBookLead" min="1" max="180" inputmode="numeric" placeholder="30">
      <div class="hint">シフトが分かる頃に合わせて。例：30日前から「📅 そろそろ予約を」とお知らせ。</div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">キャンセル</button>
      <button class="btn btn-primary" id="saveBtn">保存</button>
    </div>
    <button class="btn-del" id="delBtn" style="display:none">この予定を削除</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

/* ============ データ層 ============ */
const STORE_KEY = "tsugi_app_v1";
function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { items: [] }; }
  catch (e) { return { items: [] }; }
}
function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
let DB = load();

/* ---------- Supabase クラウド同期（recognition / GROW と同じプロジェクト） ---------- */
const SUPABASE_URL = "https://okbjqtdirrathscctyvx.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y";
const ROW_ID = "kodai";            // 完全に個人用なので固定の1行に丸ごと保存
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { persistSession: false } }); } catch (e) {}
let pushTimer = null, pushing = false;
function setSync(t) { const e = document.getElementById("syncStatus"); if (e) e.textContent = t; }

async function pushCloud() {
  if (!sb || pushing) return;
  pushing = true; setSync("同期中…");
  try {
    const res = await sb.from("tsugi_state").upsert({ id: ROW_ID, state: DB, updated_at: new Date().toISOString() });
    if (res.error) { console.error(res.error); setSync("⚠ 同期失敗"); }
    else { setSync("✓ 同期済み"); }
  } catch (e) { console.error(e); setSync("⚠ 同期失敗"); }
  finally { pushing = false; }
}
function scheduleCloud() { if (!sb) return; setSync("…"); clearTimeout(pushTimer); pushTimer = setTimeout(pushCloud, 1200); }

async function pullCloud() {
  if (!sb) return false;
  let res;
  try { res = await sb.from("tsugi_state").select("state").eq("id", ROW_ID).maybeSingle(); }
  catch (e) { console.error(e); return false; }
  if (res.error) { console.error(res.error); return false; }
  if (res.data && res.data.state && Array.isArray(res.data.state.items)) {
    DB = res.data.state; saveLocal(); return true;
  }
  return false;
}

async function bootstrapCloud() {
  if (!sb) { setSync("オフライン（この端末のみ）"); return; }
  setSync("読込中…");
  const has = await pullCloud();
  if (has) { render(); setSync("✓ 同期済み"); return; }
  if (DB.items && DB.items.length > 0) { setSync("初回アップロード中…"); await pushCloud(); }
  else { setSync("✓ 同期済み"); }
}

// localStorage 即時保存 ＋ クラウドへデバウンス送信
function save() { saveLocal(); scheduleCloud(); }

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ============ 日付ユーティリティ ============ */
const WD = ["日", "月", "火", "水", "木", "金", "土"];
function todayMid() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
function parseYMD(s) {
  if (!s) return todayMid();
  const [y, m, d] = s.split("-").map(Number);
  const dt = new Date(y, (m || 1) - 1, d || 1); dt.setHours(0, 0, 0, 0); return dt;
}
function toYMD(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function addMonths(date, n) {
  const d = new Date(date), day = d.getDate();
  d.setDate(1); d.setMonth(d.getMonth() + n);
  const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  d.setDate(Math.min(day, last)); return d;
}
function addInterval(date, value, unit) {
  const d = new Date(date), v = Number(value) || 0;
  if (unit === "day") d.setDate(d.getDate() + v);
  else if (unit === "week") d.setDate(d.getDate() + v * 7);
  else if (unit === "month") return addMonths(date, v);
  else if (unit === "year") return addMonths(date, v * 12);
  return d;
}
function makeMonthDay(year, month, day) {
  const first = new Date(year, month, 1);
  const y = first.getFullYear(), m = first.getMonth();
  const last = new Date(y, m + 1, 0).getDate();
  const d = new Date(y, m, Math.min(day, last)); d.setHours(0, 0, 0, 0); return d;
}
function nextWeekly(base, weekday, everyN) {
  const d = new Date(base); d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 1);
  while (d.getDay() !== weekday) d.setDate(d.getDate() + 1);
  if (everyN > 1) d.setDate(d.getDate() + (everyN - 1) * 7);
  return d;
}
function nextMonthly(base, monthDay, everyN) {
  const y = base.getFullYear(); let m = base.getMonth();
  let cand = makeMonthDay(y, m, monthDay);
  while (cand.getTime() <= base.getTime()) { m += (everyN || 1); cand = makeMonthDay(y, m, monthDay); }
  return cand;
}
function nextDate(item) {
  const base = parseYMD(item.lastDate);
  if (item.mode === "fixed") {
    if (item.fixedType === "monthly") return nextMonthly(base, item.monthDay || 1, item.everyN || 1);
    return nextWeekly(base, item.weekday || 0, item.everyN || 1);
  }
  return addInterval(base, item.intervalValue, item.intervalUnit);
}
function daysUntil(item) {
  return Math.round((nextDate(item).getTime() - todayMid().getTime()) / 86400000);
}
const UNIT_LABEL = { day: "日", week: "週間", month: "ヶ月", year: "年" };
function intervalLabel(item) {
  if (item.mode === "fixed") {
    if (item.fixedType === "monthly") return "毎月" + (item.monthDay || 1) + "日";
    return "毎週" + WD[item.weekday || 0] + "曜";
  }
  return (item.intervalValue || 0) + UNIT_LABEL[item.intervalUnit] + "ごと";
}
function fmtDate(d) { return (d.getMonth() + 1) + "/" + d.getDate() + "（" + WD[d.getDay()] + "）"; }

/* ============ 描画 ============ */
const appEl = document.getElementById("app");

function render() {
  renderNotifyBanner();
  if (!DB.items || DB.items.length === 0) {
    appEl.innerHTML =
      '<div class="empty"><div class="ee">🗓️</div>' +
      '<p>まだ予定がありません。<br>右下の「＋ 新しい予定」から、<br>美容室や脱毛などを登録しましょう。</p></div>';
    return;
  }
  const sorted = DB.items.slice().sort((a, b) => daysUntil(a) - daysUntil(b));
  appEl.innerHTML = '<div class="list">' + sorted.map(itemRow).join("") + '</div>';
}

function itemRow(item) {
  const du = daysUntil(item);
  let cls, label;
  if (du < 0) { cls = "over"; label = (-du) + "日すぎてる"; }
  else if (du === 0) { cls = "soon"; label = "今日"; }
  else if (du <= (item.leadDays != null ? item.leadDays : 3)) { cls = "soon"; label = "あと" + du + "日"; }
  else { cls = "far"; label = "あと" + du + "日"; }
  const nd = nextDate(item);

  const bookLead = item.bookLeadDays != null ? item.bookLeadDays : 30;
  const inBooking = item.needsBooking && !item.booked && du <= bookLead;
  let extra = "";
  if (inBooking) {
    extra = '<div class="book-note">📅 ' + (du > 0 ? "そろそろ予約を（予定日まであと" + du + "日）" : "予約がまだです") + '</div>';
  } else if (item.needsBooking && item.booked) {
    extra = '<div class="booked-chip" data-id="' + item.id + '" data-act="cal">✅ 予約済み ・ 📅 カレンダーに追加</div>';
  }
  const btn = inBooking
    ? '<button class="done-btn book-btn" data-id="' + item.id + '" data-act="book">予約した✓</button>'
    : '<button class="done-btn" data-id="' + item.id + '" data-act="done">行ってきた✓</button>';

  return '<div class="item ' + (du < 0 ? "overdue " : "") + (inBooking ? "booking" : "") + '" data-id="' + item.id + '" data-act="edit">' +
    '<div class="emoji">' + (item.emoji || "🗓️") + '</div>' +
    '<div class="body">' +
      '<div class="name">' + esc(item.name) + '</div>' +
      '<div class="meta">' + intervalLabel(item) + ' ・ 次は ' + fmtDate(nd) + '</div>' +
      extra +
    '</div>' +
    '<div class="right">' +
      '<div class="count ' + cls + '">' + label + '</div>' +
      btn +
    '</div>' +
  '</div>';
}

function esc(s) { return String(s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

/* リスト操作（イベント委譲） */
appEl.addEventListener("click", e => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const id = btn.getAttribute("data-id");
  const act = btn.getAttribute("data-act");
  if (act === "done") { e.stopPropagation(); markDone(id); }
  else if (act === "book") { e.stopPropagation(); markBooked(id); }
  else if (act === "cal") { e.stopPropagation(); addToCalendar(id); }
  else if (act === "edit") { openSheet(id); }
});

function markDone(id) {
  const it = DB.items.find(x => x.id === id);
  if (!it) return;
  it.lastDate = toYMD(todayMid());
  it.notifiedFor = null;       // 新しい周期に入ったので通知フラグをリセット
  it.booked = false;           // 予約も次の周期分はまだ
  it.bookNotifiedFor = null;
  save(); render();
}

function markBooked(id) {
  const it = DB.items.find(x => x.id === id);
  if (!it) return;
  it.booked = true;            // この周期は予約済み → 催促を止める
  save(); render();
  addToCalendar(id);           // 予約したらそのままiPhoneカレンダーへ追加を促す
}

/* ============ iPhoneカレンダーに追加（.ics） ============ */
function icsEsc(s) { return String(s).replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n"); }
function icsDay(d) { return d.getFullYear() + String(d.getMonth() + 1).padStart(2, "0") + String(d.getDate()).padStart(2, "0"); }
function buildICS(item) {
  const nd = nextDate(item);
  const start = icsDay(nd);
  const endD = new Date(nd); endD.setDate(endD.getDate() + 1);
  const n = new Date();
  const stamp = n.getUTCFullYear() + String(n.getUTCMonth() + 1).padStart(2, "0") + String(n.getUTCDate()).padStart(2, "0")
    + "T" + String(n.getUTCHours()).padStart(2, "0") + String(n.getUTCMinutes()).padStart(2, "0") + String(n.getUTCSeconds()).padStart(2, "0") + "Z";
  const title = (item.emoji || "🗓️") + " " + item.name;
  return [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//tsugi//tsugiitsu//JP", "CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    "UID:" + item.id + "-" + start + "@tsugiitsu",
    "DTSTAMP:" + stamp,
    "DTSTART;VALUE=DATE:" + start,
    "DTEND;VALUE=DATE:" + icsDay(endD),
    "SUMMARY:" + icsEsc(title),
    "BEGIN:VALARM", "ACTION:DISPLAY", "DESCRIPTION:" + icsEsc(title), "TRIGGER:PT9H", "END:VALARM",
    "END:VEVENT", "END:VCALENDAR"
  ].join("\r\n");
}
function addToCalendar(id) {
  const it = DB.items.find(x => x.id === id);
  if (!it) return;
  const blob = new Blob([buildICS(it)], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (it.name || "yotei") + ".ics";
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
}

/* ============ 追加 / 編集シート ============ */
const EMOJIS = ["🗓️", "💈", "✂️", "💆", "🪒", "💅", "🦷", "🩺", "💊", "🚗", "🧹", "🐶", "🌷", "🧴", "👓", "🛏️", "💸", "📦"];
let editingId = null;
let pickedEmoji = EMOJIS[0];

const sheetBg = document.getElementById("sheetBg");
const fName = document.getElementById("fName");
const fValue = document.getElementById("fValue");
const fUnit = document.getElementById("fUnit");
const fLast = document.getElementById("fLast");
const fLead = document.getElementById("fLead");
const fNeedsBooking = document.getElementById("fNeedsBooking");
const fBookLead = document.getElementById("fBookLead");
const bookLeadField = document.getElementById("bookLeadField");
const emojiPicker = document.getElementById("emojiPicker");
const nextPreview = document.getElementById("nextPreview");
const modeSeg = document.getElementById("modeSeg");
const intervalBlock = document.getElementById("intervalBlock");
const fixedBlock = document.getElementById("fixedBlock");
const fFixedType = document.getElementById("fFixedType");
const fWeekday = document.getElementById("fWeekday");
const fMonthDay = document.getElementById("fMonthDay");
let pickedMode = "interval";

function setMode(mode) {
  pickedMode = mode;
  modeSeg.querySelectorAll("[data-mode]").forEach(b => b.classList.toggle("sel", b.getAttribute("data-mode") === mode));
  intervalBlock.style.display = mode === "interval" ? "block" : "none";
  fixedBlock.style.display = mode === "fixed" ? "block" : "none";
  updateNextPreview();
}
modeSeg.addEventListener("click", e => {
  const b = e.target.closest("[data-mode]"); if (!b) return;
  setMode(b.getAttribute("data-mode"));
});
function syncFixedInputs() {
  const t = fFixedType.value;
  fWeekday.style.display = t === "weekly" ? "block" : "none";
  fMonthDay.style.display = t === "monthly" ? "block" : "none";
  updateNextPreview();
}
fFixedType.addEventListener("change", syncFixedInputs);
[fWeekday, fMonthDay].forEach(el => el.addEventListener("input", updateNextPreview));

fNeedsBooking.addEventListener("change", () => {
  bookLeadField.style.display = fNeedsBooking.checked ? "block" : "none";
});

function buildEmojiPicker() {
  emojiPicker.innerHTML = EMOJIS.map(em =>
    '<button type="button" data-em="' + em + '" class="' + (em === pickedEmoji ? "sel" : "") + '">' + em + '</button>'
  ).join("");
}
emojiPicker.addEventListener("click", e => {
  const b = e.target.closest("[data-em]"); if (!b) return;
  pickedEmoji = b.getAttribute("data-em");
  buildEmojiPicker();
});

function formNextDate() {
  const last = fLast.value;
  if (!last) return null;
  const base = parseYMD(last);
  if (pickedMode === "fixed") {
    if (fFixedType.value === "monthly") {
      const md = Number(fMonthDay.value); if (!md) return null;
      return nextMonthly(base, md, 1);
    }
    return nextWeekly(base, Number(fWeekday.value), 1);
  }
  const v = Number(fValue.value); if (!v || v < 1) return null;
  return addInterval(base, v, fUnit.value);
}
function updateNextPreview() {
  const nd = formNextDate();
  if (!nd) { nextPreview.textContent = ""; return; }
  const du = Math.round((nd.getTime() - todayMid().getTime()) / 86400000);
  const rel = du < 0 ? "（" + (-du) + "日すぎ）" : du === 0 ? "（今日）" : "（あと" + du + "日）";
  nextPreview.textContent = "次の予定日：" + fmtDate(nd) + " " + rel;
}
[fValue, fUnit, fLast].forEach(el => el.addEventListener("input", updateNextPreview));

function openSheet(id) {
  editingId = id || null;
  buildEmojiPicker();
  if (id) {
    const it = DB.items.find(x => x.id === id);
    document.getElementById("sheetTitle").textContent = "予定を編集";
    fName.value = it.name || "";
    fValue.value = it.intervalValue || "";
    fUnit.value = it.intervalUnit || "week";
    fLast.value = it.lastDate || toYMD(todayMid());
    fLead.value = it.leadDays != null ? it.leadDays : 3;
    fNeedsBooking.checked = !!it.needsBooking;
    fBookLead.value = it.bookLeadDays != null ? it.bookLeadDays : 30;
    pickedEmoji = it.emoji || EMOJIS[0];
    pickedMode = it.mode === "fixed" ? "fixed" : "interval";
    fFixedType.value = it.fixedType || "weekly";
    fWeekday.value = it.weekday != null ? it.weekday : 1;
    fMonthDay.value = it.monthDay != null ? it.monthDay : 15;
    document.getElementById("delBtn").style.display = "block";
  } else {
    document.getElementById("sheetTitle").textContent = "新しい予定";
    fName.value = ""; fValue.value = ""; fUnit.value = "week";
    fLast.value = toYMD(todayMid()); fLead.value = 3;
    fNeedsBooking.checked = false; fBookLead.value = 30;
    pickedEmoji = EMOJIS[0];
    pickedMode = "interval"; fFixedType.value = "weekly"; fWeekday.value = 1; fMonthDay.value = 15;
    document.getElementById("delBtn").style.display = "none";
  }
  bookLeadField.style.display = fNeedsBooking.checked ? "block" : "none";
  buildEmojiPicker();
  syncFixedInputs();
  setMode(pickedMode);
  sheetBg.classList.add("show");
}
function closeSheet() { sheetBg.classList.remove("show"); editingId = null; }

document.getElementById("addBtn").addEventListener("click", () => openSheet(null));
document.getElementById("cancelBtn").addEventListener("click", closeSheet);
sheetBg.addEventListener("click", e => { if (e.target === sheetBg) closeSheet(); });

document.getElementById("saveBtn").addEventListener("click", () => {
  const name = fName.value.trim();
  if (!name) { fName.focus(); return; }
  const value = Number(fValue.value);
  if (pickedMode === "interval") {
    if (!value || value < 1) { fValue.focus(); return; }
  } else if (pickedMode === "fixed" && fFixedType.value === "monthly") {
    if (!Number(fMonthDay.value)) { fMonthDay.focus(); return; }
  }
  const needsBooking = fNeedsBooking.checked;
  const data = {
    name,
    emoji: pickedEmoji,
    mode: pickedMode,
    intervalValue: value || null,
    intervalUnit: fUnit.value,
    fixedType: fFixedType.value,
    weekday: Number(fWeekday.value),
    monthDay: Math.max(1, Number(fMonthDay.value) || 1),
    lastDate: fLast.value || toYMD(todayMid()),
    leadDays: Math.max(0, Number(fLead.value) || 0),
    needsBooking,
    bookLeadDays: needsBooking ? Math.max(1, Number(fBookLead.value) || 30) : null,
  };
  if (editingId) {
    const it = DB.items.find(x => x.id === editingId);
    const cycleChanged = it.lastDate !== data.lastDate || it.mode !== data.mode
      || it.intervalValue !== data.intervalValue || it.intervalUnit !== data.intervalUnit
      || it.fixedType !== data.fixedType || it.weekday !== data.weekday || it.monthDay !== data.monthDay;
    Object.assign(it, data);
    if (cycleChanged) { it.notifiedFor = null; it.booked = false; it.bookNotifiedFor = null; }   // 周期が変わったら通知し直し
    if (!needsBooking) { it.booked = false; it.bookNotifiedFor = null; }
  } else {
    DB.items.push(Object.assign({ id: uid(), createdAt: Date.now(), notifiedFor: null, booked: false, bookNotifiedFor: null }, data));
  }
  save(); render(); closeSheet();
  ensureNotifyPermission();   // 予定を入れたら通知許可を促す
});

document.getElementById("delBtn").addEventListener("click", () => {
  if (!editingId) return;
  if (!confirm("この予定を削除しますか？")) return;
  DB.items = DB.items.filter(x => x.id !== editingId);
  save(); render(); closeSheet();
});

/* ============ 通知まわり ============ */
let _swReg = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('tsugi-sw.js').then(r => { _swReg = r; }).catch(() => {});
}
function notifyState() {
  if (!('Notification' in window)) return "unsupported";
  return Notification.permission;   // 'default' | 'granted' | 'denied'
}
function renderNotifyBanner() {
  const el = document.getElementById("notifyBanner");
  const st = notifyState();
  if (st === "unsupported") { el.innerHTML = ""; return; }
  if (st === "granted") {
    el.innerHTML =
      '<div class="notify-banner ok"><div class="nb-txt">' +
      '<div class="nb-title">🔔 通知オン</div>' +
      '<div class="nb-desc">予定日が近づくと、この端末にお知らせします。</div>' +
      '</div></div>';
    return;
  }
  const desc = st === "denied"
    ? "ブラウザ設定で通知がブロックされています。設定から許可してください。"
    : "予定日が近づいたらプッシュ通知でお知らせします。";
  el.innerHTML =
    '<div class="notify-banner"><div class="nb-txt">' +
    '<div class="nb-title">🔔 通知を受け取る</div>' +
    '<div class="nb-desc">' + desc + '</div></div>' +
    (st === "denied" ? "" : '<button id="notifyOnBtn">オンにする</button>') +
    '</div>';
  const b = document.getElementById("notifyOnBtn");
  if (b) b.addEventListener("click", ensureNotifyPermission);
}

/* 通知許可をリクエスト（ユーザー操作で呼ぶ） */
async function ensureNotifyPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'denied') { renderNotifyBanner(); return false; }
  let ok = Notification.permission === 'granted';
  if (!ok) { try { ok = (await Notification.requestPermission()) === 'granted'; } catch (e) { ok = false; } }
  if (ok) await ensurePushSubscription();
  renderNotifyBanner();
  return ok;
}

/* ===== Web Push（アプリを閉じていても、予定日のお知らせが届く） ===== */
const VAPID_PUBLIC = 'BOp-K1Eif_TEF21_2O_oGWuE23r2ppFzl6b1hafxV0i_1VktjXRRWnTj3vAmG_GXzaVx-HcRwQsfBoljV-_lmdk';
function urlB64ToUint8Array(base64) {
  const pad = '='.repeat((4 - base64.length % 4) % 4);
  const b = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b); const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
/* この端末をプッシュ購読し、tsugi_subs テーブルに登録する */
async function ensurePushSubscription() {
  if (!sb) return;
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    const reg = _swReg || await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC)
      });
    }
    const j = sub.toJSON();
    await sb.from('tsugi_subs').upsert({
      endpoint: sub.endpoint, who: ROW_ID,
      p256dh: j.keys.p256dh, auth: j.keys.auth, created_at: Date.now()
    }, { onConflict: 'endpoint' });
  } catch (e) { /* 非対応端末・拒否時などは無視 */ }
}

/* ============ 起動 ============ */
render();
bootstrapCloud();
if (notifyState() === "granted") ensurePushSubscription();
</script>
<!-- tsumiki-back-button -->
<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>

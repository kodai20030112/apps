<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="apple-touch-icon" href="icons/icon-reflection.png">
<meta name="apple-mobile-web-app-title" content="振り返り">
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>STARS 振り返り</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --ink: #1d1d1f;
    --ink-2: #6e6e73;
    --line: #e5e5ea;
    --accent: #0071e3;
    --gold: #ffb400;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.05);
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }

  /* ---------- Top bar ---------- */
  header.topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(245,245,247,.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
    padding-top: env(safe-area-inset-top);
  }
  .topbar-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; max-width: 640px; margin: 0 auto; padding: 0 16px;
  }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .back-btn {
    background: none; border: none; color: var(--accent);
    font-size: 16px; cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 2px;
  }
  .icon-btn {
    background: none; border: none; color: var(--accent);
    font-size: 16px; font-weight: 500; cursor: pointer; padding: 6px;
  }

  /* ---------- Views ---------- */
  .view { display: none; padding: 18px 0 96px; }
  .view.active { display: block; animation: fade .28s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  h1.page { font-size: 28px; font-weight: 700; margin: 8px 0 4px; letter-spacing: -.02em; }
  .sub { color: var(--ink-2); font-size: 14px; margin: 0 0 18px; }

  /* ---------- Filter chips ---------- */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 14px; -webkit-overflow-scrolling: touch; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; border: 1px solid var(--line); background: var(--card);
    border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .chip.pos { color: var(--accent); border-color: #bcd9fb; }
  .chip.pos.on { background: var(--accent); border-color: var(--accent); color: #fff; }

  .start-date { font-size: 13px; color: var(--ink-2); margin: -4px 0 14px; }

  /* ---------- Modal ---------- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--card); width: 100%; max-width: 640px; max-height: 88vh;
    border-radius: 20px 20px 0 0; padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: .5; } to { transform: none; opacity: 1; } }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal-desc { font-size: 13px; color: var(--ink-2); margin-bottom: 12px; }
  .modal-body { overflow-y: auto; }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal-actions button { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .m-primary { background: var(--accent); color: #fff; }
  .m-ghost { background: #f0f0f3; color: var(--ink); }
  /* PC（広い画面）ではモーダルを画面中央に。iPhoneは従来どおり下からせり出す */
  @media (min-width: 768px){
    .modal-overlay{ align-items: center; padding: 24px; }
    .modal-sheet{ border-radius: 20px; }
  }

  /* ---------- Story list ---------- */
  .story {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; margin-bottom: 12px; cursor: pointer; transition: transform .12s;
    border-left: 4px solid var(--cmp, var(--accent));
  }
  .story:active { transform: scale(.99); }
  .story-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    background: var(--cmp-bg, #eef); color: var(--cmp, var(--accent));
  }
  .pill {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    border: 1px solid var(--line); color: var(--ink-2);
  }
  .pill.live { color: #0a7d28; border-color: #b7e3c0; background: #f0faf2; }
  .pill.done { color: #6e6e73; }
  .story-title { font-size: 16px; font-weight: 600; margin: 4px 0; }
  .story-snip { color: var(--ink-2); font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .story-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .date-sm { color: var(--ink-2); font-size: 12px; }

  .empty { text-align: center; color: var(--ink-2); padding: 60px 20px; }
  .empty .big { font-size: 44px; margin-bottom: 10px; }

  /* ---------- Competency cards ---------- */
  .pos-head { font-size: 13px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; margin: 22px 0 10px; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 420px) { .card-grid { grid-template-columns: 1fr; } }
  .cmp-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; cursor: pointer; transition: transform .14s, box-shadow .14s;
    border-top: 4px solid var(--cmp); position: relative; overflow: hidden;
  }
  .cmp-card:active { transform: scale(.98); }
  .cmp-emoji { font-size: 26px; }
  .cmp-jp { font-size: 16px; font-weight: 700; margin-top: 8px; }
  .cmp-en { font-size: 12px; color: var(--ink-2); font-weight: 600; letter-spacing: .02em; }
  .cmp-desc { font-size: 13px; color: var(--ink-2); margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .info-link { font-size: 12px; color: var(--accent); margin-top: 10px; display: inline-block; font-weight: 600; }

  /* ---------- Pinned competency (edit view) ---------- */
  .pinned {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 16px; margin-bottom: 18px; border-left: 4px solid var(--cmp);
  }
  .pinned-head { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .pinned-jp { font-size: 16px; font-weight: 700; }
  .pinned-en { font-size: 11px; color: var(--ink-2); font-weight: 600; }
  .pinned-toggle { margin-left: auto; color: var(--accent); font-size: 13px; font-weight: 600; }
  .pinned-body { margin-top: 10px; font-size: 14px; color: var(--ink-2); display: none; }
  .pinned-body.open { display: block; }
  .pinned-body ul { margin: 8px 0 0; padding-left: 18px; }
  .pinned-body li { margin-bottom: 5px; }
  .pinned-body .lbl { font-weight: 700; color: var(--ink); font-size: 12px; }

  /* ---------- STARS form ---------- */
  .field { margin-bottom: 16px; }
  .field-label { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .field-letter {
    width: 24px; height: 24px; flex: 0 0 24px; border-radius: 7px; background: var(--cmp, var(--accent));
    color: #fff; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .field-name { font-size: 15px; font-weight: 700; }
  .field-hint { font-size: 12px; color: var(--ink-2); }
  textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    font-size: 16px; font-family: inherit; resize: vertical; min-height: 60px; background: var(--card);
    color: var(--ink); line-height: 1.5; transition: border-color .15s;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea.result-field { border-color: #ffe0a3; background: #fffdf6; }

  .section-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 700; margin: 0 0 4px; }
  .section-sub { font-size: 13px; color: var(--ink-2); margin: 0 0 12px; }

  /* ---------- Brainstorm tree (アイデア出し / 樹形図) ---------- */
  .bs-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; margin-bottom: 16px; border-left: 4px solid var(--cmp, var(--accent)); }
  .bs-head { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .bs-root-emoji { font-size: 20px; }
  .bs-title { font-size: 15px; font-weight: 700; }
  .bs-title .en { font-size: 12px; color: var(--ink-2); font-weight: 600; }
  .bs-toggle { margin-left: auto; color: var(--cmp, var(--accent)); font-size: 13px; font-weight: 600; flex: 0 0 auto; }
  .bs-sub { font-size: 12px; color: var(--ink-2); margin: 4px 0 0; }
  .bs-body { margin-top: 12px; display: none; }
  .bs-body.open { display: block; }
  .bs-branch { position: relative; margin-left: 7px; padding: 4px 0 14px 18px; border-left: 2px solid var(--line); }
  .bs-branch:last-child { padding-bottom: 2px; }
  .bs-branch::before { content: ""; position: absolute; left: -7px; top: 6px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--cmp, var(--accent)); border: 2px solid var(--card); }
  .bs-q { font-size: 14px; line-height: 1.5; }
  .bs-q .quote { font-weight: 600; color: var(--ink); }
  .bs-q .ask { color: var(--cmp, var(--accent)); font-weight: 700; margin-left: 2px; }
  .bs-leaves { margin-top: 6px; }
  .bs-leaf { position: relative; margin-left: 4px; padding: 6px 0 6px 16px; border-left: 2px dashed var(--line);
    display: flex; align-items: flex-start; gap: 8px; }
  .bs-leaf::before { content: ""; position: absolute; left: -5px; top: 13px; width: 8px; height: 8px;
    border-radius: 50%; background: #c7c7cc; }
  .bs-leaf-main { flex: 1; min-width: 0; }
  .bs-leaf-text { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .bs-send { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .bs-send-btn { border: 1px solid var(--line); background: var(--card); border-radius: 7px; padding: 3px 9px;
    font-size: 11px; font-weight: 700; color: var(--ink-2); cursor: pointer; transition: .12s; }
  .bs-send-btn:active { background: var(--cmp, var(--accent)); color: #fff; border-color: var(--cmp, var(--accent)); }
  .bs-leaf-del { flex: 0 0 auto; background: none; border: none; color: #c7c7cc; font-size: 14px;
    cursor: pointer; padding: 4px 6px; line-height: 1; }
  .bs-leaf-del:active { color: #ff3b30; }
  .bs-add { display: flex; gap: 6px; margin-top: 8px; margin-left: 4px; padding-left: 16px; }
  .bs-add input { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 10px; padding: 8px 11px;
    font-size: 14px; font-family: inherit; background: var(--card); color: var(--ink); }
  .bs-add input:focus { outline: none; border-color: var(--cmp, var(--accent)); }
  .bs-add button { flex: 0 0 auto; border: none; background: var(--cmp, var(--accent)); color: #fff;
    border-radius: 10px; padding: 0 15px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .bs-add button:active { opacity: .85; }

  /* ---------- Lifecycle toggle ---------- */
  .seg { display: flex; gap: 8px; }
  .seg-btn {
    flex: 1; border: 1px solid var(--line); background: var(--card); border-radius: 12px;
    padding: 12px; cursor: pointer; text-align: center; transition: .15s;
  }
  .seg-btn .t { font-size: 15px; font-weight: 700; }
  .seg-btn .d { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .seg-btn.on { border-color: var(--accent); background: #f0f7ff; box-shadow: 0 0 0 2px rgba(0,113,227,.15) inset; }

  /* ---------- Buttons ---------- */
  .primary {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 14px;
    padding: 15px; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .primary:active { opacity: .85; }
  .primary:disabled { opacity: .4; cursor: default; }
  .ghost {
    width: 100%; background: none; color: #ff3b30; border: none; padding: 14px; font-size: 15px; cursor: pointer; margin-top: 4px;
  }
  .fab {
    position: fixed; right: 18px; bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 40;
    width: 58px; height: 58px; border-radius: 50%; background: var(--accent); color: #fff;
    border: none; font-size: 30px; box-shadow: 0 6px 18px rgba(0,113,227,.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .fab:active { transform: scale(.94); }

  /* ---------- Detail / timeline ---------- */
  .detail-block { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; }
  .detail-block .dl { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .detail-block .dtext { white-space: pre-wrap; font-size: 15px; }
  .detail-block.refl { background: #fffdf6; border: 1px solid #ffe7b0; }
  .timeline { margin-top: 4px; }
  .tl-item { border-left: 2px solid var(--line); padding: 0 0 14px 14px; position: relative; }
  .tl-item::before { content: ""; position: absolute; left: -5px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--cmp, var(--accent)); }
  .tl-date { font-size: 12px; color: var(--ink-2); font-weight: 600; }
  .tl-text { font-size: 14px; white-space: pre-wrap; margin-top: 2px; }
  .tl-tools { display: flex; gap: 14px; margin-top: 5px; }
  .tl-tools button { background: none; border: none; padding: 0; font-size: 12px; font-weight: 700; color: var(--accent); cursor: pointer; }
  .tl-tools button.tl-del { color: #ff3b30; }
  .tl-editbox { width: 100%; border: 1px solid var(--accent); border-radius: 10px; padding: 9px 11px; margin-top: 4px;
    font-size: 14px; font-family: inherit; line-height: 1.5; resize: none; overflow: hidden; min-height: 44px; color: var(--ink); }
  .tl-editbox:focus { outline: none; }
  .tl-editrow { display: flex; gap: 8px; margin-top: 6px; }
  .tl-editrow button { border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .tl-editrow .save { background: var(--accent); color: #fff; }
  .tl-editrow .cancel { background: #f0f0f3; color: var(--ink); }
  .add-update { display: flex; gap: 8px; margin-top: 10px; }
  .add-update textarea { min-height: 44px; }
  .add-update button { flex: 0 0 auto; border: none; background: var(--accent); color: #fff; border-radius: 12px; padding: 0 16px; font-weight: 600; cursor: pointer; }

  .toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px);
    background: rgba(29,29,31,.92); color: #fff; padding: 11px 20px; border-radius: 999px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: .25s; z-index: 100; backdrop-filter: blur(10px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Image export sheet ---------- */
  .imgwrap { max-height: 56vh; overflow: auto; border-radius: 14px; border: 1px solid var(--line); background: #f5f5f7; -webkit-overflow-scrolling: touch; }
  .imgwrap img { width: 100%; display: block; }

  /* ---------- Position Story ---------- */
  .ps-banner {
    display: flex; align-items: center; gap: 13px; cursor: pointer;
    background: linear-gradient(120deg, #faf5ff, #f0f6ff);
    border: 1px solid #e9ddfb; border-radius: var(--radius);
    padding: 14px 16px; margin: 0 0 16px; transition: transform .14s, box-shadow .14s;
  }
  .ps-banner:active { transform: scale(.99); }
  @media(hover:hover){ .ps-banner:hover{ box-shadow: 0 8px 24px rgba(123,92,255,.14); } }
  .ps-banner .ic { font-size: 22px; width: 44px; height: 44px; flex: 0 0 auto; border-radius: 13px;
    display: flex; align-items: center; justify-content: center; background: #fff; box-shadow: var(--shadow); }
  .ps-banner .t { font-size: 15px; font-weight: 700; }
  .ps-banner .d { font-size: 12px; color: var(--ink-2); margin-top: 1px; }
  .ps-banner .arrow { margin-left: auto; color: #b9a6e8; font-size: 20px; }

  .ps-sync { font-size: 12px; color: var(--ink-2); font-weight: 600; margin: -6px 0 16px; min-height: 16px; }

  .pos-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px; margin-bottom: 14px; cursor: pointer; transition: transform .14s, box-shadow .14s;
    border-left: 5px solid var(--pos); position: relative; overflow: hidden;
  }
  .pos-card:active { transform: scale(.99); }
  @media(hover:hover){ .pos-card:hover{ box-shadow: 0 10px 30px rgba(0,0,0,.09); } }
  .pos-top { display: flex; align-items: center; gap: 12px; }
  .pos-emoji { font-size: 26px; width: 48px; height: 48px; flex: 0 0 auto; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; background: var(--pos-bg); }
  .pos-jp { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
  .pos-en { font-size: 12px; color: var(--ink-2); font-weight: 600; letter-spacing: .03em; }
  .pos-role { font-size: 13px; color: var(--ink-2); margin-top: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pos-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .pos-stat { font-size: 12px; color: var(--pos); font-weight: 700; }
  .pos-date { font-size: 12px; color: var(--ink-2); }
  .pos-arrow { position: absolute; right: 16px; top: 22px; color: #c7c7cc; font-size: 20px; }

  .desc-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px; margin-bottom: 18px; border-top: 5px solid var(--pos); }
  .desc-head { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .desc-emoji { font-size: 22px; width: 42px; height: 42px; flex: 0 0 auto; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; background: var(--pos-bg); }
  .desc-jp { font-size: 17px; font-weight: 700; }
  .desc-en { font-size: 11px; color: var(--ink-2); font-weight: 600; letter-spacing: .03em; }
  .desc-toggle { margin-left: auto; color: var(--pos); font-size: 13px; font-weight: 600; flex: 0 0 auto; }
  .desc-body { margin-top: 12px; display: none; }
  .desc-body.open { display: block; }
  .desc-body .lead { font-size: 14px; color: var(--ink); white-space: pre-wrap; }
  .desc-body .common { font-size: 13px; color: var(--ink-2); white-space: pre-wrap;
    margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .desc-body .tag { display: inline-block; font-size: 11px; font-weight: 700; color: var(--pos);
    background: var(--pos-bg); border-radius: 6px; padding: 2px 8px; margin-bottom: 6px; }

  .ps-story-head { font-size: 13px; font-weight: 700; color: var(--ink-2); text-transform: uppercase;
    letter-spacing: .06em; margin: 4px 0 10px; }
  .sec { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 14px 12px; margin-bottom: 14px; border-left: 4px solid var(--pos); }
  .sec-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .sec-no { width: 22px; height: 22px; flex: 0 0 auto; border-radius: 7px; background: var(--pos);
    color: #fff; font-weight: 800; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .sec-tools { margin-left: auto; display: flex; gap: 2px; }
  .sec-tools button { background: none; border: none; color: var(--ink-2); font-size: 17px; cursor: pointer;
    padding: 4px 7px; border-radius: 8px; line-height: 1; }
  .sec-tools button:active { background: #f0f0f3; }
  .sec-tools button.del { color: #ff3b30; }
  .sec-tools button:disabled { opacity: .25; cursor: default; }
  input.sec-h { width: 100%; border: none; border-bottom: 1px solid var(--line); padding: 4px 2px 8px;
    font-size: 16px; font-weight: 700; font-family: inherit; color: var(--ink); background: none; margin-bottom: 8px; }
  input.sec-h:focus { outline: none; border-color: var(--pos); }
  input.sec-h::placeholder { color: #b8b8bd; font-weight: 600; }
  textarea.sec-b { resize: none; min-height: 70px; overflow: hidden; line-height: 1.65; }
  textarea.sec-b:focus { border-color: var(--pos); }
  .add-sec { width: 100%; background: var(--card); color: var(--pos); border: 1px dashed var(--pos);
    border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 2px; transition: .15s; }
  .add-sec:active { background: var(--pos-bg); }

<script>

const POSITIONS = [
  { id: "specialist", name: "Specialist",
    competencyIds: ["drives_results", "nimble_learning", "self_development", "values_differences"] },
  { id: "expert", name: "Expert",
    competencyIds: ["communicates_effectively", "drives_results", "values_differences", "customer_focus", "tech_savvy"] },
  { id: "creative_pro", name: "Creative Pro",
    competencyIds: ["business_insight", "collaborates", "customer_focus", "tech_savvy", "values_differences"] }
];

/* チップ用のユニークなコンピテンシー一覧（POSITIONSで使われている順） */
const ALL_CMP_IDS = (() => { const seen = new Set(), out = [];
  POSITIONS.forEach(p => p.competencyIds.forEach(id => { if (!seen.has(id)) { seen.add(id); out.push(id); } }));
  return out; })();

/* STARS の5項目定義 */
const STARS = [
  { key: "situation", letter: "S", name: "Situation（状況）", hint: "どんな場面・背景だった？" },
  { key: "task",      letter: "T", name: "Task（課題・役割）", hint: "何を求められていた？自分の役割は？" },
  { key: "action",    letter: "A", name: "Action（行動）", hint: "具体的にどう動いた？" },
  { key: "result",    letter: "R", name: "Result（結果）", hint: "結果は？できれば数字で（例：66→69 / +5pt）", result: true },
  { key: "selfref",   letter: "S", name: "Self-reflection（学び・気づき）", hint: "そこから何を学んだ？次にどう活かす？" }
];


/* ========================= データ層 ========================= */
const LS_KEY = "stars_reflection_v1";
function loadStories(){ try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e){ return []; } }
function saveStories(arr){ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }
let stories = loadStories();

function findCmp(id){ const c = COMPETENCIES[id]; return c ? { cmp: c } : null; }

/* ========================= 画面状態 ========================= */
let draft = null;       // 編集中ストーリー
let activeFilter = "all";

const views = { home:"view-home", select:"view-select", edit:"view-edit", detail:"view-detail", positions:"view-positions", posedit:"view-posedit" };
function show(view){
  Object.values(views).forEach(id=>document.getElementById(id).classList.remove("active"));
  document.getElementById(views[view]).classList.add("active");
  window.scrollTo(0,0);
  const back = document.getElementById("backBtn");
  const act = document.getElementById("topAction");
  const title = document.getElementById("topTitle");
  back.style.visibility = (view==="home") ? "hidden" : "visible";
  act.style.visibility = "hidden";
  document.getElementById("fab").style.display = (view==="home") ? "flex" : "none";
  title.textContent = ({home:"STARS 振り返り", select:"コンピテンシー選択", edit:"STARSメモ", detail:"ストーリー",
    positions:"ポジション・ストーリー", posedit: (curPos ? PS_BY_ID[curPos].jp : "ポジション・ストーリー")})[view];
}

function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* ========================= モーダル ========================= */
const modalEl = document.getElementById("modal");
function openModal({ title, desc, bodyHTML, actions }){
  document.getElementById("modalTitle").textContent = title || "";
  const descEl = document.getElementById("modalDesc");
  descEl.textContent = desc || ""; descEl.style.display = desc ? "block" : "none";
  document.getElementById("modalBody").innerHTML = bodyHTML || "";
  const act = document.getElementById("modalActions"); act.innerHTML = "";
  (actions||[]).forEach(a=>{ const b = document.createElement("button");
    b.className = a.primary ? "m-primary" : "m-ghost"; b.textContent = a.label; b.onclick = a.onClick; act.appendChild(b); });
  modalEl.classList.add("show");
}
function closeModal(){ modalEl.classList.remove("show"); }
modalEl.addEventListener("click", e=>{ if (e.target === modalEl) closeModal(); });

/* ========================= HOME ========================= */
function renderHome(){
  // フィルタチップ
  const chips = document.getElementById("filterChips");
  let html = `<button class="chip ${activeFilter==='all'?'on':''}" data-f="all">すべて</button>`;
  POSITIONS.forEach(p=>{
    html += `<button class="chip pos ${activeFilter==='pos:'+p.id?'on':''}" data-f="pos:${p.id}">◆ ${p.name}</button>`;
  });
  ALL_CMP_IDS.forEach(id=>{ const c = COMPETENCIES[id];
    html += `<button class="chip ${activeFilter===id?'on':''}" data-f="${id}">${c.emoji} ${c.jp}</button>`;
  });
  chips.innerHTML = html;
  chips.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{ activeFilter = ch.dataset.f; renderHome(); });

  // リスト
  const list = getFilteredStories();

  const host = document.getElementById("storyList");
  if (!list.length){
    host.innerHTML = `<div class="empty"><div class="big">📝</div>${
      stories.length ? "この条件のストーリーはまだありません。" : "まだ振り返りがありません。<br>右下の ＋ から始めましょう。"
    }</div>`;
    return;
  }
  host.innerHTML = list.map(s=>{
    const f = findCmp(s.cmpId); const c = f ? f.cmp : null;
    const snip = [s.situation, s.action, s.result].filter(Boolean).join(" / ") || "（本文なし）";
    const lifePill = s.lifecycle==="longterm"
      ? `<span class="pill live">● 進行中</span>`
      : `<span class="pill done">当日完結</span>`;
    return `<div class="story" data-id="${s.id}" style="--cmp:${c?c.color:'#999'};--cmp-bg:${c?c.color+'1a':'#eee'}">
      <div class="story-top">
        <span class="badge">${c?c.emoji+' '+c.jp:'?'}</span>
        ${lifePill}
      </div>
      <div class="story-title">${escapeHtml(s.title || (c?c.jp:'') )}</div>
      <div class="story-snip">${escapeHtml(snip)}</div>
      <div class="story-meta" style="justify-content:flex-end">
        <span class="date-sm">${fmtDate(s.createdAt)}${s.updates&&s.updates.length?` · 更新${s.updates.length}`:''}</span>
      </div>
    </div>`;
  }).join("");
  host.querySelectorAll(".story").forEach(el=> el.onclick = ()=> openDetail(el.dataset.id));
}

function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[m])); }

function getFilteredStories(){
  let list = [...stories].sort((a,b)=> (b.updatedAt||b.createdAt) - (a.updatedAt||a.createdAt));
  if (activeFilter.startsWith("pos:")){
    const p = POSITIONS.find(x=>x.id===activeFilter.slice(4));
    const ids = p ? p.competencyIds : [];
    list = list.filter(s=> ids.includes(s.cmpId));
  }
  else if (activeFilter!=="all") list = list.filter(s=> s.cmpId===activeFilter);
  return list;
}

/* ========================= SELECT ========================= */
function renderSelect(){
  const host = document.getElementById("cmpCards");
  host.innerHTML = POSITIONS.map(p=>`
    <div class="pos-head">${p.name}</div>
    <div class="card-grid">
      ${p.competencyIds.map(id=>{ const c = COMPETENCIES[id]; return `
        <div class="cmp-card" data-id="${id}" data-pos="${p.id}" style="--cmp:${c.color}">
          <div class="cmp-emoji">${c.emoji}</div>
          <div class="cmp-jp">${c.jp}</div>
          <div class="cmp-en">${c.en}</div>
          <div class="cmp-desc">${c.desc}</div>
        </div>`; }).join("")}
    </div>`).join("");
  host.querySelectorAll(".cmp-card").forEach(el=> el.onclick = ()=> startDraft(el.dataset.id, el.dataset.pos));
}

/* ========================= EDIT ========================= */
function newId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function startDraft(cmpId, posId){
  draft = {
    id: newId(), cmpId, posId: posId || null,
    title:"", situation:"", task:"", action:"", result:"", selfref:"",
    lifecycle: "oneday", brainstorm: {},
    createdAt: Date.now(), updatedAt: Date.now(), updates: [],
    isNew: true
  };
  renderEdit();
  show("edit");
}

function editExisting(id){
  const s = stories.find(x=>x.id===id);
  if(!s) return;
  draft = JSON.parse(JSON.stringify(s));
  draft.isNew = false;
  renderEdit();
  show("edit");
}

function renderEdit(){
  const f = findCmp(draft.cmpId); const c = f.cmp;
  document.body.style.setProperty("--cmp", c.color);

  // ピン留めコンピテンシー（解説はタップで展開）
  document.getElementById("pinnedHost").innerHTML = `
    <div class="pinned" style="--cmp:${c.color}">
      <div class="pinned-head" id="pinnedHead">
        <span style="font-size:20px">${c.emoji}</span>
        <span><span class="pinned-jp">${c.jp}</span> <span class="pinned-en">${c.en}</span></span>
        <span class="pinned-toggle" id="pinnedToggle">解説 ▾</span>
      </div>
      <div class="pinned-body" id="pinnedBody">
        <div>${c.desc}</div>
        <div class="lbl" style="margin-top:8px">優れたスキルレベル</div>
        <ul>${c.bullets.map(b=>`<li>${b}</li>`).join("")}</ul>
      </div>
    </div>`;
  const head = document.getElementById("pinnedHead");
  const body = document.getElementById("pinnedBody");
  const tog = document.getElementById("pinnedToggle");
  head.onclick = ()=>{ const open = body.classList.toggle("open"); tog.textContent = open ? "解説 ▴" : "解説 ▾"; };

  // 記入開始日（自動取得・表示のみ）
  document.getElementById("startDateLine").textContent = `📅 記入開始日：${fmtDate(draft.createdAt)}（自動）`;

  // アイデア出し（樹形図）
  renderBrainstorm(c);

  // STARS フィールド
  document.getElementById("starsFields").innerHTML = STARS.map(fld=>`
    <div class="field">
      <div class="field-label">
        <span class="field-letter" style="background:${c.color}">${fld.letter}</span>
        <span><span class="field-name">${fld.name}</span></span>
      </div>
      <div class="field-hint">${fld.hint}</div>
      <textarea data-key="${fld.key}" class="${fld.result?'result-field':''}" placeholder="${fld.hint}">${escapeHtml(draft[fld.key])}</textarea>
    </div>`).join("");
  document.querySelectorAll("#starsFields textarea").forEach(ta=>{
    ta.oninput = ()=>{ draft[ta.dataset.key] = ta.value; };
  });

  // 寿命
  document.querySelectorAll("#lifeSeg .seg-btn").forEach(b=>{
    b.classList.toggle("on", b.dataset.life===draft.lifecycle);
    b.onclick = ()=>{ draft.lifecycle = b.dataset.life; document.querySelectorAll("#lifeSeg .seg-btn").forEach(x=>x.classList.toggle("on", x.dataset.life===draft.lifecycle)); };
  });

  document.getElementById("deleteBtn").style.display = draft.isNew ? "none" : "block";
}

/* ========================= アイデア出し（樹形図） =========================
   コンピテンシーの「優れたスキルレベル」を疑問形に変換して問いかけ、
   思いついたメモ（葉）をSTARSの各欄へ流し込めるようにする。
   draft.brainstorm = { [bulletIndex]: ["メモ1","メモ2", ...] } として保存。 */
const SEND_LABEL = { situation:"状況", task:"課題", action:"行動", result:"結果", selfref:"学び" };
const Q_SUFFIX = [
  "こんな場面、ありましたか？",
  "思い当たる出来事は？",
  "最近、こういう動きをした？",
  "どんな時に発揮できた？",
  "ピンとくる瞬間は？"
];
function bsQuestion(stem, i){ return { quote: (stem||"").replace(/[。.\s]+$/,""), ask: Q_SUFFIX[i % Q_SUFFIX.length] }; }

function renderBrainstorm(c){
  draft.brainstorm = draft.brainstorm || {};
  const open = draft._bsOpen !== false;   // 既定は開いた状態（問いを見ながら考えてもらう）
  const sendBtns = (i,j)=> STARS.map(f=>
    `<button class="bs-send-btn" data-act="send" data-key="${f.key}" data-i="${i}" data-j="${j}">${SEND_LABEL[f.key]}</button>`
  ).join("");

  const branches = c.bullets.map((b,i)=>{
    const q = bsQuestion(b,i);
    const ideas = draft.brainstorm[i] || [];
    const leaves = ideas.map((tx,j)=>`
      <div class="bs-leaf">
        <div class="bs-leaf-main">
          <div class="bs-leaf-text">${escapeHtml(tx)}</div>
          <div class="bs-send">${sendBtns(i,j)}</div>
        </div>
        <button class="bs-leaf-del" data-act="del" data-i="${i}" data-j="${j}" title="削除">✕</button>
      </div>`).join("");
    return `<div class="bs-branch">
      <div class="bs-q"><span class="quote">「${escapeHtml(q.quote)}」</span><span class="ask">${q.ask}</span></div>
      <div class="bs-leaves">${leaves}</div>
      <div class="bs-add">
        <input type="text" data-i="${i}" placeholder="思いついたことをメモ…">
        <button data-act="add" data-i="${i}">＋</button>
      </div>
    </div>`;
  }).join("");

  document.getElementById("bsHost").innerHTML = `
    <div class="bs-card" style="--cmp:${c.color}">
      <div class="bs-head" id="bsHead">
        <span class="bs-root-emoji">${c.emoji}</span>
        <span class="bs-title">${c.jp} のアイデア出し <span class="en">${c.en}</span></span>
        <span class="bs-toggle" id="bsToggle">${open?"閉じる ▴":"ひらく ▾"}</span>
      </div>
      <p class="bs-sub">「優れたスキルレベル」を問いに変えました。思い当たる出来事をメモして、STARSへ流し込もう。</p>
      <div class="bs-body ${open?'open':''}" id="bsBody">${branches}</div>
    </div>`;

  const bodyEl = document.getElementById("bsBody");
  document.getElementById("bsHead").onclick = ()=>{
    const isOpen = bodyEl.classList.toggle("open");
    draft._bsOpen = isOpen;
    document.getElementById("bsToggle").textContent = isOpen ? "閉じる ▴" : "ひらく ▾";
  };
  bodyEl.querySelectorAll("[data-act='add']").forEach(btn=>{
    btn.onclick = ()=>{ const i=+btn.dataset.i; const inp=bodyEl.querySelector(`.bs-add input[data-i="${i}"]`); bsAddIdea(i, inp.value); };
  });
  bodyEl.querySelectorAll(".bs-add input").forEach(inp=>{
    inp.onkeydown = (e)=>{ if(e.key==="Enter"){ e.preventDefault(); bsAddIdea(+inp.dataset.i, inp.value); } };
  });
  bodyEl.querySelectorAll("[data-act='del']").forEach(btn=>{
    btn.onclick = ()=> bsDelIdea(+btn.dataset.i, +btn.dataset.j);
  });
  bodyEl.querySelectorAll("[data-act='send']").forEach(btn=>{
    btn.onclick = ()=> bsFlow(btn.dataset.key, +btn.dataset.i, +btn.dataset.j);
  });
}

function bsAddIdea(i, text){
  text = (text||"").trim(); if(!text) return;
  draft.brainstorm[i] = draft.brainstorm[i] || [];
  draft.brainstorm[i].push(text);
  draft._bsOpen = true;
  renderBrainstorm(findCmp(draft.cmpId).cmp);
  const inp = document.querySelector(`#bsBody .bs-add input[data-i="${i}"]`);
  if(inp) inp.focus();
}
function bsDelIdea(i, j){
  if(!draft.brainstorm[i]) return;
  draft.brainstorm[i].splice(j,1);
  if(!draft.brainstorm[i].length) delete draft.brainstorm[i];
  renderBrainstorm(findCmp(draft.cmpId).cmp);
}
function bsFlow(key, i, j){
  const text = ((draft.brainstorm[i]||[])[j] || "").trim();
  if(!text) return;
  const cur = (draft[key]||"").trim();
  draft[key] = cur ? cur + "\n" + text : text;
  const ta = document.querySelector(`#starsFields textarea[data-key="${key}"]`);
  if(ta) ta.value = draft[key];
  toast(`${SEND_LABEL[key]} に入れました ✓`);
}

function deriveTitle(d){
  const base = (d.situation || d.task || d.action || "").trim().split(/\n/)[0];
  if (base) return base.length > 40 ? base.slice(0,40)+"…" : base;
  const f = findCmp(d.cmpId); return f ? f.cmp.jp : "無題";
}

/* 書きかけがあれば保存する。保存したら true（空っぽなら false）。
   保存ボタンを押さずに戻っても消えないよう、戻る／離脱時にも使う。 */
function draftHasContent(){
  if(!draft) return false;
  const hasStars = ["situation","task","action","result","selfref"].some(k=> (draft[k]||"").trim());
  const hasIdeas = Object.values(draft.brainstorm||{}).some(arr=> (arr||[]).length);
  return hasStars || hasIdeas;
}
function persistDraftIfAny(){
  if(!draftHasContent()) return false;
  draft.title = deriveTitle(draft);
  draft.updatedAt = Date.now();
  const idx = stories.findIndex(s=>s.id===draft.id);
  const isUpdate = idx>=0;
  const clean = {...draft}; delete clean.isNew; delete clean._bsOpen;
  if (isUpdate) stories[idx] = clean; else stories.unshift(clean);
  saveStories(stories);
  if (window.Career) Career.log({ action: "reflection", summary: (isUpdate ? "STAR経験を更新：" : "STAR経験を記録：") + (draft.title || "無題") });
  draft.isNew = false;   // 以後は「既存ストーリー」として扱う
  return true;
}
function saveDraft(){
  if(!persistDraftIfAny()){ toast("ひとことでも書いてから保存してね"); return; }
  toast("保存しました ✓");
  renderHome();
  openDetail(draft.id);
}

function deleteDraft(){
  if(!confirm("このストーリーを削除しますか？")) return;
  stories = stories.filter(s=>s.id!==draft.id);
  saveStories(stories);
  toast("削除しました");
  renderHome();
  show("home");
}

    extra = `<div class="detail-block">
      <div class="dl"><span class="field-name">📈 これまでの進展</span></div>
      <div class="timeline" style="--cmp:${c.color}">${items}</div>
      <div class="add-update">
        <textarea id="updText" placeholder="進展・新しい動きを追記…"></textarea>
        <button id="updBtn">追加</button>
      </div>
    </div>`;
  } else {
    extra = `<div class="detail-block refl">
      <div class="dl"><span class="field-name">🔁 当日の振り返り</span></div>
      <div class="dtext" style="color:#6e6e73">このストーリーは当日完結。学び（Self-reflection）を読み返して、明日に活かそう。<br>後から内容を直したくなったら「編集」へ。</div>
    </div>`;
  }

  document.getElementById("detailHost").innerHTML = `
    <div class="story-top" style="margin-bottom:10px">
      <span class="badge" style="--cmp:${c.color};--cmp-bg:${c.color}1a">${c.emoji} ${c.jp}</span>
      ${lifeLine}
    </div>
    <h1 class="page" style="font-size:22px;margin-bottom:14px">${escapeHtml(s.title||c.jp)}</h1>
    <p class="sub">${c.en} · ${fmtDate(s.createdAt)} 記録</p>
    ${blocks || '<div class="detail-block"><div class="dtext" style="color:#6e6e73">本文なし</div></div>'}
    ${extra}
    <button class="primary" id="detImg" style="background:#fff;color:var(--accent);border:1px solid var(--line)">🖼 画像で書き出す</button>
    <button class="primary" id="detEdit" style="background:#1d1d1f">編集する</button>
    <button class="ghost" id="detDel">削除</button>
  `;

  document.getElementById("detImg").onclick = ()=> exportStoryImage(s);
  document.getElementById("detEdit").onclick = ()=> editExisting(id);
  document.getElementById("detDel").onclick = ()=>{
    if(!confirm("このストーリーを削除しますか？")) return;
    stories = stories.filter(x=>x.id!==id); saveStories(stories); renderHome(); show("home"); toast("削除しました");
  };
  const updBtn = document.getElementById("updBtn");
  if (updBtn) updBtn.onclick = ()=>{
    const ta = document.getElementById("updText"); const txt = ta.value.trim();
    if(!txt) return;
    s.updates = s.updates || [];
    s.updates.unshift({ ts: Date.now(), text: txt });
    s.updatedAt = Date.now();
    saveStories(stories); renderHome(); openDetail(id); toast("追記しました ✓");
  };

  // 進展の編集・削除
  document.querySelectorAll(".tl-edit").forEach(b=> b.onclick = ()=> editUpdate(s, +b.dataset.ui, id));
  document.querySelectorAll(".tl-del").forEach(b=> b.onclick = ()=>{
    if(!confirm("この進展を削除しますか？")) return;
    s.updates.splice(+b.dataset.ui, 1); s.updatedAt = Date.now();
    saveStories(stories); renderHome(); openDetail(id); toast("削除しました");
  });

  show("detail");
}

function editUpdate(s, ui, id){
  const item = document.querySelector(`.tl-item[data-ui="${ui}"]`);
  if(!item || !s.updates[ui]) return;
  const textEl = item.querySelector(".tl-text");
  const toolsEl = item.querySelector(".tl-tools");
  if(toolsEl) toolsEl.style.display = "none";
  textEl.outerHTML = `
    <textarea class="tl-editbox">${escapeHtml(s.updates[ui].text)}</textarea>
    <div class="tl-editrow">
      <button class="save">保存</button>
      <button class="cancel">取消</button>
    </div>`;
  const box = item.querySelector(".tl-editbox");
  box.focus(); box.style.height = "auto"; box.style.height = box.scrollHeight + "px";
  item.querySelector(".save").onclick = ()=>{
    const v = box.value.trim();
    if(!v){ toast("内容を入れてね"); return; }
    s.updates[ui].text = v; s.updates[ui].edited = true; s.updatedAt = Date.now();
    saveStories(stories); renderHome(); openDetail(id); toast("更新しました ✓");
  };
  item.querySelector(".cancel").onclick = ()=> openDetail(id);
}

/* ========================= 画像で書き出し ========================= */
const IMG_FONT = (w,s)=>`${w} ${s}px -apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif`;
function wrapPara(ctx, text, maxW){
  const out = [];
  (text||"").split("\n").forEach(p=>{
    if(!p){ out.push(""); return; }
    let line = "";
    for(const ch of p){
      if(ctx.measureText(line+ch).width > maxW && line){ out.push(line); line = ch; }
      else line += ch;
    }
    out.push(line);
  });
  return out;
}
function exportStoryImage(s){
  const f = findCmp(s.cmpId);
  const c = f ? f.cmp : { color:"#0071e3", emoji:"⭐️", jp:"", en:"" };
  const accent = c.color;
  const W = 540, PAD = 22, CARDX = PAD, CARDW = W - PAD*2, IN = 18, GAP = 12, BAR = 4, maxTextW = CARDW - IN*2;
  const mc = document.createElement("canvas").getContext("2d");

  // セクション（STARSの各項目＋長期の進展）
  const sections = [];
  STARS.forEach(fld=>{
    const val = (s[fld.key]||"").trim();
    if(!val) return;
    sections.push({
      letter: fld.letter, label: fld.name, refl: fld.key==="selfref",
      blocks: [{ text: val, font: IMG_FONT(fld.key==="selfref"?600:500, fld.key==="result"?19:18), color:"#1d1d1f", lineH:27 }]
    });
  });
  if(s.lifecycle==="longterm" && (s.updates||[]).length){
    sections.push({
      letter: "📈", label: "これまでの進展", refl: false,
      blocks: (s.updates||[]).map(u=>({ text:`・[${fmtDate(u.ts)}] ${u.text}`, font: IMG_FONT(500,16), color:"#1d1d1f", lineH:24 }))
    });
  }
  if(!sections.length){
    sections.push({ letter:null, label:"記録", refl:false, blocks:[{ text:"（本文なし）", font:IMG_FONT(500,16), color:"#9a9aa0", lineH:24 }] });
  }

  // ヘッダー寸法
  mc.font = IMG_FONT(700,22);
  const titleLines = wrapPara(mc, s.title || c.jp, CARDW);
  const headBottom = 74 + titleLines.length*30;

  // 各セクション高さ
  sections.forEach(sec=>{
    let h = IN + 24 + 8;
    sec._wrapped = sec.blocks.map(b=>{ mc.font = b.font; const wl = wrapPara(mc, b.text, maxTextW); h += wl.length*b.lineH + (b.gap||0); return wl; });
    h += IN; sec._h = h;
  });
  const footerH = 40;
  const totalH = Math.ceil(headBottom + 8 + sections.reduce((a,x)=>a+x._h+GAP, 0) + footerH);

  const scale = 2, cv = document.createElement("canvas");
  cv.width = W*scale; cv.height = totalH*scale;
  const ctx = cv.getContext("2d"); ctx.scale(scale,scale); ctx.textBaseline = "top";
  ctx.fillStyle = "#f5f5f7"; ctx.fillRect(0,0,W,totalH);
  function rr(x,yy,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,yy); ctx.arcTo(x+w,yy,x+w,yy+h,r); ctx.arcTo(x+w,yy+h,x,yy+h,r); ctx.arcTo(x,yy+h,x,yy,r); ctx.arcTo(x,yy,x+w,yy,r); ctx.closePath(); }

  // ヘッダー
  let y = 24;
  ctx.fillStyle = accent; ctx.font = IMG_FONT(800,15);
  ctx.fillText(`${c.emoji} ${c.jp}`, PAD, y+2);
  const dtxt = fmtDate(s.createdAt);
  ctx.font = IMG_FONT(700,13); const dw = ctx.measureText(dtxt).width;
  ctx.fillStyle = accent + "1a"; rr(W-PAD-dw-20, y-2, dw+20, 24, 12); ctx.fill();
  ctx.fillStyle = accent; ctx.fillText(dtxt, W-PAD-dw-10, y+3);
  y += 34;
  ctx.fillStyle = "#1d1d1f"; ctx.font = IMG_FONT(700,22);
  titleLines.forEach(l=>{ ctx.fillText(l, PAD, y); y += 30; });
  y += 8;

  // セクション
  sections.forEach(sec=>{
    const cardY = y;
    ctx.fillStyle = sec.refl ? "#fffdf6" : "#ffffff"; rr(CARDX, cardY, CARDW, sec._h, 14); ctx.fill();
    ctx.strokeStyle = sec.refl ? "#ffe7b0" : "#ececf0"; ctx.lineWidth = 1; rr(CARDX+.5, cardY+.5, CARDW-1, sec._h-1, 14); ctx.stroke();
    ctx.fillStyle = accent; rr(CARDX, cardY+12, BAR, sec._h-24, 2); ctx.fill();
    const cx = CARDX + IN; let cy = cardY + IN;
    if(sec.letter && sec.letter.length===1){
      ctx.fillStyle = accent; rr(cx, cy-1, 20, 20, 6); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = IMG_FONT(800,12); ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(sec.letter, cx+10, cy+10); ctx.textAlign = "left"; ctx.textBaseline = "top";
      ctx.fillStyle = accent; ctx.font = IMG_FONT(700,14); ctx.fillText(sec.label, cx+28, cy+2);
    } else {
      ctx.fillStyle = accent; ctx.font = IMG_FONT(700,14); ctx.fillText((sec.letter?sec.letter+" ":"") + sec.label, cx, cy+2);
    }
    cy += 24 + 8;
    sec.blocks.forEach((b,bi)=>{ ctx.font = b.font; ctx.fillStyle = b.color; sec._wrapped[bi].forEach(l=>{ ctx.fillText(l, cx, cy); cy += b.lineH; }); cy += (b.gap||0); });
    y = cardY + sec._h + GAP;
  });

  // フッター
  ctx.fillStyle = "#9a9aa0"; ctx.font = IMG_FONT(500,12);
  ctx.fillText(`Reflection ・ ${c.en} ・ ${fmtDate(s.createdAt)}`, PAD, y+6);

  const safe = (s.title || c.jp || "reflection").replace(/[\\/:*?"<>|\s]/g, "_").slice(0,30);
  const d = new Date(s.createdAt);
  const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  const fname = `STARS_${safe}_${ymd}.png`;
  cv.toBlob(b=>{ if(!b){ toast("画像化に失敗しました"); return; } showImageSheet(URL.createObjectURL(b), b, fname); }, "image/png");
}
function showImageSheet(url, blob, fname){
  openModal({
    title: "🖼 画像で書き出し",
    desc: "画像を長押しでも保存・共有できます。下のボタンからもどうぞ。",
    bodyHTML: `<div class="imgwrap"><img src="${url}" alt="振り返りカード"></div>`,
    actions: [
      { label: "閉じる", primary: false, onClick: ()=>{ closeModal(); setTimeout(()=>URL.revokeObjectURL(url), 500); } },
      { label: "保存・共有", primary: true, onClick: async ()=>{
          try {
            const file = new File([blob], fname, { type:"image/png" });
            if(navigator.canShare && navigator.canShare({ files:[file] })){ await navigator.share({ files:[file], title:"STARS 振り返り" }); }
            else { const a = document.createElement("a"); a.href = url; a.download = fname; document.body.appendChild(a); a.click(); a.remove(); toast("画像を保存しました"); }
          } catch(e) {}
      } }
    ]
  });
}

    role:"エキスパートは、Appleのエコシステム全体の製品やサービスについて深く理解し、製品の販売、Appleの各種サービスの提案、卓越したカスタマーエクスペリエンスの提供に優れた能力を発揮します。また、優れた接客とはどういうものかを体現し、成果を上げるための方法について同僚のメンターとしての役割を担います。" },
  { id:"specialist", jp:"スペシャリスト", en:"Specialist", emoji:"🧭", color:"#ff9500", bg:"#fff4e6",
    role:"スペシャリストは、ブランドロイヤルティを構築し、Appleの製品やサービスのオーナーを創出します。そして、ほかに類を見ないカスタマーサービスを販売、提供することに力を尽くします。スペシャリストには好奇心が必要です。お客様のニーズを知るために質問し、お客様の人生を豊かにする製品やサービスを一人ひとりに合わせて提案します。" }
];
const PS_BY_ID = Object.fromEntries(PS_POSITIONS.map(p=>[p.id,p]));
const esc = escapeHtml;   // 既存の escapeHtml を流用

const PS_LS_KEY = "stars_position_story_v1";
const PS_SB_URL = "https://okbjqtdirrathscctyvx.supabase.co";
const PS_SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y";
const PS_ROW_ID = "position_story_kodai";

let PSDB = psLoadLocal();
let curPos = null;
let psSb = null;
try { if (window.supabase) psSb = window.supabase.createClient(PS_SB_URL, PS_SB_ANON, { auth:{persistSession:false} }); } catch(e){}
let psPushTimer = null, psPushing = false;

function psEmpty(){ return { positions:{}, _ts:0 }; }
function psLoadLocal(){ try { const d = JSON.parse(localStorage.getItem(PS_LS_KEY)); return (d && d.positions) ? d : psEmpty(); } catch(e){ return psEmpty(); } }
function psSaveLocal(){ localStorage.setItem(PS_LS_KEY, JSON.stringify(PSDB)); }
function psGet(id){ if(!PSDB.positions[id]) PSDB.positions[id] = { sections:[], updatedAt:0 }; return PSDB.positions[id]; }
function psChars(p){ return (p.sections||[]).reduce((a,s)=> a + (s.heading||"").length + (s.body||"").length, 0); }
function psSetSync(t){ ["psSync","psSyncEdit"].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent=t; }); }

function psTouch(){
  PSDB._ts = Date.now(); psSaveLocal();
  if(!psSb) return;
  psSetSync("…"); clearTimeout(psPushTimer); psPushTimer = setTimeout(psPush, 1200);
}
async function psPush(){
  if(!psSb || psPushing) return;
  psPushing = true; psSetSync("同期中…");
  try {
    const res = await psSb.from("grownote_state").upsert({ id: PS_ROW_ID, state: PSDB, updated_at: new Date().toISOString() });
    if(res.error){ console.error(res.error); psSetSync("⚠ 同期失敗"); } else psSetSync("✓ 同期済み");
  } catch(e){ console.error(e); psSetSync("⚠ 同期失敗"); }
  finally { psPushing = false; }
}
async function psPull(){
  if(!psSb) return null;
  try {
    const res = await psSb.from("grownote_state").select("state").eq("id", PS_ROW_ID).maybeSingle();
    if(res.error){ console.error(res.error); return null; }
    if(res.data && res.data.state && res.data.state.positions) return res.data.state;
  } catch(e){ console.error(e); }
  return null;
}
function psAdoptIfNewer(cloud){ if(cloud && (cloud._ts||0) > (PSDB._ts||0)){ PSDB = cloud; psSaveLocal(); return true; } return false; }
function psIsEditing(){ const a = document.activeElement; return a && (a.tagName==="TEXTAREA" || (a.tagName==="INPUT" && a.classList.contains("sec-h"))); }
function psRerender(){
  if(document.getElementById("view-posedit").classList.contains("active") && curPos) renderPosEdit(curPos);
  else if(document.getElementById("view-positions").classList.contains("active")) renderPositions();
}
async function psBootstrap(){
  if(!psSb){ psSetSync("オフライン（この端末のみ）"); return; }
  psSetSync("読込中…");
  const cloud = await psPull();
  if(cloud){
    if(psAdoptIfNewer(cloud)) psRerender();
    psSetSync("✓ 同期済み");
    if((PSDB._ts||0) > (cloud._ts||0)) psPush();
  } else {
    if(Object.keys(PSDB.positions).length){ psSetSync("初回アップロード中…"); await psPush(); }
    else psSetSync("✓ 同期済み");
  }
}
document.addEventListener("visibilitychange", async ()=>{
  if(document.visibilityState !== "visible" || !psSb) return;
  if(psIsEditing()) return;
  const cloud = await psPull();
  if(cloud && psAdoptIfNewer(cloud)){ psRerender(); toast("別の端末の更新を反映しました"); }
});

/* ---------- ポジション一覧 ---------- */
function renderPositions(){
  const host = document.getElementById("posList");
  host.innerHTML = PS_POSITIONS.map(p=>{
    const d = PSDB.positions[p.id];
    const n = d ? psChars(d) : 0;
    const stat = n>0 ? `✍️ ${n.toLocaleString()}文字` : "まだ書いていません";
    const date = (n>0 && d && d.updatedAt) ? `更新 ${fmtDate(d.updatedAt)}` : "";
    return `<div class="pos-card" data-id="${p.id}" style="--pos:${p.color};--pos-bg:${p.bg}">
      <span class="pos-arrow">›</span>
      <div class="pos-top">
        <div class="pos-emoji">${p.emoji}</div>
        <div><div class="pos-jp">${p.jp}</div><div class="pos-en">${p.en}</div></div>
      </div>
      <div class="pos-role">${esc(p.role)}</div>
      <div class="pos-foot"><span class="pos-stat">${stat}</span><span class="pos-date">${date}</span></div>
    </div>`;
  }).join("");
  host.querySelectorAll(".pos-card").forEach(el=>{ el.onclick = ()=> openPosEdit(el.dataset.id); });
}

/* ---------- 編集（説明＋セクション） ---------- */
function openPosEdit(id){ curPos = id; show("posedit"); renderPosEdit(id); }  // 先に可視化してから描画（psAutoGrowが高さを正しく計測できるように）
function renderPosEdit(id){
  const p = PS_BY_ID[id];
  document.documentElement.style.setProperty("--pos", p.color);
  document.documentElement.style.setProperty("--pos-bg", p.bg);
  const pos = psGet(id);
  if(!pos.sections.length) pos.sections.push({ heading:"", body:"" });
  document.getElementById("descHost").innerHTML = `
    <div class="desc-card">
      <div class="desc-head" id="descHead">
        <div class="desc-emoji">${p.emoji}</div>
        <div><div class="desc-jp">${p.jp}</div><div class="desc-en">${p.en} ・ Apple Retail</div></div>
        <div class="desc-toggle" id="descToggle">説明 ▾</div>
      </div>
      <div class="desc-body" id="descBody">
        <span class="tag">この役割</span>
        <div class="lead">${esc(p.role)}</div>
        <div class="common">${esc(PS_COMMON_INTRO)}</div>
      </div>
    </div>`;
  const body = document.getElementById("descBody"), tg = document.getElementById("descToggle");
  document.getElementById("descHead").onclick = ()=>{ const open = body.classList.toggle("open"); tg.textContent = open ? "説明 ▴" : "説明 ▾"; };
  document.getElementById("topTitle").textContent = p.jp;
  renderSections(id);
}
function renderSections(id){
  const pos = psGet(id);
  const host = document.getElementById("secList");
  host.innerHTML = pos.sections.map((s,i)=>`
    <div class="sec" data-i="${i}">
      <div class="sec-bar">
        <div class="sec-no">${i+1}</div>
        <div class="sec-tools">
          <button class="up" title="上へ" ${i===0?"disabled":""}>↑</button>
          <button class="down" title="下へ" ${i===pos.sections.length-1?"disabled":""}>↓</button>
          <button class="del" title="削除">🗑</button>
        </div>
      </div>
      <input class="sec-h" type="text" placeholder="見出し（任意）— 例：私が大切にしていること" value="${esc(s.heading)}">
      <textarea class="sec-b" placeholder="ここに自由に綴ってください。文量はいくらでもOK。">${esc(s.body)}</textarea>
    </div>`).join("");
  host.querySelectorAll(".sec").forEach(secEl=>{
    const i = +secEl.dataset.i, ta = secEl.querySelector(".sec-b");
    psAutoGrow(ta);
    secEl.querySelector(".sec-h").addEventListener("input", e=>{ pos.sections[i].heading = e.target.value; pos.updatedAt = Date.now(); psTouch(); });
    ta.addEventListener("input", e=>{ pos.sections[i].body = e.target.value; psAutoGrow(ta); pos.updatedAt = Date.now(); psTouch(); });
    secEl.querySelector(".up").onclick   = ()=> psMove(id, i, -1);
    secEl.querySelector(".down").onclick = ()=> psMove(id, i, 1);
    secEl.querySelector(".del").onclick  = ()=> psDelete(id, i);
  });
}
function psMove(id, i, dir){
  const pos = psGet(id), j = i + dir;
  if(j < 0 || j >= pos.sections.length) return;
  [pos.sections[i], pos.sections[j]] = [pos.sections[j], pos.sections[i]];
  pos.updatedAt = Date.now(); psTouch(); renderSections(id);
}
function psDelete(id, i){
  const pos = psGet(id), s = pos.sections[i];
  const empty = !(s.heading||"").trim() && !(s.body||"").trim();
  const doDel = ()=>{ pos.sections.splice(i,1); if(!pos.sections.length) pos.sections.push({ heading:"", body:"" });
    pos.updatedAt = Date.now(); psTouch(); renderSections(id); };
  if(empty){ doDel(); return; }
  openModal({ title:"セクションを削除", desc:"このセクションの内容を削除します。元に戻せません。",
    actions:[ { label:"キャンセル", primary:false, onClick: closeModal },
              { label:"削除する", primary:true, onClick: ()=>{ closeModal(); doDel(); } } ] });
}
function psAutoGrow(ta){ ta.style.height = "auto"; ta.style.height = Math.max(ta.scrollHeight, 70) + "px"; }
document.getElementById("addSec").onclick = ()=>{
  const pos = psGet(curPos);
  pos.sections.push({ heading:"", body:"" });
  pos.updatedAt = Date.now(); psTouch(); renderSections(curPos);
  const last = document.getElementById("secList").lastElementChild;
  if(last){ last.querySelector(".sec-h").focus(); last.scrollIntoView({behavior:"smooth", block:"center"}); }
};

/* ---------- 画像で書き出し（既存の wrapPara / IMG_FONT / showImageSheet を流用） ---------- */
function psExport(id){
  const p = PS_BY_ID[id], pos = psGet(id), accent = p.color;
  const W = 560, PAD = 22, CARDW = W - PAD*2, IN = 18, GAP = 12, BAR = 4, maxTextW = CARDW - IN*2;
  const mc = document.createElement("canvas").getContext("2d");
  const secs = pos.sections.filter(s => (s.heading||"").trim() || (s.body||"").trim());
  const cards = [];
  cards.push({ tag:"この役割", blocks:[{ text:p.role, font:IMG_FONT(500,17), color:"#1d1d1f", lineH:27 }] });
  secs.forEach((s,i)=>{
    const blocks = [];
    if((s.heading||"").trim()) blocks.push({ text:s.heading.trim(), font:IMG_FONT(800,17), color:accent, lineH:26, gap:4 });
    if((s.body||"").trim())    blocks.push({ text:s.body.trim(), font:IMG_FONT(500,16), color:"#1d1d1f", lineH:26 });
    if(blocks.length) cards.push({ no:i+1, blocks });
  });
  mc.font = IMG_FONT(700,24);
  const titleLines = wrapPara(mc, p.jp, CARDW - 58);
  const headBottom = 30 + 56 + Math.max(0,(titleLines.length-1))*32 + 14;
  cards.forEach(c=>{
    let h = IN + (c.tag ? 22 : 0);
    const tw = maxTextW - (c.no ? 26 : 0);   // 番号バッジ分のインデントを折り返し幅から差し引く
    c._wrapped = c.blocks.map(b=>{ mc.font = b.font; const wl = wrapPara(mc, b.text, tw); h += wl.length*b.lineH + (b.gap||0); return wl; });
    h += IN; c._h = h;
  });
  const totalH = Math.ceil(headBottom + 6 + cards.reduce((a,x)=>a+x._h+GAP,0) + 38);
  const scale = 2, cv = document.createElement("canvas");
  cv.width = W*scale; cv.height = totalH*scale;
  const ctx = cv.getContext("2d"); ctx.scale(scale,scale); ctx.textBaseline = "top";
  ctx.fillStyle = "#f5f5f7"; ctx.fillRect(0,0,W,totalH);
  function rr(x,yy,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,yy); ctx.arcTo(x+w,yy,x+w,yy+h,r); ctx.arcTo(x+w,yy+h,x,yy+h,r); ctx.arcTo(x,yy+h,x,yy,r); ctx.arcTo(x,yy,x+w,yy,r); ctx.closePath(); }
  let y = 30;
  ctx.fillStyle = p.bg; rr(PAD, y, 46, 46, 13); ctx.fill();
  ctx.font = IMG_FONT(400,26); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(p.emoji, PAD+23, y+25); ctx.textAlign="left"; ctx.textBaseline="top";
  let ty = y + (titleLines.length>1 ? 2 : 6);
  ctx.fillStyle = "#1d1d1f"; ctx.font = IMG_FONT(700,24);
  titleLines.forEach(l=>{ ctx.fillText(l, PAD+58, ty); ty += 32; });
  ctx.fillStyle = accent; ctx.font = IMG_FONT(700,12);
  ctx.fillText(p.en.toUpperCase() + " ・ APPLE RETAIL", PAD+58, ty);
  y = headBottom + 6;
  cards.forEach(c=>{
    const cardY = y;
    ctx.fillStyle = "#ffffff"; rr(PAD, cardY, CARDW, c._h, 14); ctx.fill();
    ctx.strokeStyle = "#ececf0"; ctx.lineWidth = 1; rr(PAD+.5, cardY+.5, CARDW-1, c._h-1, 14); ctx.stroke();
    ctx.fillStyle = accent; rr(PAD, cardY+12, BAR, c._h-24, 2); ctx.fill();
    const cx = PAD + IN; let cy = cardY + IN;
    if(c.tag){
      ctx.font = IMG_FONT(700,11); const tw = ctx.measureText(c.tag).width;
      ctx.fillStyle = p.bg; rr(cx, cy, tw+16, 18, 6); ctx.fill();
      ctx.fillStyle = accent; ctx.fillText(c.tag, cx+8, cy+3); cy += 22;
    } else if(c.no){
      ctx.fillStyle = accent; rr(cx, cy+1, 18, 18, 6); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = IMG_FONT(800,11); ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(String(c.no), cx+9, cy+11); ctx.textAlign="left"; ctx.textBaseline="top";
    }
    const tx = c.no ? cx + 26 : cx;
    if(c.no) cy = cardY + IN - 1;
    c.blocks.forEach((b,bi)=>{ ctx.font = b.font; ctx.fillStyle = b.color; c._wrapped[bi].forEach(l=>{ ctx.fillText(l, tx, cy); cy += b.lineH; }); cy += (b.gap||0); });
    y = cardY + c._h + GAP;
  });
  ctx.fillStyle = "#9a9aa0"; ctx.font = IMG_FONT(500,12);
  ctx.fillText(`Position Story ・ ${p.en} ・ ${psChars(pos).toLocaleString()}文字`, PAD, y+4);
  const ymd = (()=>{ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; })();
  const fname = `PositionStory_${p.en.replace(/\s/g,"")}_${ymd}.png`;
  cv.toBlob(b=>{ if(!b){ toast("画像化に失敗しました"); return; } showImageSheet(URL.createObjectURL(b), b, fname); }, "image/png");
}
document.getElementById("psExportBtn").onclick = ()=>{
  const pos = psGet(curPos);
  if(!pos.sections.some(s => (s.heading||"").trim() || (s.body||"").trim())){ toast("まずはストーリーを書いてみましょう ✍️"); return; }
  psExport(curPos);
};

/* ホームのバナーから一覧へ */
document.getElementById("psBanner").onclick = ()=>{ renderPositions(); show("positions"); };

/* 起動 */
renderHome();
psBootstrap();
</script>

<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->

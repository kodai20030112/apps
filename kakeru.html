<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="icons/icon-kakeru.png">
<meta name="apple-mobile-web-app-title" content="カケル">
<title>カケル — ふたりのフルマラソン練習</title>
<style>
  :root{
    --bg:#eef6fb; --card:#ffffff; --ink:#15232e; --sub:#6c8090;
    --line:#e2ecf2; --accent:#1f7fe0; --accent2:#3ad6c5;
    --kodai:#3b93ff; --yuzu:#f5a623; --ok:#34c759; --warn:#ff9500;
    --long:#5b6cff; --pace:#ff9500; --easy:#34c759; --race:#ff2d55;
    --radius:20px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  [hidden]{display:none !important;}
  html,body{overscroll-behavior-y:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 76px);
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .wrap{max-width:560px; margin:0 auto; padding:0 16px;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,select,textarea{font-family:inherit; font-size:16px;}

  /* ===== ヘッダー ===== */
  header{padding:24px 4px 8px; display:flex; align-items:center; gap:10px;}
  header .logo{font-size:28px; line-height:1;}
  header h1{font-size:22px; font-weight:800; letter-spacing:-.02em;}
  header .sync{margin-left:auto; display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--sub); background:var(--card); border:1px solid var(--line);
    border-radius:999px; padding:5px 10px;}
  .sync .dot{width:7px; height:7px; border-radius:50%; background:var(--ok);}
  .sync .dot.off{background:#c7c7cc;}

  /* わたしセレクタ */
  .mebar{display:flex; align-items:center; gap:8px; padding:2px 4px 10px;}
  .meseg{display:flex; gap:4px; background:#dfeaf2; border-radius:999px; padding:3px;}
  .meseg button{font-size:13px; font-weight:700; padding:6px 14px; border-radius:999px; color:var(--sub);}
  .meseg button.on{background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .meseg button.on[data-r="kodai"]{color:var(--kodai);}
  .meseg button.on[data-r="yuzu"]{color:var(--yuzu);}
  .mebar .hint{margin-left:auto; font-size:11px; color:var(--sub);}

  /* ===== カード共通 ===== */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:12px; box-shadow:0 1px 2px rgba(20,60,90,.03);}
  .card h2{font-size:13px; font-weight:700; color:var(--sub); letter-spacing:.02em; margin-bottom:10px;
    display:flex; align-items:center; gap:7px;}
  .card h2 .more{margin-left:auto; font-size:12px; color:var(--accent); font-weight:600;}

  /* カウントダウン */
  .count-card{background:linear-gradient(135deg,#1f7fe0,#3ad6c5); color:#fff; border:none;
    text-align:center; padding:22px 16px;}
  .count-card .ttl{font-size:13px; font-weight:700; opacity:.92;}
  .count-card .big{font-size:60px; font-weight:800; letter-spacing:-.03em; line-height:1; margin:4px 0;}
  .count-card .big small{font-size:20px; font-weight:700; margin-left:4px;}
  .count-card .meta{font-size:12.5px; opacity:.92; margin-top:4px;}
  .count-card .goal{display:inline-flex; gap:6px; margin-top:12px; font-size:12px; font-weight:700;
    background:rgba(255,255,255,.2); border-radius:999px; padding:6px 14px;}

  /* 今日のメニュー */
  .today-empty{font-size:14px; color:var(--sub); padding:6px 2px;}
  .sess{display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px;
    background:#f6fafd; border:1px solid var(--line); margin-bottom:8px;}
  .sess:last-child{margin-bottom:0;}
  .sess .ico{width:42px; height:42px; border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:21px; flex:0 0 auto; background:#fff;}
  .sess .body{min-width:0; flex:1;}
  .sess .nm{font-size:15px; font-weight:700;}
  .sess .ds{font-size:12px; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sess .km{font-size:13px; font-weight:800; color:var(--accent);}
  .sess .act{flex:0 0 auto;}
  .sess .act button{font-size:12px; font-weight:700; color:#fff; background:var(--accent);
    border-radius:999px; padding:7px 13px;}
  .sess .act .done{background:var(--ok);}
  .sess.rest{opacity:.75;}

  /* ふたりの今週 */
  .pair{display:flex; align-items:center; gap:11px; padding:10px 2px; border-top:1px solid var(--line);}
  .pair:first-of-type{border-top:none;}
  .pair .av{width:34px; height:34px; border-radius:50%; flex:0 0 auto; display:flex;
    align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff;}
  .pair .nm{font-size:14px; font-weight:700; flex:0 0 auto; min-width:58px;}
  .dots{display:flex; gap:5px;}
  .dots i{width:11px; height:11px; border-radius:50%; background:#dde7ee;}
  .dots i.on{background:var(--ok);}
  .pair .wk{margin-left:auto; font-size:12px; color:var(--sub); text-align:right;}
  .pair .wk b{color:var(--ink); font-size:14px;}

  /* 最近の記録 / ログ一覧 */
  .log{display:flex; align-items:center; gap:11px; padding:11px 2px; border-top:1px solid var(--line);}
  .log:first-of-type{border-top:none;}
  .log .lt{width:38px; height:38px; border-radius:11px; flex:0 0 auto; display:flex;
    align-items:center; justify-content:center; font-size:18px; background:#f3f7fa;}
  .log .lb{min-width:0; flex:1;}
  .log .l1{font-size:14px; font-weight:700; display:flex; align-items:center; gap:6px;}
  .log .l1 .rdot{width:8px; height:8px; border-radius:50%; flex:0 0 auto;}
  .log .l2{font-size:12px; color:var(--sub);}
  .log .lr{text-align:right; flex:0 0 auto;}
  .log .lr .d{font-size:15px; font-weight:800;}
  .log .lr .p{font-size:11.5px; color:var(--sub);}

  /* 励まし */
  .cheer{background:linear-gradient(135deg,#fff7ec,#ffeede); border:1px solid #ffe2c4;
    border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; font-size:13.5px;
    color:#8a5a1a; font-weight:600; display:flex; gap:10px; align-items:center;}
  .cheer .e{font-size:22px;}

  /* ===== 計画タブ ===== */
  .phase-chip{font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; color:#fff;}
  .pweek{margin-bottom:10px;}
  .pweek .wh{display:flex; align-items:center; gap:9px; margin-bottom:10px;}
  .pweek .wh .wl{font-size:14px; font-weight:800;}
  .pweek .wh .wd{font-size:11.5px; color:var(--sub);}
  .pweek.now{border:2px solid var(--accent);}
  .pweek .nowtag{margin-left:auto; font-size:10px; font-weight:800; color:#fff; background:var(--accent);
    border-radius:999px; padding:3px 9px;}
  .pweek .past{opacity:.5;}

  /* ===== 記録タブ ===== */
  .filt{display:flex; gap:6px; margin-bottom:12px;}
  .filt button{flex:1; font-size:13px; font-weight:700; padding:9px; border-radius:12px;
    background:var(--card); border:1px solid var(--line); color:var(--sub);}
  .filt button.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .stat-row{display:flex; gap:10px; margin-bottom:12px;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:13px 12px; text-align:center;}
  .stat .v{font-size:22px; font-weight:800; letter-spacing:-.02em;}
  .stat .v small{font-size:12px; font-weight:700; color:var(--sub);}
  .stat .k{font-size:11px; color:var(--sub); margin-top:2px;}
  .chart{display:flex; align-items:flex-end; gap:6px; height:120px; padding-top:6px;}
  .chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end;}
  .chart .bar{width:70%; max-width:26px; border-radius:6px 6px 0 0; background:var(--accent); min-height:2px; transition:height .3s;}
  .chart .bar.k{background:var(--kodai);} .chart .bar.y{background:var(--yuzu);}
  .chart .cl{font-size:9.5px; color:var(--sub); line-height:1.2; text-align:center;}
  .chart .cv{font-size:9.5px; font-weight:700; color:var(--ink);}

  /* ===== 本番タブ ===== */
  .goalseg{display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
  .goalseg button{font-size:13px; font-weight:700; padding:8px 12px; border-radius:12px;
    background:var(--card); border:1px solid var(--line); color:var(--sub);}
  .goalseg button.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .ptable{width:100%; border-collapse:collapse; font-size:13.5px;}
  .ptable th,.ptable td{padding:9px 6px; text-align:center; border-bottom:1px solid var(--line);}
  .ptable th{font-size:11px; color:var(--sub); font-weight:700;}
  .ptable td.t{font-weight:800; font-variant-numeric:tabular-nums;}
  .ptable tr:last-child td{border-bottom:none; color:var(--race); font-weight:800;}
  .ck{display:flex; align-items:center; gap:11px; padding:10px 2px; border-top:1px solid var(--line);}
  .ck:first-of-type{border-top:none;}
  .ck .box{width:24px; height:24px; border-radius:7px; border:2px solid var(--line); flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff;}
  .ck.on .box{background:var(--ok); border-color:var(--ok);}
  .ck .t{font-size:14px;}
  .ck.on .t{color:var(--sub); text-decoration:line-through;}
  .fuel{font-size:13.5px; line-height:1.8;}
  .fuel li{margin-left:18px;}

  /* ===== FAB ===== */
  .fab{position:fixed; right:18px; bottom:calc(env(safe-area-inset-bottom) + 86px); z-index:50;
    width:56px; height:56px; border-radius:50%; background:var(--accent); color:#fff;
    font-size:30px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 22px rgba(31,127,224,.45);}
  .fab:active{transform:scale(.92);}

  /* ===== ボトムナビ ===== */
  nav.tabs{position:fixed; left:0; right:0; bottom:0; z-index:40; background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border-top:1px solid var(--line); display:flex; padding:6px 6px calc(env(safe-area-inset-bottom) + 6px);}
  nav.tabs button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:10px; font-weight:700; color:var(--sub); padding:5px 0;}
  nav.tabs button .ti{font-size:21px; line-height:1;}
  nav.tabs button.on{color:var(--accent);}

  /* ===== モーダル ===== */
  .ov{position:fixed; inset:0; z-index:100; background:rgba(15,35,50,.45); display:flex;
    align-items:flex-end; justify-content:center;}
  .ov .sheet{background:var(--bg); width:100%; max-width:560px; border-radius:22px 22px 0 0;
    max-height:92vh; overflow-y:auto; padding:8px 16px calc(env(safe-area-inset-bottom) + 20px);}
  .sheet .grip{width:40px; height:5px; border-radius:3px; background:#d4dee6; margin:8px auto 14px;}
  .sheet h3{font-size:18px; font-weight:800; margin-bottom:14px;}
  .fld{margin-bottom:14px;}
  .fld label{display:block; font-size:12px; font-weight:700; color:var(--sub); margin-bottom:6px;}
  .fld input,.fld select,.fld textarea{width:100%; padding:11px 12px; border:1px solid var(--line);
    border-radius:12px; background:#fff; color:var(--ink);}
  .fld textarea{resize:vertical; min-height:60px;}
  .row3{display:flex; gap:8px; align-items:flex-end;}
  .row3 .fld{flex:1; margin-bottom:0;}
  .timebox{display:flex; gap:6px; align-items:center;}
  .timebox input{text-align:center;}
  .timebox span{color:var(--sub); font-weight:700;}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{flex:1; min-width:64px; padding:9px 6px; border-radius:11px; border:1px solid var(--line);
    background:#fff; font-size:13px; font-weight:700; color:var(--sub);}
  .seg button.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .feelseg{display:flex; gap:6px;}
  .feelseg button{flex:1; font-size:24px; padding:7px 0; border-radius:11px; border:1px solid var(--line); background:#fff; filter:grayscale(.7); opacity:.6;}
  .feelseg button.on{filter:none; opacity:1; border-color:var(--accent); background:#eef6ff;}
  .paceview{font-size:13px; font-weight:700; color:var(--accent); text-align:center; padding:6px; background:#eef6ff; border-radius:10px;}
  .splithead{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .splithead button{font-size:12px; font-weight:700; color:var(--accent);}
  .splitrow{display:flex; gap:6px; align-items:center; margin-bottom:6px;}
  .splitrow .skm{font-size:12px; font-weight:800; width:34px; color:var(--sub); flex:0 0 auto;}
  .splitrow input{flex:1; padding:8px; text-align:center; border:1px solid var(--line); border-radius:9px;}
  .splitrow .del{color:#ff3b30; font-size:18px; flex:0 0 auto; padding:0 4px;}
  .save-btn{width:100%; padding:14px; border-radius:14px; background:var(--accent); color:#fff;
    font-size:16px; font-weight:800; margin-top:6px;}
  .del-btn{width:100%; padding:12px; border-radius:14px; color:#ff3b30; font-size:14px; font-weight:700; margin-top:8px;}
  .note{font-size:11.5px; color:var(--sub); line-height:1.5; margin-top:8px; padding:0 2px;}

  .empty{text-align:center; color:var(--sub); font-size:14px; padding:40px 16px;}
  .empty .e{font-size:40px; display:block; margin-bottom:10px;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <span class="logo">🏃</span>
    <h1>カケル</h1>
    <span class="sync" id="syncBadge"><span class="dot off"></span><span id="syncTxt">この端末</span></span>
  </header>
  <div class="mebar">
    <div class="meseg" id="meSeg">
      <button data-r="kodai">こうだい</button>
      <button data-r="yuzu">ゆずは</button>
    </div>
    <span class="hint">記録するのは<span id="meHint">…</span></span>
  </div>

  <main>
    <section id="view-home"></section>
    <section id="view-plan" hidden></section>
    <section id="view-log" hidden></section>
    <section id="view-race" hidden></section>
  </main>
</div>

<button class="fab" id="fab" onclick="openLog()">＋</button>

<nav class="tabs" id="tabs">
  <button data-v="home" class="on" onclick="switchTab('home')"><span class="ti">📍</span>今日</button>
  <button data-v="plan" onclick="switchTab('plan')"><span class="ti">🗓️</span>計画</button>
  <button data-v="log" onclick="switchTab('log')"><span class="ti">📊</span>記録</button>
  <button data-v="race" onclick="switchTab('race')"><span class="ti">🏁</span>本番</button>
</nav>

<!-- tsumiki-back-button -->
<style>
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>
</html>

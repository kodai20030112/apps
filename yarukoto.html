<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="icons/icon-yarukoto.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="やることばこ">
<meta name="theme-color" content="#f5f5f7">
<title>やることばこ — やること・アイデア・買い物</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --sub: #6e6e73;
    --line: #e3e3e6;
    --blue: #0071e3;
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --gray: #8e8e93;
    --purple: #8b5cf6;
    --chip: #f0f0f2;
    --accent: #5b6cf0;
    --accent-soft: #eef0ff;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(120px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }

  /* ===== ヘッダー ===== */
  header { padding: 24px 4px 6px; text-align: center; }
  .logo { font-size: 34px; line-height: 1; }
  h1 { font-size: 23px; font-weight: 700; letter-spacing: -.02em; margin: 6px 0 2px; }
  .tagline { color: var(--sub); font-size: 13px; }
  .sync {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 7px;
    font-size: 11.5px; font-weight: 600; color: var(--sub);
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    padding: 3px 11px; cursor: default;
  }
  .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); }
  .sync.ok .dot { background: var(--green); }
  .sync.off .dot { background: var(--orange); }
  .sync.local .dot { background: var(--gray); }

  /* ===== タブ ===== */
  .tabs {
    position: sticky; top: 0; z-index: 20;
    display: flex; gap: 6px; padding: 12px 0 10px;
    background: linear-gradient(var(--bg) 78%, rgba(245,245,247,0));
  }
  .tab {
    flex: 1; border: none; cursor: pointer; font: inherit;
    background: var(--card); color: var(--sub);
    border: 1px solid var(--line); border-radius: 14px;
    padding: 9px 4px 8px; font-size: 13px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: all .15s;
  }
  .tab .ti { font-size: 18px; }
  .tab .tn { font-size: 12px; }
  .tab .tc { font-size: 11px; font-weight: 700; opacity: .6; }
  .tab.on { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 6px 16px rgba(91,108,240,.32); }
  .tab.on .tc { opacity: .85; }

  /* ===== リスト共通 ===== */
  .panel { display: none; }
  .panel.on { display: block; }
  .empty {
    text-align: center; color: var(--sub); font-size: 14px;
    padding: 48px 20px; line-height: 1.8;
  }
  .empty .e-ico { font-size: 40px; display: block; margin-bottom: 10px; opacity: .8; }

  .group-label {
    font-size: 12px; font-weight: 600; color: var(--sub);
    margin: 18px 4px 8px; display: flex; align-items: center; gap: 6px;
  }

  /* 並べ替えバー */
  .sortbar { display: flex; align-items: center; gap: 8px; margin: 14px 2px 10px; }
  .sortbar .sl { font-size: 12px; color: var(--sub); font-weight: 600; }
  .seg-sm { display: inline-flex; background: var(--chip); border-radius: 10px; padding: 2px; }
  .seg-sm button {
    border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 12.5px; font-weight: 600; color: var(--sub);
    border-radius: 8px; padding: 5px 12px;
  }
  .seg-sm button.on { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.12); }

  /* チェックリスト行（やること・買い物） */
  .row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 12px 12px 8px; margin-bottom: 8px;
  }
  .row.has-due { align-items: flex-start; }
  .row.dragging { opacity: .92; box-shadow: 0 10px 26px rgba(0,0,0,.16); border-color: var(--accent); }
  .row .handle {
    flex: 0 0 auto; align-self: center; cursor: grab; color: #cdced3;
    font-size: 17px; line-height: 1; padding: 4px 2px; touch-action: none; user-select: none;
  }
  .row .handle:active { cursor: grabbing; }
  .row.is-done .handle { visibility: hidden; }
  .row .check {
    flex: 0 0 auto; width: 23px; height: 23px;
    border-radius: 50%; border: 2px solid var(--line);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; transition: all .15s;
  }
  .row.has-due .check { margin-top: 1px; }
  .row .check.on { background: var(--green); border-color: var(--green); }
  .row .body { flex: 1; min-width: 0; }
  .row .label { font-size: 15px; word-break: break-word; cursor: pointer; }
  .row.is-done .label { color: var(--sub); text-decoration: line-through; }
  .row .due-line { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .row .due {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11.5px; font-weight: 600; border-radius: 8px; padding: 3px 9px;
    border: none; font-family: inherit; white-space: nowrap; cursor: pointer;
  }
  .row .due:active { transform: scale(.97); }
  .row .due.set-over { background: #ffe5e3; color: #d70015; }
  .row .due.set-today { background: #fff0db; color: #c25e00; }
  .row .due.set-future { background: var(--accent-soft); color: var(--accent); }
  .row .due.ghost { background: var(--bg); color: var(--sub); border: 1px solid var(--line); }
  /* やこと・買い物のテキスト編集（インライン） */
  .row .label-edit {
    width: 100%; font: inherit; font-size: 16px; color: var(--text);
    border: none; border-bottom: 2px solid var(--accent); background: transparent;
    border-radius: 0; padding: 0 0 2px; margin: -1px 0; outline: none;
  }
  .row .dx {
    flex: 0 0 auto; border: none; background: var(--chip); color: var(--sub);
    border-radius: 6px; width: 19px; height: 19px; line-height: 1;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .row .del {
    flex: 0 0 auto; align-self: center; border: none; background: none; cursor: pointer;
    color: #c7c7cc; font-size: 20px; padding: 0 2px; line-height: 1;
  }

  /* ===== アイデア ===== */
  .idea-tools {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 13px 13px 3px; margin: 14px 0 16px;
  }
  .ffield { margin-bottom: 12px; }
  .ffield .flabel {
    display: block; font-size: 11px; font-weight: 700; color: var(--sub);
    margin: 0 2px 7px; letter-spacing: .06em;
  }
  .filters { display: flex; gap: 7px; flex-wrap: wrap; }
  .fchip {
    border: 1px solid var(--line); background: var(--card); color: var(--sub);
    border-radius: 999px; padding: 6px 13px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .fchip.on { background: var(--text); color: #fff; border-color: var(--text); }
  .fchip.kc.on { background: var(--accent); border-color: var(--accent); }

  .idea {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 14px 15px; margin-bottom: 10px;
    border-left: 4px solid var(--gray);
  }
  .idea.p-high { border-left-color: var(--red); }
  .idea.p-mid { border-left-color: var(--orange); }
  .idea.p-low { border-left-color: var(--gray); }
  .idea.s-done { opacity: .64; }
  .idea .i-check {
    flex: 0 0 auto; width: 24px; height: 24px; margin-top: 1px;
    border-radius: 50%; border: 2px solid var(--line);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; transition: all .15s;
  }
  .idea .i-check.on { background: var(--green); border-color: var(--green); }
  .idea .i-main { flex: 1; min-width: 0; }
  .idea .i-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 11px; }
  .pill {
    border: none; cursor: pointer; font-family: inherit;
    border-radius: 999px; padding: 4px 11px; font-size: 12px; font-weight: 700;
  }
  .pill.prio.p-high { background: #ffe5e3; color: #d70015; }
  .pill.prio.p-mid { background: #fff0db; color: #c25e00; }
  .pill.prio.p-low { background: #ececef; color: #636366; }
  .pill.status.s-backlog { background: #ececef; color: #636366; }
  .pill.status.s-doing { background: #e3f0ff; color: #0058c7; }
  .pill.status.s-done { background: #e2f6e6; color: #1a8a3a; }
  .kchip {
    border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .kchip.k-plan { background: #efeaff; color: #6b3bf0; }
  .kchip.k-bug { background: #ffe9e6; color: #d23a26; }
  .kchip.k-improve { background: #e4f5ec; color: #1f9d57; }
  .kchip.k-other { background: #eceef3; color: #5b606b; }
  .tag {
    background: var(--accent-soft); color: var(--accent);
    border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 600;
  }
  .idea .i-title { font-size: 16px; font-weight: 600; word-break: break-word; }
  .idea.s-done .i-title { text-decoration: line-through; }
  .idea .i-memo { font-size: 13.5px; color: var(--sub); margin-top: 5px; white-space: pre-wrap; word-break: break-word; cursor: pointer; }
  .idea .i-memo:active { background: var(--accent-soft); border-radius: 8px; }
  .idea .i-act { display: flex; gap: 14px; margin-top: 11px; align-items: center; }
  .idea .i-act button {
    border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600; color: var(--accent); padding: 2px 0;
  }
  .idea .i-act button.danger { color: #c7c7cc; margin-left: auto; }

  .foot-act { text-align: center; margin: 16px 0 4px; }
  .foot-act button {
    border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600; color: var(--sub);
  }

  /* ===== 下部の追加バー ===== */
  .addbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: 10px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,.86); backdrop-filter: saturate(180%) blur(18px);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    border-top: 1px solid var(--line);
  }
  .addbar-inner { max-width: 640px; margin: 0 auto; display: flex; gap: 9px; }
  .addbar input {
    flex: 1; min-width: 0; font: inherit; font-size: 16px;
    border: 1px solid var(--line); background: var(--bg);
    border-radius: 13px; padding: 12px 14px;
  }
  .addbar input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .addbar .add {
    flex: 0 0 auto; border: none; cursor: pointer; font-family: inherit;
    background: var(--accent); color: #fff; font-size: 22px; font-weight: 600;
    border-radius: 13px; width: 52px; display: flex; align-items: center; justify-content: center;
  }
  .addbar .add.wide { width: auto; flex: 1; font-size: 16px; gap: 6px; }
  .addbar .add:active { transform: scale(.96); }

  /* ===== アイデア入力シート ===== */
  .sheet-bg {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.32);
    display: none; align-items: flex-end; justify-content: center;
  }
  .sheet-bg.on { display: flex; }
  .sheet {
    background: var(--card); width: 100%; max-width: 640px;
    border-radius: 22px 22px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 90vh; overflow-y: auto;
  }
  .sheet h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
  .sheet label { display: block; font-size: 12.5px; font-weight: 600; color: var(--sub); margin: 14px 2px 6px; }
  .sheet input[type=text], .sheet textarea {
    width: 100%; font: inherit; font-size: 16px;
    border: 1px solid var(--line); background: var(--bg);
    border-radius: 12px; padding: 11px 13px;
  }
  .sheet input:focus, .sheet textarea:focus { outline: none; border-color: var(--accent); background: #fff; }
  .sheet textarea { min-height: 76px; resize: vertical; }
  .seg { display: flex; gap: 7px; flex-wrap: wrap; }
  .seg.cols4 button { flex: 1 1 40%; }
  .seg button {
    flex: 1; border: 1px solid var(--line); background: var(--bg); cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--sub);
    border-radius: 11px; padding: 10px 4px;
  }
  .seg button.on { color: #fff; }
  .seg.prio button.on[data-v=high] { background: var(--red); border-color: var(--red); }
  .seg.prio button.on[data-v=mid] { background: var(--orange); border-color: var(--orange); }
  .seg.prio button.on[data-v=low] { background: var(--gray); border-color: var(--gray); }
  .seg.status button.on[data-v=backlog] { background: var(--gray); border-color: var(--gray); }
  .seg.status button.on[data-v=doing] { background: var(--blue); border-color: var(--blue); }
  .seg.status button.on[data-v=done] { background: var(--green); border-color: var(--green); }
  .seg.kind button.on[data-v=plan] { background: var(--purple); border-color: var(--purple); }
  .seg.kind button.on[data-v=bug] { background: var(--red); border-color: var(--red); }
  .seg.kind button.on[data-v=improve] { background: var(--green); border-color: var(--green); }
  .seg.kind button.on[data-v=other] { background: var(--gray); border-color: var(--gray); }
  .sheet-act { display: flex; gap: 10px; margin-top: 22px; }
  .sheet-act button {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    font-size: 16px; font-weight: 600; border-radius: 13px; padding: 13px;
  }
  .sheet-act .save { background: var(--accent); color: #fff; }
  .sheet-act .cancel { background: var(--chip); color: var(--text); }

  .toast {
    position: fixed; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(12px); z-index: 60;
    background: rgba(30,30,32,.94); color: #fff; font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">✅</div>
    <h1>やることばこ</h1>
    <p class="tagline">やること・アイデア・買い物を、ひとつの箱に。</p>
    <div class="sync local" id="syncChip"><span class="dot"></span><span id="syncText">この端末に保存</span></div>
  </header>

  <nav class="tabs">
    <button class="tab on" data-tab="todo"><span class="ti">📝</span><span class="tn">やること</span><span class="tc" id="c-todo"></span></button>
    <button class="tab" data-tab="idea"><span class="ti">💡</span><span class="tn">アイデア</span><span class="tc" id="c-idea"></span></button>
    <button class="tab" data-tab="shop"><span class="ti">🛒</span><span class="tn">買い物</span><span class="tc" id="c-shop"></span></button>
  </nav>

  <section class="panel on" id="panel-todo"></section>
  <section class="panel" id="panel-idea"></section>
  <section class="panel" id="panel-shop"></section>
</div>

<div class="addbar"><div class="addbar-inner" id="addbar"></div></div>

<!-- アイデア入力シート -->
<div class="sheet-bg" id="sheetBg">
  <div class="sheet" id="sheet">
    <h3 id="sheetTitle">アイデアを追加</h3>
    <label>タイトル（やりたいこと・直したいバグ）</label>
    <input type="text" id="f-title" placeholder="例：たびのきの地図がたまにズレる" autocomplete="off">
    <label>メモ（詳細・再現手順・補足）</label>
    <textarea id="f-memo" placeholder="任意"></textarea>
    <label>種類</label>
    <div class="seg kind cols4" id="f-kind">
      <button data-v="plan">✨ 新アプリ構想</button>
      <button data-v="bug">🐛 バグ</button>
      <button data-v="improve">🔧 改善</button>
      <button data-v="other">📌 その他</button>
    </div>
    <label>対象アプリ・補足タグ（任意）</label>
    <input type="text" id="f-tag" placeholder="例：たびのき" autocomplete="off">
    <label>優先度</label>
    <div class="seg prio" id="f-prio">
      <button data-v="high">高</button>
      <button data-v="mid">中</button>
      <button data-v="low">低</button>
    </div>
    <label>ステータス</label>
    <div class="seg status" id="f-status">
      <button data-v="backlog">バックログ</button>
      <button data-v="doing">進行中</button>
      <button data-v="done">完了</button>
    </div>
    <div class="sheet-act">
      <button class="cancel" id="sheetCancel">キャンセル</button>
      <button class="save" id="sheetSave">保存</button>
    </div>
  </div>
</div>

<!-- 期限ピッカー用の隠しinput（リスト再描画の影響を受けないようにリスト外に置く） -->
<input type="date" id="dueProxy" style="position:fixed; left:-9999px; top:0; width:1px; height:1px; opacity:0; pointer-events:none;" aria-hidden="true" tabindex="-1">

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== 定数 ===================== */
const PRIO = { high:'高', mid:'中', low:'低' };
const STAT = { backlog:'バックログ', doing:'進行中', done:'完了' };
const PRIO_RANK = { high:0, mid:1, low:2 };
const KINDS = {
  plan:    { label:'新アプリ構想', short:'構想', emoji:'✨', cls:'k-plan' },
  bug:     { label:'バグ',        short:'バグ', emoji:'🐛', cls:'k-bug' },
  improve: { label:'改善',        short:'改善', emoji:'🔧', cls:'k-improve' },
  other:   { label:'その他',      short:'メモ', emoji:'📌', cls:'k-other' },
};

/* ===================== Supabase（たびのき等と同じプロジェクト） ===================== */
const SUPABASE_URL  = 'https://okbjqtdirrathscctyvx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y';
const sb = (window.supabase && window.supabase.createClient) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const STATE_TABLE = 'yarukoto_state';
const STATE_ID = 'kodai';        // 個人の複数端末で共有する1行
const KEY = 'yarukoto_db_v1';

/* ===================== ユーティリティ ===================== */
function uid(){ return Date.now().toString(36) + Math.floor(Math.random()*1e6).toString(36); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1700); }
async function copyText(text){
  const s = String(text==null?'':text);
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(s); return true; }
  }catch(e){}
  // フォールバック（iOS Safari / 非セキュアコンテキスト用）
  try{
    const ta = document.createElement('textarea');
    ta.value = s; ta.setAttribute('readonly','');
    ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select(); ta.setSelectionRange(0, s.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}
const DOW = ['日','月','火','水','木','金','土'];
function todayYmd(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function parseYmd(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function dueInfo(s){
  const d = parseYmd(s); if(!d) return null;
  const t = todayYmd();
  const diff = Math.round((d - t)/86400000);
  let cls, txt;
  if(diff < 0){ cls='set-over'; txt='期限切れ '+(d.getMonth()+1)+'/'+d.getDate(); }
  else if(diff === 0){ cls='set-today'; txt='今日'; }
  else if(diff === 1){ cls='set-future'; txt='明日'; }
  else { cls='set-future'; txt=(d.getMonth()+1)+'/'+d.getDate()+'('+DOW[d.getDay()]+')'; }
  return { cls, txt };
}

/* ===================== 状態 ===================== */
function blank(){ return { todos:[], ideas:[], shopping:[] }; }
let db = blank();
let online = null;        // null=確認中 true=同期OK false=オフライン（sbあり）
let lastPushed = '';
let tab = 'todo';
let ideaStatusFilter = 'all';
let ideaKindFilter = 'all';
let todoSort = 'manual';  // 'manual' | 'due'
let editingId = null;

/* ===================== 永続化・同期 ===================== */
function migrate(){
  let o = 0;
  db.todos.forEach(x=>{ if(typeof x.order!=='number') x.order=o; o++; if(!('due' in x)) x.due=''; });
  o = 0;
  db.shopping.forEach(x=>{ if(typeof x.order!=='number') x.order=o; o++; });
  db.ideas.forEach(x=>{ if(!x.kind) x.kind='other'; });
}
function loadLocal(){ try{ const s=localStorage.getItem(KEY); if(s) db=Object.assign(blank(), JSON.parse(s)); }catch(e){} }

let saveTimer=null;
function save(){
  localStorage.setItem(KEY, JSON.stringify(db));
  if(!sb) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    const payload = JSON.stringify(db);
    lastPushed = payload;
    const { error } = await sb.from(STATE_TABLE)
      .upsert({ id:STATE_ID, state: db, updated_at:new Date().toISOString() });
    if(error){ online=false; } else if(online!==true){ online=true; }
    renderSync();
  }, 350);
}
async function loadRemote(){
  if(!sb){ online=false; return; }
  const { data, error } = await sb.from(STATE_TABLE).select('state').eq('id', STATE_ID).maybeSingle();
  if(error){ online=false; renderSync(); return; }
  online = true;
  if(data && data.state && typeof data.state==='object'){
    db = Object.assign(blank(), data.state);   // リモート優先
    migrate();
    localStorage.setItem(KEY, JSON.stringify(db));
    render();
  } else {
    // リモートにまだ行が無い → 今あるローカルを種として上げる
    if(db.todos.length || db.ideas.length || db.shopping.length) save();
  }
  renderSync();
}
function subscribeRealtime(){
  if(!sb) return;
  sb.channel('yarukoto-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:STATE_TABLE, filter:'id=eq.'+STATE_ID },
      (payload)=>{
        const incoming = JSON.stringify((payload.new && payload.new.state) || {});
        if(incoming === lastPushed) return;     // 自分の書き込みのエコー
        if(payload.new && payload.new.state){
          db = Object.assign(blank(), payload.new.state);
          migrate();
          localStorage.setItem(KEY, JSON.stringify(db));
          render();
          toast('🔄 他の端末から更新');
        }
      })
    .subscribe();
}
function renderSync(){
  const chip = document.getElementById('syncChip');
  const txt = document.getElementById('syncText');
  chip.classList.remove('ok','off','local');
  if(!sb){ chip.classList.add('local'); txt.textContent='この端末に保存'; return; }
  if(online===true){ chip.classList.add('ok'); txt.textContent='クラウド同期中'; }
  else if(online===false){ chip.classList.add('off'); txt.textContent='オフライン（この端末に保存）'; }
  else { chip.classList.add('local'); txt.textContent='接続中…'; }
}

/* ===================== 描画 ===================== */
const panels = { todo:'panel-todo', idea:'panel-idea', shop:'panel-shop' };

function render(){
  renderCounts();
  renderChecklist('todo');
  renderIdeas();
  renderChecklist('shop');
  renderAddbar();
}
function renderCounts(){
  const t = db.todos.filter(x=>!x.done).length;
  const i = db.ideas.filter(x=>x.status!=='done').length;
  const s = db.shopping.filter(x=>!x.done).length;
  document.getElementById('c-todo').textContent = t || '';
  document.getElementById('c-idea').textContent = i || '';
  document.getElementById('c-shop').textContent = s || '';
}

/* やること / 買い物 */
function sortActive(list, kind){
  const arr = list.slice();
  if(kind==='todo' && todoSort==='due'){
    arr.sort((a,b)=>{
      const ad=a.due||'', bd=b.due||'';
      if(!!ad !== !!bd) return ad?-1:1;     // 期限ありが先
      if(ad && bd && ad!==bd) return ad<bd?-1:1;
      return (a.order||0)-(b.order||0);
    });
  } else {
    arr.sort((a,b)=>(a.order||0)-(b.order||0));
  }
  return arr;
}
function renderChecklist(kind){
  const isTodo = kind==='todo';
  const list = isTodo ? db.todos : db.shopping;
  const el = document.getElementById(isTodo ? 'panel-todo' : 'panel-shop');
  if(!list.length){
    el.innerHTML = '<div class="empty"><span class="e-ico">'+(isTodo?'📝':'🛒')+'</span>'+
      (isTodo ? '下の入力欄から<br>今日のやることを追加しよう' : '下の入力欄から<br>買うものを追加しよう')+'</div>';
    return;
  }
  const active = sortActive(list.filter(x=>!x.done), kind);
  const done = list.filter(x=>x.done);
  let html = '';
  if(isTodo){
    html += '<div class="sortbar"><span class="sl">並び順</span>'+
      '<span class="seg-sm" id="todoSort">'+
        '<button data-sort="manual"'+(todoSort==='manual'?' class="on"':'')+'>手動（ドラッグ）</button>'+
        '<button data-sort="due"'+(todoSort==='due'?' class="on"':'')+'>期限順</button>'+
      '</span></div>';
  }
  html += active.map(x=>rowHTML(x, kind)).join('');
  if(done.length){
    html += '<div class="group-label">✓ '+(isTodo?'完了':'買ったもの')+'（'+done.length+'）</div>';
    html += done.map(x=>rowHTML(x, kind)).join('');
    html += '<div class="foot-act"><button data-clear="'+kind+'">'+(isTodo?'完了したものを消す':'買ったものを消す')+'</button></div>';
  }
  el.innerHTML = html;
}
function rowHTML(x, kind){
  const isTodo = kind==='todo';
  const dragOff = (isTodo && todoSort==='due');
  const di = isTodo ? dueInfo(x.due) : null;
  const showDue = isTodo && (di || !x.done);
  let dueLine = '';
  if(showDue){
    let chip;
    if(di){
      chip = '<button class="due '+di.cls+'" data-act="due">📅 '+esc(di.txt)+'</button>'+
        '<button class="dx" data-act="dueClear">×</button>';
    } else {
      chip = '<button class="due ghost" data-act="due">📅 期限を設定</button>';
    }
    dueLine = '<div class="due-line">'+chip+'</div>';
  }
  return '<div class="row'+(x.done?' is-done':'')+(showDue?' has-due':'')+'" data-kind="'+kind+'" data-id="'+x.id+'">'+
    '<span class="handle"'+(dragOff?' style="visibility:hidden"':'')+' data-act="handle">⠿</span>'+
    '<div class="check'+(x.done?' on':'')+'" data-act="toggle">'+(x.done?'✓':'')+'</div>'+
    '<div class="body">'+
      '<div class="label" data-act="editText">'+esc(x.text)+'</div>'+
      dueLine+
    '</div>'+
    '<button class="del" data-act="del">×</button>'+
  '</div>';
}

/* アイデア */
function renderIdeas(){
  const el = document.getElementById('panel-idea');
  const active = db.ideas.filter(x=>x.status!=='done');
  const sfilters = [['all','すべて',active.length],['backlog','バックログ',db.ideas.filter(x=>x.status==='backlog').length],
    ['doing','進行中',db.ideas.filter(x=>x.status==='doing').length],['done','完了（アーカイブ）',db.ideas.filter(x=>x.status==='done').length]];
  let html = '<div class="idea-tools">';
  html += '<div class="ffield"><span class="flabel">状態</span><div class="filters">'+sfilters.map(([v,l,n])=>
    '<button class="fchip'+(ideaStatusFilter===v?' on':'')+'" data-sfilter="'+v+'">'+l+(n?' '+n:'')+'</button>'
  ).join('')+'</div></div>';
  // 種類フィルタ
  const kf = [['all','すべて']].concat(Object.keys(KINDS).map(k=>[k, KINDS[k].emoji+' '+KINDS[k].label]));
  html += '<div class="ffield"><span class="flabel">種類</span><div class="filters kind">'+kf.map(([v,l])=>
    '<button class="fchip kc'+(ideaKindFilter===v?' on':'')+'" data-kfilter="'+v+'">'+l+'</button>'
  ).join('')+'</div></div>';
  html += '</div>';

  let items = db.ideas.slice();
  if(ideaStatusFilter==='all') items = items.filter(x=>x.status!=='done');
  else items = items.filter(x=>x.status===ideaStatusFilter);
  if(ideaKindFilter!=='all') items = items.filter(x=>x.kind===ideaKindFilter);

  items.sort((a,b)=>{
    if(PRIO_RANK[a.priority]!==PRIO_RANK[b.priority]) return PRIO_RANK[a.priority]-PRIO_RANK[b.priority];
    return (b.updated||b.ts||0) - (a.updated||a.ts||0);
  });

  if(!items.length){
    html += '<div class="empty"><span class="e-ico">💡</span>'+
      (db.ideas.length ? 'この条件のアイデアはありません' : 'アプリの構想やバグメモを<br>下のボタンから書き留めよう')+'</div>';
    el.innerHTML = html;
    return;
  }
  html += items.map(ideaHTML).join('');
  if(ideaStatusFilter==='done' && items.length){
    html += '<div class="foot-act"><button data-archclear="1">アーカイブをすべて削除</button></div>';
  }
  el.innerHTML = html;
}
function ideaHTML(x){
  const k = KINDS[x.kind] || KINDS.other;
  const done = x.status==='done';
  return '<div class="idea p-'+x.priority+' s-'+x.status+'" data-id="'+x.id+'">'+
    '<div class="i-check'+(done?' on':'')+'" data-act="toggleDone" title="'+(done?'未完了に戻す':'完了にする')+'">'+(done?'✓':'')+'</div>'+
    '<div class="i-main">'+
      '<div class="i-top">'+
        '<span class="kchip '+k.cls+'">'+k.emoji+' '+k.short+'</span>'+
        '<button class="pill prio p-'+x.priority+'" data-act="cyclePrio">優先度 '+PRIO[x.priority]+'</button>'+
        '<button class="pill status s-'+x.status+'" data-act="cycleStatus">'+STAT[x.status]+'</button>'+
        (x.tag ? '<span class="tag">'+esc(x.tag)+'</span>' : '')+
      '</div>'+
      '<div class="i-title">'+esc(x.title)+'</div>'+
      (x.memo ? '<div class="i-memo" data-act="copyMemo" title="タップでコピー">'+esc(x.memo)+'</div>' : '')+
      '<div class="i-act">'+
        (x.status==='done'
          ? '<button data-act="restore">↩︎ 戻す</button>'
          : '<button data-act="edit">編集</button>')+
        (x.memo ? '<button data-act="copyMemo">📋 メモをコピー</button>' : '')+
        '<button class="danger" data-act="del">削除</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

/* 追加バー */
function renderAddbar(){
  const el = document.getElementById('addbar');
  if(tab==='idea'){
    el.innerHTML = '<button class="add wide" id="openSheet">＋ アイデアを追加</button>';
    document.getElementById('openSheet').onclick = ()=>openSheet(null);
  } else {
    const ph = tab==='todo' ? 'やることを入力…' : '買うものを入力…';
    el.innerHTML = '<input type="text" id="quickInput" placeholder="'+ph+'" autocomplete="off" enterkeyhint="done">'+
      '<button class="add" id="quickAdd">＋</button>';
    const inp = document.getElementById('quickInput');
    const addIt = ()=>{
      const v = inp.value.trim(); if(!v) return;
      const arr = tab==='todo' ? db.todos : db.shopping;
      const minOrder = arr.reduce((m,x)=>Math.min(m, x.order||0), 0);
      const item = { id:uid(), text:v, done:false, ts:Date.now(), order:minOrder-1 };
      if(tab==='todo') item.due='';
      arr.unshift(item);
      save();
      inp.value='';
      // 入力欄(addbar)は作り直さずリストとカウントだけ更新 → iOSでキーボードが閉じず連続入力できる
      renderCounts();
      renderChecklist(tab);
      inp.focus();
    };
    document.getElementById('quickAdd').onclick = addIt;
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') addIt(); });
  }
}

/* ===================== タブ切替 ===================== */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b===btn));
    Object.entries(panels).forEach(([k,id])=>document.getElementById(id).classList.toggle('on', k===tab));
    renderAddbar();
    window.scrollTo({ top:0 });
  });
});

/* ===================== チェックリスト操作 ===================== */
let suppressClick = false;
['panel-todo','panel-shop'].forEach(pid=>{
  const el = document.getElementById(pid);
  el.addEventListener('click', onChecklistClick);
  el.addEventListener('pointerdown', onHandleDown);
});
function onChecklistClick(e){
  if(suppressClick){ suppressClick=false; return; }
  const sortBtn = e.target.closest('[data-sort]');
  if(sortBtn){ todoSort = sortBtn.dataset.sort; renderChecklist('todo'); return; }
  const clear = e.target.closest('[data-clear]');
  if(clear){
    if(clear.dataset.clear==='todo') db.todos = db.todos.filter(x=>!x.done);
    else db.shopping = db.shopping.filter(x=>!x.done);
    save(); render(); return;
  }
  const row = e.target.closest('.row'); if(!row) return;
  const kind = row.dataset.kind, id = row.dataset.id;
  const arr = kind==='todo' ? db.todos : db.shopping;
  const item = arr.find(x=>x.id===id); if(!item) return;
  const act = e.target.closest('[data-act]')?.dataset.act;
  if(act==='due'){ openDuePicker(item.id); }
  else if(act==='dueClear'){ item.due=''; save(); render(); }
  else if(act==='editText'){ startInlineEdit(row, item); }
  else if(act==='toggle'){ item.done=!item.done; if(item.done) item.doneAt=Date.now(); save(); render(); }
  else if(act==='del'){ arr.splice(arr.indexOf(item),1); save(); render(); }
}

/* テキストをその場で編集（タップ→入力欄に変身） */
function startInlineEdit(row, item){
  const labelEl = row.querySelector('.label');
  if(!labelEl) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'label-edit';
  input.value = item.text;
  input.setAttribute('enterkeyhint','done');
  labelEl.replaceWith(input);
  input.focus();
  // キャレットを末尾に
  const v = input.value; input.value=''; input.value=v;
  let committed = false;
  function commit(persist){
    if(committed) return; committed = true;
    if(persist){
      const nv = input.value.trim();
      if(nv && nv !== item.text){ item.text = nv; save(); }
    }
    render();
  }
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); commit(true); }
    else if(e.key==='Escape'){ commit(false); }
  });
  input.addEventListener('blur', ()=>commit(true));
}

/* 期限ピッカー：リスト外の専用inputで純正ピッカーを開く（iOSでの二重起動・取りこぼしを防ぐ） */
const dueProxy = document.getElementById('dueProxy');
let dueEditId = null;
dueProxy.addEventListener('change', ()=>{
  if(!dueEditId) return;
  const it = db.todos.find(x=>x.id===dueEditId);
  dueEditId = null;
  if(it){ it.due = dueProxy.value || ''; save(); render(); }
});
function openDuePicker(id){
  const it = db.todos.find(x=>x.id===id); if(!it) return;
  dueEditId = id;
  dueProxy.value = it.due || '';
  try{
    if(typeof dueProxy.showPicker === 'function'){ dueProxy.showPicker(); return; }
  }catch(e){}
  // 古い環境向けフォールバック
  dueProxy.focus(); dueProxy.click();
}

/* ドラッグ並べ替え（ポインタ操作・タッチ/マウス両対応） */
let drag = null;
function onHandleDown(e){
  const handle = e.target.closest('[data-act="handle"]'); if(!handle) return;
  if(tab==='todo' && todoSort==='due') return;
  const row = handle.closest('.row'); if(!row || row.classList.contains('is-done')) return;
  e.preventDefault();
  const cont = row.parentElement;
  const rect = row.getBoundingClientRect();
  drag = { kind: row.dataset.kind, row, cont };
  row.classList.add('dragging');
  row.style.width = rect.width+'px';
  try{ row.setPointerCapture(e.pointerId); }catch(err){}
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd, { once:true });
}
function onDragMove(e){
  if(!drag) return;
  const rows = [...drag.cont.querySelectorAll('.row:not(.is-done)')].filter(r=>r!==drag.row);
  let placed = false;
  for(const r of rows){
    const box = r.getBoundingClientRect();
    if(e.clientY < box.top + box.height/2){ drag.cont.insertBefore(drag.row, r); placed=true; break; }
  }
  if(!placed && rows.length){ rows[rows.length-1].after(drag.row); }
}
function onDragEnd(){
  if(!drag) return;
  document.removeEventListener('pointermove', onDragMove);
  drag.row.classList.remove('dragging');
  drag.row.style.width='';
  const arr = drag.kind==='todo' ? db.todos : db.shopping;
  const ids = [...drag.cont.querySelectorAll('.row:not(.is-done)')].map(r=>r.dataset.id);
  ids.forEach((id,i)=>{ const it=arr.find(x=>x.id===id); if(it) it.order=i; });
  drag = null;
  suppressClick = true;
  save(); render();
}

/* ===================== アイデア操作 ===================== */
document.getElementById('panel-idea').addEventListener('click', e=>{
  const sf = e.target.closest('[data-sfilter]');
  if(sf){ ideaStatusFilter = sf.dataset.sfilter; renderIdeas(); return; }
  const kf = e.target.closest('[data-kfilter]');
  if(kf){ ideaKindFilter = kf.dataset.kfilter; renderIdeas(); return; }
  const ac = e.target.closest('[data-archclear]');
  if(ac){ if(confirm('アーカイブ（完了したアイデア）をすべて削除しますか？')){ db.ideas=db.ideas.filter(x=>x.status!=='done'); save(); render(); } return; }
  const card = e.target.closest('.idea'); if(!card) return;
  const x = db.ideas.find(i=>i.id===card.dataset.id); if(!x) return;
  const act = e.target.closest('[data-act]')?.dataset.act;
  if(act==='toggleDone'){
    if(x.status==='done'){ x.status = x.prevStatus || 'backlog'; }
    else { x.prevStatus = x.status; x.status = 'done'; }
    x.updated=Date.now(); save(); render();
  }
  else if(act==='cyclePrio'){ x.priority = ({high:'mid',mid:'low',low:'high'})[x.priority]; x.updated=Date.now(); save(); render(); }
  else if(act==='cycleStatus'){ x.status = ({backlog:'doing',doing:'done',done:'backlog'})[x.status]; x.updated=Date.now(); save(); render(); }
  else if(act==='restore'){ x.status='backlog'; x.updated=Date.now(); save(); render(); }
  else if(act==='edit'){ openSheet(x); }
  else if(act==='copyMemo'){ copyText(x.memo).then(ok=>toast(ok?'📋 メモをコピーしました':'コピーできませんでした')); }
  else if(act==='del'){ db.ideas.splice(db.ideas.indexOf(x),1); save(); render(); }
});

/* ===================== アイデア入力シート ===================== */
const sheetBg = document.getElementById('sheetBg');
let sheetPrio='mid', sheetStatus='backlog', sheetKind='plan';
function setSeg(group, val){ document.querySelectorAll('#f-'+group+' button').forEach(b=>b.classList.toggle('on', b.dataset.v===val)); }
document.querySelectorAll('#f-prio button').forEach(b=>b.onclick=()=>{ sheetPrio=b.dataset.v; setSeg('prio',sheetPrio); });
document.querySelectorAll('#f-status button').forEach(b=>b.onclick=()=>{ sheetStatus=b.dataset.v; setSeg('status',sheetStatus); });
document.querySelectorAll('#f-kind button').forEach(b=>b.onclick=()=>{ sheetKind=b.dataset.v; setSeg('kind',sheetKind); });

function openSheet(x){
  editingId = x ? x.id : null;
  document.getElementById('sheetTitle').textContent = x ? 'アイデアを編集' : 'アイデアを追加';
  document.getElementById('f-title').value = x ? x.title : '';
  document.getElementById('f-memo').value = x ? (x.memo||'') : '';
  document.getElementById('f-tag').value = x ? (x.tag||'') : '';
  sheetPrio = x ? x.priority : 'mid';
  sheetStatus = x ? x.status : 'backlog';
  sheetKind = x ? (x.kind||'other') : 'plan';
  setSeg('prio',sheetPrio); setSeg('status',sheetStatus); setSeg('kind',sheetKind);
  sheetBg.classList.add('on');
  setTimeout(()=>document.getElementById('f-title').focus(), 80);
}
function closeSheet(){ sheetBg.classList.remove('on'); editingId=null; }
document.getElementById('sheetCancel').onclick = closeSheet;
sheetBg.addEventListener('click', e=>{ if(e.target===sheetBg) closeSheet(); });
document.getElementById('sheetSave').onclick = ()=>{
  const title = document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').focus(); return; }
  const memo = document.getElementById('f-memo').value.trim();
  const tag = document.getElementById('f-tag').value.trim();
  if(editingId){
    const x = db.ideas.find(i=>i.id===editingId);
    if(x) Object.assign(x, { title, memo, tag, kind:sheetKind, priority:sheetPrio, status:sheetStatus, updated:Date.now() });
  } else {
    db.ideas.unshift({ id:uid(), title, memo, tag, kind:sheetKind, priority:sheetPrio, status:sheetStatus, ts:Date.now(), updated:Date.now() });
  }
  save(); closeSheet(); render();
};

/* ===================== 起動 ===================== */
loadLocal();
migrate();
render();
renderSync();
if(sb){ loadRemote(); subscribeRealtime(); }
</script>

<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="icons/icon-yarukoto.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="やることばこ">
<meta name="theme-color" content="#f5f5f7">
<title>やることばこ — やること・アイデア・買い物</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --sub: #6e6e73;
    --line: #e3e3e6;
    --blue: #0071e3;
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --gray: #8e8e93;
    --purple: #8b5cf6;
    --chip: #f0f0f2;
    --accent: #5b6cf0;
    --accent-soft: #eef0ff;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(120px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }

  /* ===== ヘッダー ===== */
  header { padding: 24px 4px 6px; text-align: center; }
  .logo { font-size: 34px; line-height: 1; }
  h1 { font-size: 23px; font-weight: 700; letter-spacing: -.02em; margin: 6px 0 2px; }
  .tagline { color: var(--sub); font-size: 13px; }
  .sync {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 7px;
    font-size: 11.5px; font-weight: 600; color: var(--sub);
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    padding: 3px 11px; cursor: default;
  }
  .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); }
  .sync.ok .dot { background: var(--green); }
  .sync.off .dot { background: var(--orange); }
  .sync.local .dot { background: var(--gray); }

  /* ===== タブ ===== */
  .tabs {
    position: sticky; top: 0; z-index: 20;
    display: flex; gap: 6px; padding: 12px 0 10px;
    background: linear-gradient(var(--bg) 78%, rgba(245,245,247,0));
  }
  .tab {
    flex: 1; border: none; cursor: pointer; font: inherit;
    background: var(--card); color: var(--sub);
    border: 1px solid var(--line); border-radius: 14px;
    padding: 9px 4px 8px; font-size: 13px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: all .15s;
  }
  .tab .ti { font-size: 18px; }
  .tab .tn { font-size: 12px; }
  .tab .tc { font-size: 11px; font-weight: 700; opacity: .6; }
  .tab.on { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 6px 16px rgba(91,108,240,.32); }
  .tab.on .tc { opacity: .85; }

  /* ===== リスト共通 ===== */
  .panel { display: none; }
  .panel.on { display: block; }
  .empty {
    text-align: center; color: var(--sub); font-size: 14px;
    padding: 48px 20px; line-height: 1.8;
  }
  .empty .e-ico { font-size: 40px; display: block; margin-bottom: 10px; opacity: .8; }

  .group-label {
    font-size: 12px; font-weight: 600; color: var(--sub);
    margin: 18px 4px 8px; display: flex; align-items: center; gap: 6px;
  }

  /* チェックリスト行（やること・買い物） */
  .row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 12px 12px 8px; margin-bottom: 8px;
  }
  .row.dragging { opacity: .92; box-shadow: 0 10px 26px rgba(0,0,0,.16); border-color: var(--accent); }
  .row .handle {
    flex: 0 0 auto; align-self: center; cursor: grab; color: #cdced3;
    font-size: 17px; line-height: 1; padding: 4px 2px; touch-action: none; user-select: none;
  }
  .row .handle:active { cursor: grabbing; }
  .row.is-done .handle { visibility: hidden; }
  .row .check {
    flex: 0 0 auto; width: 23px; height: 23px;
    border-radius: 50%; border: 2px solid var(--line);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; transition: all .15s;
  }
  .row .check.on { background: var(--green); border-color: var(--green); }
  .row .body { flex: 1; min-width: 0; }
  .row .label { font-size: 15px; word-break: break-word; cursor: pointer; }
  .row.is-done .label { color: var(--sub); text-decoration: line-through; }
  /* やこと・買い物のテキスト編集（インライン） */
  .row .label-edit {
    width: 100%; font: inherit; font-size: 16px; color: var(--text);
    border: none; border-bottom: 2px solid var(--accent); background: transparent;
    border-radius: 0; padding: 0 0 2px; margin: -1px 0; outline: none;
  }
  .row .dx {
    flex: 0 0 auto; border: none; background: var(--chip); color: var(--sub);
    border-radius: 6px; width: 19px; height: 19px; line-height: 1;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .row .del {
    flex: 0 0 auto; align-self: center; border: none; background: none; cursor: pointer;
    color: #c7c7cc; font-size: 20px; padding: 0 2px; line-height: 1;
  }

  /* ===== アイデア：アプリ選択グリッド ===== */
  .idea-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin: 14px 0 24px;
  }
  .app-tile {
    display: flex; flex-direction: column; align-items: flex-start; gap: 5px;
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 15px 14px 13px; cursor: pointer; font-family: inherit; text-align: left;
  }
  .app-tile:active { transform: scale(.98); }
  .app-tile .at-emoji { font-size: 26px; line-height: 1; }
  .app-tile .at-label { font-size: 14px; font-weight: 700; color: var(--text); word-break: break-word; }
  .app-tile .at-count { font-size: 11.5px; font-weight: 600; color: var(--sub); }
  .app-tile.make { background: linear-gradient(135deg,#f3efff,#eaf2ff); border-color: #e1d8ff; }
  .app-tile.add {
    flex-direction: row; align-items: center; justify-content: center; gap: 8px;
    border-style: dashed; border-color: var(--accent);
  }
  .app-tile.add .at-emoji { font-size: 20px; }
  .app-tile.add .at-label { color: var(--accent); }

  /* ===== アイデア：選んだアプリの箇条書き ===== */
  .idea-head { display: flex; flex-direction: column; gap: 8px; margin: 8px 0 16px; }
  .ih-back {
    align-self: flex-start; border: none; background: none; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--accent); padding: 4px 0;
  }
  .ih-title { display: flex; align-items: center; gap: 9px; font-size: 20px; font-weight: 700; }
  .ih-title .ih-emoji { font-size: 24px; }

  .ibul {
    display: flex; align-items: flex-start; gap: 9px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 12px 12px 13px; margin-bottom: 8px;
  }
  .ibul .ib-check {
    flex: 0 0 auto; width: 21px; height: 21px; margin-top: 1px;
    border-radius: 50%; border: 2px solid var(--line); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; transition: all .15s;
  }
  .ibul .ib-check.on { background: var(--green); border-color: var(--green); }
  .ibul.is-done .ib-text { color: var(--sub); text-decoration: line-through; }
  .ibul.is-later { opacity: .72; border-style: dashed; }
  .ibul .ib-text {
    flex: 1; min-width: 0; font-size: 15px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word; cursor: pointer; padding-top: 1px;
  }
  .ibul .ib-act { flex: 0 0 auto; display: flex; gap: 1px; align-items: flex-start; }
  .ibul .ib-act button {
    border: none; background: none; cursor: pointer; font-size: 16px;
    padding: 1px 4px; line-height: 1.3;
  }
  .ib-edit {
    flex: 1; min-width: 0; font: inherit; font-size: 15px; line-height: 1.5; color: var(--text);
    border: none; border-bottom: 2px solid var(--accent); background: transparent;
    padding: 0 0 3px; outline: none; resize: none;
  }

  /* アプリ選択ピッカー */
  .sheet-sub { font-size: 13px; color: var(--sub); margin: 2px 2px 14px; }
  .picker { display: flex; flex-direction: column; gap: 6px; max-height: 60vh; overflow-y: auto; }
  .pk-row {
    display: flex; align-items: center; gap: 11px;
    border: 1px solid var(--line); background: var(--bg); border-radius: 12px;
    padding: 11px 13px; cursor: pointer; font-family: inherit; text-align: left;
  }
  .pk-row:active { background: var(--accent-soft); }
  .pk-emoji { font-size: 20px; flex: 0 0 auto; }
  .pk-label { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
  .pk-count { font-size: 12px; font-weight: 700; color: var(--sub); background: var(--chip); border-radius: 999px; padding: 2px 9px; }

  .foot-act { text-align: center; margin: 16px 0 4px; }
  .foot-act button {
    border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600; color: var(--sub);
  }

  /* ===== 下部の追加バー ===== */
  .addbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: 10px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,.86); backdrop-filter: saturate(180%) blur(18px);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    border-top: 1px solid var(--line);
  }
  .addbar-inner { max-width: 640px; margin: 0 auto; display: flex; gap: 9px; }
  .addbar input {
    flex: 1; min-width: 0; font: inherit; font-size: 16px;
    border: 1px solid var(--line); background: var(--bg);
    border-radius: 13px; padding: 12px 14px;
  }
  .addbar input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .addbar .add {
    flex: 0 0 auto; border: none; cursor: pointer; font-family: inherit;
    background: var(--accent); color: #fff; font-size: 22px; font-weight: 600;
    border-radius: 13px; width: 52px; display: flex; align-items: center; justify-content: center;
  }
  .addbar .add.wide { width: auto; flex: 1; font-size: 16px; gap: 6px; }
  .addbar .add:active { transform: scale(.96); }

  /* ===== やること追加の丸ボタン（右下FAB） ===== */
  .fab {
    position: fixed; right: 20px; bottom: calc(26px + env(safe-area-inset-bottom));
    z-index: 35; width: 64px; height: 64px; border-radius: 50%;
    border: none; cursor: pointer; font-family: inherit;
    background: var(--accent); color: #fff; font-size: 34px; font-weight: 300; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 26px rgba(91,108,240,.45);
  }
  .fab:active { transform: scale(.93); }

  /* ===== シート（アプリ選択ピッカー） ===== */
  .sheet-bg {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.32);
    display: none; align-items: flex-end; justify-content: center;
  }
  .sheet-bg.on { display: flex; }
  .sheet {
    background: var(--card); width: 100%; max-width: 640px;
    border-radius: 22px 22px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 90vh; overflow-y: auto;
  }
  .sheet h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
  .sheet-act { display: flex; gap: 10px; margin-top: 18px; }
  .sheet-act button {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    font-size: 16px; font-weight: 600; border-radius: 13px; padding: 13px;
  }
  .sheet-act .cancel { background: var(--chip); color: var(--text); }
  .sheet-act .confirm { background: var(--accent); color: #fff; }
  .sheet-act .confirm:active { transform: scale(.98); }

  /* やること追加シートの入力欄 */
  .add-ta {
    width: 100%; font: inherit; font-size: 16px; color: var(--text);
    border: 1px solid var(--line); background: var(--bg);
    border-radius: 13px; padding: 12px 14px; min-height: 104px;
    line-height: 1.6; resize: none; margin-top: 4px;
  }
  .add-ta:focus { outline: none; border-color: var(--accent); background: #fff; }

  .toast {
    position: fixed; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(12px); z-index: 60;
    background: rgba(30,30,32,.94); color: #fff; font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">✅</div>
    <h1>やることばこ</h1>
    <p class="tagline">やること・アイデア・買い物を、ひとつの箱に。</p>
    <div class="sync local" id="syncChip"><span class="dot"></span><span id="syncText">この端末に保存</span></div>
  </header>

  <nav class="tabs">
    <button class="tab on" data-tab="todo"><span class="ti">📝</span><span class="tn">やること</span><span class="tc" id="c-todo"></span></button>
    <button class="tab" data-tab="idea"><span class="ti">💡</span><span class="tn">アイデア</span><span class="tc" id="c-idea"></span></button>
    <button class="tab" data-tab="shop"><span class="ti">🛒</span><span class="tn">買い物</span><span class="tc" id="c-shop"></span></button>
  </nav>

  <section class="panel on" id="panel-todo"></section>
  <section class="panel" id="panel-idea"></section>
  <section class="panel" id="panel-shop"></section>
</div>

<div class="addbar"><div class="addbar-inner" id="addbar"></div></div>

<!-- やること追加の丸ボタン（右下FAB） -->
<button class="fab" id="todoFab" style="display:none" aria-label="やることを追加">＋</button>

<!-- アプリ選択ピッカー -->
<div class="sheet-bg" id="sheetBg">
  <div class="sheet" id="sheet">
    <h3>どのアプリのアイデア？</h3>
    <p class="sheet-sub">アイデアを書きたいアプリを選んでください</p>
    <div class="picker" id="appPicker"></div>
    <div class="sheet-act">
      <button class="cancel" id="sheetCancel">閉じる</button>
    </div>
  </div>
</div>

<!-- やること追加シート -->
<div class="sheet-bg" id="addSheetBg">
  <div class="sheet" id="addSheet">
    <h3>やることを追加</h3>
    <p class="sheet-sub">改行で複数まとめて追加できます</p>
    <textarea class="add-ta" id="addTodoInput" placeholder="例）牛乳を買う" autocomplete="off"></textarea>
    <div class="sheet-act">
      <button class="cancel" id="addTodoCancel">閉じる</button>
      <button class="confirm" id="addTodoSave">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== 定数 ===================== */
// アイデアを束ねるアプリ一覧（index.html と揃える）。key は href から .html を除いたもの。
const NEW_APP = { key:'_new', emoji:'✨', label:'アプリ制作' };  // 新しいアプリの構想用（常設）
const APP_CATALOG = [
  { key:'search',      emoji:'🔎',  label:'横断検索' },
  { key:'nps',         emoji:'📊',  label:'NPSカウンター' },
  { key:'recap',       emoji:'📈',  label:'Weekly Recap' },
  { key:'recognition', emoji:'🌟',  label:'Recognition' },
  { key:'grownote',    emoji:'🌳',  label:'GROW ノート' },
  { key:'team5whys',   emoji:'🔍',  label:'5Whys ノート' },
  { key:'reflection',  emoji:'🪞',  label:'STARS 振り返り' },
  { key:'vault',       emoji:'🔐',  label:'Password mgr' },
  { key:'osusowake',   emoji:'🎁',  label:'おすそわけ' },
  { key:'schedule',    emoji:'🗓️',  label:'スケジュール→カレンダー' },
  { key:'career',      emoji:'🗂️',  label:'キャリアログ' },
  { key:'interview',   emoji:'🎤',  label:'Interviewノート' },
  { key:'tsugi',       emoji:'⏰',  label:'つぎいつ？' },
  { key:'cooking',     emoji:'🍳',  label:'ゆずごはん日記' },
  { key:'tsunagu',     emoji:'🌱',  label:'ツナグ' },
  { key:'tabinoki',    emoji:'🌴',  label:'たびのき' },
  { key:'yarukoto',    emoji:'✅',  label:'やることばこ' },
  { key:'credit',      emoji:'💳',  label:'クレジット明細マネージャー' },
  { key:'money',       emoji:'💴',  label:'お金の残高 計算ツール' },
  { key:'forecast',    emoji:'📉',  label:'資産予測グラフ' },
  { key:'copybox',     emoji:'📋',  label:'コピペ箱' },
];
// 旧データの「対象アプリタグ」をアプリkeyへ寄せるための別名
const APP_ALIAS = {
  'クレカ':'credit', 'クレジット':'credit', '残高':'money', 'お金':'money',
  '旅':'tabinoki', '献立':'cooking', 'ごはん':'cooking', 'パスワード':'vault',
  'やること':'yarukoto', 'スケジュール':'schedule', 'キャリア':'career',
};
function bucketMeta(key){
  if(key==='_new') return NEW_APP;
  return APP_CATALOG.find(a=>a.key===key) || { key, emoji:'💡', label:key };
}
// 旧アイデアの tag 文字列からアプリkeyを推定（見つからなければ null）
function matchApp(tag){
  if(!tag) return null;
  const t = String(tag).trim(); if(!t) return null;
  const tl = t.toLowerCase();
  for(const a of APP_CATALOG){
    const lbl = a.label.toLowerCase();
    if(a.key===tl || lbl===tl || lbl.includes(tl) || tl.includes(lbl) || tl.includes(a.key)) return a.key;
  }
  for(const k in APP_ALIAS){ if(t.includes(k)) return APP_ALIAS[k]; }
  return null;
}

/* ===================== Supabase（たびのき等と同じプロジェクト） ===================== */
const SUPABASE_URL  = 'https://okbjqtdirrathscctyvx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y';
const sb = (window.supabase && window.supabase.createClient) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const STATE_TABLE = 'yarukoto_state';
const STATE_ID = 'kodai';        // 個人の複数端末で共有する1行
const KEY = 'yarukoto_db_v1';

/* ===================== ユーティリティ ===================== */
function uid(){ return Date.now().toString(36) + Math.floor(Math.random()*1e6).toString(36); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1700); }
async function copyText(text){
  const s = String(text==null?'':text);
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(s); return true; }
  }catch(e){}
  // フォールバック（iOS Safari / 非セキュアコンテキスト用）
  try{
    const ta = document.createElement('textarea');
    ta.value = s; ta.setAttribute('readonly','');
    ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select(); ta.setSelectionRange(0, s.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}
/* ===================== 状態 ===================== */
function blank(){ return { todos:[], ideas:[], shopping:[] }; }
let db = blank();
let online = null;        // null=確認中 true=同期OK false=オフライン（sbあり）
let lastPushed = '';
let tab = 'todo';
let ideaApp = null;       // null=アプリ選択グリッド / それ以外=そのアプリの箇条書き詳細

/* ===================== 永続化・同期 ===================== */
function migrate(){
  let o = 0;
  db.todos.forEach(x=>{ if(typeof x.order!=='number') x.order=o; o++; });
  o = 0;
  db.shopping.forEach(x=>{ if(typeof x.order!=='number') x.order=o; o++; });
  // 旧アイデア（title/memo/kind/tag/priority/status）→ 新アイデア（app別の箇条書き text）へ変換
  db.ideas.forEach(x=>{
    if(x.text===undefined && x.title!==undefined){
      const app = (x.kind==='plan') ? '_new' : (matchApp(x.tag) || '_new');
      let text = x.title || '';
      if(x.memo) text += '\n' + x.memo;
      x.app = app;
      x.text = text;
      delete x.title; delete x.memo; delete x.kind; delete x.tag;
      delete x.priority; delete x.status; delete x.prevStatus;
      if(!x.ts) x.ts = Date.now();
      if(!x.updated) x.updated = x.ts;
    }
    if(!x.app) x.app = '_new';
    if(x.text===undefined) x.text = '';
    if(!('done' in x)) x.done = false;
  });
}
function loadLocal(){ try{ const s=localStorage.getItem(KEY); if(s) db=Object.assign(blank(), JSON.parse(s)); }catch(e){} }

let saveTimer=null;
function save(){
  localStorage.setItem(KEY, JSON.stringify(db));
  if(!sb) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    const payload = JSON.stringify(db);
    lastPushed = payload;
    const { error } = await sb.from(STATE_TABLE)
      .upsert({ id:STATE_ID, state: db, updated_at:new Date().toISOString() });
    if(error){ online=false; } else if(online!==true){ online=true; }
    renderSync();
  }, 350);
}
async function loadRemote(){
  if(!sb){ online=false; return; }
  const { data, error } = await sb.from(STATE_TABLE).select('state').eq('id', STATE_ID).maybeSingle();
  if(error){ online=false; renderSync(); return; }
  online = true;
  if(data && data.state && typeof data.state==='object'){
    db = Object.assign(blank(), data.state);   // リモート優先
    migrate();
    localStorage.setItem(KEY, JSON.stringify(db));
    render();
  } else {
    // リモートにまだ行が無い → 今あるローカルを種として上げる
    if(db.todos.length || db.ideas.length || db.shopping.length) save();
  }
  renderSync();
}
function subscribeRealtime(){
  if(!sb) return;
  sb.channel('yarukoto-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:STATE_TABLE, filter:'id=eq.'+STATE_ID },
      (payload)=>{
        const incoming = JSON.stringify((payload.new && payload.new.state) || {});
        if(incoming === lastPushed) return;     // 自分の書き込みのエコー
        if(payload.new && payload.new.state){
          db = Object.assign(blank(), payload.new.state);
          migrate();
          localStorage.setItem(KEY, JSON.stringify(db));
          render();
          toast('🔄 他の端末から更新');
        }
      })
    .subscribe();
}
function renderSync(){
  const chip = document.getElementById('syncChip');
  const txt = document.getElementById('syncText');
  chip.classList.remove('ok','off','local');
  if(!sb){ chip.classList.add('local'); txt.textContent='この端末に保存'; return; }
  if(online===true){ chip.classList.add('ok'); txt.textContent='クラウド同期中'; }
  else if(online===false){ chip.classList.add('off'); txt.textContent='オフライン（この端末に保存）'; }
  else { chip.classList.add('local'); txt.textContent='接続中…'; }
}

/* ===================== 描画 ===================== */
const panels = { todo:'panel-todo', idea:'panel-idea', shop:'panel-shop' };

function render(){
  renderCounts();
  renderChecklist('todo');
  renderIdeas();
  renderChecklist('shop');
  renderAddbar();
}
function renderCounts(){
  const t = db.todos.filter(x=>!x.done).length;
  const i = db.ideas.filter(x=>!x.done).length;
  const s = db.shopping.filter(x=>!x.done).length;
  document.getElementById('c-todo').textContent = t || '';
  document.getElementById('c-idea').textContent = i || '';
  document.getElementById('c-shop').textContent = s || '';
}

/* やること / 買い物 */
function sortActive(list){
  return list.slice().sort((a,b)=>(a.order||0)-(b.order||0));
}
function renderChecklist(kind){
  const isTodo = kind==='todo';
  const list = isTodo ? db.todos : db.shopping;
  const el = document.getElementById(isTodo ? 'panel-todo' : 'panel-shop');
  if(!list.length){
    el.innerHTML = '<div class="empty"><span class="e-ico">'+(isTodo?'📝':'🛒')+'</span>'+
      (isTodo ? '右下の ＋ ボタンから<br>やることを足していこう' : '下の入力欄から<br>買うものを追加しよう')+'</div>';
    return;
  }
  const active = sortActive(list.filter(x=>!x.done));
  const done = list.filter(x=>x.done);
  let html = '';
  html += active.map(x=>rowHTML(x, kind)).join('');
  if(done.length){
    html += '<div class="group-label">✓ '+(isTodo?'完了':'買ったもの')+'（'+done.length+'）</div>';
    html += done.map(x=>rowHTML(x, kind)).join('');
    html += '<div class="foot-act"><button data-clear="'+kind+'">'+(isTodo?'完了したものを消す':'買ったものを消す')+'</button></div>';
  }
  el.innerHTML = html;
}
function rowHTML(x, kind){
  return '<div class="row'+(x.done?' is-done':'')+'" data-kind="'+kind+'" data-id="'+x.id+'">'+
    '<span class="handle" data-act="handle">⠿</span>'+
    '<div class="check'+(x.done?' on':'')+'" data-act="toggle">'+(x.done?'✓':'')+'</div>'+
    '<div class="body">'+
      '<div class="label" data-act="editText">'+esc(x.text)+'</div>'+
    '</div>'+
    '<button class="del" data-act="del">×</button>'+
  '</div>';
}

/* アイデア — アプリ選択グリッド / 選んだアプリの箇条書き詳細 の2階層 */
function renderIdeas(){
  const el = document.getElementById('panel-idea');
  if(ideaApp){ renderIdeaDetail(el); return; }

  // 件数を集計（未完了＝activeをラベルに、全体＝totalをタイル表示判定に）
  const total = {}, active = {};
  db.ideas.forEach(x=>{ total[x.app]=(total[x.app]||0)+1; if(!x.done) active[x.app]=(active[x.app]||0)+1; });

  // 並べるタイル：アプリ制作（常設）＋ アイデアのあるアプリのみ
  const tiles = [NEW_APP];
  APP_CATALOG.forEach(a=>{ if(total[a.key]) tiles.push(a); });
  // カタログ外のkeyにアイデアが残っていても拾う（保険）
  Object.keys(total).forEach(k=>{
    if(k==='_new') return;
    if(!tiles.some(t=>t.key===k)) tiles.push(bucketMeta(k));
  });

  let html = '<div class="idea-grid">';
  html += tiles.map(a=>{
    const n = active[a.key] || 0, tt = total[a.key] || 0;
    const label = n ? n+'件のアイデア' : (tt ? 'すべて完了' : 'メモする');
    return '<button class="app-tile'+(a.key==='_new'?' make':'')+'" data-app="'+esc(a.key)+'">'+
      '<span class="at-emoji">'+a.emoji+'</span>'+
      '<span class="at-label">'+esc(a.label)+'</span>'+
      '<span class="at-count">'+label+'</span>'+
    '</button>';
  }).join('');
  html += '<button class="app-tile add" data-pick="1"><span class="at-emoji">＋</span><span class="at-label">アプリを選ぶ</span></button>';
  html += '</div>';
  el.innerHTML = html;
}
function renderIdeaDetail(el){
  const meta = bucketMeta(ideaApp);
  const all = db.ideas.filter(x=>x.app===ideaApp);
  const active = all.filter(x=>!x.done && !x.later).sort((a,b)=>(b.updated||b.ts||0) - (a.updated||a.ts||0));
  const later = all.filter(x=>!x.done && x.later).sort((a,b)=>(b.updated||b.ts||0) - (a.updated||a.ts||0));
  const done = all.filter(x=>x.done).sort((a,b)=>(b.doneAt||0) - (a.doneAt||0));
  let html = '<div class="idea-head">'+
    '<button class="ih-back" data-back="1">‹ アプリ一覧</button>'+
    '<div class="ih-title"><span class="ih-emoji">'+meta.emoji+'</span>'+esc(meta.label)+'</div>'+
  '</div>';
  if(!all.length){
    html += '<div class="empty"><span class="e-ico">'+meta.emoji+'</span>下の入力欄から<br>アイデアを箇条書きで足していこう</div>';
  } else {
    html += active.map(ideaItemHTML).join('');
    if(later.length){
      html += '<div class="group-label">🌙 あとで・優先度低め（'+later.length+'）</div>';
      html += later.map(ideaItemHTML).join('');
    }
    if(done.length){
      html += '<div class="group-label">✓ 完了（'+done.length+'）</div>';
      html += done.map(ideaItemHTML).join('');
      html += '<div class="foot-act"><button data-clearidea="1">完了したものを消す</button></div>';
    }
  }
  el.innerHTML = html;
}
function ideaItemHTML(x){
  return '<div class="ibul'+(x.done?' is-done':'')+(x.later?' is-later':'')+'" data-id="'+x.id+'">'+
    '<div class="ib-check'+(x.done?' on':'')+'" data-act="toggle">'+(x.done?'✓':'')+'</div>'+
    '<div class="ib-text" data-act="edit">'+esc(x.text)+'</div>'+
    '<div class="ib-act">'+
      '<button data-act="copy" title="コピー">📋</button>'+
      '<button data-act="edit" title="編集">✏️</button>'+
      '<button data-act="later" title="'+(x.later?'通常に戻す':'あとで（優先度低め）に送る')+'">'+(x.later?'⤴️':'🌙')+'</button>'+
      '<button data-act="del" title="削除">🗑️</button>'+
    '</div>'+
  '</div>';
}
function openIdeaApp(key){ ideaApp = key; renderIdeas(); renderAddbar(); window.scrollTo({ top:0 }); }
function goIdeaGrid(){ ideaApp = null; renderIdeas(); renderAddbar(); window.scrollTo({ top:0 }); }

/* 追加バー */
function renderAddbar(){
  const bar = document.querySelector('.addbar');
  const el = document.getElementById('addbar');
  const fab = document.getElementById('todoFab');
  fab.style.display='none';   // やること以外では隠す（既定）
  if(tab==='idea'){
    // アプリ選択グリッドでは入力欄を出さない（アプリを選んでから箇条書きを足す）
    if(!ideaApp){ bar.style.display='none'; el.innerHTML=''; return; }
    bar.style.display='';
    const meta = bucketMeta(ideaApp);
    el.innerHTML = '<input type="text" id="quickInput" placeholder="'+esc(meta.label)+'のアイデアを入力…" autocomplete="off" enterkeyhint="done">'+
      '<button class="add" id="quickAdd">＋</button>';
    const inp = document.getElementById('quickInput');
    const addIt = ()=>{
      const v = inp.value.trim(); if(!v) return;
      db.ideas.unshift({ id:uid(), app:ideaApp, text:v, ts:Date.now(), updated:Date.now() });
      save();
      inp.value='';
      // 入力欄は作り直さずリストとカウントだけ更新 → iOSでキーボードが閉じず連続入力できる
      renderCounts();
      renderIdeas();
      inp.focus();
    };
    document.getElementById('quickAdd').onclick = addIt;
    // 変換中の1回目のEnterは確定に使う（isComposing）。2回目のEnterで追加。
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.isComposing) addIt(); });
    return;
  }
  if(tab==='todo'){
    // やること：右下の丸ボタンをタップ → 追加シート（下バーは隠す）
    bar.style.display='none'; el.innerHTML='';
    fab.style.display='flex';
    fab.onclick = openAddSheet;
    return;
  }
  bar.style.display='';
  // 買い物：下バーで即追加（テキスト→Enter/＋）
  el.innerHTML = '<input type="text" id="quickInput" placeholder="買うものを入力…" autocomplete="off" enterkeyhint="done">'+
    '<button class="add" id="quickAdd">＋</button>';
  const inp = document.getElementById('quickInput');
  const addIt = ()=>{
    const v = inp.value.trim(); if(!v) return;
    const arr = db.shopping;
    const minOrder = arr.reduce((m,x)=>Math.min(m, x.order||0), 0);
    arr.unshift({ id:uid(), text:v, done:false, ts:Date.now(), order:minOrder-1 });
    save();
    inp.value='';
    // 入力欄(addbar)は作り直さずリストとカウントだけ更新 → iOSでキーボードが閉じず連続入力できる
    renderCounts();
    renderChecklist('shop');
    inp.focus();
  };
  document.getElementById('quickAdd').onclick = addIt;
  // 変換中の1回目のEnterは確定に使う（isComposing）。2回目のEnterで追加。
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.isComposing) addIt(); });
}

/* ===================== タブ切替 ===================== */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tab = btn.dataset.tab;
    if(tab==='idea') ideaApp = null;   // アイデアタブは常にアプリ一覧から
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b===btn));
    Object.entries(panels).forEach(([k,id])=>document.getElementById(id).classList.toggle('on', k===tab));
    if(tab==='idea') renderIdeas();
    renderAddbar();
    window.scrollTo({ top:0 });
  });
});

/* ===================== チェックリスト操作 ===================== */
let suppressClick = false;
['panel-todo','panel-shop'].forEach(pid=>{
  const el = document.getElementById(pid);
  el.addEventListener('click', onChecklistClick);
  el.addEventListener('pointerdown', onHandleDown);
});
function onChecklistClick(e){
  if(suppressClick){ suppressClick=false; return; }
  const clear = e.target.closest('[data-clear]');
  if(clear){
    if(clear.dataset.clear==='todo') db.todos = db.todos.filter(x=>!x.done);
    else db.shopping = db.shopping.filter(x=>!x.done);
    save(); render(); return;
  }
  const row = e.target.closest('.row'); if(!row) return;
  const kind = row.dataset.kind, id = row.dataset.id;
  const arr = kind==='todo' ? db.todos : db.shopping;
  const item = arr.find(x=>x.id===id); if(!item) return;
  const act = e.target.closest('[data-act]')?.dataset.act;
  if(act==='editText'){ startInlineEdit(row, item); }
  else if(act==='toggle'){ item.done=!item.done; if(item.done) item.doneAt=Date.now(); save(); render(); }
  else if(act==='del'){ arr.splice(arr.indexOf(item),1); save(); render(); }
}

/* テキストをその場で編集（タップ→入力欄に変身） */
function startInlineEdit(row, item){
  const labelEl = row.querySelector('.label');
  if(!labelEl) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'label-edit';
  input.value = item.text;
  input.setAttribute('enterkeyhint','done');
  labelEl.replaceWith(input);
  input.focus();
  // キャレットを末尾に
  const v = input.value; input.value=''; input.value=v;
  let committed = false;
  function commit(persist){
    if(committed) return; committed = true;
    if(persist){
      const nv = input.value.trim();
      if(nv && nv !== item.text){ item.text = nv; save(); }
    }
    render();
  }
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter' && !e.isComposing){ e.preventDefault(); commit(true); }
    else if(e.key==='Escape'){ commit(false); }
  });
  input.addEventListener('blur', ()=>commit(true));
}

/* やること追加シート：タップで開き、テキストを入力して追加（改行で複数まとめて） */
const addSheetBg = document.getElementById('addSheetBg');
const addTodoInput = document.getElementById('addTodoInput');
function openAddSheet(){
  addTodoInput.value = '';
  addSheetBg.classList.add('on');
  // iOSでキーボードが確実に出るよう少し遅らせてフォーカス
  setTimeout(()=>addTodoInput.focus(), 60);
}
function closeAddSheet(){ addSheetBg.classList.remove('on'); }
function saveAddSheet(){
  const lines = addTodoInput.value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ closeAddSheet(); return; }
  // 既存の最小orderより前に、入力順を保って積む（1行目が一番上）
  let base = db.todos.reduce((m,x)=>Math.min(m, x.order||0), 0);
  lines.forEach((text,i)=>{
    db.todos.push({ id:uid(), text, done:false, ts:Date.now(), order: base - lines.length + i });
  });
  save();
  closeAddSheet();
  render();
  toast(lines.length>1 ? ('✅ '+lines.length+'件追加しました') : '✅ 追加しました');
}
document.getElementById('addTodoSave').onclick = saveAddSheet;
document.getElementById('addTodoCancel').onclick = closeAddSheet;
addSheetBg.addEventListener('click', e=>{ if(e.target===addSheetBg) closeAddSheet(); });

/* ドラッグ並べ替え（ポインタ操作・タッチ/マウス両対応） */
let drag = null;
function onHandleDown(e){
  const handle = e.target.closest('[data-act="handle"]'); if(!handle) return;
  const row = handle.closest('.row'); if(!row || row.classList.contains('is-done')) return;
  e.preventDefault();
  const cont = row.parentElement;
  const rect = row.getBoundingClientRect();
  drag = { kind: row.dataset.kind, row, cont };
  row.classList.add('dragging');
  row.style.width = rect.width+'px';
  try{ row.setPointerCapture(e.pointerId); }catch(err){}
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd, { once:true });
}
function onDragMove(e){
  if(!drag) return;
  const rows = [...drag.cont.querySelectorAll('.row:not(.is-done)')].filter(r=>r!==drag.row);
  let placed = false;
  for(const r of rows){
    const box = r.getBoundingClientRect();
    if(e.clientY < box.top + box.height/2){ drag.cont.insertBefore(drag.row, r); placed=true; break; }
  }
  if(!placed && rows.length){ rows[rows.length-1].after(drag.row); }
}
function onDragEnd(){
  if(!drag) return;
  document.removeEventListener('pointermove', onDragMove);
  drag.row.classList.remove('dragging');
  drag.row.style.width='';
  const arr = drag.kind==='todo' ? db.todos : db.shopping;
  const ids = [...drag.cont.querySelectorAll('.row:not(.is-done)')].map(r=>r.dataset.id);
  ids.forEach((id,i)=>{ const it=arr.find(x=>x.id===id); if(it) it.order=i; });
  drag = null;
  suppressClick = true;
  save(); render();
}

/* ===================== アイデア操作 ===================== */
document.getElementById('panel-idea').addEventListener('click', e=>{
  // グリッド：戻る / アプリを選ぶ / タイル
  if(e.target.closest('[data-back]')){ goIdeaGrid(); return; }
  if(e.target.closest('[data-pick]')){ openPicker(); return; }
  const tile = e.target.closest('[data-app]');
  if(tile){ openIdeaApp(tile.dataset.app); return; }
  // 詳細：完了したものをまとめて消す
  if(e.target.closest('[data-clearidea]')){
    db.ideas = db.ideas.filter(i=>!(i.app===ideaApp && i.done));
    save(); renderCounts(); renderIdeas(); return;
  }
  // 詳細：箇条書き1件の操作
  const bul = e.target.closest('.ibul'); if(!bul) return;
  const x = db.ideas.find(i=>i.id===bul.dataset.id); if(!x) return;
  const act = e.target.closest('[data-act]')?.dataset.act;
  if(act==='toggle'){ x.done=!x.done; if(x.done) x.doneAt=Date.now(); save(); renderCounts(); renderIdeas(); }
  else if(act==='copy'){ copyText(x.text).then(ok=>toast(ok?'📋 コピーしました':'コピーできませんでした')); }
  else if(act==='later'){ x.later=!x.later; x.updated=Date.now(); save(); renderCounts(); renderIdeas(); toast(x.later?'🌙 あとでに送りました':'通常に戻しました'); }
  else if(act==='edit'){ startIdeaEdit(bul, x); }
  else if(act==='del'){ db.ideas.splice(db.ideas.indexOf(x),1); save(); renderCounts(); renderIdeas(); }
});

/* 箇条書きをその場で編集（タップ→入力欄に変身。複数行も可） */
function startIdeaEdit(bul, item){
  const textEl = bul.querySelector('.ib-text');
  if(!textEl || bul.querySelector('.ib-edit')) return;
  const input = document.createElement('textarea');
  input.className = 'ib-edit';
  input.value = item.text;
  input.rows = Math.min(8, item.text.split('\n').length + 1);
  textEl.replaceWith(input);
  input.focus();
  const v = input.value; input.value=''; input.value=v;   // キャレットを末尾に
  let committed = false;
  function commit(persist){
    if(committed) return; committed = true;
    if(persist){
      const nv = input.value.trim();
      if(nv && nv !== item.text){ item.text = nv; item.updated = Date.now(); save(); }
    }
    renderIdeas();
  }
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter' && !e.shiftKey && !e.isComposing){ e.preventDefault(); commit(true); }
    else if(e.key==='Escape'){ commit(false); }
  });
  input.addEventListener('blur', ()=>commit(true));
}

/* ===================== アプリ選択ピッカー ===================== */
const sheetBg = document.getElementById('sheetBg');
function openPicker(){
  const wrap = document.getElementById('appPicker');
  const counts = {};
  db.ideas.forEach(x=>{ counts[x.app] = (counts[x.app]||0) + 1; });
  const all = [NEW_APP].concat(APP_CATALOG);
  wrap.innerHTML = all.map(a=>
    '<button class="pk-row" data-pickapp="'+esc(a.key)+'">'+
      '<span class="pk-emoji">'+a.emoji+'</span>'+
      '<span class="pk-label">'+esc(a.label)+'</span>'+
      (counts[a.key] ? '<span class="pk-count">'+counts[a.key]+'</span>' : '')+
    '</button>'
  ).join('');
  sheetBg.classList.add('on');
}
function closeSheet(){ sheetBg.classList.remove('on'); }
document.getElementById('sheetCancel').onclick = closeSheet;
sheetBg.addEventListener('click', e=>{ if(e.target===sheetBg) closeSheet(); });
document.getElementById('appPicker').addEventListener('click', e=>{
  const row = e.target.closest('[data-pickapp]'); if(!row) return;
  closeSheet();
  openIdeaApp(row.dataset.pickapp);
});

/* ===================== 起動 ===================== */
loadLocal();
migrate();
render();
renderSync();
if(sb){ loadRemote(); subscribeRealtime(); }
</script>

</style>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');

    function goBack(){ location.href = 'index.html'; }

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作。見えるボタンは置かない） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
<!-- /tsumiki-back-button -->
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="icons/icon-grownote.png">
<meta name="apple-mobile-web-app-title" content="GROWノート">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>GROW ノート — チームの成長に伴走する</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
    --line:#e3e3e6; --accent:#0071e3; --accent-soft:#e8f1fd;
    --warm:#fff7e6; --warm-line:#f1d99a; --good:#34c759; --good-soft:#e7f8ec; --danger:#ff3b30;
    --radius:16px; --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55;
    -webkit-font-smoothing:antialiased; padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px 96px}
  header.app{
    position:sticky;top:0;z-index:20;background:rgba(245,245,247,.82);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;border-bottom:1px solid var(--line);
  }
  .app-row{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .back{font-size:16px;color:var(--accent);background:none;border:0;padding:6px 2px;cursor:pointer;font-weight:500;display:none}
  .back.show{display:inline-block}
  .title{font-size:20px;font-weight:700;letter-spacing:.2px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .title small{display:block;font-size:11px;font-weight:500;color:var(--sub);letter-spacing:.3px}
  .hbtn{font-size:14px;color:var(--accent);background:none;border:0;padding:6px;cursor:pointer;font-weight:600}

  /* generic */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  button{font-family:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:0;border-radius:12px;
    background:var(--accent);color:#fff;font-size:15px;font-weight:600;padding:13px 18px;cursor:pointer;width:100%}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--accent-soft);color:var(--accent)}
  .btn.line{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.danger{background:#fff;border:1px solid #ffd0cc;color:var(--danger)}
  .muted{color:var(--sub)}
  .empty{text-align:center;color:var(--sub);padding:48px 20px}
  .empty .big{font-size:40px;margin-bottom:8px}

  /* progress bars */
  .bar{height:8px;border-radius:999px;background:#ececf0;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#0071e3,#34c759);transition:width .35s ease}
  .bar.sm{height:6px}
  .progress-row{display:flex;align-items:center;gap:10px}
  .progress-row .bar{flex:1}
  .progress-row .pct{font-size:13px;font-weight:700;color:var(--ink);flex:0 0 auto;min-width:42px;text-align:right}
  .slider{-webkit-appearance:none;appearance:none;width:100%;height:10px;border-radius:999px;outline:none;background:#ececf0;margin:14px 0 2px}
  .slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 1px 5px rgba(0,0,0,.28);cursor:pointer;margin-top:-8px}
  .slider::-moz-range-thumb{width:26px;height:26px;border:1px solid var(--line);border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.28);cursor:pointer}

  /* team summary */
  .summary{padding:16px;margin:16px 0 4px}
  .summary .srow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .summary .srow span:first-child{font-size:13px;font-weight:700;color:var(--sub);letter-spacing:.3px}
  .summary .savg{font-size:26px;font-weight:800;line-height:1;background:linear-gradient(90deg,#0071e3,#34c759);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .summary .smeta{margin-top:9px;font-size:12px;color:var(--sub)}

  /* HOME — member list */
  .section-lead{margin:20px 4px 10px;font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.4px;text-transform:uppercase}
  .member{padding:16px;margin-bottom:12px;cursor:pointer;display:block;position:relative;overflow:hidden}
  .member:active{background:#fafafa}
  .member .name{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 auto}
  .member .goal{margin-top:8px;font-size:14px;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .member .goal.none{color:var(--sub);font-style:italic}
  .member .meta{margin-top:10px;font-size:12px;color:var(--sub);display:flex;gap:14px;flex-wrap:wrap}
  .chev{position:absolute;right:16px;top:18px;color:#c4c4c9;font-size:20px}

  /* data transfer entry */
  .xfer{padding:14px 16px;margin-top:18px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;font-size:14px;font-weight:600}
  .xfer:active{background:#fafafa}
  .xfer .muted{font-weight:400;font-size:12px}
  .bk-actions{display:flex;gap:10px;margin-top:10px}
  .bk-actions .btn{flex:1}

  /* MEMBER detail */
  .goalcard{padding:16px;margin:16px 0 6px}
  .goalcard h3{margin:0 0 6px;font-size:12px;color:var(--sub);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
  .goaltext{font-size:17px;font-weight:600;line-height:1.5;white-space:pre-wrap}
  .goaltext.none{color:var(--sub);font-weight:400;font-style:italic}
  .goalcard .edit{margin-top:10px}

  .timeline{position:relative;margin-top:8px;padding-left:6px}
  .sess{padding:15px 16px;margin-bottom:12px;cursor:pointer}
  .sess:active{background:#fafafa}
  .sess .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .date-chip{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:999px}
  .sess .sgoal{margin-top:9px;font-size:15px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sess .insight{margin-top:9px;font-size:13px;color:var(--sub);background:var(--warm);border:1px solid var(--warm-line);
    border-radius:10px;padding:8px 10px;display:flex;gap:6px}
  .sess .insight b{color:#9a6b00;font-weight:700;flex:0 0 auto}
  .stepcount{font-size:11px;color:var(--sub)}
  .action-chip{margin-top:9px;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid #cfe3fb;border-radius:10px;padding:6px 10px;max-width:100%}
  .action-chip span{font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .action-chip .sp{flex:0 0 auto;color:var(--good);font-weight:700}

  /* EDITOR */
  .field{margin:16px 0}
  .field label{display:block;font-size:13px;font-weight:700;margin:0 2px 7px;color:var(--ink)}
  .field .hint{font-weight:400;color:var(--sub);font-size:12px;display:block;margin-top:2px}
  input[type=text],input[type=date],input[type=number],textarea{
    width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;
    font-family:inherit;font-size:16px;color:var(--ink);padding:12px 13px;resize:none;line-height:1.5}
  textarea{min-height:70px}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* GROW step heads */
  .gstep{display:flex;align-items:center;gap:9px;margin:24px 2px 4px}
  .gstep .gn{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:13px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
  .gstep .gt{font-size:15px;font-weight:700}
  .gstep .ge{font-size:18px}

  /* feedback keep/more */
  .fb{border-radius:14px;padding:13px 14px;margin-bottom:10px;border:1px solid}
  .fb.keep{background:var(--good-soft);border-color:#bfe6c9}
  .fb.more{background:#eef4ff;border-color:#cfe0fb}
  .fb h4{margin:0 0 7px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
  .fb.keep h4{color:#1f8a3b}
  .fb.more h4{color:#0a59b8}
  .fb textarea{background:#fff}

  /* idea / advice rows */
  .sublabel{font-size:13px;font-weight:700;margin:6px 2px 8px;display:flex;align-items:center;gap:6px}
  .sublabel .opt{font-weight:400;color:var(--sub);font-size:12px}
  .idea-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .idea-row input[type=text]{flex:1}
  .row-del{flex:0 0 auto;width:30px;height:34px;border:0;background:none;color:#c4c4c9;font-size:15px;cursor:pointer}
  .advice-row{border:1px solid var(--line);border-radius:12px;padding:10px 10px 6px;margin-bottom:9px;background:#fbfbfe}
  .advice-row .ar-top{display:flex;align-items:flex-start;gap:8px}
  .advice-row .ar-top textarea{flex:1;min-height:46px}
  .advice-row .ar-by{display:flex;align-items:center;gap:7px;margin:8px 2px 4px}
  .advice-row .ar-by .lbl{font-size:12px;color:var(--sub);font-weight:600;flex:0 0 auto}
  .advice-row .ar-by input{flex:1;font-size:14px;padding:8px 10px}
  .addbtn{margin-top:4px}

  /* materials + insight */
  .materials{margin:10px 0 4px;background:var(--accent-soft);border:1px solid #cfe3fb;border-radius:14px;padding:13px 15px}
  .materials h4{margin:0 0 7px;font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.3px}
  .materials ul{margin:0;padding-left:18px;font-size:14px;line-height:1.6}
  .materials li{margin:3px 0}
  .materials .by{color:var(--accent);font-weight:700;font-size:12px}
  .materials .none{color:#8fb4e0;font-size:13px;margin:0}
  .insight-field textarea{background:var(--warm);border-color:var(--warm-line);font-weight:600}

  /* action todos (reused step look) */
  .step{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .step-check{flex:0 0 auto;width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);background:#fff;color:#fff;font-size:15px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .step-check.on{background:var(--good);border-color:var(--good)}
  .step input[type=text]{flex:1;font-size:15px;padding:10px 12px}
  .step.done input[type=text]{color:var(--sub);text-decoration:line-through;background:#fafafa}
  .step-del{flex:0 0 auto;width:30px;height:30px;border:0;background:none;color:#c4c4c9;font-size:15px;cursor:pointer}

  .editor-actions{margin-top:26px;display:flex;flex-direction:column;gap:10px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0}
  .scrim.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:rise .22s ease}
  @keyframes rise{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:0 0 4px;font-size:18px}
  .sheet p.sub{margin:0 0 16px;font-size:13px;color:var(--sub)}
  .sheet-actions{display:flex;gap:10px;margin-top:18px}
  .sheet-actions .btn{flex:1}
  /* PC（広い画面）ではモーダルを画面中央に。iPhoneは従来どおり下からせり出す */
  @media (min-width: 768px){
    .scrim{ align-items:center; padding:24px }
    .sheet{ border-radius:20px; max-height:88vh; overflow-y:auto }
  }
  .imgwrap{max-height:56vh;overflow:auto;border-radius:14px;border:1px solid var(--line);background:#f5f5f7;-webkit-overflow-scrolling:touch}
  .imgwrap img{width:100%;display:block}

  .fab{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:15}
  .fab .inner{max-width:680px;margin:0 auto}

  .view{display:none}
  .view.active{display:block}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;
    padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:99}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* sync status */
  .syncbar{max-width:680px;margin:6px auto 0;font-size:12px;color:var(--sub);padding:0 2px}

  /* growth chart */
  .growth{padding:16px;margin-bottom:16px}
  .growth h3{margin:0 0 4px;font-size:16px}
  .growth .sub{font-size:12px;color:var(--sub);margin:0 0 10px}
  .gchips{display:flex;gap:8px;margin-bottom:10px}
  .gchip{flex:0 0 auto;padding:7px 14px;border:1px solid var(--line);background:#fff;border-radius:999px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit}
  .gchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .gchart-wrap{position:relative;width:100%}
  .gchart{width:100%;height:200px;display:block}
  .gempty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;text-align:center;padding:0 24px;line-height:1.5}
  /* ---- フォロー（横断ビュー） ---- */
  .followcard{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:14px;cursor:pointer}
  .followcard:active{background:#fafafa}
  .followcard .fc-ic{flex:0 0 auto;width:40px;height:40px;border-radius:12px;background:var(--warm);border:1px solid var(--warm-line);display:flex;align-items:center;justify-content:center;font-size:20px}
  .followcard .fc-main{flex:1;min-width:0}
  .followcard .fc-title{font-size:15px;font-weight:700;color:var(--ink)}
  .followcard .fc-sub{font-size:12.5px;color:var(--sub);margin-top:2px}
  .followcard .fc-pill{flex:0 0 auto;font-size:13px;font-weight:800;color:#fff;background:var(--danger);border-radius:999px;padding:3px 10px}
  .followcard .fc-pill.zero{background:var(--good)}
  .followcard .chev{flex:0 0 auto;color:#c4c4c9;font-size:22px}
  .fgroup-lead{display:flex;align-items:center;gap:8px;margin:22px 2px 10px;font-size:13px;font-weight:800;letter-spacing:.2px}
  .fgroup-lead .cnt{font-size:12px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .fgroup-lead.overdue{color:var(--danger)}
  .fgroup-lead.soon{color:#9a6b00}
  .fgroup-lead.open{color:var(--sub)}
  .fgroup-lead.done{color:#1f8a3b}
  .fitem{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;margin-bottom:9px}
  .fitem .step-check{margin-top:1px}
  .fitem .fbody{flex:1;min-width:0;cursor:pointer}
  .fitem .ftext{font-size:15px;font-weight:600;line-height:1.45;color:var(--ink);word-break:break-word}
  .fitem.is-done .ftext{color:var(--sub);text-decoration:line-through}
  .fitem .fmeta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:7px;font-size:12px;color:var(--sub)}
  .fitem .fmeta .who{display:inline-flex;align-items:center;gap:5px;font-weight:600;color:var(--ink)}
  .fitem .fmeta .av{width:20px;height:20px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .fitem .fmeta .dl{font-weight:700;border-radius:999px;padding:1px 8px}
  .fitem .fmeta .dl.overdue{color:var(--danger);background:#ffecea}
  .fitem .fmeta .dl.soon{color:#9a6b00;background:var(--warm)}
  .fitem .fmeta .dl.future{color:var(--accent);background:var(--accent-soft)}
  .fitem .fmeta .dl.none{color:var(--sub);background:#f1f1f3}
</style>
<script src="career.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="app">
  <div class="app-row">
    <button class="back" id="backBtn">‹ 戻る</button>
    <div class="title" id="appTitle">GROW ノート<small>チームの叶えたいゴールに伴走する</small></div>
    <button class="hbtn" id="headerAction"></button>
  </div>
  <div class="syncbar">☁️ <span id="syncStatus">…</span></div>
</header>

<div class="wrap">
  <section class="view active" id="homeView">
    <div id="teamSummary"></div>
    <div class="section-lead">Team members</div>
    <div id="memberList"></div>
    <div id="homeFooter"></div>
  </section>
  <section class="view" id="memberView"></section>
  <section class="view" id="editorView"></section>
  <section class="view" id="followView"></section>
</div>

<div class="fab" id="fab" style="display:none"><div class="inner"><button class="btn" id="fabBtn"></button></div></div>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY="grownote_v1";

/* ---------- store ---------- */
let DB=load();
function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&Array.isArray(r.members)){
    r.members.forEach(m=>{if(typeof m.progress!=="number")m.progress=0;});return r;}}catch(e){}
  return {members:[]};
}
function saveLocal(){localStorage.setItem(KEY,JSON.stringify(DB));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function memberById(id){return DB.members.find(m=>m.id===id);}

/* ---------- Supabase クラウド同期（recap / ゆずごはん日記と同じプロジェクト） ---------- */
const SUPABASE_URL="https://okbjqtdirrathscctyvx.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYmpxdGRpcnJhdGhzY2N0eXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjI4NTIsImV4cCI6MjA5NTg5ODg1Mn0.T-1AOK6vCD6uGdqrVGXjPui3L6WPSNrnygS-IHyfZ6Y";
const ROW_ID="kodai";            // 完全に個人用なので固定の1行に丸ごと保存
let sb=null;
try{ if(window.supabase) sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:false}}); }catch(e){}
let dirty=false, pushTimer=null, pushing=false;
function setSync(t){const e=$("#syncStatus");if(e)e.textContent=t;}

async function pushCloud(){
  if(!sb||pushing)return;
  pushing=true;setSync("同期中…");
  try{
    const res=await sb.from("grownote_state").upsert({id:ROW_ID,state:DB,updated_at:new Date().toISOString()});
    if(res.error){console.error(res.error);setSync("⚠ 同期失敗");}
    else{dirty=false;setSync("✓ 同期済み");}
  }catch(e){console.error(e);setSync("⚠ 同期失敗");}
  finally{pushing=false;}
}
function scheduleCloud(){ if(!sb)return; dirty=true;setSync("…");clearTimeout(pushTimer);pushTimer=setTimeout(pushCloud,1200); }

async function pullCloud(){
  if(!sb)return false;
  let res;
  try{res=await sb.from("grownote_state").select("state").eq("id",ROW_ID).maybeSingle();}
  catch(e){console.error(e);return false;}
  if(res.error){console.error(res.error);return false;}
  if(res.data&&res.data.state&&Array.isArray(res.data.state.members)){
    DB=res.data.state;
    DB.members.forEach(m=>{if(typeof m.progress!=="number")m.progress=0;if(!Array.isArray(m.sessions))m.sessions=[];});
    saveLocal();
    return true;
  }
  return false;
}

async function bootstrapCloud(){
  if(!sb){setSync("オフライン（この端末のみ）");return;}
  setSync("読込中…");
  const has=await pullCloud();
  if(has){render();setSync("✓ 同期済み");return;}
  const hasLocal=DB.members&&DB.members.length>0;
  if(hasLocal){setSync("初回アップロード中…");await pushCloud();}
  else{setSync("✓ 同期済み");}
}

// localStorage 即時保存 ＋ クラウドへデバウンス送信
function save(){saveLocal();scheduleCloud();}

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function diffDays(from,to){if(!from||!to)return null;const a=new Date(from+"T00:00:00"),b=new Date(to+"T00:00:00");return Math.round((b-a)/86400000);}
function fmtFull(s){if(!s)return"";const[y,m,d]=s.split("-");return `${y}年${+m}月${+d}日`;}
function initial(name){return (name||"?").trim().charAt(0)||"?";}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1600);}
function autoGrow(e){e.style.height="auto";e.style.height=Math.max(e.scrollHeight,e.tagName==="TEXTAREA"?46:0)+"px";}

/* session content checks */
function sessHasContent(s){
  return !!((s.goal&&s.goal.trim())||(s.reality&&s.reality.trim())||
    (s.feedback&&((s.feedback.keep||"").trim()||(s.feedback.more||"").trim()))||
    (s.memberIdeas&&s.memberIdeas.some(x=>x&&x.trim()))||
    (s.advice&&s.advice.some(a=>a.text&&a.text.trim()))||
    (s.insight&&s.insight.trim())||
    (s.action&&((s.action.deadline||"").trim()||(s.action.todos&&s.action.todos.some(t=>t.text&&t.text.trim())))));
}

let growthSeries="nps";   // メンバー詳細の成長グラフで表示中の系列

/* ---------- フォロー（横断ビュー） ---------- */
// 全メンバー・全会話の「やること(todo)」を1本に束ね、状態で分類する
function collectFollowItems(){
  const T=todayStr(), items=[];
  DB.members.forEach(m=>{
    (m.sessions||[]).forEach(s=>{
      const act=s.action||{}; const dl=(act.deadline||"").trim();
      (act.todos||[]).forEach(t=>{
        if(!t.text||!t.text.trim())return;
        const d = dl ? diffDays(T,dl) : null;   // 今日から期限までの日数（null=期限なし）
        let cat;
        if(t.done) cat="done";
        else if(d!==null && d<0) cat="overdue";
        else if(d!==null && d<=7) cat="soon";
        else cat="open";
        items.push({memberId:m.id,memberName:m.name,sessionId:s.id,sessionDate:s.date,
          deadline:dl,days:d,todoId:t.id,text:t.text,done:!!t.done,doneAt:t.doneAt||""});
      });
    });
  });
  return items;
}
function followCounts(){
  const c={overdue:0,soon:0,open:0,done:0};
  collectFollowItems().forEach(it=>{c[it.done?"done":(it.days!==null&&it.days<0?"overdue":(it.days!==null&&it.days<=7?"soon":"open"))]++;});
  return c;
}
// ホームに出すフォロー要約カード（やることが1件も無ければ非表示）
function followCardHTML(){
  const c=followCounts();
  const total=c.overdue+c.soon+c.open+c.done;
  if(!total)return "";
  const urgent=c.overdue;
  const pill=urgent?`<span class="fc-pill">${urgent}</span>`:`<span class="fc-pill zero">✓</span>`;
  const parts=[];
  if(c.overdue)parts.push(`期限切れ ${c.overdue}`);
  if(c.soon)parts.push(`今週 ${c.soon}`);
  const open=c.open; if(open)parts.push(`未完 ${open}`);
  const sub = parts.length?parts.join(" ・ "):`未完了なし・約束は全部完了`;
  return `<div class="followcard card" onclick="go({view:'follow'})">
      <div class="fc-ic">⏰</div>
      <div class="fc-main"><div class="fc-title">フォロー</div><div class="fc-sub">${sub}</div></div>
      ${pill}<span class="chev">›</span>
    </div>`;
}
function dlLabel(it){
  if(!it.deadline)return `<span class="dl none">期限なし</span>`;
  const cls = it.done ? "future" : (it.days<0?"overdue":(it.days<=7?"soon":"future"));
  let txt;
  if(it.done) txt=`${fmtFull(it.deadline)}まで`;
  else if(it.days<0) txt=`${-it.days}日 超過`;
  else if(it.days===0) txt=`今日まで`;
  else if(it.days<=7) txt=`あと${it.days}日`;
  else txt=`${fmtFull(it.deadline)}まで`;
  return `<span class="dl ${cls}">${txt}</span>`;
}
function renderFollow(){
  const root=$("#followView");
  const items=collectFollowItems();
  if(!items.length){
    root.innerHTML=`<div class="empty"><div class="big">🌱</div>追いかける約束はまだありません。<br>会話の「🚀 アクション宣言」でやることを決めると、ここに集まります。</div>`;
    return;
  }
  const groups=[
    {key:"overdue",cls:"overdue",icon:"⏰",label:"期限切れ・未完了",
      sort:(a,b)=>a.days-b.days, filter:it=>!it.done&&it.days!==null&&it.days<0},
    {key:"soon",cls:"soon",icon:"📋",label:"今週まで（7日以内）",
      sort:(a,b)=>a.days-b.days, filter:it=>!it.done&&it.days!==null&&it.days>=0&&it.days<=7},
    {key:"open",cls:"open",icon:"📥",label:"その他の未完了",
      sort:(a,b)=>(a.days===null)-(b.days===null)||(a.days||0)-(b.days||0), filter:it=>!it.done&&(it.days===null||it.days>7)},
    {key:"done",cls:"done",icon:"✅",label:"最近 完了したもの",
      sort:(a,b)=>(b.doneAt||b.sessionDate).localeCompare(a.doneAt||a.sessionDate), filter:it=>it.done, limit:20},
  ];
  let html="";
  groups.forEach(g=>{
    let arr=items.filter(g.filter).sort(g.sort);
    if(g.limit)arr=arr.slice(0,g.limit);
    if(!arr.length)return;
    html+=`<div class="fgroup-lead ${g.cls}"><span>${g.icon}</span><span>${g.label}</span><span class="cnt">${arr.length}</span></div>`;
    html+=arr.map(it=>{
      const tok=`${it.memberId}|${it.sessionId}|${it.todoId}`;
      return `<div class="fitem card ${it.done?'is-done':''}">
        <button class="step-check ${it.done?'on':''}" data-fcheck="${tok}">${it.done?'✓':''}</button>
        <div class="fbody" data-fopen="${it.memberId}|${it.sessionId}">
          <div class="ftext">${esc(it.text)}</div>
          <div class="fmeta">
            <span class="who"><span class="av">${esc(initial(it.memberName))}</span>${esc(it.memberName)}</span>
            <span>・</span>${dlLabel(it)}
          </div>
        </div>
      </div>`;
    }).join("");
  });
  root.innerHTML=html;
  root.querySelectorAll("[data-fcheck]").forEach(b=>b.onclick=()=>toggleFollowTodo(b.dataset.fcheck));
  root.querySelectorAll("[data-fopen]").forEach(el=>el.onclick=()=>{
    const[mid,sid]=el.dataset.fopen.split("|");
    go({view:"editor",memberId:mid,sessionId:sid});
  });
}
// フォロー一覧から直接 done を切り替え → 実体の todo に書き戻して保存
function toggleFollowTodo(tok){
  const[mid,sid,tid]=tok.split("|");
  const m=memberById(mid);if(!m)return;
  const s=(m.sessions||[]).find(x=>x.id===sid);if(!s||!s.action)return;
  const t=(s.action.todos||[]).find(x=>x.id===tid);if(!t)return;
  t.done=!t.done;
  if(t.done)t.doneAt=todayStr(); else delete t.doneAt;
  m.updatedAt=Date.now();save();
  renderFollow();
}

/* ---------- 成長グラフ ---------- */
function growthPoints(m,series){
  const arr=[...m.sessions].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:((a.createdAt||0)-(b.createdAt||0)));
  const pts=[];
  arr.forEach(s=>{
    const v = series==="nps" ? (typeof s.nps==="number"?s.nps:null)
                             : (typeof s.progressAt==="number"?s.progressAt:null);
    if(v===null) return;
    pts.push({date:s.date,v:v});
  });
  return pts;
}
function drawGrowth(m){
  const cv=$("#growthCanvas"); if(!cv)return;
  const empty=$("#growthEmpty");
  const series=growthSeries;
  const pts=growthPoints(m,series);

  const cssW=cv.clientWidth||cv.parentElement.clientWidth||320, cssH=200;
  const dpr=window.devicePixelRatio||1;
  cv.width=cssW*dpr; cv.height=cssH*dpr;
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cssW,cssH);

  if(pts.length===0){
    empty.style.display="flex";
    empty.textContent = series==="nps"
      ? "会話の「📊 数値メモ（NPS実数値など）」を入れると、ここに推移が出ます。"
      : "新しく会話を保存すると、その時点の進捗%が点として残ります。";
    return;
  }
  empty.style.display="none";

  const accent = series==="progress" ? "#34c759" : "#0071e3";
  const padL=40,padR=14,padT=16,padB=30;
  const gx=padL,gy=padT,gw=cssW-padL-padR,gh=cssH-padT-padB;

  let lo,hi;
  if(series==="progress"){ lo=0; hi=100; }
  else{
    const vs=pts.map(p=>p.v); let mn=Math.min.apply(null,vs), mx=Math.max.apply(null,vs);
    if(mn===mx){ const pad=Math.max(Math.abs(mn)*0.1,5); lo=mn-pad; hi=mx+pad; }
    else{ const r=mx-mn; lo=mn-r*0.15; hi=mx+r*0.15; }
  }
  const n=pts.length;
  const px=i=> n===1 ? gx+gw/2 : gx + gw*i/(n-1);
  const py=v=> gy+gh-gh*((v-lo)/(hi-lo));

  // grid + y labels
  ctx.strokeStyle="#ececf0"; ctx.lineWidth=1; ctx.fillStyle="#9a9aa0";
  ctx.font='11px -apple-system,"Hiragino Sans",sans-serif'; ctx.textBaseline="middle";
  const steps=4;
  for(let i=0;i<=steps;i++){ const v=lo+(hi-lo)*i/steps, yy=py(v);
    ctx.beginPath(); ctx.moveTo(gx,yy); ctx.lineTo(gx+gw,yy); ctx.stroke();
    ctx.textAlign="right"; ctx.fillText(Math.round(v*10)/10, gx-6, yy);
  }
  // x labels（日付 M/D・多いときは間引き）
  ctx.textBaseline="top"; ctx.textAlign="center"; ctx.fillStyle="#9a9aa0";
  const maxLabels=5, stepL=Math.ceil(n/maxLabels);
  pts.forEach((p,i)=>{ if(n>maxLabels && i%stepL!==0 && i!==n-1) return;
    const parts=p.date.split("-"); ctx.fillText((+parts[1])+"/"+(+parts[2]), px(i), gy+gh+8);
  });
  // line
  ctx.strokeStyle=accent; ctx.lineWidth=2.5; ctx.lineJoin="round";
  ctx.beginPath(); pts.forEach((p,i)=>{ const x=px(i),y=py(p.v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.stroke();
  // points (+ value labels when few)
  pts.forEach((p,i)=>{ const x=px(i),y=py(p.v);
    ctx.fillStyle=accent; ctx.beginPath(); ctx.arc(x,y,4,0,7); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(x,y,1.8,0,7); ctx.fill();
    if(n<=8){ ctx.fillStyle="#1d1d1f"; ctx.font='600 11px -apple-system,"Hiragino Sans",sans-serif';
      ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText(Math.round(p.v*10)/10, x, Math.max(y-7, gy+8));
    }
  });
}

      <label>🪜 やること<span class="hint">ゴールに向けた具体的な行動。チェックで進捗管理</span></label>
      <div id="todoList"></div>
      <button class="btn line addbtn" id="addTodo">＋ やることを追加</button>

      ${s?'<button class="btn danger" id="delBtn">この会話を削除</button>':''}
    </div>
  `;

  ["f_goal","f_reality","f_keep","f_more","f_insight"].forEach(id=>{const e=$("#"+id);autoGrow(e);e.addEventListener("input",()=>autoGrow(e));});

  /* ideas list */
  function renderIdeas(){
    const c=$("#ideaList");
    if(!ideas.length){c.innerHTML=`<div class="muted" style="font-size:13px;padding:4px 2px 8px">まだアイデアがありません（このセッションでは無くてもOK）</div>`;return;}
    c.innerHTML=ideas.map((t,i)=>`
      <div class="idea-row">
        <input type="text" data-idea="${i}" value="${esc(t)}" placeholder="${esc(m.name)}自身から出たアイデア">
        <button class="row-del" data-idel="${i}">✕</button>
      </div>`).join("");
    c.querySelectorAll("[data-idea]").forEach(inp=>inp.oninput=()=>{ideas[+inp.dataset.idea]=inp.value;refreshMaterials();});
    c.querySelectorAll("[data-idel]").forEach(b=>b.onclick=()=>{ideas.splice(+b.dataset.idel,1);renderIdeas();refreshMaterials();});
  }
  renderIdeas();
  $("#addIdea").onclick=()=>{ideas.push("");renderIdeas();const ins=$("#ideaList").querySelectorAll("[data-idea]");if(ins.length)ins[ins.length-1].focus();};

  /* advice list */
  function renderAdvice(){
    const c=$("#adviceList");
    if(!advice.length){c.innerHTML=`<div class="muted" style="font-size:13px;padding:4px 2px 8px">まだアドバイスがありません</div>`;return;}
    c.innerHTML=advice.map((a,i)=>`
      <div class="advice-row">
        <div class="ar-top">
          <textarea data-adv="${i}" placeholder="もらったアドバイス（例：Appleのエコシステムを使ったら？）">${esc(a.text)}</textarea>
          <button class="row-del" data-adel="${i}">✕</button>
        </div>
        <div class="ar-by"><span class="lbl">🗣 誰から</span><input type="text" data-by="${i}" value="${esc(a.by)}" placeholder="例：Kodai"></div>
      </div>`).join("");
    c.querySelectorAll("[data-adv]").forEach(t=>{autoGrow(t);t.oninput=()=>{advice[+t.dataset.adv].text=t.value;autoGrow(t);refreshMaterials();};});
    c.querySelectorAll("[data-by]").forEach(inp=>inp.oninput=()=>{advice[+inp.dataset.by].by=inp.value;refreshMaterials();});
    c.querySelectorAll("[data-adel]").forEach(b=>b.onclick=()=>{advice.splice(+b.dataset.adel,1);renderAdvice();refreshMaterials();});
  }
  renderAdvice();
  $("#addAdvice").onclick=()=>{advice.push({text:"",by:""});renderAdvice();const ts=$("#adviceList").querySelectorAll("[data-adv]");if(ts.length)ts[ts.length-1].focus();};

  /* materials live echo */
  function refreshMaterials(){
    const box=$("#materials");
    const items=[];
    ideas.forEach(t=>{if(t&&t.trim())items.push(`<li>${esc(t)} <span class="by">🙋 ${esc(m.name)}</span></li>`);});
    advice.forEach(a=>{if(a.text&&a.text.trim())items.push(`<li>${esc(a.text)}${a.by&&a.by.trim()?` <span class="by">🗣 ${esc(a.by)}</span>`:""}</li>`);});
    if(items.length){box.innerHTML=`<h4>🧩 束ねる材料（${items.length}）</h4><ul>${items.join("")}</ul>`;}
    else{box.innerHTML=`<p class="none">アイデアやアドバイスを入れると、ここに材料が並びます。それを見て下の一文に束ねよう。</p>`;}
  }
  refreshMaterials();

  /* todos */
  function renderTodos(){
    const c=$("#todoList");
    if(!todos.length){c.innerHTML=`<div class="muted" style="font-size:13px;padding:4px 2px 8px">まだやることがありません</div>`;return;}
    c.innerHTML=todos.map((st,i)=>`
      <div class="step ${st.done?'done':''}">
        <button class="step-check ${st.done?'on':''}" data-toggle="${i}">${st.done?'✓':''}</button>
        <input type="text" data-todo="${i}" value="${esc(st.text)}" placeholder="例：チームと共有して次の接客で試す">
        <button class="step-del" data-tdel="${i}">✕</button>
      </div>`).join("");
    c.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{const i=+b.dataset.toggle;todos[i].done=!todos[i].done;todos[i].doneAt=todos[i].done?todayStr():"";renderTodos();});
    c.querySelectorAll("[data-todo]").forEach(inp=>inp.oninput=()=>{todos[+inp.dataset.todo].text=inp.value;});
    c.querySelectorAll("[data-tdel]").forEach(b=>b.onclick=()=>{todos.splice(+b.dataset.tdel,1);renderTodos();});
  }
  renderTodos();
  $("#addTodo").onclick=()=>{todos.push({id:uid(),text:"",done:false});renderTodos();const ins=$("#todoList").querySelectorAll("[data-todo]");if(ins.length)ins[ins.length-1].focus();};

  /* build + persist */
  let workingId=s?s.id:null;
  function buildRec(){
    if(!workingId)workingId=uid();
    const ex=m.sessions.find(x=>x.id===workingId);
    const npsRaw=($("#f_nps").value||"").trim();
    const npsVal=npsRaw===""?null:(isFinite(+npsRaw)?+npsRaw:null);
    // 進捗%スナップショット：既存セッションは元の値を保持、新規はその時点のメンバー進捗を記録
    const prevProgAt = (ex&&typeof ex.progressAt==="number") ? ex.progressAt
      : ((s&&typeof s.progressAt==="number") ? s.progressAt : null);
    const progAt = prevProgAt!==null ? prevProgAt : (typeof m.progress==="number"?m.progress:null);
    return {
      id:workingId,
      date:$("#f_date").value||todayStr(),
      nps:npsVal,
      progressAt:progAt,
      goal:$("#f_goal").value.trim(),
      reality:$("#f_reality").value.trim(),
      feedback:{keep:$("#f_keep").value.trim(),more:$("#f_more").value.trim()},
      memberIdeas:ideas.map(t=>t.trim()).filter(Boolean),
      advice:advice.map(a=>({text:a.text.trim(),by:a.by.trim()})).filter(a=>a.text),
      insight:$("#f_insight").value.trim(),
      action:{deadline:$("#f_deadline").value||"",todos:todos.map(t=>({id:t.id,text:t.text.trim(),done:t.done,doneAt:t.done?(t.doneAt||todayStr()):""})).filter(t=>t.text)},
      createdAt:ex?ex.createdAt:(s?s.createdAt:Date.now()),
      updatedAt:Date.now()
    };
  }
  function persist(rec){
    const idx=m.sessions.findIndex(x=>x.id===rec.id);
    if(idx>=0)m.sessions[idx]=rec;else m.sessions.push(rec);
    m.updatedAt=Date.now();save();
    if(window.Career)Career.log({action:"grow",summary:"1on1ノートを記録："+(m.name||"メンバー")+"さん"+(rec.goal?"（"+rec.goal.slice(0,30)+"）":"")});
    return rec;
  }

  $("#saveBtn").onclick=()=>{
    const rec=buildRec();
    if(!sessHasContent(rec)){toast("何か入力してね");return;}
    persist(rec);toast(s?"更新しました":"保存しました");go({view:"member"});
  };
  $("#imgBtn").onclick=()=>{
    const rec=buildRec();
    if(!sessHasContent(rec)){toast("先に内容を入力してね");return;}
    exportSessionImage(rec,m);
  };
  const del=$("#delBtn");
  if(del)del.onclick=()=>confirmSheet("この会話を削除しますか？","削除した記録は元に戻せません。",()=>{
    m.sessions=m.sessions.filter(x=>x.id!==s.id);m.updatedAt=Date.now();save();toast("削除しました");go({view:"member"});
  });
}

/* ---------- image export ---------- */
const IMG_FONT=(w,s)=>`${w} ${s}px -apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif`;
function wrapPara(ctx,text,maxW){
  const out=[];
  (text||"").split("\n").forEach(p=>{
    if(!p){out.push("");return;}
    let line="";
    for(const ch of p){
      if(ctx.measureText(line+ch).width>maxW && line){out.push(line);line=ch;}
      else line+=ch;
    }
    out.push(line);
  });
  return out;
}
function exportSessionImage(s,m){
  const W=540,PAD=22,CARDX=PAD,CARDW=W-PAD*2,IN=18,GAP=13,maxTextW=CARDW-IN*2;
  const mc=document.createElement("canvas").getContext("2d");

  const sections=[];
  if(s.goal)sections.push({emoji:"🎯",label:"ゴール",lc:"#0071e3",bg:"#f4f8ff",bd:"#cfe3fb",
    blocks:[{text:s.goal,font:IMG_FONT(700,20),color:"#1d1d1f",lineH:29}]});
  if(s.reality)sections.push({emoji:"📍",label:"現状",lc:"#0071e3",bg:"#f4f8ff",bd:"#cfe3fb",
    blocks:[{text:s.reality,font:IMG_FONT(500,18),color:"#1d1d1f",lineH:27}]});
  const fb=s.feedback||{};
  if((fb.keep&&fb.keep.trim())||(fb.more&&fb.more.trim())){
    const blocks=[];
    if(fb.keep&&fb.keep.trim()){blocks.push({text:"👍 Success",font:IMG_FONT(700,14),color:"#1f8a3b",lineH:22});
      blocks.push({text:fb.keep,font:IMG_FONT(500,17),color:"#1d1d1f",lineH:26,gap:6});}
    if(fb.more&&fb.more.trim()){blocks.push({text:"📈 Opportunity",font:IMG_FONT(700,14),color:"#0a59b8",lineH:22});
      blocks.push({text:fb.more,font:IMG_FONT(500,17),color:"#1d1d1f",lineH:26});}
    sections.push({emoji:"💬",label:"Reflection",lc:"#6e6e73",bg:"#fafafa",bd:"#e3e3e6",blocks});
  }
  const ideas=(s.memberIdeas||[]).filter(x=>x&&x.trim());
  const adv=(s.advice||[]).filter(a=>a.text&&a.text.trim());
  if(ideas.length||adv.length){
    const blocks=[];
    ideas.forEach(t=>blocks.push({text:`• ${t}　🙋${m.name}`,font:IMG_FONT(500,17),color:"#1d1d1f",lineH:26}));
    adv.forEach(a=>blocks.push({text:`• ${a.text}${a.by?`　🗣${a.by}`:""}`,font:IMG_FONT(500,17),color:"#1d1d1f",lineH:26}));
    sections.push({emoji:"💡",label:"Ways Forward",lc:"#0071e3",bg:"#f4f8ff",bd:"#cfe3fb",blocks});
  }
  if(s.insight&&s.insight.trim())sections.push({emoji:"⭐",label:"今日からできること",lc:"#9a6b00",bg:"#fff7e6",bd:"#f1d99a",
    blocks:[{text:s.insight,font:IMG_FONT(700,20),color:"#1d1d1f",lineH:29}]});
  const act=s.action||{};const todos=(act.todos||[]).filter(t=>t.text&&t.text.trim());
  if(act.deadline||todos.length){
    const blocks=[];
    if(act.deadline)blocks.push({text:`📅 期限：${fmtFull(act.deadline)}`,font:IMG_FONT(700,17),color:"#0071e3",lineH:26,gap:4});
    todos.forEach(t=>blocks.push({text:`${t.done?"✓":"□"} ${t.text}`,font:IMG_FONT(500,17),color:t.done?"#34c759":"#1d1d1f",lineH:26}));
    sections.push({emoji:"🚀",label:"アクション宣言",lc:"#0071e3",bg:"#f4f8ff",bd:"#cfe3fb",blocks});
  }

  mc.font=IMG_FONT(500,15);
  const goalLines=m.goal?wrapPara(mc,"🎯 "+m.goal,CARDW):[];

  sections.forEach(sec=>{
    let h=IN+26+6;
    sec._wrapped=sec.blocks.map(b=>{mc.font=b.font;const wl=wrapPara(mc,b.text,maxTextW);h+=wl.length*b.lineH+(b.gap||0);return wl;});
    h+=IN;sec._h=h;
  });
  const headH=102+8+(goalLines.length?goalLines.length*21+6:0);
  const footerH=42;
  const totalH=Math.ceil(headH+sections.reduce((a,s)=>a+s._h+GAP,0)+footerH);

  const scale=2,cv=document.createElement("canvas");
  cv.width=W*scale;cv.height=totalH*scale;
  const ctx=cv.getContext("2d");ctx.scale(scale,scale);ctx.textBaseline="top";
  ctx.fillStyle="#f5f5f7";ctx.fillRect(0,0,W,totalH);
  function rr(x,yy,w,h,r){ctx.beginPath();ctx.moveTo(x+r,yy);ctx.arcTo(x+w,yy,x+w,yy+h,r);ctx.arcTo(x+w,yy+h,x,yy+h,r);ctx.arcTo(x,yy+h,x,yy,r);ctx.arcTo(x,yy,x+w,yy,r);ctx.closePath();}

  let y=24;
  ctx.fillStyle="#0071e3";ctx.font=IMG_FONT(800,16);ctx.fillText("🌱 GROW ノート",PAD,y);
  ctx.font=IMG_FONT(700,14);const dtxt=fmtFull(s.date),dw=ctx.measureText(dtxt).width;
  ctx.fillStyle="#e8f1fd";rr(W-PAD-dw-20,y-3,dw+20,24,12);ctx.fill();
  ctx.fillStyle="#0071e3";ctx.fillText(dtxt,W-PAD-dw-10,y);
  y+=26;
  const av=40,ax=PAD,ay=y;
  ctx.fillStyle="#e8f1fd";ctx.beginPath();ctx.arc(ax+av/2,ay+av/2,av/2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#0071e3";ctx.font=IMG_FONT(700,20);ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(initial(m.name),ax+av/2,ay+av/2+1);ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillStyle="#1d1d1f";ctx.font=IMG_FONT(800,24);ctx.fillText(m.name,ax+av+12,ay+8);
  y+=52;
  if(goalLines.length){ctx.font=IMG_FONT(500,15);ctx.fillStyle="#6e6e73";goalLines.forEach(l=>{ctx.fillText(l,PAD,y);y+=21;});y+=6;}
  y+=8;

  sections.forEach(sec=>{
    const cardY=y;
    ctx.fillStyle=sec.bg;rr(CARDX,cardY,CARDW,sec._h,16);ctx.fill();
    ctx.strokeStyle=sec.bd;ctx.lineWidth=1;rr(CARDX+.5,cardY+.5,CARDW-1,sec._h-1,16);ctx.stroke();
    let cy=cardY+IN;
    ctx.font=IMG_FONT(700,15);ctx.fillStyle=sec.lc;ctx.fillText(`${sec.emoji} ${sec.label}`,CARDX+IN,cy);
    cy+=32;
    sec.blocks.forEach((b,bi)=>{ctx.font=b.font;ctx.fillStyle=b.color;sec._wrapped[bi].forEach(l=>{ctx.fillText(l,CARDX+IN,cy);cy+=b.lineH;});cy+=(b.gap||0);});
    y=cardY+sec._h+GAP;
  });
  ctx.fillStyle="#9a9aa0";ctx.font=IMG_FONT(500,12);ctx.fillText(`GROW ノート ・ ${m.name} ・ ${fmtFull(s.date)}`,PAD,y+8);

  const fname=`GROW_${(m.name||"member").replace(/[\\/:*?"<>|\s]/g,"_")}_${s.date}.png`;
  cv.toBlob(b=>{if(!b){toast("画像化に失敗しました");return;}showImageSheet(URL.createObjectURL(b),b,fname);},"image/png");
}
function showImageSheet(url,blob,fname){
  openSheet(`<h3>🖼 画像で書き出し</h3><p class="sub">画像を長押しでも保存・共有できます。下のボタンからもどうぞ。</p>
    <div class="imgwrap"><img src="${url}" alt="会話の記録"></div>
    <div class="sheet-actions"><button class="btn line" onclick="closeSheet()">閉じる</button><button class="btn" id="img_share">保存・共有</button></div>`);
  $("#img_share").onclick=async()=>{
    try{
      const file=new File([blob],fname,{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"GROW ノート"});}
      else{const a=document.createElement("a");a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();toast("画像を保存しました");}
    }catch(e){}
  };
}

function buildBackup(){

}
function transferSheet(){
  const backup=buildBackup();
  openSheet(`<h3>⚙️ データの引き継ぎ・バックアップ</h3>
    <p class="sub">記録はこの端末の中だけに保存されています。別のブラウザ／端末で続けるには、ここで書き出して、向こうで読み込みます。</p>
    <div class="field" style="margin:6px 0 16px">
      <label>📤 書き出す（バックアップ）<span class="hint">下のテキストがいまの全データ。コピー or ファイル保存で持ち出せます</span></label>
      <textarea id="bkText" spellcheck="false" style="min-height:118px;font-size:12px;line-height:1.45">${esc(backup)}</textarea>
      <div class="bk-actions">
        <button class="btn line" id="bkCopy">📋 コピー</button>
        <button class="btn line" id="bkDownload">⤓ ファイル保存</button>
      </div>
    </div>
    <div class="field" style="margin:0">
      <label>📥 読み込む（復元）<span class="hint">別ブラウザでは、コピーした内容を上の枠に貼り付けて「復元」。ファイルからでもOK</span></label>
      <input type="file" id="bkFileInput" accept="application/json,.json,.txt" hidden>
      <div class="bk-actions">
        <button class="btn line" id="bkFileBtn">📂 ファイルを選ぶ</button>
        <button class="btn" id="bkRestore">この内容で復元する</button>
      </div>
    </div>
    <p id="bkMsg" class="sub" style="margin:12px 2px 0;min-height:18px"></p>`);

  const txt=$("#bkText"),msg=$("#bkMsg");
  const setMsg=(t,err)=>{msg.textContent=t;msg.style.color=err?"var(--danger)":"var(--accent)";};

  $("#bkCopy").onclick=()=>{
    const v=txt.value;const ok=()=>setMsg("コピーしました。メモやLINE等に貼って保存できます。");
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(v).then(ok).catch(()=>{txt.focus();txt.select();try{document.execCommand("copy");}catch(e){}ok();});}
    else{txt.focus();txt.select();try{document.execCommand("copy");}catch(e){}ok();}
  };
  $("#bkDownload").onclick=()=>{
    const blob=new Blob([txt.value],{type:"application/json"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`grownote-backup-${todayStr().replace(/-/g,"")}.json`;
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),300);
    setMsg("バックアップファイルを書き出しました。");
  };
  $("#bkFileBtn").onclick=()=>$("#bkFileInput").click();
  $("#bkFileInput").addEventListener("change",e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const rd=new FileReader();rd.onload=()=>{txt.value=rd.result;doRestore();};rd.readAsText(f);e.target.value="";
  });
  $("#bkRestore").onclick=doRestore;

  function doRestore(){
    let parsed;
    try{parsed=JSON.parse(txt.value);}catch(e){setMsg("読み込めませんでした。内容（文字列）を確認してね。",true);return;}
    const incoming=(parsed&&parsed.grownote_v1)?parsed.grownote_v1:parsed;
    if(!incoming||!Array.isArray(incoming.members)){setMsg("このバックアップに GROW ノートのデータが見つかりませんでした。",true);return;}
    incoming.members.forEach(m=>{if(typeof m.progress!=="number")m.progress=0;if(!Array.isArray(m.sessions))m.sessions=[];});
    const apply=()=>{localStorage.setItem(KEY,JSON.stringify(incoming));DB=load();scheduleCloud();closeSheet();go({view:"home"});toast("復元しました 🎉");};
    if(DB.members.length){
      openSheet(`<h3>現在のデータを置き換えますか？</h3>
        <p class="sub">いまの <b>${DB.members.length}人</b> の記録は、読み込むデータ（<b>${incoming.members.length}人</b>）で上書きされます。元に戻せません。</p>
        <div class="sheet-actions"><button class="btn line" id="r_cancel">やめる</button><button class="btn" id="r_ok">置き換える</button></div>`);
      $("#r_cancel").onclick=()=>transferSheet();
      $("#r_ok").onclick=apply;
    }else apply();
  }
}

/* ---------- CSV ---------- */
function csvCell(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"';}
function exportCSV(){
  const head=["メンバー","叶えたいゴール","達成度(%)","日付","NPS実数値","今回のゴール","現状","Success","Opportunity","本人のアイデア","もらったアドバイス","今日からできること","期限","アクション"];
  const rows=[head];
  DB.members.forEach(m=>{
    const pg=m.progress||0;
    if(!m.sessions.length){rows.push([m.name,m.goal,pg,"","","","","","","","","","",""]);return;}
    [...m.sessions].sort((a,b)=>a.date<b.date?-1:1).forEach(s=>{
      const fb=s.feedback||{};const act=s.action||{};
      const ideas=(s.memberIdeas||[]).filter(Boolean).join(" / ");
      const adv=(s.advice||[]).filter(a=>a.text).map(a=>a.by?`${a.text}（${a.by}）`:a.text).join(" / ");
      const todos=(act.todos||[]).filter(t=>t.text).map(t=>`${t.done?"✓":"□"} ${t.text}`).join(" / ");
      const npsCell=typeof s.nps==="number"?s.nps:"";
      rows.push([m.name,m.goal,pg,s.date,npsCell,s.goal||"",s.reality||"",fb.keep||"",fb.more||"",ideas,adv,s.insight||"",act.deadline||"",todos]);
    });
  });
  const csv="﻿"+rows.map(r=>r.map(csvCell).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`GROWノート_${todayStr().replace(/-/g,"")}.csv`;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("CSVを書き出しました");
}

window.go=go;window.closeSheet=closeSheet;window.editGoalSheet=editGoalSheet;window.transferSheet=transferSheet;
render();
bootstrapCloud();
document.addEventListener("visibilitychange",function(){
  if(document.visibilityState==="visible" && !dirty){
    pullCloud().then(function(changed){ if(changed){render();setSync("✓ 同期済み");} });
  }
});
</script>

<style>
  #tsumikiBack{
    position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:12px; z-index:1000;

    will-change:transform,opacity;
  }
  #tsumikiBack.show{display:inline-flex;}
  #tsumikiBack.hide{transform:translateX(-130%); opacity:0; pointer-events:none;}
  #tsumikiBack:active{transform:scale(.95);}
  #tsumikiEdge{position:fixed; top:0; bottom:0; left:0; width:22px; z-index:999;}
  #tsumikiPeek{
    position:fixed; top:50%; left:0; z-index:1001; margin-top:-23px;
    width:46px; height:46px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:saturate(180%) blur(14px); backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(0,0,0,.06); border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.18);
    color:#0071e3; font-size:24px; font-weight:600; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
    transform:translateX(-70px) scale(.8); opacity:0; pointer-events:none;
  }
</style>
<a id="tsumikiBack" href="index.html">‹ つみき</a>
<div id="tsumikiEdge"></div>
<div id="tsumikiPeek">‹</div>
<script>
  (function(){
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
    var fromTsumiki = false;
    try{
      if(document.referrer){
        var r = new URL(document.referrer);
        fromTsumiki = (r.origin === location.origin);
      }
    }catch(e){}
    if(!(standalone && fromTsumiki)) return;

    var pill = document.getElementById('tsumikiBack');
    var peek = document.getElementById('tsumikiPeek');
    var edge = document.getElementById('tsumikiEdge');
    pill.classList.add('show');

    function goBack(){ location.href = 'index.html'; }

    /* --- ピルをスクロールで自動的に出し入れ（iOSツールバー流） --- */
    var lastY = window.scrollY || 0, ticking = false;
    function onScroll(){
      var y = window.scrollY || 0;
      if(y <= 4){ pill.classList.remove('hide'); }
      else if(y > lastY + 6){ pill.classList.add('hide'); }
      else if(y < lastY - 6){ pill.classList.remove('hide'); }
      lastY = y; ticking = false;
    }
    window.addEventListener('scroll', function(){
      if(!ticking){ window.requestAnimationFrame(onScroll); ticking = true; }
    }, {passive:true});

    /* --- 左端エッジスワイプで戻る（iOS純正の戻る操作） --- */
    var sx=0, sy=0, prog=0, dragging=false, W=window.innerWidth;
    var TRIGGER = Math.min(120, W*0.32);
    window.addEventListener('resize', function(){ W=window.innerWidth; TRIGGER=Math.min(120, W*0.32); });

    function reset(){
      dragging = false; prog = 0;
      peek.style.transition = 'transform .25s ease, opacity .25s ease';
      peek.style.transform = 'translateX(-70px) scale(.8)';
      peek.style.opacity = 0;
    }
    function start(e){
      var t = e.touches ? e.touches[0] : e;
      if(t.clientX > 26) return;
      sx = t.clientX; sy = t.clientY; prog = 0; dragging = true;
      peek.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      var t = e.touches ? e.touches[0] : e;
      var dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dy) > Math.abs(dx) + 12){ reset(); return; }
      if(dx < 0) dx = 0;
      prog = Math.min(dx / TRIGGER, 1);
      peek.style.transform = 'translateX(' + (-70 + prog*82) + 'px) scale(' + (0.8 + prog*0.2) + ')';
      peek.style.opacity = prog;
      if(dx > 6 && e.cancelable) e.preventDefault();
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      if(prog >= 0.999){
        peek.style.transition = 'transform .25s ease, opacity .25s ease';
        peek.style.transform = 'translateX(20px) scale(1.05)';
        peek.style.opacity = 1;
        goBack();
      }else{
        reset();
      }
    }
    edge.addEventListener('touchstart', start, {passive:true});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end, {passive:true});
    window.addEventListener('touchcancel', end, {passive:true});
  })();
</script>
